<meta name="viewport" content="width=device-width, initial-scale=1">
<title>依照G.H.的激情</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #eae9e4;
  --ink:     #1c1c24;
  --dim:     #6a6a78;
  --accent:  #8fa5c4;
  --rule:    #ccccc4;
  --nav-h:   56px;
  --bar-h:   2px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Songti SC", "STSong", "FangSong", "Noto Serif CJK TC",
               "AR PL UMing TW", Georgia, serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  user-select: none;
}

/* ── Progress bar ── */
#bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: var(--rule);
  z-index: 10;
}
#bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  width: 0%;
}

/* ── Outer layout ── */
#reader {
  position: fixed;
  inset: var(--bar-h) 0 var(--nav-h) 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Page stage ── */
#stage {
  position: relative;
  width: min(560px, 90vw);
  height: 100%;
  overflow: hidden;
  touch-action: pan-y;
}

/* ── Page layers ── */
.pg {
  position: absolute;
  inset: 0;
  padding: clamp(2rem, 5vh, 3.5rem) clamp(1.25rem, 4vw, 2rem);
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  will-change: transform, opacity;
}
.pg::-webkit-scrollbar { display: none; }

/* ── Typography ── */
.pg h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 400;
  line-height: 1.4;
  letter-spacing: 0.08em;
  color: var(--ink);
  text-wrap: balance;
}
.pg h2 {
  font-size: 1.05rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--dim);
  margin-bottom: 1.8rem;
}
.pg p {
  font-size: clamp(15px, 2.2vw, 17px);
  line-height: 2.0;
  margin-bottom: 1.4em;
  text-align: justify;
  hanging-punctuation: first last;
}
.pg p:last-child { margin-bottom: 0; }
.pg p.author {
  font-size: 0.95rem;
  color: var(--dim);
  margin-top: 1.2rem;
}
.pg p.meta {
  font-size: 0.8rem;
  color: var(--dim);
  letter-spacing: 0.05em;
  line-height: 1.9;
  margin-top: 0.4rem;
}
.pg p.em-line {
  font-size: 0.9rem;
  color: var(--dim);
  font-style: italic;
  letter-spacing: 0.04em;
  margin-bottom: 1.6em;
}
.pg blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 1.2em;
  margin: 0 0 1.4em;
  font-size: 0.9rem;
  color: var(--dim);
  font-style: italic;
  line-height: 1.85;
}

/* ── Cover page ── */
.pg .cover {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  height: 100%;
  padding: 1rem 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.pg .cover h1 {
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  letter-spacing: 0.1em;
  margin-bottom: 2rem;
}
.pg .cover .author {
  font-size: 0.95rem;
  margin-top: 0;
  margin-bottom: 2rem;
}
.pg .cover .meta {
  margin-top: 0;
}

/* ── Divider page ── */
.pg .divider-page {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.pg .divider-page .dot {
  font-size: 2rem;
  color: var(--accent);
  opacity: 0.7;
}

/* ── Scene break ── */
.pg .scene-break {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  color: var(--dim);
}

/* ── Page animations ── */
@keyframes slideInR {
  from { transform: translateX(32px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideInL {
  from { transform: translateX(-32px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
@keyframes slideOutL {
  from { transform: translateX(0);     opacity: 1; }
  to   { transform: translateX(-32px); opacity: 0; }
}
@keyframes slideOutR {
  from { transform: translateX(0);    opacity: 1; }
  to   { transform: translateX(32px); opacity: 0; }
}

.anim-in-r  { animation: slideInR  0.32s cubic-bezier(0.4, 0, 0.2, 1) both; }
.anim-in-l  { animation: slideInL  0.32s cubic-bezier(0.4, 0, 0.2, 1) both; }
.anim-out-l { animation: slideOutL 0.32s cubic-bezier(0.4, 0, 0.2, 1) both; }
.anim-out-r { animation: slideOutR 0.32s cubic-bezier(0.4, 0, 0.2, 1) both; }

@media (prefers-reduced-motion: reduce) {
  .anim-in-r, .anim-in-l, .anim-out-l, .anim-out-r { animation: none; }
}

/* ── Home link ── */
#home-link {
  position: fixed;
  top: calc(var(--bar-h) + 10px);
  left: 14px;
  font-family: "PingFang TC", "Noto Sans CJK TC", sans-serif;
  font-size: 0.72rem;
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 0.08em;
  z-index: 9;
  opacity: 0.7;
  transition: opacity 0.15s;
}
#home-link:hover { opacity: 1; }

/* ── Nav bar ── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  border-top: 1px solid var(--rule);
  background: var(--bg);
}
#nav button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--dim);
  font-size: 1.1rem;
  padding: 0.5rem 1.2rem;
  line-height: 1;
  transition: color 0.15s;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
#nav button:hover  { color: var(--ink); }
#nav button:active { color: var(--ink); }
#nav button:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 2px;
}
#nav button:disabled { opacity: 0.25; cursor: default; }
#pg-info {
  font-family: "PingFang TC", "Noto Sans CJK TC", "Microsoft JhengHei", sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--dim);
  min-width: 6ch;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
</style>

<div id="bar"><div id="bar-fill"></div></div>
<a id="home-link" href="index.html">← 書架</a>

<div id="reader">
  <div id="stage">
    <div class="pg" id="pg-a"></div>
    <div class="pg" id="pg-b"></div>
  </div>
</div>

<nav id="nav">
  <button id="btn-prev" disabled aria-label="上一頁">&#8592;</button>
  <span id="pg-info"></span>
  <button id="btn-next" aria-label="下一頁">&#8594;</button>
</nav>

<script>
const PAGES = [
  "<div class=\"cover\">\n<h1>依照G.H.的激情</h1>\n<p class=\"author\">克拉莉絲・李斯佩克多</p>\n<p class=\"meta\">伊德拉・諾維 譯自葡萄牙文</p>\n<p class=\"meta\">班傑明・莫瑟 編輯</p>\n<p class=\"meta\">卡耶塔諾・維洛索 導讀</p>\n</div>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<blockquote>「一個完整的生命，或許終結於與非我如此徹底的認同，以至於不再有一個自我可以死去。」</blockquote>\n<p>&gt;</p>\n<blockquote>——伯納德・班森</blockquote>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<h2>導讀 by 卡耶塔諾・維洛索</h2>\n<p>《G.H.的激情》一出版，我便讀了它，那是一九六四年。我剛過二十出頭。克拉莉絲在我十七歲時便是一道光照。我在一本雜誌上讀到〈玫瑰的模仿〉這個故事，它既讓我著迷，又讓我恐懼。我的哥哥開始為我買下她所有已出版的作品。我在她的其他故事中發現了與〈玫瑰的模仿〉相同的東西：一種為了讓某個事件以頓悟的力量浮現而自我轉化的語言——在平凡生活的瑣碎憂慮之中（通常是女人的生活）。</p>\n<p>那種語言的轉化創造了一種我從未遇過的抒情散文。那種抒情化抹去了文本——然而文本始終是敘事，從不是詩——為了讓某個幾乎不可言說之物得以顯現。那個物。</p>\n<p>在〈玫瑰的模仿〉中，一個女人，在成功的心理治療之後，看見一束玫瑰便再次陷入瘋狂。日常的幸福，如此艱難地重新奪回，卻無法抵抗某種如非人格之神般的直接經驗，而這經驗使她作為主婦的存在變得不可能。</p>",
  "<p>那時我讀到的克拉莉絲其他故事，都帶著同樣的基本力量，指向同一個方向。它們的優雅使它們成為完美的物件：每一個都是一場危險的冒險，一次結構的奇蹟。閱讀它們時，審美經驗本身驅使我思考存在的經驗。當我讀《黑暗中的蘋果》時，我覺得這部小說並不理想地適合克拉莉絲的靈感（我還沒讀過《靠近野性的心》）。</p>\n<p>然而，《G.H.的激情》重製——並激進化——了她最美麗的故事。但與它們不同，它本身並不美麗。或者，它或許更為美麗——但那美麗對我而言難以感知。在書的中段，敘述者說她從未如此不畏懼低俗品味。她寫下「沉默的波濤」來指涉那迫使她像使用救生筏般抓住詞語的內容，藉以漂浮在接連襲來的沉默之上。她從前絕不會使用那個表達，因為她尊重「美及其內在的節制」。</p>\n<p>嗯，我懷念那節制，它讓她的短篇小說讀來像完美的歌。但我早已被克拉莉絲這個新開端的、無節制的反思混亂所誘捕。在此，兩種極端且或許非敘事性的文本特質匯聚。這些是她最出色的文本：為被謀殺的幫派分子米內里尼奧所寫的哀歌——其中她對巴西社會巨大分裂的觀察如此尖銳——以及關於「雞蛋與母雞」的無盡迷宮式沉思。</p>",
  "<p>而後，G.H.作為一部超越完美的小說出現。它不是一個引領讀者走向哲學思辨的故事。也不是一部需要故事來傳達思想的哲學論述。相反，它是一場賦予生命的經驗，將人引向最雄心勃勃的哲學發現。一種轉化為文學藝術的經驗，在其中，和諧與失序是啟示的代價。</p>\n<p>一位年輕的朋友，在我二十出頭、還在巴伊亞的時候說過：「我不太喜歡：這是泛神論。」那時我們都是瘋狂的孩子。如今我認為，克拉莉絲的這部小說（對我而言是她最美的一部）告訴我們的，與其說是內在論者與超越論者之間的爭論，不如說是史賓諾莎用葡萄牙文寫下《倫理學》的可能性。</p>\n<p>卡耶塔諾・維洛索</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<h2>致可能的讀者</h2>\n<p>這本書就像任何一本書。但我會很高興，如果它只被靈魂已然成形的人閱讀。那些知道接近——無論接近的是什麼——都必須逐步且艱辛地進行的人；甚至要穿過它所接近之物的反面。只有他們，才會慢慢理解，這本書不從任何人那裡奪走任何東西。對我而言，例如，角色G.H.一點一滴地給予了一種艱難的喜悅；但它被稱為喜悅。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<h2>G.H.的激情</h2>\n<p class=\"em-line\">我在尋找，我在尋找。我試圖理解。試圖</p>\n<p>*將我所經歷的給予另一個人，而我不知道那個人是誰，但我不想保留我所經歷的。我不知道該如何處理我所經歷的，我害怕那深沉的失序。我不信任發生在我身上的事。是否有一件事發生在我身上，而我，因為不知道如何活它，便將它活成了別的東西？這就是我想稱之為失序的東西，而我將有勇氣繼續前行，因為我知道之後可以回到哪裡：回到先前的秩序。我寧可稱之為失序，因為我不想在我所經歷的事物中確認自己——在對我的確認中，我將失去我原本擁有的世界，而我知道我沒有力量承受另一個世界。</p>\n<p>如果我確認自己，並認為自己是真實的，我將迷失，因為我不知道該如何鑲嵌我新的存在方式——如果我帶著我片段的異象前進，整個世界都必須轉變，才能讓我容身其中。</p>",
  "<p>我失去了某個對我至關重要的東西，而它已不復存在。我不再需要它，彷彿我失去了一條第三條腿，那條腿一直讓我無法行走，卻也使我成為一個穩定的三腳架。我失去了那第三條腿。於是我回到了一個我從未是過的人。我回到了一種我從未擁有過的東西：只有兩條腿。我知道我只能用兩條腿行走。但我感受到那第三條腿無用的缺席，它令我恐懼，那條腿曾使我成為一個可以被自己找到的東西，甚至無需尋找自己。</p>",
  "<p>我是否因為失去了不需要的東西而變得混亂？在我這新的懦弱之中——懦弱是我身上最新發生的事，是我最偉大的冒險，我這懦弱是一片如此遼闊的田野，唯有巨大的勇氣才能引領我去接納它——在我這新的懦弱裡，就像某個早晨醒來發現自己身處陌生人的屋子，我不知道自己是否有勇氣就這麼離開。迷失是困難的。如此困難，以至於我大概很快就會想出某種方法來找到自己，即使找到自己又是我那至關重要的謊言。直到此刻，找到自己就是先擁有一個關於人的概念，然後把自己套進去：我將自己化身為這個有條理的人，甚至感覺不到活著這項巨大的建構工程。我對「人」是什麼的想法，來自我的第三條腿，那條將我釘在地上的腿。但是，現在呢？我會更自由嗎？不。我知道我仍然沒有自由地感受，我之所以思考，仍是因為我懷抱著找到的目標——為了安全起見，我會把找到的那一刻稱為我發現一條出路的時候。為什麼我沒有勇氣僅僅去發現一條入口？哦，我知道我進去了，哦，是的。但我害怕了，因為我不知道那個入口通向何處。而我從不讓自己被帶走，除非我知道要去哪裡。</p>",
  "<p>然而昨天，我失去了我的人類配置好幾個小時。如果我有勇氣，我會讓自己繼續迷失。但我害怕新的事物，害怕去活出任何我不理解的事——我總是想確保至少我以為自己理解了，我不知道如何把自己交付給失序。我該如何解釋，我最大的恐懼恰恰是：存在？然而別無他途。我該如何解釋，我最大的恐懼是活出任何到來的事物？我該如何解釋，我無法承受看見，僅僅因為生命不是我所想的那樣，而是別的什麼——好像我知道那是什麼似的！為什麼看見是如此失序？</p>\n<p>*而一場失望。但對什麼失望？* 如果，甚至連感覺都沒有，我幾乎無法忍受自己那勉強構築的結構？或許失望是害怕不再屬於某個系統。所以我或許可以這樣說：他非常快樂，因為他終於失望了。我過去所是的，對我已無用處。但正是從那無用之中，我組織了最美好的一切：希望。從我自身的缺陷，我創造了一個未來的善。我現在是否害怕我的新存在方式毫無意義？但為何不讓自己隨波逐流，任由一切發生？我必須冒著神聖的風險去賭一把偶然。而我將用機率取代命運。</p>",
  "<p>但童年的發現，是否就像在實驗室裡，你找到什麼就是什麼？所以，只有在成年之後，我才變得恐懼，才創造了那第三條腿？但作為一個成年人，我能否找回童年那種迷路的勇氣？迷路意味著找到東西，卻完全不知道該拿找到的東西怎麼辦。雙腿行走，沒有那條拖住你的第三條腿。而我想要被拖住。我不知道該拿那足以毀滅我的可怕自由怎麼辦。但我在囚禁中快樂嗎？或者，在我快樂的監獄日常裡，是否一直存在著某種不安而狡猾的東西？或者，一直存在著那悸動之物，我如此習慣於它，以至於我以為悸動就是作為一個人。是這樣嗎？也是，也是。</p>",
  "<p>我如此害怕，當我意識到自己好幾個小時失去了人的形體。我不知道是否會有另一種形體來取代我失去的那個。我知道自己必須小心，不能偷偷使用一條從我身上迅速如野草般萌生的新第三條腿，並將這條保護性的腿稱為「一個真理」。但我也不知道該給發生在我身上的事什麼形體。而若不給它一個形體，對我而言，沒有任何事物能夠存在。而——而如果真的什麼都不存在呢？！也許什麼都沒有發生在我身上？我只能理解發生在我身上的事，但只有我理解的事才會發生——其餘的我又知道什麼？其餘的並不存在。也許從來沒有任何事物存在過！也許發生在我身上的，只是一場緩慢而巨大的解體？而這就是我對抗那解體的努力：此刻試圖給它一個形體？形體塑造混沌，形體賦予無定形的物質以結構——看見一塊無限的肉是瘋子的幻象，但如果我把那塊肉切成碎片，分散在日子與飢餓之間——那麼它就不再是沉淪與瘋狂：它將再次成為人化的生命。</p>\n<p>人化的生命。我把生命人化得太過分了。</p>",
  "<p>但我現在該怎麼辦？我該緊抓著那完整的幻象不放，即使那意味著擁有一個無法理解的真理？或者我該給虛無一個形體，而那將是我試圖將自身的解體整合進我之內的努力？但我如此缺乏準備去理解。從前，每當我嘗試，我的限制便給我一種身體上的不適感，任何思想的開端都立刻撞上我的前額。很早以前我就必須毫無怨言地承認自己渺小智力的極限，於是我偏離了路徑。我知道自己註定只能思考很少，推理將我禁錮在自己的皮膚之內。那麼此刻我該如何在我之內開啟思考？而也許只有思想能拯救我，我害怕激情。</p>\n<p class=\"em-line\">既然我必須拯救明日，既然我必須擁有一個形式，因為我沒有足夠的力量保持混亂，既然我無可避免地必須將那無限的怪物肉塊切開，切成與我嘴巴大小、與我眼睛視野大小相當的碎片，既然我終將屈服於對形式的需求——那來自於我對不被界定的恐懼——那麼至少願我有勇氣讓這個形狀自行成形，像痂皮自行硬化，像熾熱的星雲冷卻成大地。也願我有巨大的勇氣，抵抗發明一個形式的誘惑。</p>\n<p>我此刻所做的這番努力——讓一個意義浮現，任何意義都好——如果我假裝在寫給某人，這努力會容易些。</p>",
  "<p>但我害怕開始為了被那個想像中的某人理解而「創作」，我害怕開始「製造」一個意義，用那種馴順的瘋狂——直到昨天，那還是我融入系統的健康方式。我是否需要勇氣，用一顆毫無防備的心，繼續對著虛無與無人說話？像一個孩子想像虛無那樣。並冒著被偶然碾碎的風險。</p>\n<p>我不明白我所看見的。我甚至不知道我是否看見了它，因為我的眼睛無法與它們所見的事物區分開來。只有線條間一陣意外的顫動，只有我文明那不間斷連續性中的一個異常，讓我瞬間體驗了賦予生命的死亡。那精緻的死亡，讓我觸及了生命那被禁止的織物。說出生命的名字是被禁止的。而我幾乎說出了它。我幾乎無法從它的織物中掙脫出來——那會是我內在年齡的毀滅。</p>\n<p>或許發生在我身上的是一種理解——而為了真實，我必須繼續無法掌握它，繼續不理解它。所有突然的理解都與一種尖銳的不理解極為相似。</p>",
  "<p>不。所有突然的理解，最終都是一種尖銳的不理解的啟示。每一次發現的時刻，都是一次迷失。也許發生在我身上的，是一種如同無知般完整的理解，而我將從中脫身，如同從前一樣未受觸動、純真無瑕。我的任何理解都永遠無法觸及那樣的知識，因為活著是我唯一能掌握的高度——我只活在生命的層次上。除了此刻，此刻我知曉了一個祕密。而我已經在遺忘，啊，我感到我已經在遺忘……</p>\n<p>若要重新學會它，我現在必須重新死去。而知曉，或許是我人類靈魂的謀殺。而我不想要那樣，我不要。將自己交付給一種新的無知，或許能拯救我。因為當我掙扎著去知曉，我的新無知——也就是遺忘——變得神聖。我是遺忘了祕密的灶神女祭司。而我侍奉著那被遺忘的危險。我發現了某件我無法理解的事，我的嘴脣被封緘，我所擁有的，不過是儀式中無法理解的碎片。然而，第一次，我感到我的遺忘終於與世界處於同一層次。啊，我甚至不希望任何人向我解釋任何事，因為若要解釋，就必須將它從自身中抽離。我不希望任何人向我解釋任何事，因為那解釋需要再次用人類的認可來詮釋。</p>",
  "<p>生與死都是我的，而我是怪物。我像一個夢遊者般勇敢，只是往前走。在迷失的時刻裡，我有勇氣不去編織、不去組織。而最重要的是，不去看向前方。我從未有過勇氣讓自己被未知引領、朝向未知前進：我的期待預先決定了我將看見什麼。它們不是預見的幻象：它們早已是我關切的尺度。我的期待將世界對我封閉。</p>\n<p class=\"em-line\">好幾個小時，我放棄了。而，我的上帝，我得到了我不想要的。我沒有漫遊過河谷——我總以為「找到」會像河谷那樣豐饒而潮濕。我沒意識到那是巨大的「未找到」。</p>\n<p>為了繼續為人，我的犧牲會是遺忘嗎？如今我將懂得如何在幾張平凡的臉上認出——他們遺忘了。而且不再知道自己遺忘了他們所遺忘的。</p>\n<p>我看見了。我知道我看見了，因為我沒有賦予我所見之物我的意義。我知道我看見了——因為我不理解。我知道我看見了——因為我所見之物毫無意義。聽著，我必須說話，因為我不知道該如何處理活過這件事。更糟的是：我不想要我所看見的。我所看見的粉碎了我的日常生活。抱歉把這個給了你，我寧願看見更好的東西。帶走我所看見的，將我從無用的異象中解救出來，也從我無用的罪中解救出來。</p>",
  "<p>我如此恐懼，以至於我只能接受自己迷失了——如果我幻想有人握著我的手。握著某人的手，向來是我對喜悅的想像。常常在入睡前——在那場小小的掙扎中，不失去意識而進入更大的世界——常常，在擁有勇氣走向睡眠的偉大之前，我假裝有人握著我的手，而我走著，走向那巨大的無形之空，那就是睡眠。而即使那時我仍找不到勇氣，我便做夢。</p>\n<p>入睡與我如今必須走向自由的途徑如此相似。將自己交託給我不理解的事物，就是將自己置於虛無的邊緣。那將只是走著，像一個迷失在田野中的盲女。那超自然之物，即是生命。生命——我曾馴服它，使它變得熟悉。那勇敢之舉，將是把自己交出去，如同抓住上帝那幽靈般的手，進入那無形之物，那是一個樂園。一個我不想要的樂園！</p>\n<p class=\"em-line\">在書寫與說話的同時，我必須假裝有人握著我的手。</p>",
  "<p>噢，至少在最開始，僅僅在最開始。一旦我能放手，我便會獨自前行。與此同時，我必須握住你這隻手——儘管我無法憑空想像你的臉、你的眼睛、你的嘴。然而即使被截斷，那隻手並不令我恐懼。它的發想來自如此一種愛的意念，彷彿那隻手真的連接著一個身體，而我之所以看不見，僅僅因為我愛得不夠。我無法想像一個完整的人，因為我不是一個完整的人。而我又如何能在不知道需要什麼表情的情況下，想像一張臉？一旦我能放開你溫暖的手，我將獨自前行，帶著恐懼。恐懼將是我的責任，直到蛻變完成，恐懼化為光。不是那種來自對美與道德主義的渴望所生之光——如同從前，我未曾察覺卻意圖的那樣——而是存在之物本然的光，正是那本然的光令我戰慄。儘管我知道，那恐懼——我即是事物面前的恐懼。</p>",
  "<p>此刻我正發想著你的存在，正如有一天我將不知道如何冒險獨自死去，死亡是最大的冒險，我將不知道如何進入死亡，踏出第一步進入第一個沒有我的缺席——正如在這最後且如此初始的時刻，我將發想你未知的存在，與你一同開始死去，直到我學會獨自一人不去存在，然後我將放你離去。此刻我攀附著你，你未知而溫暖的生命是我唯一親密的組織，我這個若沒有你的手便會感到被拋入我所發現的浩瀚無垠之中的人。拋入真理的浩瀚之中？</p>\n<p>但真理對我從未有過意義。真理沒有意義！這就是為什麼我懼怕它，仍舊懼怕它。無助地，我將一切交給你——好讓你能將它化為歡愉之物。對你說話會嚇到你，讓我失去你嗎？但若我不說話，我將迷失，而在迷失自己之中失去你。</p>\n<p class=\"em-line\">真相沒有道理可言，世界的偉大限制了我。我大概曾祈求、最終也得到的事物，卻讓我像個獨自流浪大地的孩子般匱乏。如此匱乏，以至於唯有整個宇宙對我的愛才能安慰我、淹沒我，唯有那顫動事物核心卵細胞的愛——我稱之為愛。我只能這樣稱呼，卻不知其名。</p>",
  "<p>我所見的，會是愛嗎？但有什麼愛像卵細胞那般盲目？是那樣嗎？那駭人的東西，就是愛嗎？一種如此中性的愛——不，我還不想對自己說話，此刻說話只會加速意義的到來，就像一個人迅速凍結在第三條腿的麻痺安全感中。或者我只是在拖延開始說話的時刻？為什麼不乾脆什麼都不說，就只是爭取一點時間？出於恐懼。我需要勇氣，才能冒險將我的感受化為具體的事物。這就像擁有一枚硬幣，卻不知道它在哪個國家是法定貨幣。</p>\n<p>我將需要勇氣去做我即將做的事：說話。並冒著對說出口的事物之貧乏感到巨大驚訝的風險。話一出口，我就得補充：不是那樣，不是那樣！但我不能害怕荒謬，我向來寧可少也不要多，也是出於對荒謬的恐懼：因為還有謙遜的粉碎。我拖延著不得不對自己說話的時刻。出於恐懼？</p>\n<p>也因為我無話可說。我無話可說。那我為什麼不閉嘴？但如果我不強迫話語出來，沉默將永遠以浪潮吞噬我。話語與形式將是我漂浮在沉默波濤上的木板。</p>\n<p>而我之所以拖延開端，也因為我沒有嚮導。其他旅人的記述只給了我極少關於旅程的事實：所有的資訊都極其不完整。</p>",
  "<p>我感到第一波自由正一點一點地攫住我……因為直到今天，我從未如此不怕缺乏品味：我寫下「沉默的波濤」，這是我從前絕不會說的話，因為我一直尊重美及其內在的節制。我說「沉默的波濤」，我的心謙卑地低下，我接受它。我終於失去了一整套品味系統嗎？但這是我所獲得的一切嗎？我必定活得如此禁錮，以至於現在只因為不再害怕缺乏美學，就感到更加自由……我仍無法說出我還獲得了什麼。也許，慢慢地，我會明白。此刻，我擁有的第一份羞怯的愉悅，是意識到我失去了對醜的恐懼。而那份失去，竟是如此良善。它是一種甜美。</p>\n<p>我想知道，在失去中，我還獲得了什麼。我還不知道：唯有重新活過自己，我才能活。</p>\n<p>但如何重新活過自己？如果我沒有自然的詞語可說。我是否必須創造詞語，如同創造發生在我身上的一切？</p>",
  "<p>我將創造發生在我身上的一切。只因為生命無法被重述。生命是不可活的。我必須在生命之上創造。而且不說謊。創造，是的，說謊，不。創造不是想像，而是承擔抓住現實的巨大風險。理解是一種創造，是我唯一的方式。我必須努力翻譯電報信號——將未知翻譯成一種我不說的語言，甚至不理解那些信號的意義。我將說那種夢遊者的語言，如果我醒著，它就不會是語言。</p>\n<p>直到我創造出發生在我身上的真理。啊，這與其說是書寫，不如說是刮擦，因為我試圖做的與其說是表達，不如說是複製。我越來越不需要表達自己。那是我失去的另一樣東西嗎？不，即使在製作雕塑時，我也已經只試圖複製，而且只用我的手。</p>",
  "<p>*我是否會迷失在符號的沉默之中？* 我會，因為我知道自己是怎樣的人：我從未能夠僅僅觀看而不立即需要做比觀看更多的事。我知道自己會像一個終於睜開眼睛的盲人那樣驚駭——但看見什麼？一個沉默而無法理解的三角形。那個人能因為看見了一個無法理解的三角形，就認為自己不再盲目嗎？我想知道：若我用放大鏡凝視黑暗，會看見比黑暗更多的東西嗎？放大鏡並未揭露黑暗，它只顯現出更多的黑暗。而若我用放大鏡觀看光，我會震驚地只看見更多的光。我看見了，卻仍像從前一樣盲目，因為我看見了一個無法理解的三角形。除非我也轉變為那個三角形，在無法理解的三角形中認出我自己的源頭與重複。</p>\n<p>我在拖延。我知道我所說的一切都只是為了拖延——拖延那個我必須開始說話的時刻，明知自己已無話可說。我在拖延我的沉默。我這一生都在做這件事嗎？但現在，出於對詞語的輕蔑，或許我最終可以開始說話了。</p>",
  "<p>電報的信號。世界佈滿天線，而我正在接收信號。我只能做語音轉錄。三千年前我迷失了，留下的只是我語音的碎片。我比從前更盲目。我看見了，我做了。我看見了，並被一個世界的粗礪真相嚇壞——這個世界最駭人的是它如此活著，以至於當我承認自己與它一樣活著——而我最大的發現正是我與它一樣活著——我必須提升對外在生命的意識，直到它成為對我個人生命的罪行。</p>\n<p class=\"em-line\">因為一個全然活著的世界具有地獄的力量。</p>\n<p>昨日清晨——當我離開客廳，走進女傭的房間——沒有任何事物讓我想起，我正踏在發現一個帝國的邊緣。僅一步之遙。我對最原始生命的鬥爭，將以沙漠動物般平靜而吞噬一切的兇猛展開。我將在自己內部遇見一個生命層級，如此原始，幾乎無生命。然而，沒有任何我的姿勢暗示，我——嘴唇因乾渴而乾裂——即將存在。</p>",
  "<p>事後，我才想起一句老話，多年前無意間刻印在記憶中，不過是一篇我終究沒讀的雜誌文章的副標題：「迷失在峽谷的烈火地獄中，一個女人絕望地為生命掙扎。」沒有任何事物讓我猜測自己正走向何處。但我從來不是那種能在事件展開時認出它們的人；每一次它們達到高潮，都像一個斷裂、瞬間的爆炸般令我驚訝，帶著一個日期，而非連續不斷的延續。</p>\n<p>那個早晨，走進女傭房間之前，我是什麼？我是別人一直看見的那個我，而那也是我認識自己的方式。我不知道該如何說出我曾經是什麼。但至少，我想記住：我正在做什麼？</p>\n<p class=\"em-line\">我早已抵達那個房間……</p>\n<p>將近上午十點，我的公寓早已不再真正屬於我。女傭前一天辭職了。沒有人說話、走動、製造事情發生的這個事實，在我居住的這間半奢華的屋子裡，以沉默擴張開來。我在早餐桌前逗留——要知道自己曾經是什麼模樣，竟如此困難。然而我必須至少給自己一個先前的形式，才能理解當我失去那個形式時發生了什麼。</p>",
  "<p>我在早餐桌前逗留，用一條麵包的柔軟內心搓成小球——是這樣嗎？我需要知道，我需要知道我曾經是什麼！我是這樣的：我心不在焉地將麵包搓成小球，而我最後一段輕鬆的浪漫糾葛，已在一聲愛撫中友好地消散，我再次獲得自由那愉快而略帶平淡的滋味。這樣能定位我嗎？我很好相處，擁有真誠的友誼，而對此的自覺讓我得以與自己維持愉快的友誼，這份友誼從未排除對自己某種諷刺的感受，卻不帶迫害。但——我的沉默在從前是什麼模樣，我不知道，也從未知道。有時，看著一張在海灘或派對上拍下的快照，我帶著輕微的諷刺恐懼注意到，那張微笑的、黝黑的臉向我揭示了什麼：一種沉默。一種沉默與一個逃逸的命運，我，一個死去的或活著的帝國的象形文字碎片。看著照片，我看見了奧祕。不。我將失去對低俗品味殘餘的恐懼，我將開始我的勇氣練習，勇氣不是活著，知道自己在活著才是勇氣——並且說，在我的照片中，我看見了奧祕。那驚奇悄然逼近，我此刻才意識到，是驚奇在向我逼近：因為在那雙炯炯有神的眼睛裡，有一種我只有在湖泊中見過、只有在沉默本身中聽過的沉默。</p>",
  "<p>我從未想過，有一天我會去遇見那沉默。去撞碎那沉默。我瞥了一眼照片中的臉，一秒之間，在那張毫無表情的臉上，世界也同樣毫無表情地回望著我。就是那樣——僅僅那樣——是我與自己最貼近的接觸？是我所能抵達的最深沉的無言深處，是我與世界之間最盲目、最直接的連結。其餘——其餘始終是我對自己的組織，如今我明白了，啊，如今我明白了。其餘是我一點一點將自己轉變成那個承載我名字的人的方式。而我終究成了我的名字。你只需看見我皮箱皮革上印著的縮寫G. H.，我便在那裡。我也不曾要求他人超越他們名字縮寫的初層覆蓋。況且，「心理學」從來不曾引起我的興趣。心理學的視角讓我感到不耐煩，至今依然如此，它不過是一種越界的工具。我想，我在青春期便已離開了心理學的階段。</p>\n<p>G. H. 活了不少，我的意思是，經歷了許多事實。或許我急著一口氣活完所有該活的事物，好讓自己有餘裕去……去活著而沒有事實？去活著。我很早就滿足了感官的職責，很早很快地擁有了我的悲傷與喜悅——為了能迅速從我渺小的人類命運中解脫？為了自由地去追尋我的悲劇。</p>",
  "<p>我的悲劇在某處。我更大的命運在哪裡？一個不只是我生命故事的命運。悲劇——那最偉大的冒險——永遠不會發生在我身上。我所知道的只有我個人的命運。以及我所想要的。</p>\n<p>我散發著一種平靜，那是抵達了身為 G.H. 的狀態後，連行李箱上都沾染著的平靜。對我所謂的內在生活，我也無意識地採納了自己的名聲：我對待自己如同他人對待我，我就是他人眼中所見的我。當我獨處時，並無斷裂，只是比在人群中少了那麼一點什麼，而這向來是我的本性，我的健康。也是我那一種美。難道我的快照，是唯一能拍攝深淵的東西嗎？一個深淵。</p>\n<p>一個虛無的深淵。就只是那巨大而空洞的東西：一個深淵。</p>\n<p>我表現得像個所謂的成功人士。從事了一段不確定且斷斷續續的雕塑創作，也給了我一個過去和一個現在，讓他人得以定位我：人們提起我時，會說我是個做雕塑的人，說那些作品要不是太業餘，其實還不壞。對一個女人而言，這種名聲在社會上意義重大，並將我——對他人和對我自己而言——置於一個介於男人與女人之間的區域。這賦予了我遠比他人更多的自由去做一個女人，因為我不必刻意費心去扮演一個女人。</p>",
  "<p>至於我所謂的個人生活，或許正是那斷斷續續的雕塑，為它染上了一層輕微的前高潮色調——或許是因為運用了某種注意力，即便是業餘藝術也要求的那種注意力。又或許是因為擁有耐心磨損材料、直到逐漸發現其內在雕塑的經驗；也或許是因為，透過雕塑，我被迫以一種客觀的態度去處理某個不再是我自己的東西。</p>",
  "<p>這一切給了我一種高潮前的輕盈語調，彷彿一個知道自己若抵達物件的深處，那些物件中的某樣東西便會給予我，並反過來回贈給物件的人。或許正是那種高潮前的語調，我看見在一張微笑而幽靈般的照片裡——那張臉的話語是一種無聲的沉默，每個人的照片都是蒙娜麗莎的照片。而這就是我能為自己說的一切嗎？說我「真誠」？我是真誠的，相對而言。我不說謊以製造虛假的真理。但我過度使用了真理，當作藉口。真理作為說謊的藉口？我可以對自己說些奉承的話，也同樣輕易地敘述我那些卑劣的缺陷。但我必須小心，別把缺陷與真理混淆。我害怕任何可能引領我走向真誠的事物：我所謂的高貴，我略過不提，我所謂的卑劣，我也略過不提。我越是真誠，就越會受到誘惑，去讚美我偶爾的高貴，尤其是偶爾的卑劣。真誠只會阻止我誇耀自己的渺小。我略過不提，不僅僅是因為我無法原諒自己——我這個早已原諒自己一切重大與顯著之事的人。我略過渺小，因為懺悔對我來說往往是一種虛榮，即使是痛苦的懺悔。</p>",
  "<p>並非我想擺脫虛榮，而是我需要清空自己的場域，才能繼續前行。如果我前行。或者，不想虛榮難道是虛榮最糟的形式？不，我想我需要觀看，而不去在意自己眼睛的顏色，我需要從自身中豁免，才能看見。</p>\n<p>而這一切，就是我嗎？當我為不期而至的訪客開門時，我在對方看見我的臉上捕捉到的，是他們剛剛在我身上驚見了我那輕微的高潮前奏。他人從我這裡得到的，便反射回我身上，形成了那個名為「我」的氛圍。那高潮前奏，或許直到此刻，就是我的存在。而另一個——那未知而無名的——，我那個僅僅是深層的另一個存在，大概給了我一種人的篤定，就像一個總是在廚房裡用小火燒著水壺的人：無論發生什麼，我總會有滾燙的開水。</p>",
  "<p>但水從未沸騰。我不需要暴力，我冒泡的幅度恰好讓水既不沸騰也不溢出。不，我與暴力並不熟識。我生來沒有使命，我的天性也未強加任何使命；而我向來足夠細膩，不給自己強加任何角色。我沒有給自己強加角色，但我確實將自己組織得讓自己能夠理解，我無法忍受在電話簿裡找不到自己。我的問題，如果有的話，不是：「我是誰」，而是「誰在我周圍」。我的循環是完整的：我當下所經歷的，已在準備著，好讓我在日後能夠理解自己。有一隻眼睛監視著我的生命。這隻眼睛，大概就是我此刻稱之為真理、此刻稱之為道德、此刻稱之為人類法則、此刻稱之為上帝、此刻稱之為我的東西。我多半活在鏡子裡。出生後兩分鐘，我已經失去了我的起源。</p>",
  "<p>*離高潮一步之遙，離革命一步之遙，離所謂的愛一步之遙。離我的生命一步之遙——而這一步，由於某種反向的磁力，我從未將它轉化為生命；也出於對秩序的渴望。活著的混亂有種不好的氣味。而我甚至不知道，就算我想，該如何將那潛在的一步化為真實的一步。從和諧凝聚的愉悅中，從我貪婪而永遠充滿承諾的、擁有卻不耗費的愉悅中——我不需要高潮，不需要革命，也不需要任何超越前愛的東西，前愛遠比愛更幸福。承諾對我來說就夠了嗎？一個承諾就夠了。</p>\n<p>或許這種態度或缺乏態度，也來自於我從未有過丈夫或孩子，從不需要，如他們所說，打破或衝出什麼：我持續地自由著。持續地自由，也因我隨和的性情而得以維持：我吃、喝、睡都很容易。當然，我的自由也來自於經濟獨立。</p>",
  "<p>從雕塑中，我想，我學會了只在該思考的時候思考，因為我學會了只用雙手思考，只在該使用它們的時候思考。從我間歇性的雕塑中，我也養成了愉悅的習慣，我天生傾向於此：我的雙眼無數次地處理過事物的形狀，以至於我越來越學會了其中的愉悅，並在其中紮根。我可以用遠少於我自身的東西，我已經可以使用一切：就像昨天，在早餐桌上，我只需要指尖的表面和麵包的表面，就能從麵包的中心捏出圓形。為了擁有我所擁有的，我從不需要痛苦或天賦。我所擁有的不是成就，而是禮物。</p>\n<p class=\"em-line\">至於男人與女人，我又是什麼？我向來對男性的習慣與作風懷有極其溫暖的欽慕，而做為女性，我有一種不急迫的愉悅，做為女性也是一份禮物。我所擁有的，不過是禮物的輕盈，而非天職的恐懼——是這樣嗎？</p>",
  "<p>在那張我因擁有時間而流連的餐桌旁，我環顧四周，手指將麵包搓成球狀。世界是一個地方。一個適合我生活的地方：在世界裡，我可以將一個柔軟的麵包球壓進另一個裡，我所要做的只是將它們相互揉搓，無需過度費力，只需揉捏到足以讓一個表面與另一個表面黏合，於是，帶著愉悅，我塑造了一座滿足我的奇異金字塔：一個由圓形形狀構成的直角三角形，一個由與自身相反的形狀構成的形狀。如果這對我具有任何意義，麵包與我的手指大概知道。</p>\n<p>這間公寓映照著我。它在頂樓，這被視為一種優雅。我那個圈子的人們試圖住在所謂的「頂層公寓」。這遠不止是一種優雅。這是一種真正的愉悅：從那裡，你俯瞰一座城市。當這種優雅變得過於普遍時，我會不會，甚至不知道自己為何如此，轉向另一種優雅？或許吧。如同我一般，這間公寓有著潮濕的陰影與光線，這裡沒有任何事物是突兀的；一個房間預示並承諾著下一個。從我的餐廳，我能看見那些作為客廳前奏的陰影混合。這裡的一切，都是對一個從未存在於任何地方的生活的優雅、諷刺且機智的複製品：我的房子純粹是一件藝術創作。</p>",
  "<p>*這裡的一切，實際上指向一種生命——若它真實存在，我將無法適應。那麼，它在模仿什麼？若它真實，我無法理解，但我喜歡這個複製品，並理解它。複製品總是美麗的。我的半藝術與藝術圈，理應讓我鄙視複製品：但我似乎始終偏愛仿作，它於我有用。模仿一種生命，或許給了我——或者仍舊給著？我過去的和諧已被撕裂多少？——模仿一種生命，或許給了我確信，正因為那生命並非我自己的：那不是我的責任。那輕盈的普遍愉悅——似乎是我活著或曾經活著的基調——或許來自於世界既非我、也非我的：我可以享受它。正如那些我未曾佔有的男人，我可以欽佩並真誠地愛他們，如同無私地愛，如同愛一個理念。因為他們不屬於我，我從未折磨他們。</p>\n<p>如同愛一個理念。我這屋子的機智優雅，來自於這裡的一切都處於引號之中。出於對真正作者身份的誠實敬意，我引用世界，我曾引用它，因為它既非我、也非我的。美——如同對每個人一樣——某種美是我的目標嗎？我活在美之中嗎？</p>",
  "<p>至於我自己，既不說謊也不說真話——正如昨天早晨那一刻，我坐在早餐桌前——至於我自己，我始終在左側保留一個引號，在右側保留另一個。不知怎地，「彷彿那不是我的」比「那是我的」更寬廣——一種不存在的生命完全佔據了我，像一項發明般讓我忙碌。只有在攝影中，當底片顯影時，才顯露出別的東西——那未被我捕捉、卻被快照捕捉到的東西：當底片顯影時，我作為靈質的存在也顯露出來。攝影，難道是空洞、匱乏、缺席的圖像嗎？</p>\n<p>而我自身，與其說是潔淨與端正，不如說是一件漂亮的複製品。因為這一切大概正是讓我顯得慷慨而美麗的原因。一個有經驗的男人只需一眼，就能看出我是個慷慨優雅的女人，一個不惹麻煩、不消耗男人的女人：一個微笑、會笑的女人。我尊重他人的愉悅，也細緻地享用我自己的愉悅；無聊滋養著我，也細緻地消耗著我——蜜月般甜美的無聊。</p>",
  "<p>那個被括號框住的自我形象令我滿足，而且不只是表面上的滿足。我是我所不是的影像，而那個「不是」的影像淹沒了我：最強大的狀態之一，便是以否定方式存在。既然我不知道我是什麼，「不是」便是我所能最接近真實的狀態：至少我擁有了另一面；至少我擁有了「不」，我擁有了我的對立面。我不知道什麼對我好，於是我活在一種對我的「壞」的預先渴望之中。</p>\n<p>而活在我的「壞」裡，我活在某種我甚至無法去渴望或嘗試之物的另一面。就像一個人懷著愛意追隨一種娼妓般的生活，至少她擁有她所不知道、不想要、不擁有之物的對立面：修女的生活。直到現在我才明白，我早已擁有了一切，只是以相反的方式：我獻身於「不是」的每一個細節。費盡心力地不去存在，我向自己證明——我存在。</p>\n<p>那種「不是」的方式是如此愉悅，如此潔淨：因為，這並非諷刺，我是個有靈性的女人。而且擁有一個有靈性的身體。早餐桌前，我的白色長袍框住了我，我的臉潔淨而輪廓分明，身體簡單。我散發出一種來自縱容自己與他人愉悅的善意。我細緻地吃著屬於我的東西，並細緻地用餐巾擦拭嘴角。</p>",
  "<p>這個她，G. H.，在她皮箱皮革中的她，就是我：是我——仍然是嗎？不。我立刻明白，我的虛榮最難面對的，將是我對自己的審判：我將擁有一切失敗的外表，而只有我知道，那是否正是我所需要的失敗。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">只有我知道，那是否正是我所需要的失敗。</p>\n<p>我終於從早餐桌前起身，那個女人。那天沒有女傭，這給了我想要的活動：整理。我一直喜歡整理東西。我想這是我唯一真正的天職。透過將事物歸位，我同時創造與理解。但隨著我透過相當穩健的投資逐漸變得富裕，這反而妨礙了我運用這項天職：如果金錢與教育沒有把我放在我所屬的階級，我通常會去當女傭，在富人家的大宅裡整理東西——那裡有太多東西需要整理。整理就是找到最好的形式。如果我是一個整理女傭，我甚至不需要業餘的雕塑；如果我能用雙手連續數小時整理東西。整理形式？</p>\n<p>整理屋子那永遠被禁止的愉悅是如此巨大，以至於，仍坐在桌前，我已在單純的規劃中品嚐著那種感覺。我環顧公寓：我該從哪裡開始？</p>\n<p>也是為了之後，在第七個小時如同第七日，我能自由地休息，享受這一天平靜的餘韻。近乎無喜悅的平靜，那對我來說會是好的平衡：做雕塑的幾個小時教會了我近乎無喜悅的平靜。前一週我玩得太開心，出門太多，擁有了太多我想要的一切，而現在，我渴望一個正如這一天所預示的日子：沉重、美好、空無。我會盡可能地將它拉長。</p>",
  "<p>*我或許會從公寓後方開始打掃：傭人房一定很髒，畢竟它身兼兩職——既是睡覺的地方，也是堆放舊衣服、行李箱、舊報紙、包裝紙和剩餘麻繩的儲藏室。我會把它清理乾淨，為新來的女傭準備好。然後，從後方開始，我將水平地「攀爬」，緩慢前進，直到抵達公寓的另一端——客廳。在那裡——彷彿我自己就是這番整理與這個早晨的終點線——我會躺在沙發上讀報，然後很可能睡著。如果電話沒響的話。</p>\n<p>更好的是，我決定把電話聽筒拿起來，這樣就確定沒有什麼能打擾我了。我現在該如何說，我已經開始看見那些要到後來才會顯現的事？不知不覺間，我已經站在房間的入口。我已經開始看見，卻不知道；我從出生起就一直在看，卻不知道，我不知道。</p>\n<p>把你那隻未知的手給我，因為生命正在傷害我，而我不知如何說話——現實太過纖細，只有現實是纖細的，我的非現實與想像反而更沉重。</p>\n<p>決定從傭人房開始後，我穿過通往服務區的廚房。服務區的盡頭是通往傭人房的走廊。但首先，我靠在走廊的牆上，抽完一根煙。</p>",
  "<p>我低頭看：十三層樓從大樓墜落。我不知道這一切已經是即將發生之事的一部分。千次之前，這個動作一定已經開始，然後又消失了。這次，這個動作會一路走到底，而我卻沒看見它的到來。</p>\n<p>我環視著庭院，所有公寓的背面——我的公寓從這裡看來也像個背面。從外面看，我的建築是白色的，有著大理石的光滑與表面的平滑。但庭院卻是一堆框架、窗戶、索具與發黑的水漬，窗戶疊著窗戶，嘴巴窺視著嘴巴。我的建築的腹部像一座工廠。那壯麗全景的縮影充滿了峽谷與深壑：在那裡冒著煙，彷彿在山頂上，我眺望著風景，大概帶著與我照片中同樣空洞的表情。</p>\n<p>我看見它在說什麼：它什麼也沒說。而我正專注地吸納這個虛無，我用照片中眼睛裡的那個東西吸納它；直到現在我才知道，我一直都在接收那個無聲的信號。我環視庭院。一切都有一種無生命的豐饒，令人想起自然：那裡也可以開採鈾礦，那裡也可以噴出石油。</p>",
  "<p>我看見某種東西，那東西要到後來才有意義——我是說，某種東西要到後來才會深刻地沒有意義。要到後來我才會明白：看似缺乏意義的東西——那就是意義。每一個「缺乏意義」的瞬間，恰恰是那可怕的確信：這就是它的意義，而且我不僅無法觸及它，我也不想觸及，因為我沒有任何保證。缺乏意義要到後來才會淹沒我。難道意識到缺乏意義，一直是我感知意義的負面方式？那是我參與的方式。我在那台機器——也就是我公寓的庭院——的怪異內臟中所看見的，是製造出來的東西，是極其實用的東西，帶著實用的目的。</p>\n<p>然而某種屬於那可怕普遍本質的事物——我日後將在自己體內經驗到的事物——某種無可逃遁的本質，將無可逃遁地從那百來名在排水管上勞作的實用工人口中脫手而出，他們渾然不覺自己正豎立起那座埃及廢墟，而我此刻正以觀看海灘照片的目光凝視著它。要到後來我才會知道自己看見了；要到後來，當我看見那祕密時，我才會明白自己早已看見。</p>",
  "<p>我將點燃的香菸拋過邊緣，退後一步，狡黠地希望沒有鄰居會將我與這項大樓管理員禁止的行為聯想在一起。然後，我小心翼翼地只探出頭，往下看：我甚至無法猜測香菸落在何處。深淵已將它吞沒，無聲無息。我當時在想嗎？至少我什麼也沒想。或者也許在想是否有鄰居看見我做了那件違禁的事——那件事尤其不符合我這端莊女性的形象，這讓我微笑。</p>\n<p>然後我走向服務區後方那條黑暗的走廊。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">然後我走向服務區後方那條黑暗的走廊。</p>\n<p>在走廊裡——那是公寓的盡頭——兩扇門在陰影中模糊相對：服務出口與女傭房間的門。我房子的底層。我打開門，面對一堆報紙與塵垢與廢棄物的黑暗。</p>\n<p>但當我打開門時，我的眼睛因迴盪與生理上的不適而瞇起。</p>\n<p>因為我預期的是混亂的晦暗，卻撞見一個房間的幻象——那是個白色光線的四邊形；我的眼睛以瞇眼來保護自己。</p>\n<p>大約六個月——那位女傭跟隨我的時間——我未曾進去過那裡，而我的驚愕來自於走進一個完全潔淨的房間。</p>\n<p class=\"em-line\">我本預期會見到黑暗，我已準備好推開窗戶，用新鮮空氣驅散陰濕的霉氣。我沒料到女傭竟未告知我一聲，便以自己的方式整理了房間，厚顏無恥地剝奪了它的儲藏功能，彷彿這房間是她的。</p>\n<p>從門口望去，我現在看見的是一間有著平靜而空曠秩序的房間。在我那清新、潮濕而舒適的家裡，女傭未經我同意，竟打開了一片乾燥的空無。如今這房間徹底潔淨、生氣勃勃，宛如一間精神病院，所有危險物品已被移除。</p>\n<p>那裡，因著被創造出的虛空，凝聚了瓷磚的迴響、水泥露台的震動、鄰近所有建築物直豎的天線，以及它們千扇窗玻璃的反射。這房間彷彿處於一個遠比公寓本身更高的層次。</p>",
  "<p>如同一座宣禮塔。我對一座宣禮塔的第一印象就此展開，自由地懸浮在無垠的開闊之上。那印象是我此刻唯一能感知到自己身體不適的方式。</p>\n<p>房間並非規則的四邊形：其中有兩個角略為開展。儘管這是它的物質現實，它傳達給我的感覺，卻彷彿是我的視覺在扭曲它。它看起來像是紙上的一幅再現，描繪了我看見四邊形的方式：早已在透視線條中變形。一種視覺缺陷的固化，一種視覺幻象的具體化。它那不完全規整的角，使它顯得從根本上脆弱不堪，彷彿這房間——宣禮塔——既非植根於公寓，也非植根於建築物。</p>\n<p>從門口望去，我看見恆定的陽光以一道俐落的黑影線條，切開了半個天花板與三分之一的地板。六個月來，永恆的陽光已使松木衣櫃變形，並將白灰牆剝蝕成更為潔白的白色。</p>\n<p>而就在其中一面牆上，我因驚訝而瑟縮，看見了那幅意想不到的壁畫。</p>",
  "<p class=\"em-line\">在粉刷過的白牆上，靠近門邊——正因如此我才沒看見——有著幾乎等身的炭筆輪廓：一個裸體的男人、一個裸體的女人，還有一隻比狗更赤裸的狗。身體上什麼也沒畫，沒有裸露所揭示的一切，赤裸僅僅來自於所有遮蔽之物的缺席：它們是空無的赤裸的輪廓。線條粗獷，是用斷了尖的炭筆畫成的。有些筆觸是雙重的，彷彿一條線是另一條線的顫抖。一種乾燥的顫抖，乾燥炭筆的顫抖。</p>\n<p class=\"em-line\">線條的僵直將那些放大而呆滯的人形釘在牆上，像三個自動人偶。連那隻狗也帶著某種不靠自身力量移動的溫和瘋狂。那過於堅定的線條的粗獷，使狗成為某種堅實而石化之物，比釘在牆上更釘在自己身上。</p>\n<p class=\"em-line\">在最初發現自己屋裡隱藏著這幅壁畫的驚訝之後，我更仔細地端詳——這一次帶著驚異的笑意——那些躍然牆上的形體。它們簡化的腳並未完全觸及地板，小小的頭也未觸及天花板——而這，連同線條那呆滯的僵直，使三個形體鬆散地懸浮著，像三具木乃伊的鬼魂。它們那僵硬的靜止令我愈發不自在，就愈讓我聯想到木乃伊。它們浮現出來，彷彿逐漸從牆壁中滲出，緩慢地從中心而來，直到汗水般滲透粗糙的石灰表面。</p>",
  "<p class=\"em-line\">沒有一個形體是相連的，三者並未形成一個群體：每個形體都直視前方，彷彿從未側目，彷彿從未見過彼此，也不知道身邊還有任何人存在。</p>\n<p>我不自在地笑了，我試著微笑：因為牆上的每一幅圖像，正如我自己僵立於門口的姿態。那畫不是裝飾：它是一種書寫。缺席女傭的記憶壓迫著我。我想記起她的臉，卻驚愕地發現記不起——她成功地將我排除在自己的房子之外，彷彿她關上門，讓我成了自己居所的陌生人。對她面容的記憶逃逸了，那一定是暫時的失憶。</p>\n<p>但她的名字——對了，對了，我終於記起：雅奈爾。而，看著那神聖的圖畫，我突然想到雅奈爾鄙視我。我看著那男人與女人的形象，他們強而有力的手掌張開、裸露，彷彿是雅奈爾留下的粗礪訊息，等著我開門時看見。</p>\n<p>某種程度上，我的不安是荒謬的：我從未想過，在雅奈爾的沉默中，可能藏著對我生命的責備，她的沉默或許稱之為「放蕩的生活」？她是如何評判我的？</p>\n<p>我看著那壁畫，其中很可能描繪了我……我，那個男人。而那隻狗——是她給我的綽號嗎？多年來，我只被同儕與自己的圈子評判，而那個圈子，整體而言，是由我自己為自己打造的。雅奈爾是第一個真正的外人，我開始意識到她的目光。</p>",
  "<p>突然間，這一次帶著真正的不安，我終於讓一種感覺降臨——六個月來，出於疏忽與漠不關心，我一直不讓自己感受的感覺：那個女人的沉默憎恨。令我驚訝的是，那是一種超然的憎恨，最糟的那種：冷漠的憎恨。不是一種將我個體化的憎恨，而僅僅是缺乏憐憫。不，甚至不是憎恨。</p>\n<p class=\"em-line\">就在那時，我出乎意料地想起了她的臉，但當然，我怎麼可能忘記？我又看見那張漆黑而靜止的臉，看見她那全然不透明的皮膚，那皮膚彷彿是她另一種沉默的方式，看見她描繪得極其精緻的眉毛，看見她精緻細膩的五官，幾乎無法從那封閉的黑色肌膚中辨識出來。</p>\n<p>她的五官——我發現時並無愉悅——是女王的五官。她的姿態也是：身體挺直，瘦削，堅硬，平滑，幾乎沒有血肉，沒有乳房或臀部。而她的衣服呢？我竟一直把她當作沒有存在的人來使用，這並不令人驚訝：在她的小圍裙底下，她總是穿著深棕色或黑色，這使她完全黑暗而不可見——我顫抖著發現，直到此刻我才注意到，這個女人是個隱形的人。雅奈爾幾乎只有一個外在形式，她形式內的五官是如此精緻，以至於幾乎不存在：她扁平得像貼在板上的淺浮雕。</p>",
  "<p>而她看見我時，是否也無可避免地看見我本來的樣子？從我那貼在牆上的身體中，抽離出一切非本質的東西，也只看見我的輪廓。然而，奇怪的是，牆上的那個人影確實讓我想起一個人，而那個人就是我自己。被雅奈爾留在這間屋子裡的她的存在所約束，我感覺到那三個僵硬的殭屍人形其實阻擋著我，彷彿這房間仍被佔據著。</p>\n<p>我在門口猶豫著。</p>\n<p>也因為這居所出乎意料的簡陋讓我迷失方向：我真的不知道該從哪裡開始整理東西，甚至不知道是否有什麼東西需要整理。</p>\n<p>我沮喪地望著那宣禮塔般的赤裸：</p>\n<p>床，被單被剝去，露出灰塵滿布的布質床墊，上面有長長的褪色污漬，看起來像是汗水或淡血水，古老而蒼白的污漬。奇怪的纖維馬毛刺穿了那乾燥到腐朽的床墊布料，直挺挺地豎立在空氣中。</p>\n<p class=\"em-line\">沿著其中一面牆，三只舊皮箱以如此完美的對稱堆疊著，以至於我從未注意到它們——因為它們並未改變房間的空無。皮箱上，以及一個幾乎褪盡的「G. H.」標誌上，積著一層已然沉靜、沉澱的灰塵。</p>\n<p class=\"em-line\">還有那窄衣櫥：只有一扇門，與人同高，與我同高。那被陽光持續曝曬而乾裂的木頭，裂開成縫隙與倒刺。所以雅奈爾從未關上窗戶？她比我更懂得利用這「頂層公寓」的視野。</p>",
  "<p class=\"em-line\">這房間與公寓的其他部分如此不同，以至於走進去，就像我先是離開了自己的家，然後砰地關上門。這房間與我在家中創造的一切相反，與我用佈置的天賦、生活的天賦所創造的柔軟美感相反，與我平靜的諷刺、我甜美而心不在焉的諷刺相反：它是我引號的褻瀆，那些讓我成為自己引文的引號。這房間是一幅空胃的肖像。</p>\n<p class=\"em-line\">而那裏沒有任何東西是我創造的。在房子的其他地方，陽光從外往內篩落，一縷一縷溫柔的光線，是我運用厚重與輕薄窗簾的結果。但在這裏，陽光似乎並非來自外面：它是太陽自己的所在，固定而不動，在一種刺目的光線中，彷彿即使在夜晚也從不闔眼。那裏的一切都是被切碎的神經，掛在晾衣繩上晾乾。我已準備好清理骯髒的東西，但面對那空無，卻讓我迷失方向。</p>\n<p class=\"em-line\">我這才明白，我惱怒了。那房間讓我身體不適，彷彿空氣中仍殘留著乾炭刮過乾石灰的聲音。房間那聽不見的聲音，像唱針在音樂停止後劃過唱片的沙沙聲。一種事物中性嘶嘶的低鳴，構成了它寂靜的本質。炭與指甲相觸，炭與指甲，那個女人冷靜而緊繃的憤怒，她以沉默代表著沉默，彷彿代表一個異國，那位非洲女王。而她一直寄居在我屋裡，那個異鄉人，那個冷漠的敵人。</p>",
  "<p>我猜想，珍奈爾是否真的鄙視我——或者，那個從未正眼看過她的我，才是真正鄙視她的人。就像此刻我惱怒地發現，那房間不只讓我煩躁，我厭惡它，那個除了表面一無所有的斗室：它的內臟已經乾枯。我帶著厭惡與失望看著它。</p>\n<p>直到我強迫自己鼓起勇氣與暴力：就在今天，那裡的一切都必須改變。</p>\n<p>首先，我會把房間裡僅有的幾樣東西拖到走廊。然後，我會把一桶又一桶的水潑進空蕩的房間，讓堅硬的空氣吞沒它們，接著我會淹沒灰塵，直到那片沙漠終於生出濕氣，摧毀那座傲慢俯瞰天際線屋頂的尖塔。我會把水潑進衣櫥，淹到它的嘴邊——然後，終於，終於我會看見木頭開始腐朽。一股莫名的憤怒，卻來得如此自然，淹沒了我：我想在那裡殺死什麼。</p>\n<p>然後，然後我會用一張柔軟、潔淨、冰涼的床單蓋住那張乾枯的草蓆，一張繡著我姓名縮寫的床單，取代那條珍奈爾大概已經丟進洗衣機的那條。</p>\n<p>但我首先要刮掉牆上那層粗礪的炭灰，用刀子削去那隻狗，抹去男人攤開的掌心，毀掉那個巨大裸女過小的頭顱。然後我會潑水，潑更多的水，讓水流順著被刮淨的牆面奔流成河。</p>\n<p>彷彿已經看見那個房間在變成「我的」之後的模樣，我鬆了一口氣。</p>\n<p>於是我走了進去。</p>",
  "<p>該如何解釋，除了說有某種我不明白的事正在發生。那個是我自己的女人，她想要什麼？一個G. H.，在她的皮箱皮革上，究竟發生了什麼？</p>\n<p>沒有，什麼都沒有，只是我的神經此刻已經甦醒——那些曾經平靜、或者只是被安排妥當的神經？我的沉默，是一種沉默，還是一種高亢的無聲之聲？</p>\n<p>我該如何向你解釋：突然之間，那個就是我的一切的世界，因疲憊而萎縮，我再也無法承受肩上的——什麼？——我正屈服於一種張力，一種我從不知道始終屬於我的張力。它們已經開始了，而我尚未察覺，我體內最初的崩落跡象，那些地下石灰岩洞，在地層堆積的重量下坍塌——而第一次崩落的重量，正拉下我嘴角的弧度，讓我的雙臂垂落。我身上發生了什麼？我永遠不會明白，但一定有人明白。而我必須在自己內部，創造出那個將會明白的人。</p>\n<p>儘管我已經走進房間，我卻似乎走進了虛無。即使置身其中，我仍以某種方式留在外面。彷彿這個房間不夠深，無法容納我，我不得不將自己的碎片留在走廊上，這是我所遭受過最糟的拒絕：我無法契合。</p>",
  "<p>與此同時，望著粉刷天花板的低垂天空，我被禁錮與限制壓得喘不過氣。而我已開始渴望我的房子。我強迫自己記住，那個房間也是我的財產，在我房子裡：我走進房間時並未離開公寓，沒有上樓也沒有下樓。除非一個人能水平地墜入井中，彷彿他們微微扭曲了建築物，而我，滑落著，被從一扇門拋到另一扇門，直到抵達這最高的一扇。</p>\n<p>被困在那張空缺的網中，我再次忘記了為整理房間所擬定的計畫，不確定該從何處開始。那個房間沒有一個可以被稱為起點的地方，也沒有一個可以被視為終點的地方。它有一種讓它無止境的單調。</p>\n<p>我用目光掃過衣櫥，將視線抬向天花板的一道裂縫，試圖稍微更穩固地抓住那片廣闊的空虛。帶著更大膽的姿態，卻毫無一絲親密感，我用手指撫過床墊上皺成一團的布料。</p>\n<p>我被一個念頭興奮起來：衣櫥，用水滋養得飽滿，纖維脹滿，可以打磨到發亮，我也會為內部上蠟，因為裡面可能更加焦灼。</p>",
  "<p>我撬開衣櫥狹窄的門，內部的黑暗像一股氣息般逸出。我試圖再打開一些，但門被床腳擋住了，它正撞擊著床腳。我將臉盡可能地塞進那道縫隙。而，彷彿內部的黑暗在窺視我，我們短暫地互相偵察，卻沒有看見彼此。我什麼也沒看見，只聞到一股乾燥、燒焦的氣味，像活母雞的味道。然而，將床推近窗戶後，我設法把門多打開了幾公分。</p>\n<p>然後，在理解之前，我的心變灰了，就像頭髮變灰一樣。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">然後，在理解之前，我的心變灰了，就像頭髮變灰一樣。</p>\n<p>*我將那張臉湊近開口，幾乎貼著眼睛，在半明半暗中，那隻肥碩的蟑螂動了一下。* 我的驚叫如此悶窒，唯有對比的寂靜讓我明白自己並未真正喊出聲。那聲尖叫滯留在胸腔裡搏動。</p>\n<p>沒什麼，什麼都沒有——我立刻試圖從驚駭中鎮定下來。我從未想過，在一間為了我對蟑螂的厭惡而徹底消毒的屋子裡，這個房間竟會漏網。不，什麼都沒有。那是一隻正緩緩朝縫隙移動的蟑螂。</p>\n<p>從牠的體積與遲緩來看，這必定是一隻極老的蟑螂。憑著我對蟑螂那種古老的恐懼，我學會了——即使隔著距離——猜測牠們的年齡與危險；即便從未真正直視過一隻蟑螂的臉，我也知道牠們存在的方式。</p>\n<p class=\"em-line\">我早已抵達那個房間……</p>",
  "<p>只不過，在房間赤裸裸的空無中發現突如其來的生命，嚇了我一跳，彷彿我發現那死寂的房間其實是強大的。那裡的一切都已乾涸——但一隻蟑螂還留著。一隻老得無法追憶的蟑螂。我向來覺得蟑螂可憎，是因為它們既過時卻仍在這裡。知道它們早在恐龍出現之前就已存在於地球上，而且和今天一模一樣；知道最初的人類發現它們時，它們早已繁衍成群、爬行活躍；知道它們見證了世界煤礦與石油的巨大沉積層形成，並在冰川大舉前進與後退時始終在那裡——那平靜的抵抗。我知道蟑螂可以一個多月不吃不喝。它們甚至能從木頭中製造出可用的營養物質。即使被壓碎，它們也會慢慢解壓，繼續行走。即使被凍結，一旦解凍，它們仍會繼續行進……三億五千萬年來，它們不斷複製自己，卻從未改變。當世界幾乎赤裸時，它們早已懶洋洋地覆蓋其上。</p>\n<p>就像那裡，在赤裸而乾涸的房間裡，那滴惡性的液體：在乾淨的試管中，一滴物質。</p>",
  "<p>我帶著不信任看著房間。所以有一隻蟑螂。或者一群蟑螂。在哪裡？也許在行李箱後面。一隻？兩隻？多少隻？在行李箱不動的寂靜背後，也許是整片蟑螂的黑暗。每一隻都疊在另一隻之上？一層層的蟑螂——這突然讓我想起童年時，當我掀開睡著的床墊時發現的東西：數百隻、數百隻臭蟲，一隻疊著一隻，擠成一片黑暗。</p>\n<p>童年貧窮的記憶——臭蟲、漏水的屋頂、蟑螂和老鼠——就像我史前時代的記憶，我早已與地球上最初的生物一同生活過。</p>\n<p>*一隻蟑螂？很多隻？到底有多少？！* 我憤怒地問自己。我讓目光遊走於空無一物的房間。沒有聲音，沒有跡象：但究竟有多少？沒有聲音，我卻清晰地感受到一種強烈的共鳴，那是沉默摩擦著沉默的聲響。敵意淹沒了我。這不只是不喜歡蟑螂：我不要牠們。況且，牠們是某種巨大動物的縮影。我的敵意正在滋長。</p>",
  "<p>並非我摒棄了這個房間，如同我在門口那一刻所感覺的。這個房間，連同它那祕密的蟑螂，摒棄了我。起初，我被一種如海市蜃樓般強大的赤裸景象所拒絕；儘管我所見並非綠洲的幻影，而是沙漠的幻影。接著，我被牆上那堅硬的訊息釘在原地：那張開手掌的圖案，是通往石棺入口處一個又一個哨兵的其中之一。而現在我明白了，蟑螂和雅奈爾才是這個房間真正的主人。</p>\n<p>不，我什麼都不會整理——如果這裡有蟑螂的話。新來的女傭會把她上班的第一天奉獻給那間塵封而空蕩的籠子。</p>\n<p>一陣雞皮疙瘩，在太陽的酷熱之中，覆蓋了我：我衝了出去，逃離那灼熱的房間。</p>\n<p>我第一個恐懼的肢體動作，終於顯現出來，這才讓我驚訝地發現，我原來是害怕的。而它將我引領進一個更大的恐懼——當我試圖離開時，我在床腳和衣櫥之間絆了一下。在那個沉默的房間裡，一次可能的跌倒讓我的身體因深層的厭惡而退縮——絆倒這件事，本身就讓我的逃離成為一個夭折的行動——這難道就是「他們」，那些守在石棺旁的人，阻止我永遠離開的方式嗎？他們阻止我離開，用的就是這麼簡單的方式：他們讓我完全自由，因為他們知道我再也無法離開，而不會絆倒、摔落。</p>",
  "<p>我並非被囚禁，但我被定位了。被定位得如此徹底，彷彿他們僅以一個簡單而唯一的動作——用一根手指指向我，指向我與一個地點——就將我釘在那裡。我早已熟悉「位置」的感覺。小時候，我曾意外地意識到自己躺在一張床上，那張床位於一座城市，那座城市位於地球，而地球位於世界之中。如同童年那般，我當時強烈地感受到自己獨自一人在一棟房子裡，那房子高懸在空中，漂浮著，而房子裡有看不見的蟑螂。</p>\n<p>從前，當我定位自己時，我會被放大。如今我卻帶著限制來定位自己——將自己限制到如此地步：在房間裡，唯一屬於我的位置，就在床腳與衣櫃門之間。</p>\n<p>只是這一次，幸運的是，那種位置的感覺並非在夜間降臨，如同童年那樣——因為那時大概已是上午十點左右。</p>\n<p>而意外地，逼近的十一點鐘在我看來成了一種恐怖的元素——如同位置一般，時間也變得可觸可感，就像想從時鐘內部逃離，而我瘋狂地倉促起來。</p>\n<p>但要能離開那個角落——那個我推開衣櫃門後，將自己堵住的角落——我首先得關上那扇將我釘在床腳的門：在那裡，我沒有自由的路徑，被那此刻正灼燒著我後頸汗毛的太陽所困，在那個名為上午十點的乾燥烤爐裡。</p>",
  "<p>我迅疾的手伸向衣櫃門，想將它關上，為自己開出一條路——但我又縮了回來。</p>\n<p>因為蟑螂在裡面動了。</p>\n<p>我安靜了下來。我的呼吸輕淺，浮在表面。此刻我感覺沒有回頭路了。而我早已明白，儘管這聽來荒謬，我唯一能從這裡脫身的機會，便是正面而荒謬地承認——某件事正變得無可挽回。我知道我必須承認自己身處險境，即使我清楚，相信一個全然不存在的危險是瘋狂的。但我必須相信自己——我這一生，和所有人一樣，一直身處險境——然而此刻，為了離開，我肩負著一種近乎妄想的責任：我必須知道它。</p>\n<p>我被夾在衣櫃門與床腳之間，仍不敢再移動雙腳，反而向後縮退，彷彿那蟑螂，即使以極其緩慢的速度，也可能猛然撲來——我見過蟑螂突然飛起，那些長著翅膀的蟲族。</p>",
  "<p>我一動不動，瘋狂地計算著。我警覺著，我全然警覺。在我體內，一種強烈的期待感逐漸膨脹，還有一種驚訝的順從：因為在這種警覺的期待狀態中，我看見了自己過往所有的期待，我看見了那曾是我賴以生存的意識，一種從未離開過我的意識，而歸根結底，它或許正是最緊密依附於我生命的東西——也許那意識本身就是我的生命。那蟑螂也是：一隻蟑螂唯一擁有的感覺是什麼？是活著的意識，與它的身體密不可分。在我身上，所有我疊加於自身那不可分割部分之上的東西，大概永遠無法扼殺那意識——那意識與其說是對生命的感知，不如說是我體內生命運作的過程本身。</p>\n<p>就在那時，蟑螂開始出現了。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">就在那時，蟑螂開始出現了。</p>\n<p>先是牠觸鬚那預示性的顫動。</p>\n<p>然後，在那乾燥的觸鬚之後，那遲疑的身體開始顯露。直到幾乎整個身軀都抵達了衣櫃門的開口。</p>\n<p>牠是褐色的，帶著一種彷彿承載著巨大重量的猶豫。此刻牠幾乎完全可見。</p>\n<p>我迅速垂下目光。在藏起雙眼之際，我正對那隻蟑螂隱瞞一個浮現的狡詐念頭——我的心跳幾乎如同在喜悅中搏動。因為我突然感到自己擁有資源，我從未動用過自己的資源——而此刻，一股潛伏的力量正在我體內悸動，一種偉大正籠罩著我：勇氣的偉大，彷彿恐懼本身終於賦予我勇氣。片刻之前，我還膚淺地以為自己只有憤慨與厭惡，但現在我認清了——儘管我從未知曉——正在發生的是，我終於承擔起一個遠比我自己更巨大的恐懼。</p>\n<p>這巨大的恐懼深化了我內在的一切。向內轉入自身，如同盲人摸索自己的專注，我第一次完全退回到一種本能之上。而我因極度的愉悅顫抖，彷彿終於意識到一種本能的壯麗——那是邪惡的、完整的、無限甜美的本能——彷彿終於品嚐到，在我自身之內，一種比我自己更偉大的偉大。我第一次因一種清澈如泉的恨意而醉，因那殺戮的欲望而醉——無論這欲望是否正當。</p>",
  "<p>一整輩子的覺知——十五個世紀以來我未曾掙扎，十五個世紀以來我未曾殺戮，十五個世紀以來我未曾死亡——一整輩子被馴化的覺知，此刻在我體內匯聚，撞擊如一口無聲的鐘，其震動我無需聽見，我認得它們。彷彿第一次，我終於與自然同層。</p>\n<p>*一種全然受控的掠奪性已將我淹沒，而正因它受控，它便是全部的力量。直到此刻，我從未掌握過自己的力量——那些我既不理解也不願理解的力量，但我體內的生命一直緊抓著它們，好讓這未知、快樂而無意識的物質，終有一天能解開那最終的：我！我，無論那是什麼。厚顏地，因我對邪惡的臣服而激動，厚顏地，激動，感激，我第一次成為了我所是的未知之人——只是不再因不認識自己而退縮，真相已超越了我：我舉起手，彷彿要發誓，然後一擊之下，砰地關上門，壓在那半露出的蟑螂身體上。</p>\n<p>就在同時，我也閉上了眼睛。我就那樣站著，渾身顫抖。我做了什麼？</p>\n<p>或許那時我已經知道，我問的不是我對蟑螂做了什麼，而是：我對自己做了什麼？</p>",
  "<p>因為在那幾秒鐘裡，雙眼緊閉，我開始意識到自己，就像意識到一種味道：我全身嚐起來都是鋼鐵與銅綠，我像金屬在舌尖上的酸，像壓碎的綠色植物，我全部的滋味升到嘴裡。我對自己做了什麼？心跳如擂，太陽穴搏動，這就是我對自己做的事：我殺了。我殺了！但為何有這樣的愉悅，而且還有一種對那愉悅的致命接納？那麼，我究竟已經準備要殺多久了？</p>\n<p>不，不是那樣。問題是：我殺的是什麼？</p>\n<p>*那個我一直以來的平靜女人，是否已因狂喜而瘋狂？* 我仍閉著雙眼，卻因愉悅而顫抖。殺戮——遠比我自己更為巨大，與那無垠的房間相稱。殺戮使房間沙地的乾燥敞開，迎向潮濕，終於，終於，彷彿我用堅硬而飢渴的手指不斷挖掘，直到在自身內部找到一線可飲用的生命，而那正是死亡的絲線。我緩緩睜開眼睛，如今帶著甜美，帶著感激、羞怯，帶著一種榮耀的謙遜。</p>\n<p>從我終於自潮濕世界浮現之處，我睜開眼，迎向巨大而刺目的敞亮光線，我看見衣櫥那扇已關上的門。</p>\n<p>而我看到半截蟑螂的身體在門外。</p>\n<p>突出著，直立在空中，一根女像柱。</p>\n<p>但一根活生生的女像柱。</p>",
  "<p>我猶豫著去理解，驚訝地望著它。我逐漸明白發生了什麼：我沒有把門關得夠用力。我確實夾住了那隻蟑螂，牠無法再前進。但我卻讓牠活著。</p>\n<p>活著，而且看著我。我迅速移開目光，帶著劇烈的厭惡。</p>\n<p>因此，我需要再擊一次。再一次打擊？我沒有看著那隻蟑螂，但我告訴自己，我仍需要再擊一次——我緩慢地重複這句話，彷彿每一次重複都能命令我的心跳，那些間隔過於寬闊的搏動，像是我無法感受到的疼痛的痠楚。</p>\n<p>直到——終於能聽見自己，終於能控制住自己——我高高舉起手，彷彿我的整個身體，連同我手臂的揮擊，將一起砸向衣櫥的門。</p>\n<p>但就在那時，我看見了那隻蟑螂的臉。</p>\n<p>它直直地突出，與我的頭和眼睛同高。一秒鐘內，我呆坐著，手懸在空中。然後我緩緩放下。</p>\n<p>一秒鐘前，我或許還能不去看見那蟑螂臉上的面容。</p>\n<p>但這一切發生得太遲了，僅差那麼一秒：我正看著。我的手，在放棄擊打的決心後垂了下來，又緩緩升回腹部的高度：雖然我自己沒有移動，我的胃卻在體內瑟縮了一下。我的嘴乾得可怕，我用同樣乾澀的舌頭舔過粗糙的嘴唇。</p>",
  "<p>那是一張沒有輪廓的臉。觸鬚像鬍鬚般從嘴的兩側伸出。牠棕色的嘴畫得很好。細長的鬍鬚緩慢而乾燥地移動著。牠黑色的複眼正在觀看。那是一隻老如化石魚的蟑螂。那是一隻老如蠑螈、嵌合獸、獅鷲與利維坦的蟑螂。牠古老如傳說。我看著牠的嘴：那裡才是真正的嘴。</p>\n<p>我從未見過蟑螂的嘴。事實上——我從未真正見過一隻蟑螂。我只是被牠古老而永恆的存在所排斥——卻從未真正與牠面對面，連在思想中也沒有。</p>\n<p>於是我發現，雖然蟑螂身體緊密，卻是由一層層棕色薄層構成，細如洋蔥皮，彷彿每一層都能用指甲掀起，而底下總還有另一層，然後又一層。也許那些鱗片是牠的翅膀，但那樣一來，牠必定是由一層層薄翼壓縮而成，才形成那緊密的身體。</p>\n<p>牠是紅棕色的。全身佈滿纖毛。也許那些纖毛是牠的許多條腿。觸鬚此刻靜止不動，是乾燥而沾滿灰塵的細絲。</p>\n<p>蟑螂沒有鼻子。我看著牠，帶著那張嘴和那些眼睛：牠看起來像一個垂死的黑白混血女人。但牠的眼睛閃耀而漆黑。新娘的眼睛。每一隻獨立的眼睛看起來都像一隻蟑螂。那帶有流蘇的、黑暗的、無塵而活生生的眼睛。而另一隻眼睛也一樣。兩隻蟑螂植入在蟑螂身上，每一隻眼睛都複製了整隻蟑螂。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">每一隻眼睛都複製了整隻蟑螂。</p>\n<p>——請原諒我將這個遞給你，握著我的手，但我不願為自己保留這個！帶走那隻蟑螂，我不要我所看見的。</p>\n<p>我張著嘴，既受冒犯又退縮——面對那塵土般的存有正回望著我。帶走我所看見的：因為我所看見的，帶著一種如此痛苦、如此驚懼、又如此天真的窘迫，我看見的是生命正回望著我。</p>\n<p>我還能如何描述那粗礪而可怖的、原始的物質與乾燥的原生質，它就在那裡，而我縮進自己體內，帶著乾嘔的噁心，我墜落，幾個世紀又幾個世紀，墜入一團泥濘——那是泥，甚至不是乾泥，而是仍潮濕、仍活著的泥，那是一團泥，其中我身分的根仍以難以忍受的緩慢在移動。</p>\n<p>帶走它，把這一切帶走，我不要成為一個活著的人！我對自己感到厭惡與驚奇，濃稠的泥緩慢地滲出。</p>\n<p>原來是這樣——原來就是這樣。因為我凝視著那活著的蟑螂，並在其中發現了我最深層生命的本質。在一場艱難的拆解中，堅硬而狹窄的路徑在我體內敞開。</p>\n<p>我看著牠，看著那蟑螂：我如此憎恨牠，以至於我正走向牠那一邊，感到與牠的團結，因為我無法忍受獨自被遺留在我的攻擊性之中。</p>",
  "<p>而突然間，我大聲呻吟出來，這一次我聽見了自己的呻吟。因為浮上我表面的，像膿一樣的，是我最真實的物質——帶著驚駭與厭惡，我正感覺到「我之存有」來自一個遠比人類源頭更古老的源頭，而且，令人恐懼的是，遠比人類更為巨大。</p>\n<p>在我體內敞開，帶著石門般的緩慢，在我體內敞開的是寂靜的廣闊生命，與那凝滯的太陽相同，與那靜止的蟑螂相同。而這也可能與我相同！如果我有勇氣放棄……放棄我的感覺？如果我有勇氣放棄希望。</p>\n<p>*希望什麼？* 我第一次驚愕地發現，自己竟將全部希望寄託於成為一個不是我的東西。那個希望——我還能給它什麼別的名字呢？——我此刻第一次要拋棄它，出於勇氣與致命的求知慾。在我過去的人生裡，希望是建立在真實之上的嗎？帶著孩子般的驚奇，我開始懷疑這一點。</p>\n<p>要找出我真正能希望什麼，難道得先穿越我的真實？我究竟在多大程度上發明了一個命運，卻同時從另一個命運底下活著？</p>\n<p>我閉上眼睛，等待驚愕過去，等待喘息平息到不再是那可怕的呻吟——我聽見它彷彿來自一口乾涸深井的底部，正如那蟑螂是乾井裡的生物。我仍在我體內不可測的距離處，感受著那不再抵達喉嚨的呻吟。</p>",
  "<p>這是瘋狂，我閉著眼睛想。但從灰塵內部誕生的感覺如此無可否認——我只能跟隨某個我清楚知道不是瘋狂的東西，它是，我的天，更糟的真實，可怕的那種。但為什麼可怕？因為它沒有言語地反駁了我過去也同樣沒有言語地思考的一切。</p>\n<p>我等著驚愕過去，等著健康回來。但我正以一種遠古記憶的努力意識到：我從前就感受過這種驚愕——那是我看見自己的血流出體外時所經歷的，我為之驚嘆。因為我看見體外的血，那血以如此驚奇吸引著我：它是我的。</p>\n<p>我不想睜開眼睛，不想繼續看下去。記住規則與法則很重要，記住沒有規則與法則就沒有秩序，我必須不忘記它們、捍衛它們，才能捍衛我自己。</p>\n<p>但對我來說，已經太遲了，無法再拉住自己。</p>\n<p class=\"em-line\">第一個束縛已不由自主地迸裂，我正從法則中掙脫，儘管我隱約感到自己即將進入活物質的地獄——那會是什麼樣的地獄在等著我？但我必須去。我必須沉入我靈魂的沉淪，好奇心正吞噬著我。</p>\n<p>於是我猛然睜開雙眼，看見了那個房間完整無盡的遼闊，那個在寂靜中顫動的房間，地獄的實驗室。</p>\n<p>房間，未知的房間。我對它的進入終於完成。</p>",
  "<p>進入這個房間只有一條通道，而且狹窄：通過那隻蟑螂。那隻蟑螂正以終於敞開的顫動充滿房間，沙漠中響尾蛇尾巴的顫動。經由一條艱辛的路徑，我抵達了牆上那道深深的切口，那就是那個房間——而那裂縫創造出一個廣闊、自然的空穴大廳，如同洞穴一般。</p>\n<p>赤裸，彷彿為一個人的進入而準備。而無論誰進入，都將被轉化為一個「她」或「他」。我是那個被房間稱為「她」的人。一個「我」進去了，而房間賦予了它一個「她」的維度。彷彿我也成了立方體的另一面，那面當你直視時看不見的一面。</p>\n<p>而在我的巨大擴張中，我身處沙漠。我該如何向你解釋？身處一個我從未經歷過的沙漠。那沙漠呼喚著我，如同一首單調而遙遠的聖歌在召喚。我正在被誘惑。而我正走向那充滿希望的瘋狂。但我的恐懼不是一個走向瘋狂的人的恐懼，而是走向一個真相的恐懼——我的恐懼在於，我即將擁有一個我終將不想要的真相，一個會使我屈辱的真相，它會讓我匍匐爬行，與蟑螂同一個層次。我與真相的第一次接觸，總是使我蒙羞。</p>",
  "<p>— 握住我的手，因為我感到自己正在離去。我正再一次走向那最神聖的原初生命，走向一個赤裸生命的煉獄。別讓我看見，因為我即將看見生命的核心——而透過那隻我此刻又看見的蟑螂，透過這活生生的恐怖樣本，我害怕在那核心裡，我將不再知道希望是什麼。</p>\n<p>那蟑螂是純粹的誘惑。纖毛，眨動的纖毛，不斷呼喚著。</p>\n<p>我也一樣，正緩慢地將自己縮減為內在不可化約之物，我也擁有成千上萬眨動的纖毛，而憑藉我的纖毛，我向前移動，我這原生動物，純粹的蛋白質。握住我的手，我帶著喪鐘般無可避免的必然性，抵達了那不可化約之物——我感覺到這一切古老而遼闊，在緩慢蟑螂的象形文字中，我讀到了遠東的書寫。而在這偉大誘惑的沙漠中，存在的是：我與那活生生的蟑螂。生命，我的愛，是一場偉大的誘惑，其中一切存在之物都在誘惑。那個房間荒蕪，因此原初地活著。我已抵達虛無，而那虛無是活生生的、濕潤的。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我已抵達虛無，而那虛無是活生生的、濕潤的。</p>\n<p>就在那時——就在那時，彷彿從一根管子裡，物質開始從那隻被壓碎的蟑螂體內緩緩滲出。</p>\n<p>蟑螂的物質，那是它的內臟，濃稠、乳白而緩慢的物質，正像從牙膏管裡那樣流出。</p>\n<p>在我既噁心又被誘惑的眼前，蟑螂的形狀開始緩慢地改變，向外膨脹。那白色物質緩慢地溢出，堆積在牠的背上，像一個重擔。牠動彈不得，承受著自身軀體的重量，壓在牠塵土覆蓋的側腹上。</p>\n<p>「尖叫，」我冷靜地命令自己。「尖叫，」我無用地重複，伴隨著一聲深沈寧靜的嘆息。</p>\n<p>那白色稠厚物在牠的鱗甲上停了下來。我望向天花板，短暫地歇息那雙我感覺已變得深邃而巨大的眼睛。</p>\n<p class=\"em-line\">但我只要尖叫一次，或許就再也無法停止。如果我尖叫，沒有人能再幫助我；然而，如果我從不暴露我的匱乏，我就不會嚇到任何人，他們會在不知不覺中幫助我——但前提是我不越出規則，不嚇到任何人。但如果他們發現了，他們會害怕，我們這些把尖叫當作不可侵犯的秘密的人。如果我為活著而發出警報，他們會無聲而冷酷地把我拖走，因為他們會拖走那些脫離可能世界的人，那個例外存在被拖走，那個尖叫的存在被拖走。</p>",
  "<p>我以沉重的目光凝視天花板。一切都可以兇猛地歸結為：絕不發出第一聲尖叫——第一聲尖叫會釋放所有其他的尖叫，出生時的第一聲尖叫釋放了一生，如果我尖叫，我會喚醒成千上萬的尖叫存在，它們會在屋頂上釋放出一片尖叫與恐怖的合唱。如果我尖叫，我會釋放存在——什麼的存在？世界的存在。我懷著敬畏，恐懼著世界對我的存在。</p>\n<p>——因為，扶持我的手啊，因為我，在一場我永遠不想再經歷的試煉中，在一場我為自己請求寬恕的試煉中，我正離開我的世界，進入世界。</p>\n<p>因為我不再看見自己，我只是在看。一個完整的文明已經崛起，其保證是：人所見之物立即與人所感之物混合，一個完整的文明，其基礎是救贖——所以我正處於它的廢墟之中。唯一能離開這個文明的，是那些被賦予特殊角色的人：科學家被准許離開，神父被允許離開。但一個連頭銜的保障都沒有的女人不行。而我正在逃離，不安地逃離。</p>\n<p>如果你知道我最初那幾步的孤獨。那不是一個人的孤獨。彷彿我已經死去，獨自踏出第一步，走進另一種生命。而那種孤獨，彷彿被稱為榮耀——我也知道那是榮耀——在那神聖的原初榮耀中，我渾身顫抖，不僅不理解，而且深深不願理解。</p>",
  "<p>——因為，你看，我知道自己正踏入自然那粗礪而原始的榮耀。被誘惑著，我仍盡力抵抗那吞噬我的流沙：我朝「不，不！」做出的每一個動作，都無可避免地將我推向前；沒有力氣抵抗，是我唯一的寬恕。</p>\n<p>我環顧這間我將自己囚禁的房間，尋找出口，絕望地試圖逃脫，而內在的我早已縮得如此之小，以至於我的靈魂緊貼著牆壁——甚至無法停下，也不再想停下，被那吸引我的磁鐵般的確定性所迷住，我縮回自身，直到牆上那個女人的線條裡，我已被植入其中。我縮進骨髓，我最後的避難所。在那牆上，我如此赤裸，連影子都沒有。</p>\n<p>而那些尺度，尺度依然相同，我能感覺到它們不變，我知道我從來不曾多於牆上那個女人，我就是她。而我保存完好，一條漫長而豐饒的路徑。</p>\n<p>我的緊繃突然斷裂，像一聲被打斷的噪音。</p>\n<p>而第一個真正的寂靜開始低語。無論我在那些黑暗而微笑的照片中看見的，是何等平靜、廣闊而陌生的東西——無論那是什麼，此刻第一次置身於外，完全在我觸手可及之處，不可理解，卻在我觸手可及之處。</p>",
  "<p class=\"em-line\">那樣的解脫，如同乾渴被緩解一般，正在釋放我——它釋放我，彷彿我一生都在等待一種水，一種對我這刺蝟般的身體而言，如同古柯鹼對渴求它的身體那般必要的水。終於，這身體，浸透了寂靜，平靜了下來。解脫來自於我嵌入了洞穴中那無聲的圖畫。</p>\n<p>直到那一刻，我才完全察覺到自己的掙扎——我便是如此深陷其中。但此刻，從我終於墜入的寂靜中，我知道我曾掙扎過，我曾屈服，也曾投降。</p>\n<p>而現在，我真的在那個房間裡。</p>\n<p>如同一個在洞穴中存續了三十萬年的圖畫那般，置身其中。而我就是這樣嵌進自己裡面，我就是這樣，在牆上被刻印出自己。</p>\n<p>那狹窄的路徑穿過了那隻艱難的蟑螂，我帶著厭惡擠過那鱗片與泥濘的身體。而我最終，也渾身污穢，從那蟑螂中湧出，進入了我的過去——那過去是我持續的現在，也是我持續的未來——而今天與永遠，它都在牆上，我那從那時直到我自己的、一千五百萬個女兒，也都在那裡。我的生命如同死亡一般連續。生命是如此連續，以至於我們將它劃分成階段，並將其中一個階段稱為死亡。我始終在生命之中，而那幾乎無關緊要——不是嚴格意義上的「我」，不是我通常稱為「我」的那個東西。我始終在生命之中。</p>",
  "<p>我，中性的蟑螂身體，我，擁有著一個終於不再逃脫我的生命，因為我最終在自身之外看見了它——我是那蟑螂，我是我的腿，我是我的頭髮，我是牆上灰泥中最白的那片光——我是我身上每一塊地獄般的碎片——我體內的生命是如此苛求，以至於若他們將我肢解，如同蜥蜴一般，那些碎片仍會顫抖、蠕動。我是刻在牆上的寂靜，而最古老的蝴蝶拍翅飛來，找到了我：一如往常。從出生到死亡，是我稱自己為人的時候，而我永遠不會真正死去。</p>\n<p>但那不是永恆，那是詛咒。</p>\n<p>這份寂靜何其奢華。它由數個世紀堆疊而成。那是一隻正在凝視的蟑螂的寂靜。世界在我之中凝視著自身。萬物凝視著萬物，萬物活在他者之中；在這片荒漠裡，事物認識事物。事物如此深刻地認識事物，以至於那便是……那便是我所謂的寬恕，若我想在人類世界中拯救自己的話。那便是寬恕本身。寬恕是活物質的一種屬性。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">寬恕是活物質的一種屬性。</p>\n<p>——你看，我的愛，你看我如何出於恐懼便已開始組織，你看我如何仍無法處理這些原始的實驗室元素，而不立刻想要組織起希望。因為此刻，我蛻變為我自己的過程毫無意義。這是一場我失去我所擁有的一切的蛻變，而我所擁有的就是我——我只有我現在所是的。而我現在是什麼？我是：站在一場驚駭面前。我是：我所看見的。我不明白，也害怕明白，世界的物質令我恐懼，帶著它的行星與蟑螂。</p>\n<p>我，那個曾經活在慈善或驕傲或任何字詞之上的人。但字詞與它試圖成就之事之間的鴻溝何其深，字詞「愛」與那甚至不具人類意義的愛之間的鴻溝何其深——因為——因為愛是活物質。愛是活物質嗎？</p>\n<p>昨天發生在我身上的事是什麼？而現在呢？我困惑了，我穿越了一片又一片荒漠，但我是否被某個細節卡住了？如同被壓在一塊岩石之下。</p>\n<p>不，等等，等等：我必須帶著寬慰記住，我昨天離開了那個房間，我離開了它，我是自由的！而且仍有機會復原。如果我願意的話。</p>\n<p>但我願意嗎？</p>",
  "<p>我所看見的是無法被組織的。但如果我真的願意，此刻，我仍能將我所發現的翻譯成更接近我們的語言，更接近人類的語言，並且仍能讓昨天那些時光悄然流逝。如果我仍願意，我可以在我們的語言之中，用另一種方式追問發生在我身上的事。</p>\n<p>而我若這樣說，仍能找到一個讓我恢復的答案。恢復，便是知道：G. H. 是一個活得好的女人，活得很好，活得很好，活在世界的沙礫最上層，而沙礫從未在她腳下塌陷——協調如此完美：沙礫移動時，她的腳也隨之移動，於是萬物保持堅實緊密。G. H. 活在上層結構的頂樓，雖是懸空建造，卻是一座堅固的建築，她自身也在空中，如同蜜蜂在空中編織生命。這已持續了數世紀，歷經必要或偶然的變遷，而它運作著。它運作著——至少沒有什麼開口說話，沒有人開口說話，沒有人說不；所以它運作著。然而，正是這數世紀緩慢累積、自動疊加的過程，在無人察覺之際，使那空中建築變得極其沉重：它逐漸自我飽和：變得更加緊密，而非更加脆弱。在上層結構中生活的累積，愈來愈沉重地懸浮在空中。</p>",
  "<p>如同一棟建築，夜裡人人安睡，渾然不知地基正在下沉，而在那未被寧靜暗示的瞬間，樑柱將因凝聚的力量緩慢拉扯——每世紀一毫米——而斷裂。然後，在最不預期的時刻——在一個如舞會中舉杯至微笑唇邊般重複平凡的瞬間——然後，昨天，在一個如盛夏白晝般陽光燦爛的日子，工人們工作著，廚房飄出炊煙，鑿岩機擊碎石頭，孩子們笑著，一位神父試圖阻止——但阻止什麼？昨天，毫無預警，傳來堅固之物驟然崩裂的巨響。</p>\n<p>在崩塌中，噸位疊著噸位。而當我，G.H.，甚至還站在我的行李箱上，我，人群中的一員，睜開眼睛時，我——並非在瓦礫堆頂，因為連瓦礫都已被沙土吞噬——我身處一片平靜的平原，在曾經是座大城的下方，數公里又數公里深處。萬物已回歸它們本來的樣子。</p>\n<p>世界奪回了它自己的現實，而，如同一場災難之後，我的文明已然終結：我不過是一個歷史事實。我體內的一切都被時間的起點與我自己的起點所奪回。我已移步至最前線的景框，我置身於風的寂靜與錫銅的時代——在生命的第一紀元。</p>\n<p>——聽著，面對那活生生的蟑螂，最可怕的發現是：世界並非人性，而我們也並非人性。</p>",
  "<p>不，別害怕！當然，直到那一刻，將我從我所活過的那種感傷化生活中拯救出來的，正是那非人的部分——那是我們身上最好的部分，是那個物，我們身上的物之部分。正因如此，作為一個虛假的人，我從未在感傷與功利的建構之下挖掘：我的人類情感是功利的，但我沒有向下挖掘，因為那物之部分，神的物質，太過強大，正等著奪回我。普遍生命那偉大的中性懲罰，在於它能突然動搖一個單一的生命；如果它不被賦予自己的力量，它就會像水壩潰堤般迸發——然後純粹地、未經稀釋地到來：純粹中性。那便是巨大的危險：當事物的中性部分無法滿足一個個人生命時，生命便以純粹中性的形式到來。</p>\n<p class=\"em-line\">但為何偏偏在我身上，那最初的寂靜會突然重現？彷彿一個平靜的女人只是被喚了一聲，便從容地將刺繡擱在椅上，站起身，無言地——拋下她的生命，放棄刺繡、愛情與一顆已然成形的靈魂——無言地，那女人從容地四肢著地，開始爬行，拖曳著自己，眼神冷靜而閃亮：因為更早的生命召喚了她，她便去了。</p>\n<p>但為何是我？但為何不是我。若不是我，我便不會知曉；而既然是我，我便知曉——僅此而已。召喚我的究竟是什麼：瘋狂，還是現實？</p>",
  "<p>生命在向我報復，而它的報復不過是回返，僅此而已。每一樁瘋狂的案例中，都有某種東西回返了。被附身者並非被將臨之物附身，而是被回返之物附身。有時，生命會回返。若力量穿過我時，一切在我體內碎裂，那並非因為它的功能是碎裂：它只是終於需要穿過，因為它已過於豐沛，無法被容納或轉向——沿著它的路徑，它埋葬了一切。而後，如洪水過後，漂浮在水面上的是一隻衣櫃、一個人、一扇零落的窗、三只行李箱。那對我而言如同地獄，那種人類考古學層層疊疊的毀滅。</p>\n<p>地獄，因為世界對我而言不再具有人的意義，而人對我而言也不再具有人的意義。而沒有了那種人化，沒有了那種對世界的感傷化——我恐懼萬分。</p>\n<p>沒有哭喊，我凝視著那隻蟑螂。</p>\n<p>近距離觀看，蟑螂是一件極度奢華之物。一位佩戴黑寶石的新娘。它如此稀有，彷彿獨一無二。我用衣櫃門將它半身夾住，隔離了這唯一已知的標本。只有半截身體可見。其餘看不見的部分，可能巨大無比，分散在成千上萬戶人家裡，藏在雜物與衣櫃之後。然而，我並不想要分派給我的那一份。在房屋的表面之下——那些爬行的晦暗寶石？</p>",
  "<p>我感到不潔，正如聖經所說的不潔。為何聖經如此關切不潔之物，還列出一張不潔與禁食的動物清單？為何，如果那些動物，和其他動物一樣，也是被創造出來的？又為何不潔之物被禁止？我觸碰了不潔之物，犯下了被禁止的行為。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我觸碰了不潔之物，犯下了被禁止的行為。</p>\n<p>於是我如此不潔，以至於我對自己突然間間接的認識，讓我張開嘴尋求幫助。他們說盡了一切，在聖經裡，他們說盡了一切——但如果我理解了他們所說的，他們自己便會稱我為瘋子。和我一樣的人早已說過這些，然而理解他們卻會是我的毀滅。</p>\n<p>「但不可吃那不潔的：就是鷹、鷲、與隼。」以及貓頭鷹、天鵝、蝙蝠、鸛，和任何一種烏鴉。</p>\n<p>我發現聖經中的不潔動物之所以被禁止，是因為不潔之物就是根源——因為有些被造之物從未裝飾自己，它們保存了自己，正如它們被創造的那一刻，唯有它們繼續是那仍全然完整的根源。而因為它們是根源，人不能吃它們，善惡之果——吃下那活生生的物質，會將我逐出一個裝飾的樂園，讓我永遠手持牧羊杖在曠野中流浪。許多人曾手持牧羊杖在曠野中流浪。</p>\n<p>更糟的是——這會引領我看見，沙漠也有生命，也有濕潤，萬物皆有生命，且由同一物質構成。</p>",
  "<p>為了建造一個可能的靈魂——一個頭顱不吞噬自己尾巴的靈魂——律法命令我們只能守著那些偽裝成活著的東西。而律法也命令，凡吃下不潔之物的人，必須在不知不覺中吃下。因為，若有人明知不潔卻仍吃下——他也將知道，不潔之物並非不潔。是這樣嗎？</p>\n<p>「凡在地上爬行、有翅膀的，都當以為可憎，不可吃。」</p>\n<p>我張開嘴，驚愕不已：那是為了求救。為什麼？為什麼我不願變得和那蟑螂一樣不潔？是什麼理想將我緊縛於某種觀念的情感？為什麼我不該變得污穢，正如我發現自己的整個存在就是如此？我在害怕什麼？害怕與什麼一同變得污穢？</p>\n<p>與喜悅一同變得污穢。因為此刻我明白，我開始感受到的，已是喜悅，只是我尚未認出，也未能理解。在我無聲的求救中，我所抗拒的，是一種模糊的初生喜悅，我不願在自己身上察覺它，因為，即使模糊，它已駭人：那是一場無可救贖的喜悅，我不知道該如何向你解釋，但那是一場沒有希望的喜悅。</p>",
  "<p>——啊，別把你的手從我手中抽離，我向自己承諾，也許在這不可能的故事結尾，我會明白，哦，也許在地獄之路上，我會找到我們所需要的——但別抽走你的手，儘管我已經知道，找到必須沿著我們所是的道路前行，如果我設法不徹底沉入我們所是的深淵。</p>\n<p>看啊，我的愛，我已經失去勇氣去找到我必須找到的一切，我已經失去勇氣將自己交付給那條路，我已經向我們承諾，在那地獄裡，我會找到希望。</p>\n<p>——也許那不是舊日的希望。也許它甚至不能被稱為希望。</p>\n<p>我掙扎著，因為我不想要一份未知的喜悅。它對我未來的救贖而言，將如同那被稱為不潔的禁忌造物一樣被禁止——而我正痛苦地張闔著嘴，尋求幫助，因為那時我還沒想到要發明這隻我此刻用來握住自己的手。昨日，在恐懼中，我孤身一人，我想為了我最初的去人性化而尋求幫助。</p>\n<p>去人性化如同失去一切般痛苦，如同失去一切，我的愛。我張闔著嘴想尋求幫助，但我不能，也不知道如何將它說出口。</p>\n<p>因為我已無話可說。我的痛苦就像臨死前想要說話。我知道我正在永遠告別某樣東西，某樣東西即將死去，而我想說出那個至少能總結那正在死去的東西的詞語。</p>\n<p>我最終設法至少說出一個念頭：「我在尋求幫助。」</p>",
  "<p>那時我才想到，我並沒有什麼需要對抗的事情需要幫助。我無事可求。</p>\n<p>突然間，就是這樣了。我明白了，「請求」仍是一個可申訴世界的最後殘餘，而這個世界正越來越遙遠。如果我繼續想要請求，那是為了仍舊攀附在我古老文明的最後殘餘上，攀附著，以免讓自己被那此刻正召喚我的東西拖走。而對於那個東西——在一種沒有希望的愉悅中——我已經在屈服，啊，我已經想要屈服——經歷過它，已是地獄般渴望、渴望、渴望的開端……我渴望的意志，比我想得救的意志更強嗎？</p>\n<p>我越來越無事可求。而我正看著，帶著著迷與恐懼，我那腐朽木乃伊衣物的碎片乾燥地落在地板上，我看著自己從蛹蛻變成潮濕的幼蟲，我的翅膀緩慢地焦灼萎縮。而一個全新的、為地面而生的腹部，一個新的腹部正在重生。</p>\n<p>我的視線未曾離開那隻蟑螂，我開始緩緩放下身體，直到感覺自己碰觸到床沿，而視線仍舊鎖定那隻蟑螂，我坐了下來。</p>\n<p>此刻，我是仰著頭在看牠。此刻，牠彎身對著自己的腹部，俯視著我。我將世間的不潔之物緊扣在眼前——卻也打破了活物的咒語。我失去了那些念頭。</p>\n<p>然後，又一毫米厚的白色物質噴湧而出。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">然後，又一毫米厚的白色物質噴湧而出。</p>\n<p>聖母瑪利亞，天主之母，我願以我的生命交換，換取昨日那一刻並非真實。那隻溢出白色物質的蟑螂正看著我。我不知道牠是否看見了我，我不知道一隻蟑螂看見什麼。但我們彼此凝視，而我也不確定一個女人看見什麼。但若牠的眼睛看不見我，牠的存在卻在「存在」著我——在我所進入的那個原始世界裡，存有者以「存在彼此」的方式來看見對方。而在那個我正逐漸認識的世界裡，有許多方式意味著「看見」：一種是看著對方卻看不見他，一種是佔有對方，一種是吞噬對方，一種只是待在一個地方而對方也在那裡：這一切也都意味著看見。那隻蟑螂並非直接看見我，牠與我同在。那隻蟑螂不是用眼睛看見我，而是用牠的身體。</p>\n<p>而我——我看見了。沒有辦法不去看見牠。沒有辦法否認：我的信念與我的翅膀正迅速乾涸，再也沒有任何意義。我再也無法否認。我不知道我無法否認的是什麼，但我再也無法否認。而我甚至無法像從前那樣，用一整座文明來拯救自己——那座曾幫助我否認我所看見之物的文明。</p>\n<p>我看見了全部，那隻蟑螂。</p>",
  "<p>蟑螂是醜陋而閃閃發光的存有。蟑螂是反過來的。不，不，它沒有所謂的反過來：它就是那個樣子。它身上暴露的一切，正是我隱藏在自己內心的東西：從我外在的存在被暴露出來，我造就了我那未被察覺的內在。它正看著我。而那並不是一張臉。那是一張面具。一張潛水員的面具。那塊生鏽鐵礦的珍貴寶石。它的兩隻眼睛活像兩顆卵巢。它正以它凝視的盲目豐饒看著我。它正在為我死去的豐饒施肥。它的眼睛會是鹹的嗎？如果我觸碰它們——因為我正逐漸變得越來越不潔——如果我以我的嘴觸碰它們，它們嚐起來會是鹹的嗎？</p>\n<p>我嘴裡早已嚐過一個男人的眼睛，而從我口中的鹹味，我意識到他在哭泣。</p>\n<p>但，一想到那蟑螂黑色眼睛裡的鹽分，我突然又退縮了，我乾裂的嘴唇向後扯到牙齒上：那些在地表移動的爬蟲類！在房間光線停滯的震顫中，那蟑螂是一隻緩慢的小鱷魚。那乾燥而震顫的房間。蟑螂與我，在那乾燥中對峙，如同在一座死火山的乾燥地殼上。我進入的那片沙漠，而在它內部，我也正在發現生命與它的鹽分。</p>\n<p>又一次，蟑螂的白色部分噴湧而出，或許不到一毫米。</p>\n<p>這一次，我幾乎沒有察覺到它的物質所做出的細微動作。我正全神貫注地看著，一動不動。</p>",
  "<p>——直到那一刻，生命從未在白晝發生在我身上。從未在陽光下。只有在我的黑夜裡，世界才緩慢地旋轉。只有那樣，無論在黑夜本身之中發生什麼，也同時會發生在我自己的內臟裡，而我的黑暗與外頭的黑暗並無分別，到了早晨，當我睜開眼睛，世界仍是一片表面：夜晚的秘密生命很快在我口中縮減為一個消失的噩夢的味道。但現在，生命正在白晝發生。無可否認，且清晰可見。除非我移開目光。</p>\n<p>而我仍然可以移開目光。</p>\n<p>——但地獄早已將我擄獲，我的愛，那病態好奇的地獄。我已在出賣自己的人類靈魂，因為觀看已開始以愉悅吞噬我，我出賣我的未來，我出賣我的救贖，我出賣我們。</p>\n<p>「我在求救，」我隨即對自己無聲吶喊，如同那些嘴巴逐漸被流沙填滿的人，「我在求救，」我仍坐著，思索著。然而我從未想過起身離去，彷彿那已不可能。蟑螂與我被埋在同一座礦坑裡。</p>\n<p>天平如今只剩一個秤盤。那秤盤上盛著我對蟑螂的深切拒絕。但此刻「拒絕蟑螂」不過是詞語，而我也知道，在我死亡的時刻，我同樣無法被詞語翻譯。</p>",
  "<p>死亡，是的，我明白，因為死亡是未來，是可以想像的，而對於想像，我向來有時間。但此刻，這個此刻——當下——是無法想像的，在當下與我之間沒有間隙：它就在此刻，在我之內。</p>\n<p>——明白嗎，死亡我早已預知，死亡尚未向我索求。但我從未經歷過的，是與名為「此刻」的瞬間相撞。今日正向我索求這一日。我從未知曉，活著的時間也無詞語可表。活著的時間，我的愛，是如此當下，以至於我將嘴倚靠在生命的物質上。活著的時間是門扉持續敞開的緩慢嘎吱聲。兩扇門始終敞開著，從未停止敞開。但它們持續敞開——朝向虛無？活著的時間是如此地獄般地無表達性，以至於它就是虛無。我所稱之為「虛無」的，卻與我如此貼合，以至於它對我而言……就是我？而正因如此，它變得不可見，如同我對自己不可見，它變成了虛無。門扉一如既往地敞開著。</p>\n<p>最終，我的愛，我屈服了。而它成了一個此刻。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">最終，我的愛，我屈服了。而它成了一個此刻。</p>\n<p>*終於是現在了。就只是現在。是這樣的：這個國家正處於上午十一點。表面如一方庭院那般翠綠，最細緻的表面性。綠，綠——綠是一個庭院。在我與綠之間，是空氣的水。空氣的綠水。我透過一只滿盈的玻璃杯看見一切。什麼也聽不見。屋子的其餘角落裡，陰影全都腫脹著。成熟的表面性。此刻是巴西的上午十一點。是現在。那意味著精確的現在。現在是時間腫脹到極限。十一點沒有深度。十一點充滿了十一小時，滿到綠玻璃杯的邊緣。時間顫動如一只靜止的氣球。空氣受孕且喘息。直到某一首國歌裡，十一點半的鐘聲切斷了氣球的纜繩。然後我們突然全都抵達正午。它會像現在一樣綠。</p>\n<p>我突然從那片意外的綠洲中醒來——在那裡，我曾短暫地全然棲身。</p>\n<p>但我身處沙漠。而且不只是綠洲的頂峰才是現在：現在也在沙漠裡，而且全然飽滿。正是此刻。我這一生第一次，它全然是關於現在。這是我所承受過最殘酷的暴力。</p>\n<p>因為當下沒有希望，當下也沒有未來：未來將精確地再次成為當下。</p>\n<p>我如此恐懼，以至於我在自己內部變得更加安靜。因為似乎我終究必須去感受。</p>",
  "<p>似乎我必須放棄一切我留在門後的事物。而我知道，我早已知道，如果我穿過那扇永遠敞開的門，我將進入自然的核心。</p>\n<p class=\"em-line\">我知道，進入並非罪孽。但它的風險如同死亡。正如一個人死去時不知去向何方，而那正是一個身體最偉大的勇氣。進入之所以是罪孽，只因它是我生命的詛咒——我後來或許永遠無法回返的詛咒。我或許早已知道，在門的另一邊，我與蟑螂之間將毫無差別。在我自己的眼中如此，在神之眼中亦然。</p>\n<p>我就這樣開始踏入虛無的第一步。我猶豫的第一步，邁向生命，同時拋棄我的生命。我的腳踩入空氣，我進入了天堂或地獄：核心。</p>\n<p>我用手抹過額頭：帶著寬慰，我注意到自己終於開始出汗。不久之前，只有那股灼熱的乾燥炙烤著我們倆。現在，我開始濕潤自己。</p>\n<p>啊，我多麼疲倦。我此刻的渴望是打斷這一切，在這艱難的故事中插入一則我前幾日聽到的趣聞——關於一對情侶為何分手——純粹為了娛樂與放鬆。啊，我知道那麼多有趣的故事。我也可以，為了放鬆，談論悲劇。我知道悲劇。</p>",
  "<p>我的汗水讓我舒緩。我抬頭，望向天花板。在光束的遊戲中，天花板變得圓潤，轉化為某種讓我想起穹頂的東西。熱氣的震動如同一部唱誦神劇的震動。只有我的聽覺部分在感受。閉口的聖歌，聲音震動著，聾啞如某種被囚禁與壓抑之物，阿們，阿們。為一個存在被另一個存在謀殺而感恩的聖歌。</p>\n<p>最深的謀殺：那是一種關係的方式，一個存在藉以存在於另一個存在的方式，看見另一個、成為另一個、擁有另一個的方式——那謀殺中既無受害者也無劊子手，只有相互的兇猛連結。我為生命而戰的原始鬥爭。*「迷失在峽谷的烈焰地獄中，一名女人絕望地為生命掙扎。」*</p>\n<p>我等待那無聲且被囚禁的聲音過去。但小房間內的廣闊正在增長，無聲的神劇以震動擴張著它，那些震動抵達天花板的裂縫。那神劇不是祈禱：它不祈求任何事物。以神劇形式存在的激情。</p>\n<p>蟑螂突然從牠的裂縫中又嘔出一團蓬鬆而白色的噴濺。</p>",
  "<p>——啊！但我能向誰求助，如果你也——我當時對著一個曾經屬於我的男人想——如果你現在對我也毫無用處。因為你和我一樣，想要超越生命，因此超越了它。但現在我再也無法超越了，我必須知道，而我將沒有你同行，我曾試圖向你求助。為我祈禱吧，我的母親，因為不超越是一種犧牲，而超越曾是我作為人類的救贖努力，超越有著立即的效用。超越是一種越界。但留在無論是什麼之中，那要求我無所畏懼！</p>\n<p>而我將必須留在無論是什麼之中。</p>\n<p>有件事必須說出來，你不覺得有件事必須被知道嗎？哦，即使我之後必須超越它，即使之後超越無可避免地從我身上誕生，如同活人的呼吸。但是，在我發現之後，我將接受它如同一次呼吸——或者如同有毒的蒸氣？不，不是如同有毒的蒸氣，我可憐我自己！如果超越必須無可避免地降臨到我身上，願它如同從嘴本身誕生的呼吸，從那存在的嘴，而不是從手臂或頭上張開的虛假之嘴。</p>",
  "<p>*我帶著地獄般的狂喜，彷彿自己即將死去。我開始感到，我那被鬼魅纏繞的步伐已無可挽回，而我正一點一點地拋棄自己的人類救贖。我感到，我內在屬於我的東西，儘管有著蓬鬆白淨的質地，卻仍有力量炸開我那銀白與美麗的臉龐——再會了，世界的美麗。那美麗如今對我而言如此遙遠，而我已不再想要——我已無力再渴求美麗——或許我從未真正想要過它，但它曾經如此美好！而我記得，美麗的遊戲曾是多麼美好，美麗是一種持續的蛻變。</p>\n<p>然而，我帶著地獄般的解脫與它告別。從蟑螂腹中流出的東西是無法超越的——啊，我不想說那是美麗的對立面，「美麗的對立面」根本毫無意義——從蟑螂腹中流出的東西是：「今日」，妳的子宮所結的果實是應當稱頌的——我要的是當下，不把它裝扮成一個能救贖它的未來，甚至不帶一絲希望——直到此刻，希望在我體內所求的，不過是驅散當下。</p>\n<p>但我想要的遠不止於此：我要在今日、在此刻、在正在發生的現實中找到救贖，而不是在應許之中；我要在這一瞬間找到喜悅——我要那從蟑螂腹中流出的東西之中的神——即使那，以我過去的人類用語來說，意味著最糟的，以人類用語來說，意味著地獄。</p>",
  "<p>是的，我想要它。但與此同時，我雙手緊緊抓住自己的胃窩：「我辦不到！」我向另一個同樣辦不到、也永遠辦不到的人哀求。我辦不到！我不想明白我此刻將稱之為「虛無」的東西是由什麼構成的！我不想直接用我這極其敏感的嘴去感受蟑螂眼中的鹽分，因為，我的母親，我向來習慣的是它層層的濕軟，而不是事物單純的潮潤。</p>\n<p>正當我思索著蟑螂眼中的鹽時——帶著一種終究還是得再次妥協的嘆息——我意識到自己仍在使用古老的人類之美：鹽。</p>\n<p>就連鹽的美、淚的美，我也得拋棄。連那個也得拋棄，因為我所看見的，遠在人類之前。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">因為我所看見的，遠在人類之前。</p>\n<p>不，那些眼睛裡沒有鹽。我確信蟑螂的眼睛是無鹽的。對於鹽，我始終準備妥當，鹽是我用來體驗滋味、逃離我所謂「虛無」的超越。對於鹽，我準備好了，為了鹽，我構築了整個自我。但我的嘴無從理解的——是無鹽。我整個存在所不知道的——是中性。</p>\n<p>而中性，就是我曾經稱之為虛無的生命。中性，就是地獄。</p>\n<p>太陽移動了些許，貼在我的背上。即使在陽光下，蟑螂仍是裂成兩半。我無法為你做任何事，蟑螂。我也不想為你做任何事。</p>\n<p>因為這不再關乎「做」什麼：蟑螂那中性的凝視告訴我，那不是重點，而我知道。只是我無法忍受就那樣坐著、存在著，於是我想要行動。行動就是超越，超越是一條出路。</p>\n<p>然而此刻已經來臨，不再關乎那個。因為蟑螂不懂希望或憐憫。倘若牠未被囚禁、且比我巨大，牠會以中性而忙碌的愉悅殺死我。正如牠生命中暴烈的中性，允許了我——因為我未被囚禁、且更為巨大——去殺死牠。那就是我們所在的沙漠中，那種平靜而中性的兇猛。</p>",
  "<p>而牠的眼睛是無味的，不像我所期望的那樣鹹：鹹會是感覺、是詞語、是滋味。我知道蟑螂的中性，正如其白色物質般缺乏味道。坐著，我持續存在。坐著，持續存在，我正意識到——如果我不將事物稱為鹹或甜、悲傷或快樂、痛苦或甚至更細微的中間色調——那麼唯有如此，我才不再超越，而停留在事物本身。</p>\n<p>那個事物，我不知其名，正是那個事物——看著蟑螂時，我開始以無名的方式呼喚它。與那沒有性質或屬性的事物接觸，令我作嘔；一個沒有名字、沒有滋味、沒有氣味的活物，令人厭惡。平淡：此刻的滋味不過是一種酸澀：我自身的酸澀。於是，一瞬間，我感受到一種顫抖的幸福遍及全身，一種可怕的快樂不安，我的雙腿彷彿消失——如同每當我未知身分的根源被觸及時。</p>\n<p>啊，至少我已進入蟑螂的本質，到了不再想為牠做任何事的地步。我正從我的道德中解放自己，那是一場沒有撞擊、沒有悲劇的災難。</p>",
  "<p>道德。若將道德問題簡化為：對他人而言，在於行為合乎應然；對自己而言，在於感受合乎應然——這是否過於淺薄？我的道德，在於我做了該做的事、感受了該感受的情感嗎？剎那間，道德問題在我看來不僅壓倒性地沉重，而且極其瑣碎。為了讓我們適應它，道德問題必須同時更不苛求、也更宏大。因為作為一種理想，它既渺小又不可企及。渺小，若你達成了它；不可企及，因為它甚至無法被達成。「絆腳石是必要的，但那個帶來絆腳石的人有禍了」——這是新約聖經裡的話嗎？解決之道必須是祕密的。道德的倫理，在於保守祕密。自由是一種祕密。</p>\n<p>儘管我知道，即使在祕密中，自由也無法照料罪疚。但人必須比罪疚更偉大。我身上那微小的神性部分，比我的人性罪疚更偉大。神比我本質的罪疚更偉大。所以我選擇神，而非我的罪疚。不是為了原諒自己而逃離，而是因為罪疚使我萎縮。</p>",
  "<p>我不再想為那隻蟑螂做任何事了。我正在從我的道德中解放自己——儘管這帶給我恐懼、好奇與著迷；還有許多恐懼。我不會為你做任何事，我也在地上爬行。我不會為你做任何事，因為我已不再明白我過去以為自己懂得的愛的意義。還有我對愛的想法，那也正在告別，我幾乎不再知道那是什麼，我不記得了。</p>\n<p>也許我會找到另一個名字，起初更為殘酷，也更為它自身。也許我不會。愛，是否就是當你不為事物的身分命名？</p>\n<p>但我現在知道一件可怕的事：我知道什麼是匱乏、匱乏、匱乏。這是一種新的匱乏，處在我只能稱之為中性而可怖的層次。這是一種匱乏，對我的匱乏毫無憐憫，對蟑螂的匱乏也毫無憐憫。我坐著，平靜，流汗，正如現在——而我看到，有某種東西比我過去用各種名字稱呼的一切更為嚴肅、更為無可避免、更為核心。我，這個曾把愛稱為我對愛的盼望的人。</p>",
  "<p>但現在，是在這自然與蟑螂與我身體活著的睡眠的中性當下，我想要知道愛。而我想知道，盼望是否曾是對不可能的暫緩。或者，它是否是一種拖延此刻可能之事的方式——而我只是出於恐懼才沒有擁有它。我想要那沒有承諾的當下時間，也就是說，那正在發生的存在。這是我既想要又恐懼的核心。這是我從未想要的核心。</p>\n<p>蟑螂以牠那黑色、多面、閃亮而中性的凝視觸碰著我的全部。</p>\n<p>而現在我開始讓牠觸碰我。事實上，我一生都在對抗那讓自己被觸碰的深層渴望——而我之所以對抗，是因為我不能允許自己所謂的良善死去；人類良善的死去。但現在我不再想對抗了。必須有一種如此他者的良善，以至於它不再像良善。我不再想對抗了。</p>\n<p>帶著厭惡，帶著絕望，帶著勇氣，我屈服了。太遲了，而現在我想要。</p>\n<p>難道只有在那一刻我才在想要？不，否則我早就離開了房間，或者根本不會看見那蟑螂——過去多少次蟑螂發生在我身上，而我卻走了另一條路？我屈服了，但帶著恐懼與碎裂。</p>\n<p>我想著，如果電話響了，我就得去接，那樣我還能得救！但，彷彿記起一個已滅絕的世界，我想起我早已把話筒拿起來了。若非如此，它會響，我會逃出房間去接，然後再也不，噢！再也不回來。</p>",
  "<p>——我記起了你，當我吻你那張男人的臉，慢慢地，慢慢地吻著，而當該吻你雙眼的時候——我記起那時我嚐到了口中的鹹味，而你眼中的淚之鹽，是我對你的愛。但，最令我以愛之驚駭緊緊縛住的，是在那鹽的深淵之深處，你那無鹽、純真而稚氣的質地：以我的吻，你最深處的淡而無味的生命給了我，而吻你的臉，是那無鹽而忙碌的愛的耐心工作，是女人編織一個男人，正如你編織了我，生命的中性編織。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">生命的中性編織。</p>\n<p>因為有朝一日吻過淚之鹽中發現的淡而無味的殘渣，房間的陌生感變得可辨認，如同已被活過的物質。若它直到那時都未被認出，那是因為它只被我最深處無鹽的血液無鹽地活過。我正在辨認一切事物的熟悉感。牆上的圖案，我以一種新的觀看方式辨認著它們。我也正在辨認蟑螂的警覺。蟑螂的警覺是活著的生命，是我自己的警覺生命活著它自己。</p>\n<p>我在睡袍口袋裡摸索，找到一根香煙和火柴，點燃了它。</p>\n<p>陽光下，蟑螂的白色團塊變得越來越乾，微微泛黃。那告訴我，比我以為的更多的時間已經過去了。一朵雲遮蔽了太陽一瞬，突然間，我看見同一個房間，沒有陽光。</p>\n<p>*不是黑暗，只是沒有光。於是我注意到，房間是獨自存在的，它不是太陽的熱度，它也可以像月亮一樣寒冷而平靜。*想像著它可能的月夜，我深深吸了一口氣，彷彿走進一座寂靜的水庫。雖然我也知道，冰冷的月亮也不會是房間。房間就在自身之中。那是永恆呼吸的響亮單調。那令我恐懼。世界只有在我成為世界時，才不再令我恐懼。如果我是世界，我就不會害怕。如果我們是世界，我們便被一種精細的雷達所驅動，引領著我們。</p>\n<p>當雲層飄過，房間裡的陽光變得更加明亮、更加潔白。</p>",
  "<p>時不時地，在一個輕盈的瞬間，蟑螂動了動牠的觸角。牠的眼睛持續單調地看著我，那兩顆中性而豐饒的卵巢。在它們之中，我認出了我自己的兩顆匿名而中性的卵巢。而我不想要，啊，我多麼不想要！</p>\n<p>我已經把電話聽筒拿下來了，但或許有人會按門鈴，那樣我就自由了！那件襯衫！我買的那件，他們說會送來，然後他們就會按門鈴！</p>\n<p>不，他們不會。我必須繼續辨認。而我在蟑螂身上，辨認出我懷孕時的那種無味。──我回憶起自己在街上遊蕩，知道自己會去墮胎，醫生，我這個對孩子只知道、也只會知道自己要去墮胎的人。但至少我認識了懷孕。沿著街道，我感受著體內那個尚未動彈的孩子，而我停下來，看著櫥窗裡微笑的蠟像模特兒。當我走進一家餐廳吃飯時，一個孩子的毛孔正像等待的魚嘴般吞噬著。當我走路時，當我走路時，我正承載著它。</p>",
  "<p class=\"em-line\">在那些漫無邊際的時辰裡，我徘徊街頭，為墮胎之事下定決心——儘管我早已與您，先生，醫生，安排妥當——那些時辰裡，我的雙眼想必也失去了鹽分。在街上，我也不過是中性原生動物數以千計的纖毛在拍動，我體內早已認識那隻被攔腰擒住的蟑螂那閃亮的凝視。我走過街頭，嘴唇乾裂，而活著，醫生，對我而言是罪行的反面。懷孕：我被拋入中性生命的快樂恐怖之中，那生命活著、移動著。</p>\n<p>而當我凝視櫥窗，醫生，嘴唇乾裂如同一個不用鼻子呼吸的人，當我凝視那些固定不動、微笑著的模特兒，我體內充滿中性的浮游生物，張開我窒息而靜默的嘴，我對您，先生，說：「最困擾我的，醫生，是我呼吸困難。」浮游生物給了我顏色，塔帕若斯河之所以是綠色，是因為它的浮游生物是綠色的。</p>\n<p>當夜晚降臨，我正為我早已下定決心的墮胎下定決心，躺在床上，以我數千個複眼窺視黑暗，嘴唇因呼吸而發黑，不思，不思，下定決心，下定決心：那些夜晚，我整個人正緩慢地因自己的浮游生物而變黑，正如蟑螂的物質正在變黃，而我逐漸的變黑正記錄著時間的流逝。而這一切，都是對孩子的愛嗎？</p>",
  "<p>如果是，那麼愛遠比愛更多：愛是愛之前的某種東西：是掙扎的浮游生物，是偉大而中性的生命在掙扎。正如那隻被攔腰卡住的蟑螂體內的生命。</p>\n<p>*我始終畏懼生命自我成就時的那份寂靜。我畏懼中性。中性是我最深、最活生生的根——我看著蟑螂，便明白了。在看見蟑螂的那一刻之前，我對自己所經歷的一切總有個名字，否則我無法逃脫。為了逃離中性，我早已將存在讓位給人格，讓位給人類的面具。當我將自己人性化，我便從沙漠中解放了自己。我從沙漠中解放了自己，是的，但也失去了沙漠！也失去了森林，失去了空氣，失去了我體內的胚胎。</p>\n<p>然而，那隻中性的蟑螂就在那裡，沒有痛苦或愛的名字。它在生命中唯一的區別，就是必須是雄性或雌性。我只將牠視為雌性，因為被壓碎在腰際的東西總是雌性。</p>\n<p>我捻熄了那根已經燙到手指的煙蒂，小心地用拖鞋在地板上按滅，然後交叉起汗濕的雙腿——我從不知道腿可以流這麼多汗。我們兩個，被活埋的兩個。如果我有勇氣，我會擦去蟑螂的汗。</p>",
  "<p>牠在體內感受到的，是否類似於我的目光在牠身上所看見的？牠對自己的利用，對自己本質的利用，到了什麼程度？即使以某種間接的方式，牠知道自己正在爬行嗎？或者爬行是我們自己也不知道正在發生的事？我對別人顯然在我身上看見的東西，又知道些什麼？如果我的肚子壓在塵土中爬行，我又如何能知道？真理沒有見證者嗎？存在不等於知道嗎？如果一個人不去看、不去見，真理是否仍然存在？那連看得見的人也無法傳遞的真理。這就是做為一個人的祕密嗎？</p>\n<p>如果我願意，即使現在，在一切發生之後，我仍然可以讓自己不去看見。然後我將永遠不會知道那個我正試圖再次穿越的真理——它仍然取決於我！</p>\n<p>我環顧這間乾燥而潔白的房間，從這裡我只能看見一片又一片的殘骸，有些覆蓋著另一些。我所在的宣禮塔由堅硬的金屬鑄成。我立於這堅硬的金屬之上，它什麼也無法承接。而我正需要被承接。我害怕。</p>",
  "<p>——母親：我殺了一個生命，如今沒有臂膀能承接我，現在，以及我們荒漠的時刻，阿們。母親，如今一切都化為堅硬的金屬。我打斷了一件有秩序的事物，母親，那比殺戮更糟，它讓我從一道裂縫中進入，那道裂縫向我展示，比死亡更甚，向我展示那濃稠而中性的生命正轉為黃色。蟑螂是活的，牠的眼睛凝視是肥沃的，我害怕自己的沙啞，母親。</p>\n<p>因為我無聲的沙啞，早已是某個享受著溫柔地獄之人的沙啞。</p>\n<p>那沙啞——是某個正在享樂之人的沙啞。地獄對我來說是好的，我正在享受那被我潑灑的白色血液。蟑螂是真實的，母親。牠不再是一個關於蟑螂的概念。</p>\n<p>——母親，我所做的一切不過是想殺，但看看我打碎了什麼：我打碎了一個外殼！殺戮也是被禁止的，因為它打破了堅硬的外殼，留下黏稠的生命。從堅硬外殼的內部，正湧出一顆濃稠、潔白、充滿膿液的心臟，母親，你在蟑螂中受祝福，現在，以及你我的死亡時刻，蟑螂與寶石。</p>\n<p>彷彿說出「母親」這個詞，在我體內釋放出一種濃稠而潔白的部分——神劇的強烈震動突然停止，宣禮塔陷入沉默。如同一次劇烈的嘔吐之後，我的額頭感到舒緩，清新而冰冷。甚至不再有恐懼，甚至不再有驚駭。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">甚至不再有恐懼，甚至不再有驚駭。</p>\n<p>*我是否已嘔出最後的人類殘餘？* 而我已不再求救。白晝的荒漠在我面前展開。如今聖樂再次響起，卻以另一種方式——如今聖樂是熱氣折射在牆壁與天花板上的聾啞之聲，在圓拱穹窿中迴盪。聖樂由悶熱的顫抖構成。我的恐懼也變了：不再是即將進入者的恐懼，而是已然進入者的恐懼——遠為廣闊。</p>\n<p>如此廣闊：那是對自己缺乏恐懼的恐懼。</p>\n<p>於是我帶著魯莽看向蟑螂。我看見：那是個對其他物種而言毫無美感的生物。當我凝視它，那小小的舊恐懼只回來一瞬：「我發誓，我會做你要的一切！但別把我囚禁在蟑螂的房間裡，因為某件巨大的事將降臨於我，我不要其他物種！我只要人類。」</p>\n<p>然而，在我輕微退縮之際，聖樂只是加劇，於是我保持靜止，不再試圖做出任何自救的動作。我早已遺棄了自己——我幾乎能看見，在已走過的路徑起點，那具被我拋下的身體。但我仍不時呼喚它，仍呼喚著自己。正因我再也聽不見自己的回應，我才明白我已遺棄自己於觸及範圍之外。</p>",
  "<p>是的，蟑螂是對其他物種而言毫無美感的生物。那嘴：若有牙齒，必是巨大、方正而黃的牙。我多麼憎恨那揭露一切的陽光——連可能之物也揭露。我用袍緣擦拭額頭，目光不曾離開蟑螂的眼睛，而我的眼睛也有同樣的睫毛。但沒有人會觸碰你的，不潔之物。只有另一隻蟑螂會想要這隻蟑螂。</p>\n<p>而我——今日誰會想要我？誰已變得與我一般沉默？誰像我一樣，將恐懼稱為愛？將渴望稱為愛？將匱乏稱為愛？誰像我一樣，知道自他們在洞穴的石壁上畫下我以來，我從未改變過形貌？旁邊還有一個男人與一條狗。</p>\n<p>從今以後，我可以隨意為任何事物命名：在這乾燥的房間裡，我可以，因為任何名字都行得通，也因為它們全都行不通。在這穹頂的乾燥聲響中，一切都可以被稱為任何事物，因為任何事物都會在同一種顫動的沉默中被轉化。蟑螂那更為龐大的本質，使任何進入那裡的東西——無論是名字還是人——都失去了虛假的超越性。以至於我只看見、且精確地看見牠身體的白色嘔吐物：我只看見事實與事物。我知道自己身處不可化約之境，儘管我並不知道不可化約之物究竟是什麼。</p>",
  "<p>但我也知道，對不可化約法則的無知並不能作為藉口。我不能再以「我不知道這法則」來為自己開脫——因為認識自己與認識世界，就是那條即使無法企及也不可違背的法則，沒有人能以不知為由而免責。更糟的是：蟑螂與我並非面對一條必須服從的法則：我們自己就是那條我們所服從的未知法則。那重新發生的原罪是這樣的：我必須完成我所不知的法則，而若我不完成我的無知，我便是在對生命犯下原罪。</p>\n<p>在伊甸園裡，誰是怪物，誰又不是？在房屋與公寓之間，在高樓之間的升騰空間裡，在那座懸空花園中——誰是，誰又不是？我還能忍受多久，至少不知道是什麼在注視著我？那赤裸的蟑螂正注視著我，牠的法則看見了我的法則。我感到自己即將知曉。</p>\n<p>——此刻別拋下我，別讓我獨自承擔這個早已做出的決定。我曾經，是的，我仍然渴望躲進自己的脆弱裡，躲進那個狡猾卻真實的辯詞——我的肩膀是女人的肩膀，軟弱而纖細。每當我需要的時候，我就用「我是個女人」來為自己開脫。但我很清楚，害怕看見的不只是女人，每個人都害怕看見上帝的面容。</p>\n<p>我害怕上帝的面容，我害怕牆上最終的赤裸。美，那種與我過去稱之為美的一切毫無關聯的新生的缺席之美，令我驚駭。</p>",
  "<p>——把你的手給我。因為我已不知道自己在說什麼。我想這一切都是我編造的，這一切從未存在過！但如果我編造了昨天發生的事——誰能擔保我沒有連昨天之前的整個人生也一併編造出來？</p>\n<p>把你的手給我：</p>\n<p>把你的手給我：</p>\n<p>我現在要告訴你，我是如何進入那無表情之境——那始終是我盲目而祕密的追尋。我是如何進入存在於數字一與數字二之間的那個東西，如何看見那條神祕與火焰的線，那條隱密的線。在兩個音符之間存在一個音符，在兩個事實之間存在一個事實，在兩粒無論多麼靠近的沙粒之間存在一段空間的間隙，一種存在於感官之間的感官——在原初物質的縫隙中，是那條神祕與火焰的線，那是世界的呼吸，而世界持續的呼吸正是我們所聽見並稱之為沉默的東西。</p>\n<p>我並非藉由任何屬性作為工具而抵達那等離子體光滑而神祕的火焰——恰恰相反，我是剝除自己所有的屬性，僅帶著我活生生的內臟前行。為了抵達那一點，我正拋棄自己的人類組織——進入那怪物般的東西，那是我活生生的中性。</p>",
  "<p>——我知道，握著我的手是不好的。在那座坍塌的礦井裡，我毫無憐憫地將你帶入，卻出於對自己的憐憫，讓你窒息而無空氣，這是不好的。但我發誓我會讓你活著離開這裡——即使我沒有說謊，即使我沒有對我雙眼所見之事說謊。我會將你從這恐懼中拯救出來，而此刻，我需要你。現在，對你——我所抓住的你——有何憐憫可言？你天真地將手遞給我，而正因我握著它，才有了沉入深淵的勇氣。但別試圖理解我，只要陪伴我就好。我知道，如果你的手知道了真相，它會放開我。</p>\n<p>我該如何報答你？至少也利用我吧，至少把我當作一條黑暗的隧道——當你穿越我的黑暗，你會在另一端與自己相遇。你也許不會與我相遇，我不知道我是否能穿越過去，但你會與自己相遇。至少你不再孤單，不像昨天的我，而昨天我只祈禱至少能活著離開那裡。不僅僅是活著——像那隻原始而猙獰的蟑螂那樣僅僅活著——而是像一個人那樣有組織地活著。</p>\n<p>身分——那最初的本質——那就是我所臣服的嗎？那就是我所進入的嗎？</p>\n<p>我知道，身分對我而言是被禁止的。但我願意冒險，因為我信任我未來的懦弱，而正是我本質的懦弱，將再次將我重組為一個人。</p>",
  "<p>不僅僅透過我的懦弱。我將透過我生來便擁有的儀式來重組自己，如同在精液的中性之中，生命的儀式是內在的。身分對我而言是被禁止的，但我的愛如此巨大，以至於我無法抗拒進入那神祕織物的意志，進入那團原生質，或許我再也無法從中脫身。然而，我的信念也同樣深沉，以至於，若我無法脫身，我知道，即使在我新的非現實之中，神的原生質仍將存在於我的生命裡。</p>\n<p>啊，但同時我怎能渴望我的心去觀看？若我的身體如此脆弱，無法直面太陽而不讓雙眼生理性地流淚——我又怎能阻止我的心在生理性的有機淚水中閃爍，若在赤裸中我感受到那同一性：那神？我的心，披上了千層斗篷。</p>\n<p>我所經歷的偉大中性現實，正以其極端的客觀性吞噬著我。我感到自己無力像那觸及我的現實那般真實——我是否正開始扭曲，以求如我所見那般赤裸地真實？然而我卻以一種現實的非現實感，經歷著那一切現實。我所經歷的，難道不是真理，而是真理的神話？每一次我經歷真理，都是透過一種無可逃遁的夢境印象：那無可逃遁的夢境，便是我的真理。</p>",
  "<p>我試著告訴你，我是如何觸及我內在的中性與無表情。我不知道我是否理解我所說的話，我正在感受——而我非常畏懼那感受，因為感受只是存在的一種形式。然而我將穿越那從虛無中翻騰而出的、令人呆滯的悶熱，並必須以感受去理解那中性。</p>\n<p>中性。我說的是那連結萬物的生命元素。噢，我不怕你不理解，我怕的是我自己理解得不好。若我不理解自己，我將死於我所賴以生存之物。現在，讓我告訴你最可怕的部分：</p>\n<p>我被那惡魔般的東西帶走了。</p>\n<p>因為無表情即是惡魔般的。一個不委身於希望的人，活在那惡魔之中。一個有勇氣拋棄感受的人，發現了極度忙碌的寂靜的豐沛生命——那與蟑螂體內的寂靜相同，與星辰相同，與自我相同——那惡魔先於人類。而看見那當下性的人，便如看見神一般燃燒。前人類的神聖生命，是一種燃燒的當下性。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">前人類的神聖生命，是一種燃燒的當下性。</p>\n<p class=\"em-line\">我要告訴你：我害怕一種盲目而早已狂野的喜悅，它正開始吞沒我。並且失去我。</p>\n<p>迷失的喜悅是一種安息日的喜悅。迷失是一種危險的發現。我在那片荒漠中經歷著事物的火：那是一場中性的火。我從構成事物的織理中活著。而那是個地獄，那個地方，因為在我所活著的那個世界裡，既無憐憫也無希望。</p>\n<p>我進入了安息日的狂歡。如今我知道山巒暗處在狂歡之夜發生什麼。我知道！我帶著恐懼知道：事物在享樂自身。事物之所由成的東西在歡愉自身——那是黑魔法赤裸的喜悅。我正是從那中性活著——中性是我真正的原始湯汁。我向前移動，感受著地獄的喜悅。</p>\n<p>而地獄不是痛苦的折磨！它是喜悅的折磨。</p>\n<p>中性是無法解釋而活生生的，試著理解我：就像原生質與精液與蛋白質屬於一種活著的中性。而我全然嶄新，像個初學者。彷彿從前我有一個嗜鹽嗜糖的味覺，一個嗜喜嗜痛的靈魂——卻從未嘗過最初的滋味。而如今我正經驗著虛無的滋味。我迅速戒除成癮，那滋味新鮮如母親的乳汁——只有嬰兒的嘴才能嘗到。隨著我的文明與人性崩塌——那對我而言是巨大的鄉愁之苦——隨著人性的失落，我正狂歡般地嘗到事物的同一性。</p>",
  "<p>品嘗是非常困難的。直到此刻，我一直被情感化所吞噬，以至於當我經驗真實同一性的滋味時，它嘗起來就像雨滴在你嘴裡的味道那樣無味。那是可怕的淡薄，我的愛。</p>\n<p>我的愛，這就像最無味的甘露——就像空氣本身沒有氣味。直到那時，我上癮的感官對事物的滋味仍舊啞然。然而，我那最古老也最惡魔般的乾渴，已在地下引領我，將所有建構都摧毀殆盡。那有罪的乾渴正引導著我——而如今我知道，品嘗那近乎虛無的滋味，正是諸神祕密的喜悅。那是一種虛無，即是神——而它沒有滋味。</p>\n<p>但這是最原初的喜悅。而唯有如此，終於，終於！才是與感受—人性—基督教那一極相對的另一極。透過那原初惡魔般喜悅的一極，我隱約感知到——而且第一次——原來真的存在一個相反的極。</p>\n<p>我從自身對感受的陶醉中潔淨了，如此潔淨，以致我能進入那神聖的生命，那是一種全然沒有美善的原初生命，生命本身就像從天而降的嗎哪，沒有任何滋味：嗎哪如同雨水，沒有味道。體驗那虛無的滋味，是我的詛咒，也是我歡愉的恐懼。</p>",
  "<p>噢，我未知的愛，記住我曾被囚禁在那坍塌的礦井中，而此時房間已染上一種無可言說的熟悉感，如同夢境中那真實的熟悉。而，如同在夢中，我無法為你重現的，是它氛圍的本質色澤。如同在夢中，「邏輯」是另一回事，是一種醒來後毫無意義的邏輯，因為夢境更大的真理已然失落。</p>\n<p>但記住，這一切發生時，我是清醒的，在白晝的光中動彈不得，而夢境的真理竟在沒有夜晚麻醉的狀態下發生。與我一同清醒地入睡，唯有如此，你才能知曉我偉大的沉睡，才能知道什麼是活著的沙漠。</p>\n<p>突然間，坐在那裡，一種全然硬化、毫無倦意的疲憊攫住了我。再多一點，它就會將我石化。</p>\n<p>然後，小心翼翼地，彷彿體內已有部分癱瘓，我開始在粗糙的床墊上伸展身體，在那裡，蜷縮著，我立刻入睡，就像一隻蟑螂在垂直的牆壁上睡著一樣。我的睡眠中沒有人類的穩定：那是蟑螂在石灰牆頂入睡時的平衡力量。</p>\n<p>醒來時，房間裡的陽光更加潔白，更加熾熱而靜止。從那場睡眠歸來——我那短小的爪子曾攀附在其無底深淵的表面——我現在因寒冷而顫抖。</p>\n<p>但隨後麻木感逐漸消退，再次，完全置身於烈日的灼燒中，我被困住，窒息難當。</p>",
  "<p>想必已過正午。我甚至還沒下定決心就站了起來，雖然徒勞無功，卻試圖將早已大開的窗戶開得更開，我試著呼吸，即使只是為了呼吸一片視覺的廣闊，我在尋找一片廣闊。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我在尋找一片廣闊。</p>\n<p>從那間在建築岩石中鑿出的房間，從我宣禮塔的窗戶，我極目遠眺，看見無盡的屋頂與屋頂在陽光下平靜地灼燒。公寓大樓像低矮的村莊。其規模超越了西班牙。</p>\n<p>越過岩石的溝壑，在建築物的水泥之間，我看見山丘上的貧民窟，看見一隻山羊緩慢地爬上山丘。再過去，延伸著小亞細亞的高地。從那裡，我凝視著當下的帝國。那邊是達達尼爾海峽。更遠處是崎嶇的山脊。你莊嚴的單調。在陽光下你帝國的廣袤。</p>\n<p>再過去，已是沙漠的開端。赤裸而燃燒的沙漠。當黑暗降臨，寒冷將吞噬沙漠，人在其中會像在沙漠之夜一樣顫抖。更遠處，藍色的鹹水湖閃閃發光。那邊，想必是偉大鹽湖的區域。</p>\n<p>*在悶熱的顫動波紋之下，是單調。* 透過其他公寓的窗戶，以及水泥露臺上，我看見人影與陰影的來來去去，如同最早的亞述商人。他們正在為小亞細亞的控制權而爭鬥。</p>\n<p>我或許挖掘出了未來——或者抵達了如此遙遠的古老深處，以至於我挖掘它們的雙手也無法探測其深淵。我站在那裡，像一個穿著修士服的孩子，一個昏昏欲睡的孩子。但一個好奇的孩子。從這棟建築的頂端，當下凝視著當下。就像西元前第二個千年一樣。</p>",
  "<p>而我，現在我不再是一個好奇的孩子了。我長大了，變得像一位女王那樣簡單。國王、獅身人面獸與獅子——這是我居住的城市，而它們全都滅絕了。我是剩下的東西，被一塊墜落的石頭卡住。而，由於寂靜將我的靜止判定為一個死人的靜止，他們全都忘了我，他們離去時沒有將我拉出，而，被假定為已死，我躺在那裡觀看。我看著，而真正死去之人的寂靜正侵入我，如同常春藤侵入石獅的口中。</p>\n<p>而因為我自己那時確信我終將被那塊壓住我四肢的落石餓死——我於是看見了，像一個永遠不會說出的人那樣看見。我看見了，像一個甚至不會對自己訴說的人那樣置身事外。我正在看著，像一個永遠不必理解她所見之物的人。如同一隻蜥蜴的本性在看：甚至事後無需記得。蜥蜴看著——像一顆鬆脫的眼睛看著。</p>\n<p>我或許是第一個踏上那座空中城堡的人。五百萬年前，也許最後一個穴居人曾從同一個地點向外眺望，那裡曾經必定有一座山。而後來，被侵蝕，變成了一片空地，之後又再次有城市崛起，而它們本身又反過來被侵蝕。今日，這片土地廣泛地居住著多樣的人種。</p>",
  "<p>佇立窗前，有時我的目光歇落在藍色的湖面上——那湖或許不過是一片天空的碎片。但我很快便倦了，因為那藍色是由過於強烈的光所構成。我迷濛的雙眼於是轉向那片赤裸而灼燒的沙漠歇息，至少它沒有顏色的硬度。三千年後，祕密的石油將從那些沙土中噴湧而出：此刻正為一個新的此刻開啟了巨大的視野。</p>\n<p>與此同時，今日，我活在某種事物的寂靜之中——那事物在三千年後，歷經侵蝕與重建，又將成為樓梯、起重機、人與建築。我活在一個未來的史前時代。像一個從未有過孩子、卻將在三千年後擁有孩子的女人，我今日已活在將在三千年後噴湧的石油之中。</p>\n<p>倘若我至少在黃昏時分走進那個房間——今夜月圓，我想起昨夜露台上的派對時記起了——我將看見滿月升起在沙漠之上。</p>\n<p>「啊，我想回到我的房子，」我突然對自己說，因為潮濕的月亮讓我渴望我的生命。但從那個平臺上，我無法獲得一絲黑暗與月光的片刻。只有那堆餘燼，只有那流浪的風。而對我而言，沒有水瓶，沒有食器。</p>\n<p>但也許，不到一年之後，我會有一項發現——沒有人、甚至連我自己也不敢預期的發現。一只金聖爵？</p>\n<p>因為我正在尋找我的城市的寶藏。</p>",
  "<p>一座黃金與石頭的城市，里約熱內盧，其居民在陽光下是六十萬個乞丐。城市的寶藏可能藏在瓦礫堆的某個裂縫中。但哪一個呢？那座城市需要一位地圖繪製者的工作。</p>\n<p>*我將目光抬得更高，望向更陡峭的高處，眼前矗立著巨大的建築群，形成一幅沉重的構圖，尚未在任何地圖上標示。我的目光繼續前行，在山丘上尋找某段防禦城牆的殘跡。抵達山頂後，我讓目光環繞全景。我在心中沿著貧民窟半頹廢的遺跡畫了一個圓，並認出那裡曾經可能有一座城市，其規模與清澈，如同雅典全盛時期，孩子們在街頭陳列的貨物之間奔跑。</p>\n<p>我的觀看方法全然不偏不倚：我直接以視覺的證據工作，不允許視覺之外的暗示預先決定我的結論；我完全準備好要讓自己驚訝。即使證據最終與我最平靜的狂想中所降臨的一切相矛盾。</p>\n<p>我知道——從我自己獨特的見證——在我這項探索工作的開端，我絲毫不知道那種語言會是什麼模樣，它將慢慢向我顯露，直到有一天我能抵達君士坦丁堡。但我已準備好，要在房間裡忍受我們氣候中潮濕悶熱的季節，以及隨之而來的蛇、蠍子、狼蛛，還有城市崩塌時湧現的無數蚊蟲。而且我知道，許多次，在野外的工作中，我必須與牲畜同床共枕。</p>",
  "<p>此刻，陽光在窗邊炙烤著我。直到今天，陽光才完全觸及我。但同樣真實的是，唯有當陽光觸及我時，我才能因為站立著，而成為一道陰影的源頭——在那裡，我將保存我水囊中清涼的酒。</p>\n<p>我需要一根十二公尺長的鑽頭、駱駝、山羊和綿羊、一條電熱帶；而且我必須直接運用那片廣袤本身，因為要複製——比如說——在一個簡單的水族箱裡，海洋表面所蘊含的豐富氧氣，是不可能的。</p>\n<p>*為了不讓對這份工作的熱情消退，我會試著不忘記地質學家早已知道，在撒哈拉沙漠的地下，存在著一片巨大的可飲用水湖，我記得讀過這個；而在撒哈拉本身，考古學家也已挖掘出家用器皿與古老聚落的遺跡：七千年前，我曾讀到，在那片「恐懼之地」曾發展出繁榮的農業。沙漠擁有一種必須重新尋回的濕潤。</p>\n<p>我該如何著手工作？為了固定沙丘，我必須種植兩百萬棵綠樹，尤其是桉樹——睡前我總會讀點東西，而我讀了許多關於桉樹特性的資料。</p>",
  "<p>而在工作之初，我不能忘記讓自己準備好犯錯。不能忘記，錯誤往往已成為我的路徑。每當我思考或感受的某件事行不通時——那是因為終於出現了一道裂隙，而若我從前有勇氣，早已穿越它。但我始終害怕迷狂與錯誤。然而，我的錯誤，必定是一條通往真理的路徑：因為唯有在犯錯時，我才踏出我所知與所理解的範圍。如果「真理」是我所能理解的任何事物——那它終究只會是一個渺小的真理，一個與我尺寸相符的真理。</p>\n<p>真理必定恰恰存在於我永遠無法理解的事物之中。而之後，我能否理解我自己？我不知道。未來的人類會理解我們如今的面貌嗎？他會心不在焉地，帶著一絲心不在焉的溫柔，輕撫我們的頭，如同我們撫摸那隻走向我們、從其黑暗深處凝視我們、眼神沉默而痛苦的狗。他，未來的人類，會輕撫我們，遙遠地理解我們，正如我日後會遙遠地理解自己，在記憶的記憶的記憶——那已失落的痛苦時光的記憶——之下，渾然不知我們的痛苦時光終將過去，正如一個孩子並非靜止的孩子，而是一個正在成長的存在。*</p>",
  "<p>除此之外，用桉樹固定沙丘，我無法忘記——如果必要的話——稻米能在鹽鹼地裡茁壯，其高鹽分有助於降低土壤的鹽度；我也記得，從我夜間的閱讀中，我刻意讓它們變得非個人化，好幫助我入睡。</p>\n<p>我還需要什麼工具來挖掘？十字鎬、一百五十把鏟子、絞盤——儘管我不確切知道絞盤是什麼——裝有鋼軸的重型馬車、一座便攜式鍛爐，還有釘子和麻繩。至於我的飢餓，我的飢餓則仰賴一千萬棵棕櫚樹的椰棗，更不用說杏仁樹和橄欖樹了。而且我必須事先知道，當我從我的宣禮塔祈禱時，我只能向沙祈禱。</p>\n<p>但我可能從出生起就準備好面對沙了：我會知道如何祈禱它們，為此我不需要事先訓練，就像巫醫不向事物祈禱，而是祈禱事物本身。我一直都準備好了，被恐懼訓練成這個樣子。</p>\n<p>我想起一件銘刻在記憶中的事，直到此刻都毫無用處：阿拉伯人和遊牧民族稱撒哈拉為El Khela，虛無；Tanesruft，恐懼之國；Tiniri，牧區之外的境地。</p>\n<p>為了祈禱沙，我像它們一樣，早已被恐懼準備好了。</p>",
  "<p>又一次過於灼熱，我尋找那巨大的藍色湖泊，將我枯萎的雙眼浸入其中。湖泊或天空的光斑。湖泊既不醜也不美。而這正是仍然讓我的人性感到恐懼的地方。我試著去想黑海，我試著去想波斯人從峽谷中下降——但在這一切中，我既找不到美也找不到醜，只有世界世紀的無限連續。</p>\n<p>突然之間，我再也無法忍受。</p>\n<p>於是我驀然轉向房間內部，在它的燃燒中，至少那裡沒有被佔據。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我驀然轉向房間內部，在它的燃燒中，至少</p>\n<p>沒有被佔據。</p>\n<p>不，在那整個過程中，我並沒有發瘋或失去理智。那只不過是一場視覺冥想。冥想的危險在於不經意間開始思考，而思考就不再是冥想，思考會導向某個目標。在冥想中，最不危險的事是「觀看」，它不需要思考語言。我知道現在有一種電子顯微鏡，能將物體的影像放大到自然尺寸的十六萬倍——但我不會說透過那顯微鏡所見的景象是幻覺，即使你再也認不出那個被怪異放大的小物體。</p>\n<p>如果我在視覺冥想中錯了？</p>\n<p>極有可能。但即使在純粹的光學視覺中，無論是一張椅子或一個水壺，我也是錯誤的受害者：我對水壺或椅子的視覺見證，在各方面都有缺陷。錯誤是我運作方式中無可避免的一環。</p>\n<p>我重新坐回床上。但此刻，看著那隻蟑螂，我已經知道得更多了。</p>\n<p>看著牠，我看見了利比亞沙漠的廣袤，在埃爾舍勒地區。那隻蟑螂在我之前數千年就已抵達那裡，甚至比恐龍更早到達。面對那隻蟑螂，我已經能望見遠方的大馬士革，地球上最古老的城市。在利比亞沙漠裡，有蟑螂和鱷魚嗎？這整段時間我一直不願去想我其實早已想到的事：蟑螂和龍蝦一樣可食用，蟑螂是一種甲殼類動物。</p>",
  "<p>而我對鱷魚爬行的厭惡，只是因為我不是鱷魚。我對鱷魚那充滿層層鱗片的沉默感到恐懼。</p>\n<p>但厭惡對我而言是必要的，就像水的污濁對水中萬物的繁衍是必要的一樣。厭惡引導我，並使我肥沃。透過厭惡，我看見了加利利的一夜。加利利的一夜，彷彿黑暗中沙漠的廣袤在移動。那隻蟑螂，是一片移動的黑暗廣袤。</p>\n<p class=\"em-line\">我早已活在那個我尚未經歷的地獄裡，但我不知道我只需穿過它，還是得留在那裡。我已經開始明白，這個地獄既可怕又美好，也許我自己想留在那裡。因為我正看見那隻蟑螂深邃而古老的生命。我看見一種沉默，其深度如同一個擁抱。太陽在利比亞沙漠中，正如它自身那般熾熱。而大地就是太陽——我怎麼從未看見，大地就是太陽？</p>\n<p>然後它將發生——在利比亞沙漠中一塊赤裸乾燥的岩石上——兩隻蟑螂的愛將發生。我現在知道那是什麼模樣。一隻蟑螂在等待。我看見它那褐色之物的沉默。而現在——現在我看見另一隻蟑螂緩慢而艱難地穿過沙地，朝那塊岩石移動。在那塊洪水乾涸了數千年的岩石上，兩隻乾燥的蟑螂。一隻，是另一隻的沉默。相遇的殺手：這個世界極度地相互對應。岩石中一陣完全無聲的顫動；而我們，活到今日的我們，仍與它一同顫動。</p>",
  "<p>——我為自己承諾，有一天也要擁有這同樣的沉默，我為我們承諾我現在學到的一切。只是對我們而言，那必須在夜裡發生，因為我們是潮濕而帶鹽的存在，我們是海水與眼淚的存在。那也將以蟑螂完全睜開的眼睛進行，但只有在夜裡才行，因為我是擁有巨大潮濕深度的造物，我不認識乾涸水槽的塵埃，而岩石的表面不是我的家。</p>\n<p>我們是必須潛入深處才能呼吸的生物，如同魚兒潛入水中才能呼吸，只是我的深處在夜晚的空氣裡。夜晚是我們的潛在狀態。它如此潮濕，以致植物生長。屋裡的燈熄滅了，為了更清晰地聽見蟋蟀，也讓蚱蜢能在葉片上行走，幾乎不觸及它們，葉片，葉片，葉片——在夜晚，柔軟的焦慮透過空氣的空洞傳遞，虛無是一種運輸工具。</p>\n<p>是的，白晝沙漠中的愛不屬於我們：我們是會游泳的，夜晚的空氣潮濕而甜美，而我們是鹹的，因為汗水是我們的吐息。很久以前，我與你被畫在一個洞穴裡，與你一起從那黑暗深處游到今日，我用無數纖毛游動——我是那直到今日才噴湧的油，當一個黑人女子在我屋裡畫出我，使我從牆上萌發。夢遊般，如同終於噴湧的油。</p>",
  "<p>——我發誓，愛就是這樣。我知道，只因為我曾坐在那裡，並且知道。只靠蟑螂的光，我才知道我們曾有的一切已是愛。那蟑螂必須傷害我，如同我的指甲被拔除——然後我再也無法忍受折磨，便承認了，我正在告知。我再也無法忍受，正在承認我早已知道一個從未有過用途或應用的真理，而我會害怕去應用它，因為我尚未長大到懂得如何使用一個真理而不摧毀自己。</p>\n<p>如果你能透過我而知道，而不必先被折磨，不必被衣櫃的門劈開，不必打破你那隨著時間乾涸成石殼的恐懼外殼——正如我的外殼必須在鉗子的力量下碎裂，直到我觸及自己那溫柔的中性——如果你能透過我而知道……那麼，就向我學習吧，我必須完全暴露，失去所有刻著姓名縮寫的行李箱。</p>\n<p>——猜測我吧，猜測我吧，因為天氣寒冷，失去龍蝦的殼是寒冷的。用你對我的猜測溫暖我，理解我，因為我並不理解我自己。我只是在愛那隻蟑螂。而這是一場地獄般的愛。</p>\n<p>但你害怕，我知道你一直害怕儀式。但當一個人被折磨到成為一個核心，那麼他就會惡魔般地開始想要服務儀式，即使儀式意味著消耗自己——正如為了獲得薰香，唯一的方式就是燃燒薰香。聽著，因為我嚴肅得像一隻有纖毛的蟑螂。聽著：</p>",
  "<p>當一個人成為自己的核心，他就不再有任何偏差。那麼他就是自己的莊嚴，不再害怕在服務那消耗性的儀式時消耗自己——儀式是核心生命的展開，儀式不在核心之外：儀式是內在的。蟑螂在其細胞內擁有它的儀式。儀式——相信我，因為我認為我知道——儀式是神的印記。而每個孩子出生時，就已帶著同樣的儀式。</p>\n<p>— 我知道：我們兩人始終畏懼彼此的莊嚴。我們以為那只是形式的莊嚴。而我們始終偽裝著自己所知的事實：活著永遠是生與死的問題，因此才有莊嚴。我們也知道——卻沒有領受這份知道的恩寵——我們是內在的生命，我們服從自己。我們與生俱來的唯一命運，是儀式。我一直稱「面具」為謊言，但它不是：它是莊嚴的本質面具。我們必須戴上儀式的面具才能相愛。聖甲蟲生來就帶著那副將使它們圓滿的面具。透過原罪，我們失去了自己的面具。</p>\n<p>我凝視：那蟑螂是一隻聖甲蟲。它全然只是自己的面具。透過蟑螂笑聲的深層缺席，我看見了它戰士般的兇猛。它溫順，但它的功能是兇猛的。</p>",
  "<p>我溫順，但我活著的功能是兇猛的。啊，前人類的愛侵襲著我。我明白了，我明白了！活著的形式是一個如此隱密的秘密，以至於它是秘密的無聲爬行。那是沙漠中的一個秘密。而我確實早已知道。因為，藉由兩隻蟑螂之愛的光芒，我想起了一段我曾擁有卻不知自己擁有的真愛——那時的愛，我用一個詞就理解了。但有些事必須說出來，必須說出來。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">但有些事必須說出來，必須說出來。</p>\n<p>— 我要說出從未對你說過的話，或許那正是缺失之物：說出口。若我未曾說，並非出於吝於言說，也非因我如那隻眼睛多於嘴巴的蟑螂般沉默。若我未曾說，是因為我不知道自己知道——但我現在知道了。我要對你說：我愛你。我知道我曾對你說過這句話，說的時候也是真的，但唯有此刻我才真正說出口。我必須在……之前說出來。噢，但即將死去的是那隻蟑螂，不是我！我不需要這封死囚牢房裡的信……</p>\n<p>——不，我不想讓你因我的愛而驚懼。你若怕我，我便會怕我自己。別怕那疼痛。我此刻的確定，如同那房間裡我活著、蟑螂也活著的確定：我確定的是：萬物都在疼痛之上與之下流動。疼痛並非人們所謂疼痛的真名。聽著：我對此確定。</p>\n<p>既然我已不再與自己掙扎，我便靜靜地知道那是一隻蟑螂，疼痛並非疼痛。</p>\n<p>啊，若我早知道房間裡會發生什麼，進門前多帶幾根菸就好了：我正被抽菸的慾望吞噬。</p>",
  "<p>——啊，若我能將記憶傳遞給你，那此刻才甦醒的記憶，關於我們兩人曾活過卻未曾察覺的一切。你願意與我一同回憶嗎？噢，我知道這很難：但讓我們走向自己。而非超越自己。現在別怕，你很安全，因為那至少已經發生，除非你從知曉它發生一事中看見危險。</p>\n<p>那是因為，當我們相愛時，我並不知道愛其實更精確地發生在我們稱之為愛的事物不在場的時刻。愛的無性，那才是我們活過並輕蔑的。</p>\n<p>我所說的是當什麼都沒有發生的時候，我們稱那無事發生為間隙。但那間隙究竟是什麼模樣？</p>\n<p>那是一朵巨大的花，正盛開著，鼓脹著自身，充盈著我的顫抖而宏大的視野。我所凝視的，瞬間在我的目光下凝結，成為我的——卻不是永久的凝塊：若我將它壓在掌間，像一小塊凝結的血，那固態便會再度液化，從指縫間流回血液。</p>\n<p>而時間並非全然液態，因為，為了讓我用雙手捧起事物，事物必須像果實般凝結。在那些我們稱之為空虛而平靜的間隙裡，當我們以為愛已經停止的時候……</p>",
  "<p>我記得那時喉嚨的痠痛：扁桃腺腫脹，體內的凝結來得很快。卻也容易液化：我的喉嚨痛好了，我正告訴你。像夏日裡的冰川，融化後河流奔湧。我們的每一個字——在那段我們稱之為空虛的時間裡——每個字都輕盈而空洞，像一隻蝴蝶：字從內裡撲翅而出，迎向嘴唇，話語被說出口，我們卻甚至聽不見它們，因為融化的冰川奔流時發出巨大的聲響。在液態的喧囂中，我們的嘴在動，在說話，而事實上我們只看見蠕動的嘴唇，卻聽不見——我們各自望著對方的嘴，看著它說話，而聽不見與否，幾乎無關緊要，噢，以上帝之名，那幾乎無關緊要。</p>\n<p>而以我們之名，看見那張嘴在說話，便已足夠，我們笑了，因為我們幾乎沒有在聽。然而，我們卻稱那種不聆聽為冷漠，為缺乏愛。</p>\n<p>但我們其實在說話，而且說得多麼起勁！說著虛無。然而一切都在閃爍，如同沉重的淚水黏在眼眶裡；正因如此，一切都在閃爍。</p>",
  "<p>在那樣的間歇裡，我們以為自己正從彼此的存在中休息。其實，那是極大的愉悅——不成為對方的愉悅：因為那樣一來，我們各自便擁有了兩個。一切都將結束，當我們所謂的愛的間歇結束之時；而正因為它即將結束，它顫動著，沉重地承載著自身已然蘊含的終結。我記得這一切，如同透過水的震顫。</p>\n<p>啊，難道我們原本並非人類？而為了實際的必要，我們才變成了人類？這令我恐懼，如同令你恐懼一般。因為那蟑螂正以牠聖甲蟲般的甲殼注視著我，以牠那完全由管道、觸角與鬆軟水泥構成的破碎身軀——而那無可否認地是我們語言之前的真理，那無可否認地是我至今一直不願面對的生命。</p>\n<p>——於是——於是透過地獄之門，我吞下了生命，也被生命吞噬。我明白了我的國度屬於這個世界。而我透過內心的地獄明白了這點。因為在我自身之內，我看見了地獄的模樣。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">因為在我自身之內，我看見了地獄的模樣。</p>\n<p>地獄是那張嘴，咬下並吞噬帶血的活肉，而被吞噬者的眼中卻因狂喜而嚎叫：地獄是作為物質之愉悅的痛苦，而伴隨著愉悅的笑聲，淚水因痛苦而奔流。那從痛苦的笑聲中湧出的淚水，是救贖的對立面。我正看見那蟑螂帶著儀式面具的無情。我看見那就是地獄：對痛苦的殘酷接納，對自身命運的莊嚴無憐，愛生命的儀式勝過愛自己——那就是地獄，在那裡，吞噬對方活生生臉龐的那一方，正沉溺於痛苦的喜悅之中。</p>\n<p class=\"em-line\">我第一次以地獄般的饕餮感受著那股渴望：想要擁有我從未有過的孩子——我想要繁殖，不是三個或四個孩子，而是兩萬個，將我有機的地獄快感滿溢而出。我在孩子身上的未來存活，將是我真正的當下，那不只是我自己，而是我愉悅的物種永不中斷。未曾生育使我痙攣，如同面對被否認的癮。</p>\n<p>那隻蟑螂有過孩子，而我沒有：蟑螂可以死於碾壓，但我卻被判定永遠不能死，因為如果我死了，哪怕只死一次，我就會死。而我想要的不是死，而是永恆地處於垂死狀態，如同至極痛苦的狂喜。我身在地獄，被快感刺穿，像一陣低沉的快感神經嗡鳴。</p>",
  "<p>而這一切——哦，我的恐懼——這一切竟發生在廣漠的冷漠之心……。所有那些迷失在螺旋命運中的事物，卻從未真正迷失。在那無限的命運中，僅由殘酷的當下構成，我，像一隻幼蟲——在我最深層的非人性中，因為直到此刻，我所逃脫的正是我真正的非人性——我和我們像幼蟲一樣，在柔軟的肉體中吞噬彼此。</p>\n<p>而沒有懲罰！那就是地獄：沒有懲罰。因為在地獄中，我們將本該是懲罰的事物化為至高的愉悅，在這片荒漠中，我們將懲罰化為另一種帶淚的狂喜笑聲，在地獄中，我們將懲罰化為對愉悅的希望。</p>\n<p>所以，這就是人性化與希望的彼岸嗎？</p>\n<p>在地獄中，那股我不需負責的惡魔信仰。那是對狂歡生命的信仰。地獄的狂歡是中性的神化。安息日的喜悅是迷失在無調性中的喜悅。仍然令我恐懼的是，即便是那無可懲罰的恐怖，也會被無盡時間的深淵、無盡高度的深淵、神的深淵慷慨地重新吸收——被吸收進冷漠之心。</p>\n<p class=\"em-line\">與人類的冷漠如此不同。因為那是一種自私自利的冷漠，一種圓滿的冷漠。那是一種極其充滿能量的冷漠。而這一切都在沉默中，在我那地獄裡。既然笑聲構成沉默體積的一部分，只有在眼裡閃爍著冷漠的愉悅，但笑聲本身就在血液裡，無法被聽見。</p>",
  "<p>而這一切都在這同一瞬間，就在此刻。然而同時，此刻卻因神的偉大規模而全然遙遠。因那永恆龐大的尺度，即便是此刻存在的任何事物，也是遙遠的：就在衣櫃裡那隻蟑螂被碾碎的瞬間，它相對於那重新將它無恙吸收的巨大自利冷漠之心，也是遙遠的。</p>\n<p>那宏偉的冷漠——那就是我內在存在的東西嗎？</p>\n<p>生命那地獄般的宏偉：既然連我的身體都無法界定我，慈悲不讓我的身體界定我。在地獄裡，我的身體無法界定我，而那就是我所謂的靈魂嗎？活著那不再是我身體的生命——那就是我所謂的非個人靈魂嗎？</p>\n<p>而我的非個人靈魂灼燒著我。一顆星的宏偉冷漠就是蟑螂的靈魂，那顆星正是蟑螂身體的極致誇張。蟑螂與我渴望一種不屬於我們的平靜——那是超越蟑螂與我的尺度與命運的平靜。而因為我的靈魂如此無限，以至於它不再是我，因為它如此超越我——因為我對自己總是遙遠的，我對自己就像一顆星對我一樣不可觸及。我扭曲自己試圖觸及包圍我的此刻，但我相對於這同一瞬間仍是遙遠的。未來，唉，比此刻更接近我。</p>",
  "<p class=\"em-line\">蟑螂與我同樣地獄般地自由，因為我們的生命物質大過我們自身，我們地獄般地自由，因為我自己的生命如此勉強地容納在我的身體裡，以至於我無法使用它。我的生命被大地使用得比我更多，我遠比過去我所謂的「我」更加龐大，以至於單單擁有世界的生命，我就擁有了自己。需要一大群蟑螂才能在世界上形成一個略微敏感的點——然而一隻蟑螂，僅僅透過牠那專注的生命，那一隻蟑螂就是世界。</p>\n<p>我靈魂中最不可觸及的部分，那個不屬於我的部分——正是觸及我與不再是我之物邊界的那一部分，而我將自己交付給它。我所有的焦慮一直是這種無法逾越、過分貼近的貼近。我更是那個在我之內卻不是我的東西。</p>\n<p>就在那時，我握著的手鬆開了我。不，不。是我自己抽回了手，因為現在我必須獨自前行。</p>\n<p>如果我設法從生命的國度歸來，我將再次握住你的手，感激地親吻它，因為它等待著我，等待我的路徑經過，等待我歸來時瘦削、飢餓而謙卑：只為微小之物而飢餓，只為更少之物而飢餓。</p>\n<p>因為，坐在那裡一動不動，我已經開始渴望活出自己的遙遠，作為活出當下的唯一方式。而那，表面上看來無辜，卻再次成為一種愉悅，一種近似於駭人而宇宙性的狂喜。</p>",
  "<p>為了重溫它，我放開了你的手。</p>\n<p class=\"em-line\">因為在那種享受中，沒有憐憫。憐憫是成為某人或某物的孩子——但成為世界，就是殘酷。蟑螂互相啃噬、互相殺戮、在繁衍中互相穿透、在一個逐漸暗成黑夜的永恆夏日裡互相吞食——地獄是一個沸騰、幾乎暗成黑夜的夏日。當下看不見蟑螂，當下的時間從如此遙遠的距離凝視它，以至於從高處無法感知蟑螂，只看見一片寂靜的沙漠——當下的時間甚至不曾懷疑，在那赤裸的沙漠中，吉普賽人的狂歡盛宴。</p>\n<p>在那裡，我們縮小成小豺狼，帶著笑聲互相吞食。帶著痛苦的笑聲——而且自由。人類命運的奧祕在於：我們是無可避免的，但我們擁有實現或不實現這無可避免的自由：實現我們無可避免的命運，取決於我們自己。而非人的存在，如蟑螂，則完成它們自己的完整循環，從不出錯，因為牠們不選擇。但成為我無可避免所是的樣子，卻取決於我自由地選擇。我是我無可避免性的主人，如果我決定不去實現它，我便將滯留在我特定生命本質之外。但若我實現了我那中性而活生生的核心，那麼，在我的物種之內，我將成為特定的人類。</p>",
  "<p>——但成為人類可能轉化為一種理想，並在層層累積之下窒息……對一個無可避免是人類的人而言，成為人類不應是一種理想；成為人類必須是這樣的方式：我，一個活物，自由地順從一切活物的道路，而成為人類。而我甚至無需照料我的靈魂，它會無可避免地照料我，我也不必為自己打造一個靈魂：我只需選擇活著。我們是自由的，而那就是地獄。但蟑螂如此之多，以至於牠們看起來像是一場祈禱。</p>\n<p class=\"em-line\">我的國度屬於這個世界……而我的國度不僅僅是人類的。我知道。但知道這件事會散播死亡-生命，而我子宮裡的孩子將脆弱得足以被生命-死亡本身吞噬，沒有一個基督教詞彙能賦予意義……然而，有多少子宮裡的孩子啊，多得像一聲祈禱。</p>\n<p>那一刻我仍未明白，那將成為祈禱的第一個草稿，早已從我所進入的快樂地獄中誕生——而我不願再離開。</p>\n<p>從那個充滿老鼠、狼蛛與蟑螂的國度，我的愛，那裡歡愉滴落成濃稠的血珠。</p>\n<p>唯有上帝的慈悲能將我從那可怕的冷漠喜悅中拽出——我正浸浴其中，完整無缺。</p>\n<p>因為我正狂喜。我正認識那快樂黑暗的暴力——我快樂得像個魔鬼，地獄是我的極致。</p>\n<p class=\"em-line\">地獄是我的極致。</p>",
  "<p>我全然處於一種靜止而警醒的冷漠之心。而在冷漠之愛、冷漠的醒眠、冷漠的痛苦之心。在一個上帝的心裡——如果我愛祂，我不明白祂要我什麼。我知道，祂要我成為祂的同等，要我透過一種我無能為力的愛與祂相等。</p>\n<p>透過一種如此巨大的愛，它將是那樣冷漠的個人——彷彿我不是一個人。祂要我與祂一同成為世界。祂要我的人性神性，而那必須始於對建構之人最初的剝除。</p>\n<p>而我已踏出第一步：至少我已知，成為人類是一種敏感化，一種自然的狂喜。而且，僅透過自然的異常，我們不是成為上帝——如同其他存有即是祂——我們不是成為祂，我們卻想看見祂。看見祂不會受傷，如果我們與祂一樣偉大。一隻蟑螂比我偉大，因為牠的生命如此全然交付於祂，從無限來，往無限去，毫不察覺，牠從不錯失節拍。</p>\n<p class=\"em-line\">我已踏出那偉大的第一步。但我身上究竟發生了什麼？</p>",
  "<p>我墜入了觀看的誘惑，知曉與感受的誘惑。我的偉大，追尋著神的偉大，卻將我帶入了地獄的偉大。我無法理解祂的秩序，除非透過惡魔狂喜的痙攣。好奇心將我逐出庇護所——而我正遇見那冷漠的神，祂全然良善，因為祂不善也不惡，我正處於物質的核心，那是自身冷漠的爆炸。生命擁有著泰坦般冷漠的力量。一種想要前進的泰坦冷漠。而我，想要與它一同前進，卻被那讓我僅止於地獄般的快感鉤住了。</p>\n<p>快感的誘惑。誘惑是直接從源頭吞食。誘惑是直接從律法吞食。而懲罰是再也無法停止吞食，吞食自己這同樣可食的物質。而我正將詛咒當作幸福來追尋。我在自身中追尋最狂歡的狀態。我再也無法安息：我偷了一位歡樂之王的獵馬。我現在比我自己更糟！</p>\n<p>我再也無法安息：我從安息日之王那裡偷了獵馬。若我沉睡片刻，馬嘶的回音便將我驚醒。而不去是徒勞的。在黑夜中，那喘息讓我起雞皮疙瘩。我假裝入睡，但在寂靜中，那駿馬呼吸著。它什麼也不說，只是呼吸，等待，呼吸。每一天都將是同樣的事：就在黃昏時分，我開始變得憂鬱而沉思。我知道山上的第一聲鼓將使夜晚降臨，我知道第三聲鼓已將我裹入它的雷鳴。</p>",
  "<p>而到了第五聲鼓，我將已在我的貪婪中失去意識。直到黎明，在最後最輕的鼓聲中，我將不知不覺地結束在一條小溪旁，永遠不知道我做了什麼，伴隨著那匹馬巨大而疲憊的頭顱。</p>\n<p class=\"em-line\">我正吞噬著自己，我這安息日的活質。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p>累從何來？我們做了什麼，我們這些在喜悅地獄中奔騰的人？我已經兩百年沒有出發了。上一次我從那裝飾華麗的馬鞍上下來，我的人類悲傷如此巨大，以至於我發誓再也不去。然而那奔騰卻在我體內持續著。我聊天，整理屋子，微笑，但我知道那奔騰就在我體內。我思念它，像一個垂死之人。我再也無法不去了。</p>\n<p>而我知道夜晚，當它呼喚我時，我會去。我只想再有一次，讓那匹馬引領我的思緒。那就是我所學習的對象。如果你能稱之為思緒的話，那介於犬吠之間的一小時。狗吠叫，我開始感到悲傷，因為我知道，我的眼睛已經閃爍著光芒，我將要出發。當夜晚呼喚我進入地獄時，我就去。我像一隻貓降臨在屋頂上。無人知曉，無人看見。我在黑暗中現身，沉默而發光。五十三支長笛在我們身後追逐。我們前方，一支單簧管照亮我們。而除此之外，再無任何事物容我知曉。</p>\n<p>黎明時分，我將看見我們筋疲力竭地躺在溪邊，不知道在抵達黎明之前，我們犯下了何種罪行。我的嘴裡和你的蹄上，都有血的印記。我們犧牲了什麼？黎明時分，我將站在那沉默的駿馬身旁，伴隨著教堂的第一聲鐘聲順著溪水流淌，伴隨著長笛的殘音仍從我的髮間流淌而出。</p>",
  "<p>夜晚是我的生命，黑暗降臨，歡樂的夜晚是我悲傷的生命——偷走，偷走我的駿馬，因為在偷竊了這麼多之後，我甚至偷走了黎明，並從中製造了一個預感：趁還有時間，趁黑暗尚未降臨，迅速偷走那匹駿馬，如果還有時間的話，因為當我偷走那匹駿馬時，我不得不殺死國王，而在謀殺他的過程中，我偷走了國王的死亡。而謀殺的喜悅以快感吞噬著我。</p>\n<p>我正吞噬著自己，我這安息日的活質。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我正吞噬著自己，我這安息日的活質。</p>\n<p class=\"em-line\">那會是聖人的試探嗎？——儘管遠不止於此。而無論那願意或不願成為聖人的人，從中走出時，要麼成聖，要麼不然。從那曠野的試探中，我，一個平信徒，一個非聖人，要麼沉淪，要麼第一次作為一個活物從中走出。</p>\n<p>——聽著，有一種東西叫做人性的聖潔，而那並非聖人的聖潔。我怕連上帝都不明白，人性的聖潔比神性的聖潔更危險，平信徒的聖潔更為痛苦。然而基督自己也知道，若他們對祂做了那些事，他們對我們會做得更多，因為祂說：「*他們若在青綠的樹上這樣行，那枯乾的樹將來又當如何呢？*」</p>\n<p>試煉。如今我明白了什麼是試煉。試煉：意味著生命在考驗我。但試煉：也意味著我在嘗試。而嘗試可以變成一種永不饜足的渴。</p>\n<p>等我：我要把你從我墜入的地獄中拉出來。聽著，聽著：</p>\n<p>因為從那無可赦免的喜悅中，一聲哽咽已在我體內誕生，那更像是一聲喜悅的哽咽。那不是痛苦的哽咽，我從未聽過：那是我的生命為了孕育我而分裂的聲音。在那片曠野的沙土上，我開始擁有初次羞怯獻祭的纖細，如同一朵花。我在獻祭什麼？我能獻出什麼——我，曾是那片曠野，我，曾有所求，也曾擁有？</p>",
  "<p>*我正獻出那聲啜泣。我終於在地獄裡哭泣。我使用並揮汗於黑暗的翅膀本身，為了我自己而使用它們、為了我自己而揮汗——而祢是誰，祢，沉默的閃光。我不是祢，但我是祢。正因如此，我永遠無法直接感受祢：因為祢就是我。哦，上帝，我開始以巨大的驚異理解：我的地獄狂歡正是人類的折磨本身。我怎能猜到？如果我不知道人在受苦時會笑。因為我不知道那就是受苦的方式。於是我曾將最深沉的苦難稱之為喜悅。而在啜泣中，上帝來到我面前，上帝此刻充滿了我全部。我將我的地獄獻給上帝。第一聲啜泣——從我可怖的愉悅與盛宴中——製造出一種新的痛苦：此刻它輕盈而無助，如同我沙漠中的花朵。此刻流淌的淚水，如同為愛而流的淚。那上帝，我永遠無法理解祂，除非我以理解祂的方式理解祂：將我折斷，如同一朵在誕生時幾乎無法支撐自己、彷彿就要碎裂的花。</p>",
  "<p>但此刻，既然我知道我的喜悅曾是苦難，我正在懷疑：我是否在逃向一位上帝，因為我無法承受自己的人性。因為我需要一個不像我這般渺小的人，一個比我寬廣得多的人，好讓我的不幸得以存在，甚至無需憐憫與安慰——一個存在的人，存在！而不是像我一樣，一個自然的控訴者，不像我一樣，一個為自身愛恨力量而驚異的人。</p>\n<p>就在這一秒，此刻，一個疑問襲擊了我。上帝，或無論祢被稱為什麼：我此刻只求幫助：但求祢此刻幫助我，不是像祢是我那樣晦暗不明，而是這一次，清清楚楚地，在光天化日之下。</p>\n<p>因為我需要確切知道這一點：我感受到的是我真正感受到的，還是我感受到的是我渴望感受到的？或者，我感受到的是我可能需要感受到的？</p>\n<p>因為我甚至不再渴望理想的具體化，我想要成為的，只是一粒種子。即使從那粒種子之後，理想又會再次誕生——無論是真實的理想，那是一條道路的誕生，還是虛假的理想，那是沉積物。我是否正在感受我願意感受的？因為一毫米的差距是巨大的，而那一毫米的空間，可以透過真理拯救我，也可以再次讓我失去我所看見的一切。這很危險。人們高度讚揚他們所感受的。這與厭惡自己所感受的一樣危險。</p>",
  "<p>我曾將我的地獄獻給上帝。而我的殘酷、我的愛、我的殘酷，突然停止了。而突然之間，同一片沙漠成了那被稱為天堂的模糊草圖。一個天堂的濕氣。不是別的東西，而是同一片沙漠。而我感到驚訝，如同一個人對從虛無中迸出的光感到驚訝。</p>\n<p>我是否正在理解，我所經歷的——那地獄般掠奪的核心——就是所謂的愛？但——中性的愛？</p>\n<p>中性的愛。中性正在低語。我正在抵達我一生所追尋的：無論那是什麼最最終極的身分，而我曾稱之為無表情。那正是始終在我眼中、在那張快照裡的東西：一種無表情的喜悅，一種不知道自己是喜悅的喜悅——一種對我的粗礪人性而言太過細緻的喜悅，而我的粗礪人性一直由粗礪的概念構成。——我費了這麼大的力氣，對自己訴說一個沒有語言的地獄。現在，我該如何訴說一種只有感受本身、而在它面前「愛」這個詞不過是塵封物件的愛？</p>\n<p class=\"em-line\">我所經歷的地獄——我該如何向你解釋？——是來自愛的地獄。</p>\n<p>啊，人們總是把罪的觀念放進性裡。但那種罪是多麼天真而幼稚。真正的地獄是愛的地獄。愛是對更大之罪的危險體驗——是泥濘、墮落與最惡劣狂喜的體驗。性是一個孩子的驚懼。但我該如何為自己言說我如今所知的愛？</p>",
  "<p>幾乎不可能。因為在愛的中性裡有一種持續的喜悅，像風中樹葉的聲響。而我嵌入了牆上女人赤裸的中性。同樣的中性，那個曾以有害而渴切的喜悅吞噬我的中性——正是在那個同樣的中性裡，我如今聽見另一種持續的愛的喜悅。無論神是什麼，祂更存在於風中樹葉的中性聲響裡，而非我舊日的人類禱告中。</p>\n<p>除非我能做出真正的禱告，而對他人與我自己而言，那會像黑卡巴拉的咒語，一種中性的低喃。</p>\n<p>那低喃，不帶任何人類意義，將是我的本質觸及萬物本質的瞬間。我知道，相對於人類而言，那種中性禱告會是一種怪物。但相對於無論神是什麼而言，它會是：存在。</p>\n<p>我被逼入荒漠，驚駭地發現荒漠是活的，發現一隻蟑螂就是生命。我向後退縮，直到發現在我之內最深層的生命存在於人類之前——為此我擁有惡魔般的勇氣去擺脫情感。我必須不賦予生命任何人類價值，才能理解神的廣度——遠比人類廣度更廣的廣度。我是否要求了最危險、最禁忌的事物？冒著靈魂的風險，我是否大膽地要求看見神？</p>",
  "<p>而此刻，我彷彿立於祂面前，卻無法理解——我徒然地站在祂面前，又一次面對虛無。對我，如同對每個人，一切已然賜予，但我想要更多：我想要知道那一切。於是我出賣了靈魂以求知曉。但如今我明白，我並非將靈魂賣給魔鬼，而是遠比這更危險地：賣給了上帝。祂讓我得以看見。因祂知曉，我無論看見什麼，都無從理解：一個謎題的解釋，不過是謎題的重複。你是什麼？而答案是：你是。你為何存在？而答案是：你為何存在。我有能力提出問題，卻無力聽見答案。不，我甚至不知如何提出問題。然而答案自出生起便強加於我。正因這持續不斷的答案，我，反向而行，被迫尋找與之對應的問題。於是我迷失在問題的迷宮中，胡亂發問，期盼偶爾能有一個問題與答案相符，屆時我便能理解答案。</p>\n<p>但我就像一個天生盲眼、身邊又無任何能看見之人的人，那人甚至無法形成關於視覺的問題：她不會知道「看見」的存在。然而，既然視覺確實存在，即使那人對此一無所知、從未聽聞，她也會靜止不動、不安、警覺，不知如何追問一個她不知其存在的事物——她會感到某種本應屬於她的東西的匱乏。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">她會感到某種本應屬於她的東西的匱乏。</p>\n<p>——不。我並未告訴你一切。我仍想試試，是否只告訴自己一點點就能蒙混過關。但我的解放，唯有在我對自身的不理解懷有不知羞恥的勇氣時，才會到來。</p>\n<p>因為，坐在床上，我對自己說：</p>\n<p>——他們給了我一切，而你看看這一切是什麼！是一隻活著的、即將死去的蟑螂。然後我看著門把。之後我看著衣櫥的木頭。我看著窗戶的玻璃。你看看這一切是什麼：是一塊東西，一塊鐵、碎石、玻璃。我對自己說：看看我奮鬥了什麼，為了擁有我早已擁有的一切，我匍匐前進直到門為我敞開，那扇通往我追尋寶藏的門：而你看看那寶藏是什麼！</p>\n<p>那寶藏是一塊金屬，是牆上的一片白灰，是一塊化為蟑螂的物質。</p>\n<p>自史前時代起，我便開始穿越沙漠的跋涉，沒有星辰指引，只有沉淪引領我，只有迷途引領我——直到，幾乎死於狂喜的疲憊，被激情照亮，我終於找到了保險箱。而在保險箱裡，閃耀著榮光，那隱藏的秘密。世上最遙遠的秘密，晦暗不明，卻以其單純存在的輻射使我目盲，在那裡閃耀著刺痛我雙眼的榮光。保險箱裡的秘密：</p>\n<p>一塊東西。</p>\n<p>一塊鐵，一根蟑螂的觸角，一片灰泥碎屑。</p>",
  "<p>我的疲憊匍匐在那塊東西的腳前，地獄般地崇拜著。權力的秘密是權力，愛的秘密是愛——而世界的珍寶是一塊晦暗的東西。</p>\n<p>那晦暗在我眼中迴盪。我千年來縱慾與死亡與榮耀與乾渴的軌跡的秘密，直到我終於找到我始終擁有的一切，而為此我必須先死去。啊，我如此直接，以至於我顯得像是象徵。</p>\n<p>一件東西的碎片？法老們的秘密。為了那個秘密，我幾乎獻出了生命……更多，遠比更多：為了擁有那個秘密——即使此刻我仍不理解——我會再次獻出生命。我曾冒著世界的風險，追尋那跟隨答案而來的問題。一個答案，即使對應的問題被揭示後，它依然是秘密。我沒有找到關於謎題的人類答案。但更多，噢，遠比更多：我找到了謎題本身。我被給予了太多。我該拿這被給予之物做什麼？「願聖物不被丟給狗。」</p>\n<p>而我甚至沒有觸碰到那東西。我只是觸碰著從我通往生命節點的空間——我正處於生命節點那凝聚而受控的震動區域。生命節點以我抵達的頻率震動著。</p>\n<p>我最極致的靠近，停在一步之遙。是什麼阻止了那一步？是那晦暗的輻射，同時來自那東西與我自身。因為我們相似，我們彼此排斥；因為我們相似，我們無法進入對方。而如果那一步被跨出？</p>",
  "<p>我不知道，我不知道。因為那東西永遠無法真正被觸及。生命節點是一根指向它的手指——而當那東西被指向時，它甦醒，如同黑暗靜謐中的一毫克鐳。然後潮濕的蟋蟀聲響起。那一毫克的光並不改變黑暗。因為黑暗不可被照亮，黑暗是一種存在方式：黑暗存在於黑暗的生命節點中，而你無法觸及一件東西的生命節點。</p>\n<p>*事物之於我，是否終將縮減為僅是那不可觸及部分周遭的一切？我的神，請賜予我祢所成就的。或者祢早已賜予了我？而我，是那個無法跨出一步、以取得祢所成就之物的人？我是祢所造之物嗎？而我無法跨出那一步，走向我自身——我，既是物，也是祢。請賜予我祢在我之內的存在。請賜予我祢在他人之內的存在，祢是「他」，我知道，我知道，因為當我觸碰時，我看見了「他」。但「他」，那個人，小心翼翼地守護著祢所賜予他的，並將自己包裹在一層專為我觸碰與觀看而造的殼中。而我想要的，不僅僅是那層我也深愛著的殼。我想要的是我所愛的那個祢。</p>\n<p>然而，在殼之外，我只找到了謎題本身。我因對神的恐懼而渾身顫抖。</p>\n<p>我因對一切存在之物的恐懼與崇拜而顫抖。</p>",
  "<p>一切存在之物，不過是事物的一小塊碎片，然而我必須以手遮眼，抵擋那事物的不透明性。啊，一切存在之物那暴烈而無意識的愛，超越了我意識的可能性。我畏懼如此多的物質——物質因專注而顫動，因過程而顫動，因內在的當下時間而顫動。一切存在之物以強烈的浪潮拍打著我這無法摧毀的粒子，而這粒子在存在之平靜波濤的深淵間旋轉，它旋轉著，卻不溶解，那粒子——那粒種子。</p>\n<p>我是什麼的種子？事物的種子，存在的種子，那些中性之愛的波濤本身的種子。我，這個人，是一個胚胎。胚胎僅是敏感的——那是它唯一固有的特質。胚胎會痛。胚胎是渴望而精明的。我的渴望是我最初始的飢餓：我是純粹的，因為我是渴望的。</p>\n<p class=\"em-line\">我這胚胎，這歡愉之物，亦是由此構成：那物。那是一種對自身過程感到滿足的存在，深深沉浸於自身過程之中，而這過程全然顫動。保險箱裡的那塊物，是箱子的祕密。而箱子本身，亦由同樣的祕密構成，那保險箱，懷抱著世界的珍寶，保險箱本身，亦由同樣的祕密構成。</p>\n<p>啊，而我一點也不想要這些！我憎恨我所看見的一切。我不想要那個由物構成的世界！</p>",
  "<p>我不想要。然而，我無法不感到自己因那晦暗與中性的貧瘠而內在膨脹：那物像雜草一樣活著。如果那是地獄，那便是天堂本身：選擇在我。我將成為惡魔或天使；若我為惡魔，這是地獄；若我為天使，這是天堂。啊，我派遣我的天使在我面前預備道路。不，不是我的天使：而是我的人性與其悲憫。</p>\n<p>我派遣我的天使在我面前預備道路，讓石頭知曉我的到來，讓它們在我無法理解之前軟化。</p>\n<p>而我那最溫柔的天使，找到了那塊物。它除了自身之外，什麼也找不到。因為即使有東西從天而降，那也是隕石，也就是說，一塊物。我的天使讓我成為一塊鐵或玻璃的崇拜者。</p>\n<p>但我必須阻止自己為那物命名。名字是一種增生，阻礙了與物的接觸。物的名字是物的一個間隔。對增生的渴望是巨大的——因為赤裸的物是如此乏味。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">因為赤裸的物是如此乏味。</p>\n<p>啊，原來如此，我一直對乏味懷有一種愛。以及對它持續的恨。</p>\n<p>因為無聊是無味的，它與事物本身相似。而我還不夠偉大：只有偉大者才熱愛單調。與無調性的超音波接觸，有一種無以言表的喜悅，唯有肉身在愛中才能承受。偉大者擁有肉身的生命質地，不僅容忍無調性，更渴望它。</p>\n<p>我過去的建構，始終在於將無調性轉化為調性，將無限分割成一連串有限，卻沒察覺有限不是一種數量，而是一種性質。而我所有的不適，在於感覺到：無論有限的序列有多長，都無法窮盡無限的殘留性質。</p>\n<p>但無聊——無聊是我唯一能感受無調性的方式。而我從不知道我喜歡無聊，因為我為它所苦。然而在活生生的物質中，受苦並非生命的尺度：受苦是致命的副產品，無論多麼尖銳，都是微不足道的。</p>\n<p>啊，而我，早該注意到這一切的！我，以無以言表作為我的祕密主題。一張無表情的臉吸引著我；不是高潮的時刻吸引著我。自然，我喜歡自然的，是它顫動的無以言表。</p>\n<p>——啊，我不知道如何告訴你，因為我只有在犯錯時才變得雄辯，錯誤引導我論證與思考。但如何對你說，如果我正確時只有沉默？如何對你說那無以言表？</p>",
  "<p>即使在悲劇中，因為真正的悲劇在於其無以言表的無可挽回性，那是它赤裸的本質。</p>\n<p>有時候——有時候我們自身會顯現那無以言說之物——人們在藝術中如此，在肉體的愛中亦然——顯現那無以言說，即是創造。到頭來，我們是如此如此快樂！因為與生命接觸的方式並非只有一種，甚至還有負面的方式！還有痛苦的方式，甚至幾乎不可能的方式——而這一切，這一切都在死亡之前，這一切甚至發生在我們清醒之時！而有時，無調性的激越也屬於一種深沉的喜悅：那激越的無調性，是起飛的姿態——自然即是激越的無調性，世界就是這樣形成的：無調性變得激越了。</p>\n<p>且看那些葉子，多麼翠綠多麼沉重，它們在物之中變得激越，葉子多麼盲目，又多麼翠綠。而用手去感受，萬物皆有重量，那重量逃不出那無以言說的手。不要喚醒那個全然缺席的人，那個沉浸於感受事物重量的人。重量是事物存在的證據之一：只有有重量的事物才能飛翔。而唯一會墜落的——那來自天上的隕石——正是那些有重量的事物。</p>\n<p>或者，這一切仍是我在渴望事物之詞的愉悅？或者，這一切仍是我在渴望極致之美、理解、極致之愛之姿態的狂喜？</p>",
  "<p>因為倦怠是一種太過原始的喜悅！而這就是為什麼天堂對我而言無法忍受。而我不想要天堂，我懷念地獄！我無法待在天堂，因為天堂沒有人間的味道！它只有物的味道，而生命之物是沒有味道的，就像我割傷自己時吸吮口中的血，我驚恐，因為我自己的血沒有人間的味道。</p>\n<p>而母親的乳汁，那是屬於人的，母親的乳汁卻遠在人類之前，沒有味道，什麼也不是，我嚐過了——它就像雕像那鑿出的眼睛，空洞而無表情，因為當藝術臻於完美時，它觸及的是那無以表達之物，最糟的藝術是表達的，那種逾越了鐵片與玻璃片、逾越了微笑與嘶喊的藝術。</p>\n<p>——啊，握著我的手，若我不需要那麼多的自己來塑造我的人生，我早已擁有生命了！</p>\n<p>但就人類而言，那將是毀滅：活著生命，而非活著自己的生命，是被禁止的。進入神聖的物質是一種罪。而那罪有著無可挽回的懲罰：膽敢進入這祕密的人，在失去個體生命的同時，也瓦解了人類的世界。我本也可以將我堅固的建構懸置在空中，即使明知它們是可拆解的——若非那誘惑。而誘惑能阻止人渡往彼岸。</p>\n<p>但為何不留在裡面，而不試圖渡往對岸？留在事物裡面是瘋狂。我不想留在裡面，否則我先前那如此漸進的人化，將變得毫無根基。</p>",
  "<p>而我不想失去我的人性！啊，失去它很痛，我的愛，如同剝離一具仍活著的身體，而那身體拒絕死去，就像蜥蜴斷裂的肢節。但現在已經太遲了。我必須比我的恐懼更偉大，我必須看見我先前的人化是由什麼構成的。啊，我必須以如此堅定的信念相信人性那真實而隱藏的種子，以至於我絕不能畏懼從內部看見人化。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我絕不能畏懼從內部看見人化。</p>\n<p>——再給我你的手一次，我仍不知如何安慰自己關於真理的事。</p>\n<p class=\"em-line\">但——請與我同坐片刻——對人性化真理最缺乏的信仰，莫過於以為真理會摧毀人性化。等等我，且慢：我知道日後我終將懂得如何將這一切納入日常實用，別忘了我也需要一個日常！</p>\n<p class=\"em-line\">然而，我的愛，真理不可能邪惡。真理就是它本然的樣子——正因為它不可改變地是它本然的樣子，它必定是我們最大的安全感，正如渴望父親或母親是如此無可避免，以致它必定是我們的根基。那麼，懂了嗎？我為何要害怕吃下善與惡？若它們存在，那是因為它們就是存在的。</p>\n<p class=\"em-line\">等等我，我知道我正朝著某個會痛的事物前進，因為我正在失去其他——但等我再走遠一些。從那一切之中，或許，一個名字能夠誕生！一個沒有詞語的名字，卻可能將真理植入我的人性構造中。</p>\n<p class=\"em-line\">別像我一樣害怕：看見生命在其原生質中，不可能邪惡。那是危險的，是有罪的，但不可能邪惡，因為我們就是由那原生質構成的。</p>",
  "<p class=\"em-line\">——聽著，別害怕：記住我吃了禁果，卻未被存在的狂歡擊倒。所以，聽著：這意味著我將找到比未曾吃下生命更大的庇護……聽著，因為我潛入深淵，便開始愛上構成我的深淵。身分可能危險，因為那強烈的愉悅可能淪為純粹的愉悅。但此刻我正接受去愛那事物！</p>\n<p class=\"em-line\">而它並不危險，我發誓它並不危險。</p>\n<p class=\"em-line\">因為恩寵的狀態永恆存在：我們始終被拯救。整個世界都處於恩寵的狀態。一個人只有在意識到我們處於恩寵之中時，才會被甜美擊倒——恩賜是感覺我們處於恩寵之中，而很少有人敢於在自己內在承認這一點。但沒有沉淪的危險，我現在知道了：恩寵的狀態是與生俱來的。</p>\n<p>— 聽著。我向來只懂得超越。希望對我而言，不過是延宕。我從未讓靈魂自由過，並且迅速將自己組織成一個「人」，因為失去形體太危險了。但我現在看清了自己真正的處境：我的信仰如此薄弱，以至於我只發明了未來；我對存在的一切如此缺乏相信，以至於我為了承諾與未來，而不斷推遲當下。</p>\n<p>但此刻我發現，人甚至不需要希望。</p>",
  "<p>這更為嚴重。啊，我知道自己又在招惹危險，應該對自己閉嘴。人不該說「希望是不必要的」，因為這句話——由於我的軟弱——可能轉變為一把毀滅性的武器。而對你自己而言，則會成為一把有用的毀滅武器。</p>\n<p>我無法理解，你也無法理解：放棄希望——其實意味著行動，意味著今天。不，這並非毀滅，等等，讓我試著理解我們。這是個禁忌的主題，不是因為它邪惡，而是因為我們會因此冒險。</p>\n<p>我知道，如果我拋棄了那套完全圍繞希望組織起來的生活——我知道，拋棄這一切，轉向那更寬廣的事物，也就是「活著」——拋棄這一切，痛楚如同與未出生的孩子分離。希望就是一個尚未出生的孩子，僅被承諾，卻已帶來瘀傷。</p>\n<p>但我知道，同時我想要、也不再想要約束自己。這就像臨終的掙扎：死亡中的某個東西想要掙脫，卻又害怕失去身體的安全感。我知道談論「缺乏希望」是危險的，但聽著——一種深層的煉金術正在我體內發生，它是在地獄之火中鍛造出來的。而這給了我最大的權利：犯錯的權利。</p>",
