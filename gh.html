  "<p class=\"em-line\">不要帶著恐懼與痛苦聆聽：上帝的「中性」是如此巨大而充滿生機，以至於我——無法承受上帝的牢籠——便將祂人性化了。我知道，此刻發現上帝擁有非人稱的力量，是多麼駭人的危險——因為我知道，噢，我知道！那彷彿意味著祈禱的毀滅！</p>\n<p class=\"em-line\">而未來彷彿不再到來。我們不能，我們是匱乏的。</p>\n<p class=\"em-line\">但請聽我片刻：我說的不是未來，我說的是永恆的當下。而那意味著希望並不存在，因為它不再是延宕的未來，它就是今天。因為上帝不承諾。祂遠比那更偉大：祂是，且永不停止存在。是我們無法承受這永遠在場的光，於是我們將它許諾給未來，只為了不在今天、不在這一刻感受它。當下是上帝今日的面容。</p>\n<p class=\"em-line\">恐怖在於，我們知道我們在生命本身中看見上帝。我們睜大雙眼看見上帝。而我若將現實的面容推遲到死後——那是出於狡詐，因為我寧願在該見祂時已死，如此我便以為自己不會真正看見祂，就像我只有在睡夢中才有勇氣真正做夢。</p>\n<p class=\"em-line\">我知道我此刻的感受是嚴肅的，足以毀滅我。因為——因為這就像給自己一個消息：天國已經降臨。</p>",
  "<p class=\"em-line\">而我不想要天國，我不想要，我能承受的只有天國的應許！我從自身得到的消息聽起來像一場災難，又一次近乎惡魔。但那只是出於恐懼。是恐懼。因為放棄希望意味著我必須開始活著，而不只是對自己許諾生命。這是我能擁有的最大恐懼。我曾經懷抱希望。但上帝是今天：祂的國度早已開始。</p>\n<p>而祂的國度，我的愛，也屬於這個世界。我沒有勇氣停止成為一個承諾，於是我對自己許諾，像一個缺乏勇氣承認自己早已成年的成年人，不斷對自己許諾著成熟。</p>\n<p>於是我明白了，生命的聖潔承諾早已被兌現，而且始終如此。從前，只有偶爾，在一瞬間隨即被迴避的瞥見中，我才被提醒：承諾不僅是為了未來，它屬於昨日，也永遠屬於今日——但那對我而言太過震撼。我寧可繼續追問，卻沒有勇氣去已經擁有。</p>\n<p>而我確實如此。我永遠都會如此。我只需要渴望，我便擁有。渴望永不終結，因為渴望是我中性的本質。無論我如何處理那懇求與那欲求——那便是我從自己的生命中創造出來的生命。不將自己置於希望面前，並非摧毀懇求！也非戒除匱乏。啊，而是透過增加它，透過無限地增加那從匱乏中誕生的懇求。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">無限地增加那從匱乏中誕生的懇求。</p>\n<p>牛奶並非為我們而流淌，但我們飲用它。花朵並非為我們而綻放，讓我們觀賞或嗅聞它的芬芳，但我們觀賞它、嗅聞它。銀河並非為我們而存在，讓我們知曉它的存在，但我們知曉它。而我們知曉神。我們從祂那裡所需的一切，我們便喚起它。（我不知道我稱之為神的究竟是什麼，但祂或許可以被如此稱呼。）如果我們對神所知甚少，那是因為我們所需甚少：我們只擁有祂那必然足夠我們的部分，我們只擁有那能裝入我們內在的神。（鄉愁並非針對我們所失去的神，而是針對那不足夠的我們自己；我們懷念我們那不可能達成的偉大——我無法觸及的當下，便是我失落的樂園。）</p>\n<p class=\"em-line\">我們因飢餓太少而受苦，儘管這微小的飢餓已足以讓我們深深懷念——倘若飢餓更大，我們本可擁有的愉悅。我們只喝身體所需的牛奶，對花朵，也只看到眼睛及其扁平飽滿所能及的範圍。我們需要得越多，上帝的存在就越豐沛。我們能承接得越多，我們所擁有的上帝就越多。</p>",
  "<p class=\"em-line\">祂允許我們。（祂不是為我們而生，我們也不是為祂而生，我們與祂同時存在。）祂不間斷地忙於存在，正如萬物都在存在，但祂並不阻止我們加入祂，並與祂一同忙於存在——在一種如此流動而穩定的交換中——如同生命本身。例如，祂全然使用我們，因為我們每個人身上，沒有一樣東西是祂那絕對無限的需求所不需要的。祂使用我們，也不阻止我們使用祂。大地中的礦石，並不為未被使用而負責。</p>\n<p class=\"em-line\">我們落後太多，完全不知道如何在交換中利用上帝——彷彿我們尚未發現牛奶是可以喝的。再過幾個世紀，或再過幾分鐘，我們或許會驚嘆地說：而想到上帝一直都在！那個幾乎不存在的人是我——正如我們會對石油說，我們終於需要它到足以知道如何從大地中奪取它，正如有一天我們會為那些死於癌症的人感到遺憾，因為他們沒有使用那早已存在的療法。顯然，我們還不需要不死於癌症。一切都在這裡。（來自另一個星球的存有或許早已知道某些事，並生活在對他們而言自然的交換中；對我們而言，這種交換卻是「聖潔」，並會徹底顛覆我們的生活。）</p>",
  "<p class=\"em-line\">牛的奶，我們喝它。如果牛不讓我們喝，我們就訴諸暴力。（在生與死中，一切都是合法的，活著始終是生死攸關的事。）對上帝，我們也可以透過暴力強行進入。祂自己，當祂特別需要我們其中一人時，祂選擇我們，並強暴了我們。</p>\n<p>*我對上帝的暴力必須轉向自身。我必須強暴自己，才能渴求更多。為了變得絕望地更加偉大，直到我空無一物、一貧如洗。如此，我將觸及需求的根源。我內在的巨大空無，將成為我存在的所在；我的極度貧乏，將成為一種巨大的意志。我必須強暴自己，直到一無所有，直到需要一切；當我需要時，我便會擁有，因為我知道，給予更多給要求更多的人，是公平的——我的要求是我的尺度，我的空無是我的度量。人也可以直接強暴上帝，透過一種充滿狂怒的愛。</p>\n<p>祂會明白，我們這種狂暴而嗜血的貪婪，其實是我們神聖而猛烈的生命之怒，是我們強暴自己的嘗試，是我們試圖吞下超過所能負荷的，以人為地增長我們的飢餓——在生命的索求中，一切都是合法的，甚至人為的造作，而有時，人為的造作正是為了獲得本質而付出的巨大犧牲。</p>",
  "<p>但是，既然我們如此渺小，因此只需要那麼一點點，為什麼一點點對我們來說還不夠？因為我們猜疑著那愉悅。如同盲人摸索前行，我們預見了活著的強烈愉悅。</p>\n<p>而如果我們預見了它，那也是因為我們不安地感覺自己被上帝所用，我們不安地感覺自己被一種強烈而不間斷的愉悅所利用——更何況，我們此刻的救贖，至少是「被使用」；我們並非無用，我們被上帝強烈地利用著；身體、靈魂與生命，正是為此而存在：為了某人的交流與狂喜。不安地，我們感覺自己每一瞬間都被使用著——但那在我們內心喚醒了同樣不安的慾望：我們也想要使用。</p>\n<p>*祂不僅允許我們使用祂，祂更需要被使用，被使用是祂被理解的一種方式。*（在所有的宗教中，神都要求被愛。）為了讓我們擁有，我們所欠缺的只是需要。需要始終是至高無上的時刻。正如男人與女人之間最勇敢的歡愉，來自於需要之偉大到了讓我們感到痛苦與恐懼的程度：沒有你，我無法活下去。愛的啟示即是匱乏的啟示——虛心的人有福了，因為他們承受著生命那撕裂的王國。</p>",
  "<p>如果我放棄希望，我便是在慶祝我的匱乏，而那是活著最沉重的負擔。而正因為我承認了自己的欠缺，生命便近在咫尺。有許多人捨棄了他們所有的一切，去追尋更大的饑餓。</p>\n<p>啊，我失去了羞怯：神已然存在。我們早已被宣告，而正是我自身那迷途的生命，將我宣告給了正確的那一位。福樂是事物持續的愉悅，事物的過程由愉悅與接觸所構成，接觸那逐漸越來越被需要的東西。我整個虛假的掙扎，來自於我不願承認那已然應許的應許：我不想要現實。</p>\n<p>因為成為真實，即是承認應許本身：承認自身的純真，並重新拾回那從未被意識到的滋味：活著的滋味。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">活著的滋味。</p>\n<p>那是一種近乎虛無的滋味。而那是因為事物極其精微。啊，那些嘗試品嚐聖體的企圖。</p>\n<p>事物是如此精微，以至於我驚異於它竟能成為可見。還有一些事物甚至更為精微，以至於它們不可見。但它們全都擁有一種精微，等同於我們的身體擁有一張臉的意義：身體的敏銳化，即是一張人類的臉。事物擁有它自身如臉一般的敏銳化。</p>\n<p>啊，而我，這個不知如何將我的「靈魂」實體化的人。它並非無形之物，而是由事物最精緻的材質所構成。它是物，我只是無法將它實體化為可見的厚度。</p>\n<p>啊，我的愛，事物是如此纖細。我們用過於人性的蹄足踩踏其上，帶著太多的情感。唯有純真的纖細，或入門者的纖細，才能品嚐其近乎無味之味。從前，我為每件事物都需要調味，而那就是我如何躍過事物本身，只嚐到調味料滋味的方式。</p>\n<p>我無法品嚐馬鈴薯的滋味，因為馬鈴薯幾乎是大地之物；馬鈴薯是如此纖細——以至於，由於我無力活在僅有大地之味的纖細層次上——我將人性的蹄足置於其上，粉碎了它作為活物的纖細。因為活著的物質非常純真。</p>",
  "<p>而我的純真呢？它刺痛了我。因為我也知道，在純然人性的層次上，純真就是擁有蟑螂對自身的那種殘酷——當牠緩慢死去而無痛楚；超越痛苦，是最殘酷的殘酷。而我害怕那個，我這個極度道德的人。但現在我知道，我必須擁有更大的勇氣：擁有另一種道德的勇氣，一種如此超然，連我自己都無法理解、且令我恐懼的道德。</p>\n<p>——啊，我想起了你，你是我記憶中最古老的事物。我又看見你固定電線以修理燈座，留意著正極與負極，以纖細的態度對待事物。</p>\n<p>我不知道我從你身上學到了這麼多。我從你身上學到了什麼？我學會了看著一個人纏繞電線。我學會了看著你修理一張破損的椅子。你的身體能量，是你最纖細的能量。</p>\n<p>——你是我遇過最年長的人。你是我永恆愛情的單調，而我卻渾然不覺。我對你懷著節日裡那種無聊。那是什麼？就像石砌噴泉中流動的水，歲月在石頭的平滑表面刻下印記，苔蘚被流水的細線分開，頭頂有雲，心愛的男人在休憩，愛情停滯了，那是個節日，而寂靜在蚊蟲的飛翔中。還有那垂手可得的當下。以及我緩慢厭倦的自由，豐盈，豐盈——那不求也不需的身體。</p>",
  "<p>我不知道如何看出那是細膩的愛。它在我眼中卻像無聊。它確實是無聊。那是尋找玩伴的渴望，是加深空氣的慾望，是與空氣進入更深層接觸的慾望——那無法被加深的空氣，註定懸浮在原處的空氣。</p>\n<p>我不知道，我記得那是個節日。啊，那時我多麼渴望痛苦：它會讓我從與你同在的那個巨大神聖虛空中分心。我，休憩的女神；你，在奧林帕斯山上。幸福的大呵欠？距離追隨著距離，接著又是另一個距離，再一個——節日擁有的空間豐盈。那平靜能量的展開，我甚至無法理解。那已無渴求的吻，落在休憩的心愛男人心不在焉的額頭上；那沉思的吻，落在已是心愛的男人身上。那是個國定假日。旗幟升起。</p>\n<p>但夜幕降臨。我無法忍受某種東西的緩慢轉變——它正緩慢地轉變為同樣的東西，只多了一滴相同的時間。我記得我對你說：</p>\n<p>——我有點反胃，我帶著某種飽足感呼吸著。今晚我們該做什麼？</p>\n<p>——什麼也不做，你回答，遠比我智慧，什麼也不做，今天是假日，那個對事物與時間都細膩的男人說。</p>",
  "<p class=\"em-line\">深沉的倦怠——如同偉大的愛——將我們連結在一起。而翌日清晨，極早的清晨，世界正將自己獻給我。事物的翅膀敞開了，午後將會炎熱，你已能在那些度過倦怠夜晚的事物滲出的新鮮汗水中感受到，如同醫院裡病人仍甦醒著活著。</p>\n<p>但這一切對我這人類的蹄足而言太過精緻。而我，我想要美。</p>\n<p>然而如今我擁有一種放棄美的道德。我將不得不帶著渴望向美告別。美曾是我的溫柔誘惑，是我——軟弱而恭敬——裝飾事物以忍受其核心的方式。但如今我的世界屬於我曾稱之為醜陋或單調的事物——而它對我而言已不再醜陋或單調。我經歷過啃噬大地、吞食泥土，經歷過在其中狂歡，並帶著道德上的恐懼感受到被我啃噬的泥土也感到愉悅。我的狂歡其實來自我的清教徒主義：愉悅冒犯了我，而從那冒犯中，我製造出更大的愉悅。然而我如今這個世界，我曾經會稱之為暴力。</p>\n<p>因為水的味道的缺席是暴力的，玻璃碎片中色彩的缺席是暴力的。一種暴力，因其中性而更加暴力。</p>\n<p>我今日的世界是生澀的，是一個巨大生命困境的世界。因為，比起一顆星辰，今日我更想要星辰那濃稠而黑色的根，我想要那總是看似骯髒、確實骯髒、且總是難以理解的源頭。</p>",
  "<p>我帶著痛苦告別，甚至告別一個孩子的美——我想要那個更原始、更醜陋、更乾燥、更困難的成人，那個已成為無法在齒間咬碎的種子之孩子。</p>\n<p>啊，我也想看看自己能否放下那匹飲水的馬，多麼美麗。我也不想要我的感受，因為它總在美化；而我能否放下那在雲中移動的天空？還有那朵花？我不想要美麗的愛。我不想要黃昏，不想要那張精雕細琢的臉，不想要富於表情的事物。我想要那無表情的。我想要人體內部的非人性；不，這並不危險，因為人終究是人，你無須為此奮鬥：想要成為人，對我來說聽起來太美了。</p>\n<p>我想要事物的質料。人性浸透了人為的修飾，彷彿那是必要的；而那虛假的人性化絆倒了人，也絆倒了他的人性。存在著一種更飽滿、更遲鈍、更深沉、較不善良、較不邪惡、較不美麗的事物。然而那事物，在我們粗糙的手中，也冒著被轉化為「純粹」的風險——我們那粗糙且滿是言語的手。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">我們那粗糙且滿是言語的手。</p>\n<p>——請容我告訴你，神並不美麗。因為祂既非結果也非結論，而我們覺得美麗的一切，有時僅僅是因為它已經被完成了。但今日被視為醜陋的，幾個世紀後將被視為美，因為它將完成它自身運動中的一個階段。</p>\n<p>我不再想要那從未真正完成的完成運動，而我們總是出於慾望去完成它；我不再想沉溺於那種輕易的喜愛——只因一件事物看似完成了，便不再嚇到我，因此虛假地屬於我——我，曾是美的吞噬者。</p>\n<p>我不想要美，我想要身分。美是一種附加物，而現在我必須捨棄它。世界並無美的意圖，這在過去會令我震驚：世界上不存在美學的平面，甚至不存在良善的美學平面，這在過去會令我震驚。事物遠比那更為深遠。神比良善及其美更為偉大。</p>\n<p>啊，向那一切意味著巨大失望的事物告別。然而正是在失望之中，應許得以實現——透過失望，透過痛苦，應許得以實現——這就是為何人必須先經歷地獄：直到你看見有一種更深的愛的方式，而那種方式放棄了美的積累。神就是一切存在之物，所有的矛盾都在神之內，因此並不與祂相悖。</p>",
  "<p>啊，我體內的一切都在疼痛，當我鬆開那對我而言曾是世界的東西。鬆手是如此粗暴而侵略性的姿態，以至於那個張開嘴談論鬆手的人應該被囚禁、與世隔絕——我寧可認為自己只是暫時失去理智，也不願有勇氣去想這一切都是一個真理。</p>\n<p>——把你的手給我，不要拋棄我，我發誓我也不想要這樣：我曾經活得很好，我是那種你可以說「G.H.的生活與愛情」的女人。我無法用言語說出那個系統是什麼，但我活在一個系統之內。彷彿我把自己組織在胃痛的事實之中——因為，如果我不再胃痛，我也會失去那有一天能從胃痛中解脫的奇妙希望：我過去的生活對我而言是必要的，因為正是它的糟糕讓我沉醉於想像一個希望——沒有那樣的生活，我根本無從知曉那個希望。</p>",
  "<p>*我現在正賭上一個全然合宜的希望，為了換取一個遠比它更為巨大的現實——巨大到我必須用臂膀遮住雙眼，才不必面對一個如今已然實現的希望——甚至在我死前！所以，在我死前。我也在這發現中灼燒自己：存在著一種道德，其中美是一種巨大的、可怖的表面性。如今，那引誘我、呼喚我的，是中性的。我沒有詞語可以表達，因此只能談論中性。我只有那狂喜，而它也不再是我們所謂的狂喜，因為它不是一個高峰。但那無高峰的狂喜，表達了我所說的中性。</p>\n<p>啊，與我說話、與你說話，便是沉默。與神說話，是存在中最沉默的事。與事物說話，是沉默的。我知道這聽起來對你而言是悲傷的，對我也是如此，因為我仍耽溺於詞語的調味料。正因如此，沉默傷害我，像一種驅逐。</p>\n<p>但我知道我必須驅逐自己：與事物的接觸必須是低語，而與神說話，我必須收集斷裂的音節。我的匱乏來自於失去了非人的那一面——當我成為人，我便被逐出了樂園。而真正的祈禱，是沉默的非人神劇。</p>\n<p>不，我不必透過祈禱上升：我必須，脹滿著，成為一個顫動的虛無。我對神說的話，不該有意義！如果它有意義，那是因為我錯了。</p>",
  "<p>啊，請別誤解我：我並非從你身上奪取什麼。我所做的，是向你要求。我知道這看似我在剝奪你我的「人性」。但恰恰相反：我所渴望的，是從那最初與原初之物中活出來——正是那東西，讓某些事物得以抵達渴望成為「人」的境地。我渴望為自己活出那最艱難的人性部分：為自己活出中性之愛的種子，因為正是從那源頭，開始升起某種東西，後來逐漸扭曲成各種情感，直到核心被豐饒的堆積物窒息，被我們自身的人性蹄足碾碎。我對自己要求一種遠為巨大的愛——那是如此巨大的生命，甚至連美都不復存在。</p>\n<p>我正擁有那堅硬的勇氣，它刺痛我，如同分娩中轉化的血肉。</p>\n<p>但不。我仍未說盡一切。</p>\n<p>並非我接下來要說的就是全部缺失。在我對自己訴說的這個故事中，還缺失更多：例如，父親與母親是缺失的；我尚未有勇氣去榮耀他們；我經歷過的許多屈辱也是缺失的，而我略過它們，因為唯有不被屈辱者才會感到屈辱，與其說屈辱，我該說的是我缺乏謙卑；而謙卑遠不止是一種感覺，它是帶著最低限度的常識所看見的現實。</p>\n<p>許多我能訴說的事物是缺失的。但有一件事，我必須說出來。</p>",
  "<p>（我知道一件事：如果我講完這個故事，我今天——不是明天，就是今天——就要去「頂級寶貝」吃飯跳舞，我瘋狂地需要找點樂子，讓自己分心。是的，我一定會穿上那件襯我膚色、讓我氣色好的新藍色洋裝，我會打電話給卡洛斯、約瑟芬娜、安東尼奧——我不太記得他們兩個之中是誰注意到想要我，還是兩個都想要——我會吃某種風味的蝦子，我知道因為我會吃蝦子，今晚，今晚就是我正常生活的重啟，我平凡喜悅的生活，往後的日子我需要我的輕盈、甜美而幽默的庸俗，我需要遺忘，像每個人一樣。）</p>\n<p>因為我還沒有說出一切。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">因為我還沒有說出一切。</p>\n<p>我還沒有說出，坐在那裡一動不動的我，仍然沒有停止以極大的厭惡——是的，仍舊帶著厭惡——凝視著蟑螂灰濛身軀上那泛黃發白的糊狀物。而我知道，只要我還感到厭惡，世界就會避開我，我也會避開我自己。我知道，活著的基本錯誤，就是對一隻蟑螂感到厭惡。對親吻痲瘋病人感到厭惡，是我錯失了內在的第一個生命——因為厭惡與我矛盾，與我內在的物質矛盾。</p>\n<p>然後，那件我出於對自己的憐憫而不願去想的事，我終究還是想了。我再也無法克制自己，我想了那件其實早已被想過的事。</p>\n<p>此刻，出於對那隻被我握在手中的無名之手的憐憫，出於對那隻手將無法理解的憐憫，我不願帶著它一起走進我昨天獨自前往的恐怖之中。</p>\n<p>因為我突然發現的，是那一刻不僅僅是到了必須理解我不該再超越的時候，而是那一刻真的到了不再超越的時刻。並且要擁有我過去以為該留待明天才擁有的東西。我試圖讓你免於承受，但我做不到。</p>\n<p>因為救贖必須存在於事物本身。而存在於事物本身的救贖，意味著將那蟑螂的白色糊狀物放進我的嘴裡。</p>",
  "<p>光是這個念頭，我便閉上眼睛，力道之猛如同有人咬緊牙關；我咬得如此之緊，再用力一點，牙齒就會在嘴裡碎裂。我的內臟在說不，我的糊狀物在拒絕那蟑螂的。</p>\n<p>我停止了出汗，再一次完全乾涸。我試圖與自己的厭惡講道理。為什麼我會對從蟑螂體內流出的糊狀物感到厭惡？難道我沒有喝過那白色的乳汁——那是液態的母性糊狀物嗎？而當我飲下構成我母親的那個東西時，我不是無以名之地稱之為愛嗎？然而理性一無所獲，只讓我牙關緊咬，彷彿那是顫抖的肉體所鑄。</p>\n<p>我做不到。</p>\n<p>只有一個方法能讓我做到：如果我給自己一個催眠般的指令，然後彷彿陷入沉睡，夢遊般地行動——當我從睡眠中睜開眼睛時，我已經「做了」，那會像一場噩夢，醒來後便解脫，因為最糟的時刻是在睡夢中度過的。</p>\n<p>但我知道，那不該是我做這件事的方式。我知道我必須吃下那蟑螂的糊狀物，但要用我的全部去吃，也要吃下我自己的恐懼。唯有如此，我才能擁有那突然間在我看來像是反罪惡的東西：吃下蟑螂的糊狀物就是反罪惡，罪惡會是我那輕易得來的純潔。</p>\n<p>反罪惡。但代價何其高昂。</p>\n<p>以穿越一種死亡感的代價。</p>\n<p>我站起身，向前邁出一步，帶著的決心不是自殺者，而是謀殺自己的兇手。</p>",
  "<p>汗水再次湧出，我從頭到腳都在流汗，黏膩的腳趾在拖鞋裡滑動，髮根正軟化著那黏稠之物——那是我全新的汗水，一種我不認識的汗水，聞起來像久旱的土地迎來初雨後的氣息。然而，那股深沉的汗水卻正是令我甦醒的東西，我正緩慢地泅泳於自己最古老的原始湯汁中，汗水是浮游生物，是氣息，是生命之糧，我正在成為，我正在是我在成為。</p>\n<p>不，我的愛，這不像所謂的「好」那樣好。這是所謂的「壞」。真的非常、非常壞。因為我的根——我此刻才初次品嚐——帶著馬鈴薯塊莖的味道，混雜著將它從中拔出的泥土。然而，那股壞滋味卻擁有一種奇異的生命恩寵，我只能藉由再次感受它來理解，也只能藉由再次感受它來解釋。</p>\n<p>我又踏出一步。但沒有向前邁進，我突然吐出了早餐吃的牛奶和麵包。</p>\n<p>被猛烈的嘔吐徹底撼動——甚至沒有噁心的預警——我對自己感到幻滅，驚恐於自己缺乏力量去完成那個在我看來唯一能將身體與靈魂結合的姿態。</p>\n<p>儘管如此，嘔吐之後，我平靜了下來，額頭清涼，身體安詳。</p>",
  "<p>這更糟：現在我必須吃那隻蟑螂，卻沒有先前那股激昂的幫助——那股激昂本該像催眠般在我體內作用；我已經吐掉了那股激昂。而意外地，在嘔吐這場革命之後，我感到身體單純得像個女孩。就必須是這樣，像一個無意間快樂的女孩，我才能吃下那蟑螂的糊狀物。於是我向前邁步。</p>\n<p>我的喜悅與羞恥，在從暈眩中醒來時降臨。不，那不是暈厥。更像是暈眩——因為我仍站著，一手扶著衣櫃。一陣暈眩，讓我失去了對片刻與時間的掌握。但我知道，甚至在思考之前就知道，當我在暈眩中離開自己之際，「某件事已經完成了。」</p>\n<p>我不願去想，但我知道。我怕嚐到嘴裡正在嚐的味道，我怕用手抹過嘴唇時發現殘跡。而我也怕看向那隻蟑螂——此刻牠那黯淡的背上，白色糊狀物應該少了一些……</p>\n<p>我為自己感到羞恥：為了完成某件事而陷入暈眩與無意識——這件事我再也無法知道自己是怎麼做的——因為在做之前，我已從自身抽離了所有參與。我不願「知道」。</p>\n<p>原來事情就是這樣運作的嗎？「不知道」——最深的事物就是這樣發生的嗎？為了讓活著得以運作，總是有某樣東西必須看似死去？我必須不知道自己是活著的嗎？永遠逃不出更大生命的祕密，就是像夢遊者一樣活著？</p>",
  "<p>或者，像夢遊者一樣活著，是最大的信任？在暈眩中閉上眼睛，永遠不知道發生了什麼。</p>\n<p>如同一種超越。超越，是對過去、現在或未來的記憶。在我身上，超越是我抵達事物的唯一途徑嗎？就連吃那隻蟑螂，我也以超越吃這行為本身的方式行動。而如今我所擁有的，不過是恐懼的模糊記憶，不過是那個念頭。</p>\n<p>直到記憶變得如此強烈，我的整個身體在內部尖叫起來。</p>\n<p>我將指甲抵在牆上繃緊：此刻我嘴裡嚐到那股噁心，然後開始吐，狂怒地吐著那種「沒有這種東西」的味道，一種虛無的味道，然而對我來說卻近乎甜膩，像某些花瓣——那是我的味道——我正吐出我自己，卻始終無法抵達一種終於將整個靈魂吐乾淨的感覺。「——因為你是不冷不熱的溫水，既非冷也非熱，我必將你從我口中吐出。」那是《約翰啟示錄》中的句子，而這句原本該指向其他事物的話我已不復記憶，這句話從記憶深處向我襲來，象徵著我所吞食的那種淡而無味——於是我繼續吐。</p>\n<p>這並不容易：因為那中性之物極具能量，我吐著，卻仍然是我。直到我驚訝地領悟，我正在拆解自己費盡心力建構的一切，領悟到我正在放棄自己——我才在狂怒中停下來。而，唉，我終究只配得上自己的生命。</p>",
  "<p>我驚愕地停下，雙眼盈滿淚水，卻只是灼燒而不流下。我想我甚至不認為自己值得讓淚水流下，我缺乏對自己的第一絲憐憫——那是讓人得以哭泣的——而我的瞳孔中，我以灼熱留住那些正在鹽漬我的淚水，那些我不配讓它流下的淚水。</p>\n<p>但，即使沒有流下，那些淚水在某種程度上仍是同伴，以某種憐憫沐浴著我，於是我開始低下一個被安慰的頭。然後，像一個從遠方歸來的人，我回到床上靜靜坐下。</p>\n<p>我曾以為，將我轉化為我自身的最佳證明，就是把那蟑螂的白色糊狀物放進嘴裡。而那樣，我就能靠近那……神聖的？那真實的？對我而言，神聖就是真實。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">對我而言，神聖就是真實。</p>\n<p class=\"em-line\">然而，親吻痲瘋病人甚至不是良善。那是自我的真實，自我的生命——即便那也意味著痲瘋病人的救贖。但首先，那是自己的救贖。聖人最大的益處是對他自己，這無關緊要：因為當他抵達自身那巨大的寬闊，成千上萬的人便因他的寬闊而擴展，並從中存活，而他愛他人，如同他愛自己那可怕的擴展，他以對自己的不敬來愛他的擴展。聖人想要淨化自己，是因為他感到需要去愛那中性之物？去愛一切非增生的東西，並放棄美好與漂亮。聖人的偉大良善——在於對他而言，萬物皆同。聖人灼燒自己，直到他抵達對中性之物的愛。他需要這個，為了他自己。</p>\n<p>我於是明白，無論以何種形式，活著本身就是對他人的一種良善。活著就夠了，而這本身終將歸於那偉大的良善。全然活著的人，是為他人而活；活出自身寬闊的人，是在獻祭，即便他的生命發生在一間無法溝通的斗室裡。活著是如此巨大的獻祭，以至於成千上萬的人從每一個被活出的生命中獲益。</p>",
  "<p>——上帝之良善是中性地持續、持續地中性，這是否令你痛苦？但我曾經視為奇蹟、稱之為奇蹟的事物，其實是對斷裂與中斷的渴望，是對異常的渴望：我稱之為奇蹟的，正是那真實而持續的奇蹟過程被打斷的瞬間。然而，上帝的中性良善，仍比它若非中性時更可訴求：要擁有它，你只需前行；要擁有它，你只需開口。</p>\n<p class=\"em-line\">而奇蹟可以被祈求，也可以被獲得，因為連續性中存在著不中斷它的空隙，奇蹟是兩個音符之間的那個音符，是一與二之間的那個數字。要擁有它，你只需要需要它。信仰——就是知道你可以前去，吃下奇蹟。飢餓，那才是信仰本身——而需要，是我的保證：對我而言，它永遠會被賜予。需要是我的指引。</p>\n<p>不。我不需要曾有勇氣去吃下那蟑螂的糊漿。因為我缺乏聖徒的謙卑：我賦予了「吃下它」這個行動一種「極致」的意義。但生命被劃分為品質與種類，而法則就是：蟑螂只能被另一隻蟑螂所愛、所吃；而一個女人，在愛一個男人的時刻，那個女人正活在她自己的種類裡。我明白了，我早已做了等同於活過那蟑螂糊漿的事——因為法則就是：我必須以一個人的物質來活，而不是一隻蟑螂的。</p>",
  "<p>我明白了，將那蟑螂的糊漿放入口中，我並非如聖徒那般剝除自己，而是再一次渴求著增積。增積更容易被愛。</p>\n<p>而現在，我握住你的手，不是為了我自己。我是那個將我的手遞給你的人。</p>\n<p>現在我需要你的手，不是為了讓我不再害怕，而是為了讓你不害怕。我知道，相信這一切，起初將是你巨大的孤獨。但那一刻會到來——你將把手遞給我，不再是出於孤獨，而是如我此刻所做：出於愛。如同我，你將不再害怕將自己添加至那神聖的極致甜美能量之中。孤獨，就是只擁有人類的命運。</p>\n<p>而孤獨並非匱乏。不匱乏使人極其孤獨，全然孤獨。啊，匱乏並不隔離人，事物需要事物：你只需看著小雞四處走動，便會明白它的命運將由匱乏所塑造，它的命運是像水銀滴匯聚其他水銀滴那樣匯聚，即使，如同每一滴水銀滴，它自身擁有完全完整而圓滿的存在。</p>\n<p>啊，我的愛，不要害怕匱乏：那是我們更大的命運。愛遠比我以為的更致命，愛如同欲望本身一樣與生俱來，而我們被一種將不斷自我更新的必然性所擔保。愛已然存在，它始終存在。所欠缺的只是那致命一擊——它名為激情。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">所欠缺的只是那致命一擊——它名為激情。</p>\n<p>我此刻感受到的是一種喜悅。透過那活著的蟑螂，我開始明白，我也是任何活著的東西。活著是一個極高的階段，是我此刻才抵達的境界。它是如此高而脆弱的平衡，我知道我無法長久地知曉那平衡——激情的恩典何其短暫。</p>\n<p>也許，身為人，如同我們，只是一種我們稱之為「擁有人性」的特殊敏感化。啊，我也害怕失去那種敏感化。直到此刻，我稱生命為我對生命的敏感。但活著是另一回事。</p>\n<p>活著是一種粗礪的、輻射性的漠然。活著是最高雅的敏感也無法觸及的。活著是非人性的——最深邃的冥想是如此空洞，以至於一抹微笑如同從物質中呼出。而我將更加精緻，作為一種更持久的狀態。我在說死亡嗎？我在說死後嗎？我不知道。我感到「非人性」是一個偉大的現實，而它並不意味著「無人性地」，恰恰相反：非人性是赫茲波中一種中性愛的輻射中心。</p>",
  "<p class=\"em-line\">若我的生命轉化為它自身，今日我所謂的敏感將不復存在——它將被稱為冷漠。但我尚無法掌握那種方式。彷彿數十萬年後，我們終於不再感受與思考：我們將擁有某種更接近「情緒」而非「觀念」的東西。我們將成為活生生的物質，直接顯露自身，無視於詞語，超越那始終怪誕的思想。</p>\n<p class=\"em-line\">而我將不再「從一個思想遊蕩到另一個思想」，而是從一種情緒到另一種情緒。我們將是非人的——作為人類最崇高的征服。存在是超越人的存在。做人行不通，做人一直是種束縛。未知等待著我們，但我感覺這未知是一種總體化，將是我們所渴望的真正人性化。我是在說死亡嗎？不，是生命。那不是一種幸福的狀態，而是一種接觸的狀態。</p>\n<p>啊，別以為這一切不讓我作嘔，我甚至覺得它如此令人厭煩，以至於讓我失去耐心。因為它像天堂，我甚至無法想像自己在那裡能做什麼，因為我只能想像自己在思考與感受——這兩種存在的屬性——而我無法想像僅僅存在，並放棄其餘的一切。僅僅存在——那會讓我感到極度無事可做。</p>\n<p>與此同時，我也有些懷疑。</p>\n<p>因為，正如之前我因進入可能終將是絕望的境地而嚇到自己，我現在懷疑自己又一次在超越事物……</p>",
  "<p>我是否過度擴大了事物本身，正是為了超越那隻蟑螂、那塊鐵片、那片玻璃？</p>\n<p>我不這麼認為。</p>\n<p class=\"em-line\">我甚至不曾將希望簡化為建構與偽造的單純結果，也不否認仍有值得期盼之物存在。我也未曾移除那應許：我只是以極大的努力感受著——希望與應許，在每一個瞬間都已實現。而那是可怕的，我始終害怕被圓滿擊倒，我總以為圓滿就是終結——卻未曾算入那永恆誕生的需求。</p>\n<p class=\"em-line\">也因為我恐懼著，無法承受單純的榮耀，便將它轉化為另一層增生物。但我知道——我知道——有一種榮耀的經驗，在其中生命擁有最純粹的虛無滋味，而在榮耀中，我感到它是空的。當活著發生時，人會問：就只是這樣嗎？而答案是：不僅如此，正是如此。</p>\n<p class=\"em-line\">只是我仍須謹慎，不讓它變得比這更多，否則它就不再是它了。本質是一種刺鼻的平淡。我必須「淨化自己」更多，甚至不再想要事件的增生物。淨化自己，曾經意味著對我稱之為美的東西施以殘酷，也對我稱之為「我」的東西施以殘酷，卻不知「我」不過是我自己的增生物。</p>\n<p class=\"em-line\">但如今，透過我最艱難的驚駭——我終於朝向那逆反的路徑前行。我朝向我所建造之物的毀滅前行，我朝向去人格化前行。</p>",
  "<p class=\"em-line\">我對世界貪婪，我有強烈而明確的欲望，今晚我要去跳舞、去吃東西，我不穿那件藍色洋裝，而穿黑白相間的那件。但同時，我什麼也不需要。我甚至不需要一棵樹存在。我現在知道一種方式，它捨棄一切——包括愛、自然、物體。一種不需要我的方式。儘管如此，至於我的欲望、我的激情、我與一棵樹的接觸——它們對我而言，仍像一張正在進食的嘴。</p>\n<p class=\"em-line\">去人格化，是對無用個體性的拋棄——失去一切所能失去的，卻依然存在。一點一滴地剝除，以一種極其專注以致感受不到疼痛的努力，剝除，如同褪去自己的皮膚，褪去自己的特質。一切標誌著我的東西，不過是我最容易為他人所見的方式，以及我最終如何膚淺地認出自己的方式。正如曾有那麼一刻，我看見那隻蟑螂是所有蟑螂的蟑螂，同樣地，我想在自己身上找到所有女人的女人。</p>",
  "<p class=\"em-line\">去人格化，是對自身的偉大客體化。一個人所能達到的最大外化。經由去人格化而抵達自身的人，必能在任何偽裝下認出他者：走向他者的第一步，是在自己內心找到所有男人的男人。每個女人都是所有女人的女人，每個男人都是所有男人的男人，而他們每一個都可能出現在人受審判之處。但只在內在性之中，因為只有少數人能達到，在我們之中認出他們自己。然後，藉由他們存在的單純在場，揭示我們的存在。</p>\n<p class=\"em-line\">無論我們賴以維生的是什麼——正因它沒有名字，只有沉默才能發聲——正是從那裡，我透過讓自己存在的巨大慷慨，而更靠近自己。不是因為我因此找到了名字的名字，不可觸摸的變得具體——而是因為我將不可觸摸的指稱為不可觸摸，然後呼吸重新迸發，如同燭焰。</p>\n<p class=\"em-line\">對自身逐漸的去英雄化，是我們在表面勞動之下真正從事的勞動，生命是一項祕密任務。真實的生命是如此隱密，以至於連我這個為它而死的人，也無法獲知通關密語，我死時不知從何而來。而這祕密是如此深沉，唯有當任務得以完成，我才會在電光石火間領悟，我生來就是為了承擔它——每一個生命都是一項祕密任務。</p>",
  "<p class=\"em-line\">我自身的去英雄化，正如地底暗流般侵蝕著我的建築，未經我同意便悄然降臨，如同一聲未被理會的呼喚。直到最終向我揭示：我內在的生命，並不冠以我的名。</p>\n<p>而我也沒有名字，而那正是我的名字。因為我將自己非人格化到不再擁有名字的程度，每當有人說「我」時，我便回應。</p>\n<p>去英雄化，是一場生命的巨大失敗。並非每個人都能成功失敗，因為這如此艱辛——一個人必須先痛苦攀爬，直到終於抵達足夠高的地方，才能夠墜落——我唯有先構築起完整的聲音，才能抵達沉默的非人格性。我的文明是必要的，為了讓我上升到一個可以下降的點。正是透過聲音的失敗，一個人才能首次聽見自己、他人與事物的沉默，並接受它作為可能的語言。唯有如此，我的本性才被接納——帶著它驚恐的折磨被接納，在那裡，痛苦不是發生在我們身上的事，而是我們之所是。而我們的處境被接受為唯一可能的處境，因為它就是存在本身，而非其他。而活出它，就是我們的激情。人類的處境，就是基督的受難。</p>",
  "<p>啊，但要抵達沉默，需要多麼巨大的聲音努力。我的聲音是我追尋現實的道路；現實，在我的語言之前，存在如同一種未被思考的思想，但我無可逃避地曾經、並且仍然被迫需要知道那思想在想什麼。現實先於追尋它的聲音，正如大地先於樹木，正如世界先於人類，正如海洋先於對海洋的凝視，生命先於愛，身體的物質先於身體，而反過來，語言有一天也將先於對沉默的佔有。</p>\n<p>我所能指稱的，僅止於我所命名的範圍——而這正是擁有語言的榮耀。但我所無法指稱的，卻遠比這更多。現實是原料，語言是我追尋它的路徑——也是我找不到它的路徑。然而，正是從追尋與找不到之間，誕生了那我不曾知曉、卻在瞬間認出的東西。語言是我作為人的努力。我的命運是追尋，我的命運是空手而歸。但——我帶著那不可言說之物歸來。不可言說之物，只能透過我語言的失敗而給予我。唯有當建構失敗，我才能獲得它未能成就之物。</p>",
  "<p>而試圖走捷徑，想要一開始就知道聲音說得很少，直接從非人格的存在出發，是沒有用的。因為旅程存在，而旅程不僅僅是前進的方式。我們自己就是旅程。在活著這件事上，人永遠無法預先抵達。苦路不是繞道，它是唯一的路，人只能沿著它、帶著它抵達。堅持是我們的努力，放棄是報償。人唯有經歷了建構的力量，並且——儘管品嚐了力量的滋味——仍選擇放棄，才能抵達。放棄必須是一種選擇。放棄是一個生命中最神聖的選擇。放棄是真正的人類瞬間。而唯有這個，才是我處境中真正的榮耀。</p>\n<p>放棄是一種啟示。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p class=\"em-line\">放棄是一種啟示。</p>\n<p>我放棄，我將成為那個人——唯有在我處境最糟的時刻，那個處境才被接納為我的命運。存在要求我做出巨大的犧牲：沒有力量。我放棄，突然間世界便容納在我虛弱的手中。我放棄，在我人性的貧窮之上，開啟了唯一被賜予我的喜悅——人的喜悅。我知道，而我顫抖——活著如此撞擊我，活著使我失眠。</p>\n<p>我攀得夠高，足以墜落，我選擇，我顫抖，我放棄，而後，終於獻身於我的墜落，非人格化，沒有自己的聲音，終於沒有了我——於是我所不擁有的一切都成為我的。我放棄，而我越是少，我越是活，我越是失去我的名字，他們越是呼喚我，我唯一的秘密使命就是我的狀態，我放棄，而我越不知道密碼，我越是完成那秘密，我越不知道，深淵的甜美越是我的命運。於是我崇拜它。</p>\n<p>雙手靜靜交疊在膝上，我感受到一種溫柔羞怯的喜悅。那幾乎是虛無，如同微風吹動一片草葉時的顫動。幾乎是虛無，但我能辨識出我羞怯的微小動作。我不知道，但帶著苦痛的崇拜，我正接近某種東西，帶著恐懼者的細膩。我正接近那發生在我身上最強大的事物。</p>\n<p>比希望更強大，比愛更強大？</p>",
  "<p>我正接近某種我認為是——信任的東西。或許那就是名字。或者無關緊要：我也可以給它另一個名字。</p>\n<p>我感到我的臉在謙遜中微笑。或許沒有，我不知道。我在信任。</p>\n<p>信任自己？世界？神？蟑螂？我不知道。或許信任不是關於什麼或誰的問題。或許我現在知道，我自己永遠無法等同於生命，但我的生命等同於生命。我永遠無法觸及我的根，但我的根存在。羞怯地，我讓自己被一種甜美穿透，那甜美使我謙卑，卻不束縛我。</p>\n<p class=\"em-line\">哦，上帝，我感到被世界施洗了。我將一隻蟑螂的物質放入口中，終於完成了那最微小的行動。不是最大的行動，如我從前所想，不是英雄主義與聖潔。而是那最微小的行動——我一直錯失的那個。我一直無能於最微小的行動。而藉由這最微小的行動，我將自己從英雄中解放。我，這個從道路中段活過來的人，終於踏出了起點的第一步。</p>",
  "<p class=\"em-line\">終於，終於，我的外殼真正碎裂了，而沒有限制地，我存在著。藉由不存在，我存在。直到我所不是的一切盡頭，我存在。凡我所不是的，我即是。一切將在我之內，若我不存在；因為「我」不過是世界的一次瞬間痙攣。我的生命不只有人類的意義，它更為巨大——如此巨大，以人類的尺度而言，它毫無意義。對於那比我更巨大的總體組織，我從前只感知到碎片。但如今，我遠比人類更少——而我只能實現我特定的人類命運，如果我將自己交出，如同我正在交出自己，給那不再是我的一切，給那已然非人的一切。</p>\n<p class=\"em-line\">而交出自己，帶著歸屬於未知的信任。因為我只能向我不知的一切祈禱。而我只能愛事物那未知的證據，只能將自己加入我所不知的一切。唯有那才是真正的交出自己。</p>\n<p class=\"em-line\">而這樣的交出，是唯一不將我排除的超越。我如今如此巨大，以至於再也看不見自己。巨大如遠方的風景。我遙遠。但在我最遠的山脈與最遙遠的河流中可被感知：同時的當下不再驚嚇我，在我最極端的盡頭，我終於可以微笑，甚至無需微笑。終於，我伸展到我的感知之外。</p>",
  "<p>世界不依賴於我——這是我已抵達的信任：世界不依賴於我，而我並不理解自己究竟在說什麼，永遠！我再也不會理解自己所說的任何話。因為我怎能說話，而不讓語言為我說謊？我怎能說話，除非如此膽怯地：生命就只是為了我。生命就只是為了我，而我不懂自己在說什麼。於是我愛它。</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<h2>譯者註</h2>\n<p>一位巴西的朋友告訴我，里約有個年輕女子，痴迷地讀著克拉莉絲・李斯佩克多，並深信——正如我和無數其他克拉莉絲信徒一樣——若能與她本人相遇，她們之間會產生改變生命的連結。她設法聯繫上這位作家，對方親切地答應見她。當年輕女子抵達時，克拉莉絲坐著，凝視著她，一言不發，直到女子終於逃離那間公寓。</p>\n<p>翻譯一位已故的作家，總是像這場相遇。你可以提出一個問題，卻得不到回答。作家只是凝視著你，什麼也不說，而你懷疑最好的選擇是否就是起身跑出房間——尤其當你正在翻譯的作品，像《G.H.的激情》這般令人困惑。</p>\n<p>我本想問她，關於她奇特交替使用的「o Deus」（「那神」）與「Deus」（「神」）——她意圖讓那個冠詞對讀者聽起來有多麼怪異。我也本想問她，關於書中反覆出現的各種詞語，像賦格曲中的主題，每次都以略微不同的音高回歸。例如，她用 *preso* 這個詞來指稱囚犯，然後指牆上淺浮雕中的人物，再然後指敘述者站在她前女傭那間乾燥悶熱的房間——整部小說發生的地點——時的感受。</p>",
  "<p class=\"em-line\">我知道，作為這部小說的譯者，我的首要任務之一，必須是重現貫穿全書的、如賦格般重複出現的詞語，例如「preso」。但在好幾個段落裡，使用「被囚禁」會讓英文句子聽起來古怪，而原文並無此感——例如她以「preso」描述被岩石壓住的感覺時。最終，我在那個段落使用了「被壓住」而非「被囚禁」，但我多希望能問她：我在此處選擇「被壓住」是對的嗎？還是應該用「被囚禁」，因為這種重複的抒情性，正是讓這部小說如此令人著迷的關鍵？</p>",
  "<p class=\"em-line\">這種兩難也出現在某些文字遊戲的時刻，例如她說蟑螂多到「parece uma prece」，字面意思是「它們看似一場祈禱」。然而，這種直譯無法捕捉葡萄牙語原文中詞語的聲響愉悅。我最終選擇了「它們顯現為一場祈禱」這個片語。其中「p」與「r」的重複，提供了原文中某些創造性的抒情質感，儘管「seeming」與「appearing」在意義上並非完美對應。既然我無法詢問克拉莉絲，在這本書中何時該優先考慮音樂性、何時該優先考慮意義，我只能信任自己在過去十年反覆重讀《G.H.的激情》時，腦中所聽見的聲音。這是我在大學時讀到的她的第一部作品，我深深為之著迷，以至於立刻讀完了她所有的著作。隔年，我學習葡萄牙語，部分原因正是為了聽見她原初的聲音。</p>",
  "<p>即便反覆重讀這部小說如此多次、如此專注，以至於我能背誦其中許多段落，但每次讀到結尾，我仍感覺頭頂的每一根髮絲都著了火。翻譯《G.H.的激情》的經驗讓我感到自己禿了——不是因為過程中失去了頭髮，而是發現，就像G.H.，就像那隻蟑螂，我其實全是纖毛與觸角，而若非親身、緩慢、痛苦地體驗這本書裡的每一個字，我永遠不會知道這件事。所以——如同這部最傑出小說的最後一行——我愛它。</p>\n<p>伊德拉・諾維</p>",
];

const DURATION = 320;
let cur = 0;
let busy = false;

const stage    = document.getElementById('stage');
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const pgInfo   = document.getElementById('pg-info');
const barFill  = document.getElementById('bar-fill');

let layers = [
  document.getElementById('pg-a'),
  document.getElementById('pg-b'),
];
let activeIdx = 0;

function active()   { return layers[activeIdx]; }
function inactive() { return layers[1 - activeIdx]; }

function renderLayer(el, idx) {
  el.innerHTML = PAGES[idx];
  el.scrollTop = 0;
}

function updateUI() {
  const n = PAGES.length;
  pgInfo.textContent = (cur + 1) + ' / ' + n;
  barFill.style.width = ((cur / (n - 1)) * 100).toFixed(1) + '%';
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === n - 1;
}

function go(dir) {
  if (busy) return;
  const next = cur + dir;
  if (next < 0 || next >= PAGES.length) return;

  busy = true;

  const outClass = dir > 0 ? 'anim-out-l' : 'anim-out-r';
  const inClass  = dir > 0 ? 'anim-in-r'  : 'anim-in-l';

  const inLayer  = inactive();
  renderLayer(inLayer, next);

  inLayer.style.zIndex = '0';
  active().style.zIndex = '1';
  active().classList.add(outClass);

  requestAnimationFrame(() => {
    inLayer.classList.add(inClass);
    inLayer.style.display = '';
  });

  setTimeout(() => {
    active().classList.remove(outClass);
    active().style.display = 'none';
    inLayer.classList.remove(inClass);
    inLayer.style.zIndex = '1';
    activeIdx = 1 - activeIdx;
    cur = next;
    updateUI();
    busy = false;
  }, DURATION);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Touch / swipe — horizontal drag threshold 48px
let tx0 = null, ty0 = null;
stage.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

stage.addEventListener('touchmove', e => {
  if (tx0 === null) return;
  const dx = Math.abs(e.touches[0].clientX - tx0);
  const dy = Math.abs(e.touches[0].clientY - ty0);
  // If clearly horizontal, prevent default scroll
  if (dx > dy && dx > 10) e.preventDefault();
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = Math.abs(e.changedTouches[0].clientY - ty0);
  // Only trigger if horizontal movement dominates and meets threshold
  if (Math.abs(dx) > 48 && Math.abs(dx) > dy) go(dx < 0 ? 1 : -1);
  tx0 = null; ty0 = null;
}, { passive: true });

// Buttons
btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

// Init
renderLayer(active(), 0);
inactive().style.display = 'none';
updateUI();

</script>
