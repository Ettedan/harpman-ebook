  "<p>一開始，我便數著自己的腳步。心跳是我計算時間的單位，步伐則是我衡量長度的單位。我曾聽人說，一步平均是七十公分，而一公尺等於一百公分。當女人們談論長度或距離時，總是用公尺或公里，所以我傾向於使用同樣的概念。但我很快意識到這完全是荒謬的——那些詞彙對她們有意義，對我卻毫無意義，而我也已不再需要共用一套語言。步行一小時——這對我來說才有意義。我無需費心將步伐換算成公里，只需用步行的時數來評估距離。我始終信賴自己體內的時鐘，而在第一天，我決定計算一小時內走多少步，並選定一個屬於我自己的單位，相當於公里。為此，我必須以極穩定的速度行進。地面不算崎嶇，交替著平緩的下坡與和緩的上坡，大概對我的速度影響不大。五小時後，我第一次停下。我數了三萬七千七百四十二步。我開始進行除法運算，如今這對我已不那麼困難，因為安西亞曾教過我在地上寫數字來算，但這仍需要極大的專注力。結果是每小時七千一百五十步。我決定逐小時核對，再用十分鐘的時間片段細算，到了傍晚，我發現自己每分鐘穩定走一百一十九到一百二十二步。</p>",
  "<p>與此同時，我試著預先估算抵達某個特定點還有多遠，好讓自己對距離有所掌握。這片單調的景色毫無助益，我只能滿足於以一棵灌木、一塊小石頭或某個微小地標為憑據。有時我無法確定，此刻走過的灌木叢，是否就是十分鐘或十五分鐘前選定的那一株。但我仍丈量著走過的距離，並能感覺到自己逐漸培養出距離感，正如我從前曾感覺自己逐漸掌握了時間感。</p>",
  "<p>第一天，儘管徹夜未眠，我仍以平穩的步伐走了十個小時——這種步調能帶我走很遠——並決定一旦感覺到疲憊拖慢了速度就停下來。我思索著什麼會讓我停下腳步，是飢餓、睏倦還是無聊——換句話說，當你徹底孤身一人時，是什麼促成了決定。我對這個最初的答案感到滿意：我想建立一個內在的距離計量器，因此，是計畫本身、以及在適當條件下執行的決心，主導了我的每個選擇。我在感到腳步遲緩的那一刻坐下。我本可以從最近的灌木叢撿些枯枝生火，但一放下背包，就發現自己已筋疲力竭，於是決定就這麼冷吃水煮肉。確實，這頓飯算不上美味，但佐以最終擁有完全自由的感受，倒也別有風味。我這才體會到，自己有多麼厭惡被迫遷就其他女人安頓下來的念頭，想到等待著我的漫長旅程，不禁暗自微笑。我整平地面，攤開一條對折的毯子，裹上另一條，便立刻沉沉睡去。六小時後醒來，飢腸轆轆，又吃了一頓，然後再次入睡直至日出。再次啟程前，我往解手的洞裡撒了些土，這才發現全身僵硬——腳踝、大腿、背脊都在隱隱作痛。我這輩子從未一口氣走過這麼久。我不知道該如何是好。該停下來休息，還是繼續走下去，指望活動能讓肌肉放鬆？想到要在這片無聊的平原中央坐上一整天，簡直荒謬至極，而我的不耐煩戰勝了一切。然而，既然無法仰賴穩定的速度，這一天我就不勉強去完善我的距離計量器了。</p>",
  "<p>午後，地景微微起了變化。原本平緩的起伏變得更加明顯，有些坡道長達一萬多步。稱之為丘陵或許有些誇大，但我仍為此感到興奮——這或許預示著即將進入丘陵地帶。我本想加快腳步，卻又覺得此舉過於魯莽——雖然身上的痠痛既未加劇也未消退，但我隱約感到不該冒進，以免徹底無法行走。況且今日的疲憊比昨日來得更早，我不願過度消耗體力。我堅信，耐力的培養並非來自超越極限的勉強。</p>\n<p>傍晚六點前我便停下腳步，生起火來。我盡可能地多吃了些，能撐多久就撐多久。入睡前，我將油脂塗抹在發燙的雙腳上。其中一個鐵罐裝的是女人們稱為「豆子培根燉菜」的食物，上頭凝結著一層豬油——我先將豬油刮下，再把剩餘的內容物倒進鍋中加熱。我發現每當雙手沾到這種油脂時，肌膚便會變得柔軟；這個發現讓我靈機一動，將油脂塗在雙腳與臉上。這晚我不像昨夜那樣倒頭就睡，而是靜靜望著夕陽西沉，看著蒼白平滑的天空中浮現第一批星子。</p>",
  "<p>第三天中午時分，我看到下一處山坡上有間小屋。沒料到這麼快就會遇見一間。我停下腳步，在稀疏乾枯的草叢中坐下，遠遠地打量著目標。那裡頭有什麼，我太清楚了——那永恆的絕望長廊。最上層是生鏽的鎖、永遠亮著的燈，下層是緊鎖的監牢、鐵籠與滿坑滿谷的屍骸。我會走下去，仔細端詳一切，這是我能向受害者們致上的唯一敬意。然後我會關上那扇大門。我不確定自己是否仍指望著有朝一日能發現敞開的鐵籠，或是找到另一群逃出來、像我們一樣在外頭定居的女人或男人的蹤跡——只能找到蹤跡，因為身為地堡最後的倖存者，我無法想像其他人能比我那些同伴活得更久。我會這樣想，是因為我習慣從每個角度審視問題，除了思考，我從來沒有任何形式的娛樂。</p>",
  "<p>夕陽西下，我再次啟程。休息過後，身體舒暢，疼痛也消失了。我估計地堡約半小時路程，欣喜地發現自己並未算錯：二十八分鐘便抵達了。我把背包放在小屋內，不疾不徐地走下樓梯。幾乎沒有氣味，但我仍盡量小心翼翼地呼吸。女人們曾將這惡臭比作下水道、有毒沼澤或化糞池——這些我都未曾見識。對我而言，那不過是淡淡的屍體氣味罷了。下方狹窄的走廊裡，房門敞開，一如往常的格局：警衛室、後方的櫥櫃、監獄的雙重大門。我看見一張椅子被撞倒，一只平底鍋翻覆，灑出的液體已乾涸，留下一道褐色污漬。這輕微的凌亂並不常見，引起我的好奇，但首先，我必須去看看那個鐵籠。我們向來覺得這是種義務，即使早已確信，永遠不會找到那扇開啟的門。我們必須向死者致敬，向那些扭曲的身軀致意——它們棲息於此，胡亂堆疊，是恐怖與寂靜的永恆居民。</p>",
  "<p>她們是女人。我凝視了很久，然後繞著鐵籠走了一圈，仔細觀察一切：沒有任何新鮮事物。刀叉和盤子仍在籠中，顯示警報響起時，她們正在用餐。一根鞭子躺在守衛來回踱步的那片區域地板上。其中一名守衛想必比平常更為驚慌，才掉落了武器。或許正是他在逃竄時撞倒了椅子。鞭子靠牆躺著，囚犯們始終無法搆到，她們至死都想抓住它。一人癱倒在欄杆邊，手臂仍向前伸出，在最後一次嘗試中被死亡擊倒。</p>",
  "<p>守衛室裡的物品僅是尋常之物：幾張椅子、一張桌子、幾個置物櫃。他們絲毫未留下任何東西。安西亞常跟我說這很奇怪，但我並不真正理解。我一無所有，所以無法想像她所描述的物件：書籍、信件、香菸、撲克牌、刮鬍刀。我的行囊只有兩條毯子、一把小鏟子、開罐器、火柴和食物，因此我不覺得守衛們隨身只有衣物與武器有什麼好訝異的。我扶正椅子坐下，感到一陣悲傷。我本不想去看那些死去的女人，但我強迫自己去看。除了那個手臂伸直的死者，我其實沒真正看清她們的模樣。我告訴自己這很虛偽，既然無人可欺騙，我卻發現人可以對自己說謊，這感覺非常奇特。難道我比自己以為的更渴望陪伴，以至於把自己變成了另一個人、變成一個見證者，只為了蒙騙她？我沉思良久，卻不知如何繼續這個念頭。在這片荒蕪之地，我仍是囚徒，一如早年困在籠中那般。我放棄這無謂的思緒，回到平時的思維模式——總是計畫、評估、組織——於是去探查食物儲藏室。那是在各個碉堡之間唯一有所不同的地方，彷彿補給品都是大量送來同樣的東西，而如何使用全憑守衛們決定。在冷藏庫裡，我發現大塊的牛肉，得先解凍才能切開。豬肉和羊肉已經沒有了。櫥櫃裡有幾罐奶粉，令我雀躍不已。至少三年沒喝到奶粉了，我知道這是營養豐富的食物，能幫助我恢復體力。我對其他幾罐粉末也產生了興趣。那時我閱讀能力很差，難以辨認標籤上的字。當我終於認出來時，「柳橙」這個詞讓我困惑不已。 當然，我曾聽過那些女人提起這個詞，而我慢慢想起，那是對過去美好事物的懷念。我將少許粉末溶於水中，好奇地嘗了一口。發覺它苦澀難耐，需要加糖調味，但我手邊幾乎沒有糖。然而，安西雅曾告訴我有關維生素的事，我便取來這些罐頭，心想它們能改善我的飲食。</p>",
  "<p>我多次往返於地堡，搬上肉類、粉末、一張床墊和一把椅子。我煮了豐盛的一餐，靈機一動在肉和蔬菜的混合物上灑了奶粉。之後，我睡了很長一段時間。醒來時，我發現那裡再也沒有什麼可做的了。我感到隱約的失望，彷彿我曾對那個地堡寄予更多期望，彷彿我忘了它們全都一模一樣。下一個地堡的門也會鎖著，但我大概找不到更多牛奶了。或許會有什麼別的新奇事物？那些女人們曾提起過巧克力、麵包和起司。我在尋找別的東西。我告訴自己，在等待弄清楚那是什麼的同時——因為我謙遜到甚至不敢想「在找到它之前」——我會享受那美味的紅肉，用樹枝生火烤來吃，還有牛奶，我喝了整整一葫蘆。</p>\n<p>早上八點左右，我感到異常舒暢。我走下 bunker，拿了幾罐食物，補上這幾日消耗的庫存，也想找些縫線——昨天忘了做這件事。等我準備離開時，背包比來時重了許多，但並不覺得太過沈重。我已經強壯多了，甚至想把那張床墊也帶走，因為睡在上面遠比地面舒服。但我告訴自己該謹慎些，等過幾天抵達下一個 bunker、完全適應新生活後，再來考慮這件事也不遲。或許到時我根本不再需要它了。</p>",
  "<p>我沒有在地上留下慣常的標記，因為我已不再相信還有其他倖存者。但我把床墊丟在木屋前，這樣若我再次經過此地，便能認出自己留下的痕跡。</p>\n<p>我想我對第一座地下堡壘的描述是準確的。我這麼認為，但不能確定。我確定那是找到牛奶的那一座，但後來，我找到茶的是哪一座？第五座？第十座？它們全都一模一樣，四十具木乃伊化的屍體堆疊或散落在各處。只有一次我數到三十八具，只有一次我發現所有女人都靜靜躺著，彷彿她們明白死亡無可避免，決定沉默等待。另一次，鑰匙掉落在鐵柵欄兩公尺範圍內，我想像那景象有多可怕——看著鑰匙卻無法觸及。有時，籠子裡有水龍頭在流水，發出細細的滴答聲，起初驚動了我，但我早已對門會打開不抱任何希望。每次都是這樣：食物儲藏室和永恆的燈光。我往東走，從一座堡壘到另一座，攜帶著我的補給，最後，我始終沒有拿床墊。我的鞋磨破了，這倒無所謂——總會找到合腳的靴子。然後是天空總是陰霾的季節，伴隨著我熟悉的那種細雨，我在其中一間警衛室裡找到防水布時很高興。它折疊在桌上，旁邊是一疊還沒收起來的新毯子。這又讓我想起在堡壘裡找到不尋常物品有多罕見，彷彿一切都注定必須完全相同。我正要陷入對警衛和我們囚禁意義的慣常思索。起初，我想聳聳肩，把思緒轉向其他事情。但為什麼呢？我又能如何佔據我的心神？逃脫後，桃樂絲常說：「讓我們安排生活，不要浪費思緒。」事實是，我可以隨心所欲地使用我的思緒，說浪費它們的想法是荒謬的。 我的生存無虞，永遠吃不完儲備的食物，罕見的惡劣天氣也從未讓我生病。我可以任憑思緒隨意遊蕩，就算走進死胡同也無所謂——只需及時打住就好。我確信，那些遺棄的物品永遠不會向我揭示我們被驅逐與囚禁的目的，而躺在地上的鞭子也教不了我什麼有用的東西。我在所有地堡裡找到的都是同樣的東西，就連守衛的住所也不例外。</p>",
  "<p>即使在警衛的營房裡也是如此：我想我從未如此清晰地表述過這個想法。那些話語不斷縈繞心頭，開始讓我感到煩躁，這時一個念頭終於成形：我們一直以為警衛不願透露囚禁我們以及讓我們活著的原因，但我們始終假定他們其實知情。如果他們和我們一樣一無所知呢？如果他們被迫執行一項他們不被允許理解的任務呢？如果上層刻意在所有地下堡壘中放置相同的物品，是為了對他們和我們都隱瞞訊息呢？我因這個理論而激動不已，可以感覺到腳步輕盈起舞，不禁笑了起來。我完全明白這只是在無數問題中又添加了一個新的問題，但這是個嶄新的問題，而在我所處——至今仍身處——的荒謬世界裡，這便是幸福。</p>",
  "<p>在她臨終前不久，我曾對安西亞說過，我會是這片土地的唯一主人。但我明白，那些石塊和冷庫不過是微不足道的寶藏。我出發時懷著探索的意圖——或許是女人們一直談論的那座發電廠，那個發號施令、主宰我們生活的地方——任何新鮮的事物都好。認為守衛們一無所知，這是個全新的想法，而對我來說，沒有比這更珍貴的了。我本該慶祝一番。既然我隨心所欲地活著，想走就走，想吃就吃，想睡就睡，我也想不出什麼特別的慶祝方式。但那天傍晚，我點起火，帶著輕快的心情烤肉。我對自己許諾，那晚要做個甜美的夢。我不知道是否如願以償。每個夜晚，我都有許多同伴，醒來時，總隱約記得自己曾與男女們嬉笑玩鬧，卻從未能記起更具體的細節。這總讓我感到意外，因為當我清醒時，我什麼都不會遺忘。</p>",
  "<p>意識到那些守衛其實也是受害者後，我對即將遇見的奇異際遇已做好準備。我向著朝陽升起的方向行走了整整一年。地貌略有變化，綿延起伏的丘陵逐漸隆起成山丘，我每次攀爬時都懷抱著希望。河流變得更加深邃，得以在其中泅泳帶給我莫大歡愉，而我也在更茂密的林間看見不曾見過的樹種。我仔細檢查灌木叢，因為記得那些女人曾提及野生漿果——草莓、黑莓與覆盆子——據說都美味無比，但我從未見過任何符合她們描述的事物。有次我遇見了自認為是蘑菇的東西，卻沒有採摘，因為她們說過那些可能有毒。正當我走出其中一片樹林之際，地勢的樣貌深深震撼了我。</p>\n<p>前方展開一道長長的山谷，覆蓋著慣見的稀疏植被與鬆散碎石，但我立刻辨出一條與眾不同的地帶：那兒的草更為稀薄，幾乎不見石頭。這條筆直的痕跡延伸至下一座山丘頂。女人們曾提起道路——這會是其中一條嗎？我朝它走去，自然決定沿著它前行，即使它並非朝東，因為我當初選擇那個方向，不過是為了避免原地打轉。走了一天半，我才抵達一座低緩丘巒的頂峰。一往下看，我就見到了那輛巴士。</p>",
  "<p>我說巴士，但起初，我當然不知道自己在看什麼。首先，它在半小時路程之外，我能辨認出的只是平原中央一個長方形的形狀；再來，自然，我從未見過巴士。我唯一能依憑的是女人們告訴我的話，而她們從未精確描述過那些她們視為理所當然的事物。我只知道那是一種能載很多人的車輛。</p>\n<p>我的心臟狂跳，我飛快地往下跑，十分鐘便抵達底部。途中踉蹌了幾次，因為視線始終無法離開目標——那是一具巨大的鏽蝕結構，長約十步，有兩個我那麼高，立在輪子上，輪子多半已經毀損，四周布滿窗戶。才跑到一半，我便看見巴士裡坐著人影，差點當場停下腳步，但我很快穩住自己。我跑到車旁，扔下背包，站在原地動彈不得，努力看清眼前的景象。我認出那是一扇有把手的門，試著轉動它，把手卻應聲脫落。窗玻璃早已碎裂，我扯開門框，門打開後立刻從鉸鏈上脫落。我攀上殘破的門階，踏進了巴士。</p>",
  "<p>多年來，地堡中的屍體早已乾癟成木乃伊；如今這些已成骸骨，穿戴著再熟悉不過的制服，配備著武器與那遮住面骨、樣貌古怪的面罩。他們的姿態自然安坐，彷彿死亡來得猝不及防，他們在毫無察覺最後一次心跳之際，便滑入了那終極的靜止狀態，多年以來，無人驚擾。駕駛仍坐在座位上，雙手緊握方向盤。踏入巴士時，我揚起了一縷輕塵，當我呆立原地，塵埃便在我周圍靜靜落下。我機械式地進行著多年來習以為常的動作，這已成為我心智的運作結構：我開始數算。我逐一數出二十四個座位上的二十二名乘客，他們沿著中央走道兩側成對而坐。總計二十三具屍體。每具屍體都有一個背包，或置於膝上，或擱在兩腳之間的地板上。我難以置信地仔細檢查：毫無慌亂跡象，沒有任何跡象顯示他們曾事先得到任何危險的預警。巴士就停在這片平原中央，而他們全都在此處當場死亡。</p>\n<p>我佇立良久，環顧四周，放任自己狂野的好奇心按自己的步調獲得滿足。我早已知道這份好奇終將落空——若我棲身的這個詭異世界能仁慈地在我未解的疑問清單上再多添幾道問題，便已是萬幸。時值五點，太陽開始西沉，我才動起身來。</p>",
  "<p>我主要對那些行李袋感興趣：我探訪過上百個地堡，卻從未見過這種用粗硬布料製成、附有背帶和金屬扣環的袋子。我拎起一個。在將它拖到外面的過程中，不耐煩的情緒逐漸佔了上風，我渾身緊繃，心臟怦怦直跳。我試圖冷靜下來，告訴自己不會找到什麼特別的東西，但我心底並不相信，解開繩結時手指不住顫抖。</p>\n<p>最上方放著一件仔細折疊好的衣物，是我從未見過的樣式。它有長袖、硬挺的領子和一條腰帶，布料也不是我見過的任何種類，而是用一種厚實、相當柔韌的材料裁剪而成——布料上有皺褶、口袋、平縫——這個詞立刻浮現在我腦中——還有加墊的部分。我習慣了那些連微風都能吹動的輕薄棉布，心想這件穿起來肯定很不舒服。這大概就是夾克，女人們曾提過、但男人們在地堡裡從未穿過的衣物。</p>",
  "<p>底下有幾樣物品。我先拆開一個較小的包裹，外層是厚紙做的。顯然，我不知道那是紙，因為我從未見過，但我不打算細說我在辨認及命名這些東西時遭遇的困難，因為那太過冗長乏味，我也不樂在其中。我得一遍又一遍地重複敘述。我小心翼翼地解開包裹，它脆弱不堪，幾近碎裂。裡面只有一些褐色的粉末，無臭無味，大概是某種已乾枯的食物。接著，我從一個柔軟的小皮袋中取出一件奇怪的器具，我得仔細端詳才發現兩片金屬板之間夾著極薄的刀片，全都裝在一個握起來十分順手的把手上。除非將刀片取下，否則無法用於切割：我花了很長時間才猜出那是一把剃刀。第三樣東西是一個玻璃瓶，我把它擱在一旁，因為我對兩塊仔細折疊、潔白寬大、觸感厚實柔軟的布料更感興趣。我心想這想必就是那些女人們深深懷念的毛巾布料，而我早已學會沒有它們的生活。但我可以用它們來為自己做點什麼，取代我那破爛不堪的連衣裙。此外，還有兩條內褲。我後來想起，男人的內褲另有說法，叫作底褲。</p>\n<p>而在底下，有一本書。</p>",
  "<p>安西亞曾在沙地上畫字母，教會我認字和閱讀的基本功夫。那時候她覺得這差事無趣極了——她看不明白我學這些東西能做什麼——但我堅持要學：世間可學之事已少得可憐，我豈能放過任何能抓住的東西。我腦中有許多詞彙，代表著我從未見過、更別說觸摸過的事物，而此刻我正親身經歷。我一眼便認出了那本書，震撼之餘幾乎暈眩。我想，若我是站著的，恐怕早已癱倒在地。我手中握著的是最珍貴的寶藏，是一口能讓我汲取那個我永遠無緣踏足的世界之知識的泉源。每當情緒激動時，我便開始數數。書名印得很大，有二十三個字母分成四個詞，每個詞都以大寫開頭。我望著它，卻無力辨識——興奮、不耐與疲憊攪和在一起，既繃緊了我的神經，又遲鈍了我的思維。我不知該往哪個方向，是先去滿足好奇心搜查袋子，還是先弄清楚這本書的內容，我必須費盡極大的力氣才能控制住自己。太陽已經很低了，再過不久我便看不清東西，於是決定先將書留待稍後。但興奮讓我笨手笨腳，懷裡的瓶子掉在地上。僥倖沒有破，那瓶子落在夾克上，我及時接住，沒讓它滾到石頭上。這一嚇讓我冷靜下來，我果斷地把書擱到一旁，回頭翻看袋子，卻失望了：裡面除了一條毯子——和地堡裡的那些一樣——再無他物。我拿起那只瓶子，瓶子不大，大概半公升，裝滿了無色液體，看來像水，從未被開啟過。我仔細端詳著軟木塞，決定先擱下開啟的事。我已是筋疲力竭。 我慣常過著規律的生活，每天在荒野中行走八到十個小時，這樣的日常從未讓我準備好面對這場情感的風暴。我因疲憊而顫抖，甚至連為自己弄點吃的力氣都沒有。我從袋中抽出那條毯子，攤在地上通風，再用自己的毯子把自己裹起來。我甚至沒察覺到自己正在入睡，而當我猛然驚醒時，才驚訝地發現已是凌晨三點。我點燃火堆，熱了點食物。日出時分，我回到了巴士裡。</p>",
  "<p>我先取出所有行李袋，在生鏽的巴士車殼幾公尺外將它們排成一列，接著用同樣的方式處理屍體。那些遺骸已縮成骨架，拎起來輕得難以置信。我尤其對他們的衣物感興趣。我想知道，那些在地下碉堡見過的守衛所穿的輕薄棉褲與有肩章的襯衫，是否會比我的連衣裙更舒適。其中一具男屍身材矮小纖瘦，我決定留下他的衣物，清洗後再試穿看看。我將武器分成兩堆：一堆是再也無法揮響的鞭子，另一堆是那些在地下碉堡從未出鞘的大型手槍——但我聽人說過它們的用途。我曾想試試它們，便拿起一把，瞄準後扣動扳機。什麼也沒發生，當時我告訴自己那是因為沒裝子彈。後來，我記起那種東西有保險栓，心想或許是開啟的，但無論如何，我也不曉得該如何解除保險。接著我開始搜索所有行李袋，發現每個袋子裡的東西都一模一樣，這點並不令我意外：一件夾克、兩條內褲、一包食物——其中一包保存得比其他完好，裡面裝著細碎的白色碎屑，我一碰就粉碎了。我猜想那是麵包，那種我從未吃過的日常食物——一條毯子、一把刮鬍刀，還有一本書。我甚至不需要辨識書名，就知道它們全部相同。我沒有在這件事上多想，深怕又會像昨晚那樣被一陣激動擊潰。等我把所有東西整理完畢，我開始納悶，為什麼我們從未在任何地下碉堡裡找到過麵包。至今我仍毫無頭緒。</p>",
  "<p>時至正午，萬事皆已就緒。二十三具骨骸並排躺著，襯衫與內褲整齊疊放，面具與武器分三堆擺放。我曾仔細端詳那些面具，想起女人們說的故事：那些大概是防毒面具。這讓我不禁思索，究竟是什麼奪去了這些男人的性命——絕非毒氣，他們早有防備。況且，警報聲停歇後僅數分鐘我們便逃了出來，卻什麼事也沒發生。</p>",
  "<p>我站起身來，伸展身體。長時間彎腰讓背部痠痛不已，在加熱餐食之前，我花了很長時間檢視自己的財物。轉眼間，我成了大量物品的主人，而我向來一無所有。我感到不知所措。一邊吃著飯，一邊凝視著那些骨骸。他們曾是荒謬的守護者，執行著自己也不明白目的的指令，自身還得服從無法理解的規則，或許他們對我們的身分，就像我們對他們一樣一無所知。死神在他們坐公車時猝不及防地襲來：但他們知道自己要去哪裡嗎？警報響起後，我們再也沒找到任何警衛的蹤跡，想像他們都被帶到別處去了：為什麼這些警衛還留在這裡？唯一可能的解釋，我很久以後才想到：他們是在兩個碉堡之間例行往返，正要去睡覺，或者可能是新來的、正被載往崗位，對危險渾然不覺。防毒面具顯示這片土地不安全，但殺死他們的東西是始料未及的。只有我們這座監獄，在籠門打開那一刻正好響起警報，這正是我們得救的原因：只有他們暴露在外，也因此喪命。這種對稱性困擾了我很長時間。不知為何，我在其中發現了一種隱晦的美。是否有什麼事物、什麼人，在某個地方理解這一切的意義？事情是否仍在繼續？而在這顆行星上，無論我走多遠，都只能看見一小部分，是否存在一個地方，那裡的碉堡仍在運作？那裡的男女仍服從鞭子，隨機地睡覺吃飯，而某個叛逆的女孩正開始數她的心跳？難道只有我一個人嗎？ 我遊蕩其上的這顆行星，是否有一千個姊妹星散落在滿天星斗之間？而當夜幕降臨、我等待入睡之際，目光偶然落向某個遙遠的星球時，那裡是否正上演著同樣的景象？</p>",
  "<p>我決定埋葬那些骨骸，因為我想證明，無論我們遭遇了什麼，我們都屬於同一個族類——那些會尊敬死者的人。我挖了二十三座淺墳，將骨骸一一放入，然後覆上泥土，在每座墳上堆起一個小丘，並在上面放置面具和武器。我將它們排成一個圓圈，不知為何，我覺得這樣最好——頭朝圓心，腳指向遠方。這花了我三天時間，因為土地乾硬，我感到相當疲憊。休息時，我便試著解讀我的書本。</p>\n<p>她們每個人都帶著同一本書：《簡易園藝手冊》。書中解說如何種植、播種、疏苗、鋤草與除雜草，如何在各季節進行不同作業，以及該在何處種植何種植物。我仔細讀完整本書，成了嫁接玫瑰的專家，這讓我不禁失笑。書裡有許多插圖，讓我得以一睹鋤頭、鬱金香球莖的模樣，還有許多我從未見過、也永遠無緣親眼目睹的事物。</p>\n<p>我一遍又一遍地讀著那本書。我獲得了完全無用的知識，卻樂在其中。我感到自己彷彿為心靈綴上珠寶，就像那些女人在美麗尚有用途的年代，曾用來妝點容顏的珍飾。</p>",
  "<p>第五天，一切就緒。我選了兩條長褲、兩件襯衫、一件夾克、幾條內褲，還盡可能帶了許多毛巾，其餘物品則整齊疊好，裹在毯子裡，放回巴士座位上。我重新打包了背包，只比之前稍重一些——因為我已經吃掉不少罐頭的內容物——這時我突然瞥見那些瓶子，我完全忘了它們的存在。難道我已經富足到可以忽略部分財產了嗎？我必須繼續前進，因為水源逐漸見底，得盡快找到河流或地堡補給，但我還能花點時間弄清楚瓶子裡裝的是什麼。我沒有開瓶的工具，只好用刀尖挖軟木塞，過程既費力又耗時。總算倒出一點液體進杯子裡。氣味怪異，濃烈刺鼻，不算好聞。我蘸了手指舔嚐——並不喜歡。我小心翼翼地抿了一小口，吞下時喉嚨灼痛，忍不住想咳嗽。果然如我所料，是酒精。起初有些惱火，但接著想起酒精有藥用價值。過去人們常用它清洗傷口，或在劇痛時麻痺知覺。我身上的傷口——不過是穿越荊棘叢時腿部留下的劃痕——從未感染過。儘管如此，帶上一瓶似乎還是個好主意。我將其餘瓶子放回巴士內。</p>",
  "<p>啟程前，我凝望著即將告別的景象：那輛鏽蝕的巴士，像平原中央的貝殼，在接下來的幾個世紀裡，會在原地緩慢瓦解。環形排列的墳塚上裝飾著面具與武器，寂靜僅被風的絮語微微擾動。這一切顯得詭異莫測、陰森而動人。我感到無法解釋之物的重量、生命的重量、以及那個我是唯一見證者的世界的重量。我在此別無他事，除了繼續我的旅程。總有一天，我也會在這裡死去。就像那些守衛一樣。</p>\n<p>我順著那條路走下去。</p>\n<p>這條路已經有二十年沒有人使用了，某些路段儘管植被稀疏，卻蔓草叢生到幾乎消失，我必須爬上一座小丘才能辨認出那條裸露的土帶。它往西南方向延伸。我揣想著它是否會通往某個地方。如果這個世界上還有任何邏輯可言，那這應該合乎邏輯。在那輛巴士裡，有兩個座位始終空著：司機是去接另外三名警衛，其中一人得站著，還是正載著其他人駛向他們最終的歸宿？</p>",
  "<p>一連三天，我每天步行十小時，再次被不耐煩驅使著前進。我在同一個地方待了很久，物資即將耗盡時，看見了一間小屋。我走進去，心無波瀾，篤定會像往常一樣，只見到燈火通明、大門敞開、籠子鎖著。在冷藏室裡，我看見一塊相當小的羊肉，心裡慶幸，這塊肉很快就能解凍、煮熟。回到上層時，我才意識到自己甚至沒往籠子和它的 occupants 瞥上一眼。這讓我的心一沉，我答應自己，明天一定要去致意。</p>\n<p>那晚，我做了一個記得的夢。夢裡，我坐在巴士內，四周是活生生的警衛。因為面具的緣故，我看不清他們的臉，但能聽見他們彼此交談。實際上我從未聽過男人的聲音，但在夢中，我並未意識到這點。巴士正在行駛。我的處境感覺完全自然，沒有疑惑自己要去哪裡，或是在警衛之間做什麼。這一切似乎持續了很長一段時間，我完全放鬆，被男人們包圍著，突然間，我重新體驗到從前那種美妙的爆發——那些我獨自編織、不與人分享的故事。</p>",
  "<p>那喚醒了我。我獨自一人，裹著毯子，躺在平原中央，離小屋不過幾步之遙。想到曾有男人存在，而他們的親近能觸發那種美妙的顫慄，我便感到一股巨大的悲傷——可我呢，可憐的我！只能在夢中偶然邂逅這樣的感受。有好一會兒，我在想是什麼給了我活下去的決心。我想起那些在衰老之前，早早就被絕望殺死的女人們，想起蘿拉，她厭倦了將靈魂拴在肉體上的疲憊，於是我感到一種隱約的誘惑，一種咬嚙般的認輸念頭，這令我恐懼。我起身走了幾步。這是個清朗的夜晚，天空遼闊，山丘綿延，我有數千公里的路要走。我那瞬間低落的求知慾，又重新燃起。</p>",
  "<p>翌日，我再次走下階梯，坐在鐵籠外。這是少數幾座庇護所之一，裡頭的人至死都維持著尊嚴。沒有令人毛骨悚然的扭曲屍體堆疊，他們各自躺在自己的床墊上，彷彿睡著一般。或許其中一人對其他人有極大的影響力，說服他們吼叫與抵抗毫無用處，必須接受死亡，擁抱命運，無需做無謂的掙扎。一切井然有序，但是，除了四處遍布的屍體之外，當你一無所有時，又能製造什麼混亂呢？看著那些屍體，我感到某種平靜：他們安詳地死去，將以寧靜的姿態進入永恆。這讓我思索自己會如何死去——是否會在夜裡，於睡夢中離世，從此躺在平原上，永遠暴露在恆常的微風中；還是會生病，承受痛苦。我想起了槍，也想起了保險栓，告訴自己當初應該堅持下去，我一定能學會如何使用它，因為我終究可能會想要尋死。我本可以回到巴士上，但我極不情願走回頭路，前方還有如此多未知的領域等待探索。我年輕健康，還有很多時間來擔心這類預防措施。況且，我預期自己會有新的發現。那平原上不可能只有這些艙房！</p>\n<p>我裝滿其中一個大煮鍋的水，放在守衛的爐子上將衣物長時間煮沸。當它看起來乾淨後，我將它拿起，鋪在草地上讓陽光曬乾。這花了我一整天的時間。</p>",
  "<p>我又出發了。現在我有了書，可以學習閱讀了，卻遺憾沒有鉛筆或任何書寫工具，無法記錄我的路線。每晚入睡前，我會在地上練習書寫字母，抄寫書中的句子和詞彙。這些詞我大多在談話中使用過，所以認得它們，我思考如何組合那些書中沒有的詞。我嘗試拼寫的第一個詞是「小屋」：我從「罐頭」裡取了「罐」，從「堆肥箱」裡取了「箱」——只需將兩者結合，就成了「小屋」。接著我拼寫了「籠子」。神奇的字尾「e」讓字母「a」發出自己的名稱，不同於「小屋」中的短音「a」。我為自己領悟出這個規則感到十分得意，彷彿記住了過去所學的一切。</p>\n<p>有時候，我在這樣忙碌時，會不自覺地將試圖寫下的字句說出口，而聽見自己的聲音時，我總感到驚異——那聲音已變得沙啞粗糙。大概是因缺乏練習，我正逐漸忘記如何說話。這令我有些擔憂，但隨即又聳聳肩：就算徹底忘記怎麼說話，那又怎樣？反正我再也不會跟任何人交談了！</p>\n<p>即便如此，我仍感到一瞬間的懷舊。那場美妙的夢境再也沒有重現，而有時我敏銳地意識到自己是孤獨的，而且永遠都會是孤獨的，而我所能企及的唯一愉悅，便是那極為難得的、滿足的好奇心。</p>",
  "<p>我繼續從一處碉堡走向下一處。在這個萬物變化甚微的星球上，若說仍有季節之分，那麼冬季回來了。氣溫略為轉涼，夜間時常下雨。我裹著防水布睡覺，早上會晚些出發，因為得等它晾乾。我穿著長褲和夾克。在等待天氣好轉之際，若沒有在練習閱讀，我便用毛巾為自己做件裙子。大地變得更加翠綠，溪流也更深了。我迷失了道路。</p>\n<p>跟蹤變得越來越困難。起初，我告訴自己一定是搞錯了，把那條路和地形的自然起伏混淆了。儘管我很不情願，還是循著原路折返。我以為在山丘頂端重新找到了它，便仔細掃視周遭的鄉野。我來時的方向似乎才是對的，於是我沿原路回頭，希望之前只是因為一時分神才錯過它。我等候傍晚低斜的陽光，它會凸顯地景的輪廓，果然我看見一條細帶蜿蜒爬上對面的山丘。隔天黎明時分，我又找出了更多線索，但走了一個小時後，再也看不到任何明確的跡象。我決定搜索一個半徑五千步的巨大半圓形區域。一連三天，我來回走動，最後不得不承認：那條路就到此為止了。</p>",
  "<p>我心頭湧上劇烈的失望。我曾如此期盼它會引領我前往某處，卻忘了在這片荒蕪之中，一切都毫無道理可言。人們會修築一條突然消失的路嗎？會的，我告訴自己，是的，那些人確實這麼做了。我幾乎想頹然坐地痛哭，但幸好，憤怒比悲傷更為強烈，驅策著我繼續前行。我必須決定一個新的方向。起初我選擇了東方，然後那條路使我偏向了西南方，此刻我下定決心，要朝正南方前進。</p>",
  "<p>我的體力大不如前。那條公路和那輛公車，曾經帶給我那麼多希望，如今卻和其他一切事物一樣成了無解的謎團。有時我會對自己說，步行兩年後得到這樣的回報也未免太寒酸了。但漸漸地，我天生的韌性又回來了，當我從一個山頭走到另一個山頭時，我想到可以更聰明地規畫路線，而不是走一條直線。如果一直走直線，我只能探索一個非常狹窄的區域，或許會錯過左右兩側的東西。那次徒勞無功的半圓形路線給了我一個靈感：我可以走巨大的平行弧線，相距兩三個小時的路程，視我的體力狀況和地形的吸引力而定。當然，這比直線前進難計算得多——走直線時，我只需要選定地標然後朝著它們走去就行。我知道如果一直跟著太陽走，最後會繞成一個圓圈。我開始進行複雜的推算和實地實驗：我需要跟著太陽走一段時間，然後在正午時改變方向。那時我沒有辦法繪製地圖，但到了晚上，我會用石頭在地上畫出路線，長久地凝視著它，確保自己記住了。我開始思索，那些地下碉堡是隨機分布的，還是它們的位置遵循著某種計畫。在我們第一次探險時，走了二十六天才找到一個；但有時候我走不到一個星期就能重新補充物資。我走了好幾個半圓形，然後，當我確定自己能辨別方向後，我就沿著圓弧做大鋸齒狀的移動。幾個星期後，我發現這些碉堡是以五個為一組排列的：四個在長方形的四個角落，一個在中心。如果一直走直線，自然就會錯過一些。不久之後，我就能在抵達一個小屋時，推算出該往哪個方向才能找到下一個，並能按自己的意願前往或避開它們。 我從未刻意避開她們，無論是否需要食物，我都會下樓向死者致意。我從未見過任何一扇敞開的牢門。</p>",
  "<p>使警報在守衛將鑰匙插入鎖孔的瞬間響起的那個巧合，獨一無二。有時我驚嘆於自己的命運：我是那群女人中唯一的孩子，而我們是僥倖逃出生天的囚徒。不過短短幾年。</p>\n<p>對路線的這份新掌握驅散了我的憂鬱心情。畢竟，我已經有了一個發現，又何苦讓它令我沮喪呢？往後還會發現更多。</p>\n<p>我有了另一個發現。</p>\n<p>那一天接近尾聲。我已經累了，正在尋找一處適合停下來過夜的空地。連續幾個夜晚都在下雨，但那天傍晚天空萬里無雲，所以我可以指望天氣乾燥，這讓我鬆了一口氣——因為我一直無法生火，只能吃冷掉凝固的罐頭食物。換句話說，我需要一片茂密的樹叢，那裡能找到足夠的木材砍伐，而且盡可能少些荊棘。我仔細環顧四周，但帶著一個明確的目標，這讓我差點錯過那堆石頭。我幾乎要走過去了，卻突然有一種不尋常的感覺讓我停下腳步。我轉過身，看見那堆石頭在平原的單調景色中格外醒目。這裡從來不會有石堆！它有兩公尺寬，幾乎高到我的膝蓋。我從未遇見過這樣的事物——頂多見過幾塊大石頭彼此靠近，但我在此發現的東西不可能是自然形成的。我卸下背包，慢慢地把它放在地上，然後喘了口氣。</p>",
  "<p>我幾乎不敢動手搬動那些石頭。我必須振作起來。石頭相當大，一次只能搬起一塊。我意識到手掌很可能會擦傷，於是從毯子上撕下一條布裹住雙手，這讓動作慢了下來，但某種程度上，我反而覺得鬆了口氣。我極度害怕失望——害怕費盡力氣之後，最終只發現幾隻喜陰的蟲子。這堆石頭是人為堆疊的，這點毫無疑問。如果底下什麼也沒有，我就得問自己為什麼有人要堆起它，而我所得到的不過又是一個新的問題，這種毫無價值的「寶藏」已開始讓我厭倦。這個世界就像一幅拼圖，而我手中只有幾塊無法拼合的碎片。從前安西亞曾向我解釋過這個遊戲，聽起來我應該會喜歡才對。</p>\n<p>我專注地從石堆頂端均勻移開石塊，避免引發落石。這是件緩慢的工作，花了我一個多小時才清到最後一層石子——那些石子小得多，排成一個圓形。我拿起每晚用來整平地面的鏟子，開始小心翼翼地刮開泥土。我跪在地上，像過去的朝聖者一般，而且肯定也像他們一樣顫抖著。鏟子很快就碰觸到一片金屬表面。</p>",
  "<p>我整個人為之一振！一股強烈的顫慄穿過全身，我感到一陣暈眩。我靜立片刻，調整呼吸，既驚愕又幾乎感到害怕。我放下鏟子，重新包紮雙手，好清除最後的石塊。汗水從額頭滴落，我因不耐而微微發抖，但仍舊緩慢而有條理地繼續工作。不到三分鐘，一切清晰可見：在我面前是一個圓形金屬蓋，直徑約一公尺，旁邊有個略帶繡蝕、偏離中心的把手。我拿起螺絲起子，想鬆開它並把它掀起來。難道我必須抬起這個看似沉重的蓋子嗎？我困惑又近乎絕望，告訴自己恐怕沒有這個力氣，但還是試探性地拉了拉把手。我感覺到有什麼東西動了，又拉了一次，發現這個蓋子沿著水平軸轉動，十分僵硬，伴隨著刮擦聲，但所需的力量並沒有超出我的能力。它升了起來，周圍鑲著一圈鋼緣，我見到半公尺深處有個小平台，可以讓我站上去。我小心翼翼地爬下去，雙手扶著邊緣。一站穩腳，我就發覺自己踩在一條極窄、沒有燈光的螺旋階梯最上端。那時，我從未體驗過封閉空間裡深邃的黑暗，因為碉堡裡的燈從不熄滅，但女人們曾說起過開關。我沿著牆壁摸索。她們沒有精確描述過位置，但我猜想應該是在門邊的小物件。我開始摸黑下樓，走到第三階時，摸到一個光滑的小東西，上面有個按鈕。我按下去：一盞大燈就在我腳邊亮起。牆壁是灰色的，粗糙如碉堡裡的牆，但階梯從未像這樣是螺旋狀的，而且你也無法控制燈光。我繼續往下走，起初加快腳步，但我大概只走到第十階左右，就開始感到頭暈。 我停了下來，儘管心中焦急，仍強迫自己等上幾分鐘，直到暈眩過去。才重新邁步，暈眩又回來了。後來，我能上上下下地跑了，但初次登梯時，即使好奇心吞噬著我，也不得不停歇數次。那是八十級鏤空的金屬階梯。終於看見地板，材質與牆壁相同，粗糙質樸。最後一個轉彎，我抵達底部，走進一條六七步寬、十二步長的走廊，從地板到天花板，層層疊疊的架子上滿是罐頭、瓶罐和各式包裹，盡頭是一扇由前所未見、極其奇特的材料製成的門。門輕易推開，露出一個寬敞的方形房間，不像地堡那般灰暗陰沉。牆壁全鋪著色澤暗沉、泛著光澤的美麗木材，腳下觸感柔軟。我明白了，這是我有生以來第一次踏上地毯。房間各處的燈盞散發溫暖的光芒，在大桌子上聚成更亮的暈圈，還有寬大低矮的椅子，我一眼認出，那正是曾被稱為「扶手椅」的物件。我驚嘆得幾乎窒息。我從未見過如此美麗的事物，因為我從未見過任何出於人手的造物能如此美麗。我曾見過天空之美，雲朵變換的形狀，輕柔落下的雨；我見過緩慢移動的星辰，還有幾朵花，但此刻，我看到的是家具、牆上的畫作、花瓶、一座小雕刻——但我不該如此精確地描述這些東西，因為初次目睹時，我只見到線條、形狀與和諧色彩的相互交織，一種深不可測的構圖完全淹沒了我，淚水湧上眼眶，只因那份平靜與安寧的感覺，讓我想起從前，女人們的歌聲升騰於平原之上。 色彩彼此和諧交融，與房間的尺度與體積相互呼應。下墜的暈眩感仍未消退，我蹲下身，總覺得自己隨時會跌倒。過了幾分鐘，我心想閉上眼睛或許是明智之舉——暈眩不僅沒有減輕，反而愈發劇烈。我將頭枕在交疊的手臂上，深深吸氣，做起一件多年未做之事：開始數起自己的心跳。這項老習慣的召喚似乎讓我平靜了些。然而，整整一個多小時過去，我才能夠沉著地探索這片新的王國。我幾次試圖抬頭睜眼，卻總被洶湧的情緒淹沒，只能再次蜷縮成團，耐心等待這場風暴平息。</p>",
  "<p>我面對的是人類的過去，在一個為居住者享樂而設計的場所。這與地堡截然不同。我只認識監獄、滿足基本需求的工具、鞭子，以及我們為了能走动而必須堆疊起來的草蓆。但這處秘密的地下空間，是一個家。</p>\n<p>我從未改變這個房間的佈置；每次使用某件物品，我一定會放回完全相同的位置。桌子兩側各放著三張椅子，桌上有一盞搭配美麗赭色燈罩的檯燈，還有一只透明玻璃大盤。遠離桌子的地方，三張扶手椅圍著另一張較低的桌子，還有一張鋪著彩色床單的大床，床上隨意散落著幾個靠枕。當我能環顧四周時，看見右邊應該是廚房，有水槽、電爐，以及一個裝著鍋子和白色藍花瓷盤的櫥櫃。其中一個水龍頭供應熱水，另一個則是冷水。水槽左側有一扇與我見過的任何門都不同的門——一扇漆成白色的木門，通往一個小得多的房間，裡面有馬桶、洗手台和浴缸。</p>\n<p>當我檢查完所有東西後，我坐到一張椅子上，然後又換到扶手椅坐下。我開始笑了起來。足足過了兩個多小時，我的驚愕與激動才轉化為喜悅。</p>",
  "<p>有太多東西值得探索，將這一切盡收眼底是如此令人振奮，以至於我尚未注意到，牆上其中一件裝飾品其實是一個塞滿書籍的書架。我的頭又開始暈眩起來，我站在原地，凝視著房間對面的它們許久。我曾反覆閱讀那本園藝手冊，早已倒背如流。面對這份禮物，我能感覺到自己的雙眼逐漸睜大，為了平復這份震驚，我開始數算：總共有十九本書，其中八本非常厚重，約有三根手指寬。我走向它們：書脊上印著書名。起初，我太過敬畏，試圖從遠距離辨認那些文字，卻以為自己忘記了如何閱讀。我抬起手，取下一本——出乎意料地沉重——然後坐下，將它立放在邊緣。上面寫著：《太空學基礎論述》。我翻開書頁。紙頁上滿是文字和奇異的符號，其中我認出安西亞教過我的幾個標誌：加、減、乘、除與等號。我想是疲憊讓我明智地決定當晚不再繼續深入。之後，我才發現其他幾本是同一主題更深入的研究。我讀完了所有書，每一個字都沒放過。但我一無所獲。</p>",
  "<p>我真的更懂得莎士比亞的劇本、唐吉軻德的故事，或是杜斯妥也夫斯基小說裡的情節嗎？我認為沒有。它們全都在談論我從未經歷過的事。我想我對物品的理解還更好一些——我花了幾個小時才學會怎麼用開瓶器打開一瓶酒，但最起碼我辦到了。情感對我來說仍是個謎，或許是因為與之相關的感受對我而言太過陌生，又或許是因為它們就像身體接觸一樣令我排斥——而身體接觸在愛情中似乎如此重要。每當我想到安西亞的死，想到要將她抱在懷裡是多麼費力，眼淚便湧上眼眶。我試著想像自己是溫暖的：總有個時刻，皮鞭會啪地落下。那些女人過去告訴我的許多事仍讓我困惑：我知道曾經有過「錢」這種東西，萬物都必須用錢購買，而她總覺得從冷凍庫裡拿取物資卻無需付費很奇怪，但這些始終相當抽象，我也無法真正理解為什麼人們會像那可憐的老拉斯柯尼柯夫一樣為錢殺人。沒錯，我殺過人，但我是為了減輕同伴的痛苦而這麼做，而且我始終覺得她們是感激我的。但也許我不該如此確定：我對人類情感的無知如此巨大，她們或許在恨我而我卻渾然不覺。我也不明白為什麼穿二手衣物會令人感到屈辱——我幾乎從未穿過別的衣服！我喜愛蘿絲唱的歌，我想我會比欣賞文學更欣賞音樂。如果這個地方有錄音設備和播放器材，我還沒有找到它們。</p>",
  "<p>我意識到，從我在地面上感到疲倦、決定停下腳步的那一刻起，又注意到那堆石頭，已經過去了五個小時。我餓了。打開一罐罐頭，冷著吃了裡面的東西。我猜想電熱板應該和燈一樣運作無礙，但我已經受夠了驚嚇。我筋疲力盡，甚至不想試它們。我攤開毯子鋪在地毯上，暫時不打算睡床。經歷了這番情緒風暴後，本以為會睡上很久，但興奮感太過強烈，三個小時後，我猛然驚醒，又餓得發慌。我走進廚房，用一只漂亮的小鍋燒了些水。冷藏庫的門就在水槽右邊，我驚訝地發現，這間房間比地堡裡那間還要大，從地面到天花板塞滿了各式肉類，還有蔬菜和水果。每個袋子都仔細標了名稱：有我聽說過、但在地堡裡找不到的食物，像是雞肉、鹿肉和麂肉、蛋粉、番茄、巴西里、乳酪，還有數百種我後來才熟悉的美味。還有麵包，這尤其讓我開心。我決定好好慶祝一番，拿了一隻雞，灑上香草，配上番茄、馬鈴薯球，還有抹在奶油麵包上的草莓果醬。我把所有東西放進廚房解凍。後來，我學會使用一種能在幾秒鐘內加熱食物的烤箱，但當時，我必須等上好幾個小時。我忙得不可開交，時間飛快流逝。我放了一缸滾燙的熱水，生平第一次體驗到女人們如此懷念的奢華享受。後來，這變得司空見慣，只有遠征歸來時，我才會再度發現沉浸在那種讓人昏昏欲睡的滾燙熱水裡的魔力。還有肥皂條。當然，一切對我來說都是新的，需要長時間思索：肥皂條就讓我困惑不已。 我被它的氣味所震懾，這氣味對我而言是那樣陌生——我向來只識得青草、幾朵野花和雨後泥土的氣息。我嚐了一口，便皺起眉頭，這東西絕非食物。接著我記起女人們曾說過的話，便將它抹在手上，卻毫無用處，因為我當時並未領悟需要先將手沾濕。最終，我還是摸索出了門道，用肥皂洗了頭髮。待頭髮乾了，我驚訝地發現，它竟如此輕盈飄逸，溫柔地框住我的臉龐。</p>",
  "<p>我差點忘了！當然，其中最奇妙的發現之一，便是那面鏡子。我從未見過自己的模樣。安西婭曾說我長得好看，但那對我毫無意義，至今依然如此。即便如此，我仍為此著迷，花了數小時凝視著自己。我不認得自己的表情；我學會了微笑是什麼樣子，嚴肅或憂慮的神情又是何種模樣，我盯著它們想：「那就是我。」</p>\n<p>即使到了現在，我依然喜歡望著鏡子。這些年來，我追隨著皺紋在我額頭犁出的軌跡。雙頰日漸消瘦，嘴唇也變得蒼白，但那全是我自己，我對鏡中的倒影感到某種憐惜。我們逃出來時，我大概十四、五歲，而蘿拉在二十三年後死去。我又走了兩年才到達這裡，這個我稱之為家的地方：那時我剛過四十歲。那是二十二年前的事了。我想我是個老婦人了，但我仍深愛著凝視自己的臉龐。我不知道它美或醜，但這是我唯一能見到的人類面孔。我對它微笑，它便回以一個友善的笑容。</p>\n<p>我打開浴室的櫥櫃，找到一疊毛巾，除此之外別無他物。我猜想這些是為那些從未抵達的住客準備的行李。那裡沒有任何預先擺放的物品，這很可惜，因為那本可以讓我對他有更多了解。</p>",
  "<p>於是我返回廚房，沖了些白咖啡，按包裝上的說明將雞蛋粉加水調勻，準備做一份蛋餅。接著，我拉開床單，平生頭一次枕著枕頭入睡。我很喜歡那種感覺。</p>\n<p>隔天，我開始清點走廊裡的東西。那裡有各式各樣的工具，以及許多我始終沒能弄明白用途的物品。我猜想它們是電子裝置，有些可能已組裝完成，有些則是零件。女人們曾提起收音機、電視、電話、摩托車和汽車，而那些太空學書籍讓我懷疑，這會不會是未能派上用場的實驗器材。走廊裡沒有任何書面說明，除了廚房裡那臺解凍烤箱，多虧了它，我才學會如何使用。我在走廊裡那些器材旁徘徊了好一陣子，拿起又放下，因為我心裡很清楚，光靠決心是彌補不了我所欠缺的知識的。時至今日，我偶爾還是會去看看它們。話說回來，我發現那本園藝手冊時，其實也不太會認字，但我終究設法解讀了它。我算術不錯，加減很順手，但乘法和除法對我來說仍然吃力。安西亞說，這是因為我年紀很大了才學九九乘法表，那些東西得在很小的時候就記住，才能真正刻在腦海裡。除此之外，我一無所知，走廊裡的物品來自一個高度發達的科技文明，而我對它毫無概念。女人們教過我她們懂得的一切，但其實也不多——她們忘了許多東西，而且，她們也沒有工具可以實際示給我看。所以，我知道人們以前會編織，我們本可以用削直的細樹枝做織針，但我們沒有毛線。我偶爾會縫補東西——當我找到線的時候——但這種機會不多。屋子裡根本沒有線。隨著時間過去，我的褲子和襯衫都完全磨壞了，但後來我在一個地堡裡找到一塊不錯的布料，便又開始穿起束腰外衣。</p>",
  "<p>我在避難所裡找到最珍貴的東西是紙張。那裡有幾疊紙，還有一盒鉛筆。這讓我終於得以學習寫字。書籍成了我的老師，連那些關於太空航行的書也不例外。說實話，我並不理解其中的數學，但它們有許多冗長的解釋章節，我在其中研習表達的方式、拼字與文法。我花了大把時間研讀那些與文字相伴的費解圖表。我將它們臨摹下來，這教會了我精確的繪圖技巧，懂得保持比例正確，讓我能夠為自己的遠足繪製地圖。</p>",
  "<p>我決定將這座地堡作為我的基地。關於它的用途，我問了自己千百個問題。它沒有小屋作為標記，只有一堆容易被人忽略的石塊，我猜想這些石頭究竟是為了隱藏它，還是標記它。這裡儲存的補給品比我在監獄裡見過的都要多，足以讓我永遠住在這裡。對我而言，這是個奢華的地方，但顯然我對奢華並沒有清楚的概念。天花板上有著與其他地堡相同的空調通風柵，當我保持絕對安靜時，能聽見同樣輕柔的嗡鳴聲，表示一切都正常運作。床鋪很大，可以讓好幾個人睡在上面，桌子周圍也有足夠六個人坐的空間。廚房裡有四打玻璃杯和好幾種不同的盤子。一個人真的需要這麼多東西嗎？我真的很遺憾這裡沒有衣物，因為不僅找到一些會很有用，而且我也能從它們身上學到很多。那些書只教會了我怎麼寫字。這是一個領袖的住所，還是罪犯的藏身處？我實在太過無知，無法解讀那些對我來說可能極為明顯的事物——那些與我同住的婦女們至少見過這個世界，她們一定能明白。</p>",
  "<p>於是我放棄追問那些無謂的問題。我檢視每一樣東西，但對這住處缺席的主人，所知並不多過初來之時。如今我已不再想他。無論他曾有何等計畫，他終究失敗了，這片領地如今屬於我。不論是他或我，對此都無能為力。</p>\n<p>兩個月後，我再度啟程探索。我進行了超過五十次遠征，有時沿直線行走，有時繞著同心半圓前進。除了那些上鎖的監獄，我一無所獲。或許還有其他像我安家的那處地方，但我從未見過，即使我從不忘記仔細檢查地面，耐心尋找另一堆石塊。我對自己生活的這個世界一無所知。我朝各個方向來回穿梭，卻仍未發現它的邊界。</p>",
  "<p>最後一次出行時，我站在一座山丘頂上，眼前是一片綿長的下坡路，以及一片新的平原，遠處可以看見一間小屋。突然間，一陣沮喪將我淹沒。我對自己說，又是一段階梯、警衛室、鐵籠，以及四十具瘦骨嶙峋的屍體。我坐了下來，恍然大悟——我已經受夠了。在獨自度過的這二十年左右的光陰裡，希望曾一直支撐著我，而此刻，它卻棄我而去。我曾想像過無數次：有一座碉堡，那裡的鐵籠敞開著，囚徒們因喜悅而陶醉，得以逃脫。他們會找到天空、平原，會顫抖，會夢想城鎮和救援者，但最終，也將像我們一樣，發現這同一種空洞的自由。彷彿他們就站在我面前，看著我，要求一個解釋：這就是你能給我們的一切嗎？讓我們靜靜待著吧，我們寧可死去，也不願絕望。我低下頭，轉身回家。</p>",
  "<p>然而，我還是開始寫下這份記述：顯然，即使我已沒有力氣或意願再去探索，我那曾短暫消退的希望，其實並未真正熄滅。那個我沒進入的碉堡，或許就是那個——或者下一個，或者在我往東去時，西邊的某一個。誰知道呢，也許有一天，一位非常年邁的老先生或老太太會來到這裡，看見那掀開的蓋子，感到驚奇，懷抱希望，開始走下那道螺旋樓梯？那人會發現這疊堆在大木桌上的紙張，讀它們，終於有人能從另一個人那裡收到訊息。也許，就在此刻，當我筋疲力竭地度過餘生時，另一個像我一樣的人正穿越平原，背著背包從一個碉堡走到另一個碉堡，堅定地尋找著那些吞噬他們的成千上萬問題的答案。我知道我無法再等待太久，很快我就必須給自己施予同伴們時常請求的那一記致命打擊，因為痛苦正變得愈發無情。</p>",
  "<p>夜裡，我有時會上樓，坐在外面。我傾聽著。最近，我決心試著放聲大喊：「喂！有人在嗎？」我的聲音沙啞而微弱，但我依然仔細聆聽。我只聽見微風中草叢的輕柔沙沙聲。另一次，我收集了許多樹枝，生了一堆火，遠遠就能看見。我讓它燃燒了整夜，儘管我的理智告訴我那裡空無一人。但它也告訴我，這裡有這麼多 bunker，很可能，極有可能，還有另一個 bunker 在門打開時警報響過，為什麼他們全都死了呢？夜晚流逝，我想著我的生命，那個憤怒的女孩，對著年輕守衛嘲諷，為當下而憤怒——好像我有未來似的——或是輕快地爬上一百階樓梯，陷入幻覺之網，身處在無邊無際的荒涼平原中央，在幾乎總是灰色、或蒼白得彷彿垂死的天空下。但天空不會死，是我在死去，我早在 bunker 裡就已經在死去——而我告訴自己，我在這片不再有獄卒、也不再有囚犯的土地上獨自一人，不知道自己來這裡要做什麼，是寂靜的女主人，bunker 與屍體的所有者。我告訴自己，我已經走了幾千個小時，很快我將跨出最後十步，去把這些紙張放在桌上，然後回來躺上我的死床，一個瘦骨嶙峋的老婦人，她的雙眼——沒有人會為她闔上——永遠望向那扇門。我耗盡一生做了些連我自己也不清楚的事，但這些事並未讓我快樂。我僅剩幾滴鮮血，這是我唯一能獻給命運的祭酒，命運選擇了我。然後，我看見冬日蒼白的黎明破曉，我便下樓睡覺——如果疼痛肯給我片刻喘息的話——躺在那張能容納好幾個人的大床上。</p>",
  "<p>光總是存在。有時我期盼某個夜晚它會熄滅，會發生什麼事。那些女人總在追問光從何而來。我始終無法真正理解她們關於發電廠、電塔、導線的解釋，也從未見過任何與她們模糊描述相符的事物。我所見過的，只有曠野、小屋，以及我在此終老的庇護所。很久以前我便不再試圖想像那些未知的事物。我曾花費大量時間研究走廊書架上的物品，卻一無所獲。那些或許是武器，或是能讓我與人類聯繫的通訊工具。可惜了。我放棄反覆閱讀那些宇航學書冊與論著。在那些行走的歲月裡，發生的事如此稀少。我找到了那輛巴士，迷失了道路，最終來到這裡。無論如何，人終有一死。即便我曾如從前的女人們那般過著正常生活，依然會在最後一個黎明的曙光中醒來。有時女人們憐憫我，說至少她們體驗過真正的人生，而我對她們充滿妒忌；但她們終究死了，正如我即將死去——當你不再活著，活過的意義又何在？若非生了這場病，我想自己仍會再次啟程，繼續行走，因為除此之外，我別無他事可做。</p>",
  "<p>我知道，即使假裝不以為然，我仍是這個幾乎沒有季節的星球上唯一的活人。只有我能說時間存在，但它經過我時，我全然無感。我曾看著其他女人老去。我走到鏡前端詳自己：我猜從前臉頰和眼周沒有這些細紋，但我已記不起皺紋出現前的面容。那些女人曾解釋照片是什麼，但我沒有半張。我對時間的所知僅是晝夜更迭，會感到疲倦便入睡，會感到飢餓便進食。當然，我也會數算。每三十天我便對自己說一個月過去了，但這不過是空話，它們並未真正賦予我時間。或許獨自一人時，你永遠無法擁有時間？你只能透過目睹時間在他人身上流逝來獲得它，而既然所有女人都已死去，時間僅作用在石縫間生長的瘦弱植物上——它們偶爾開出恰好能結一粒種子的花朵，種子將落在不遠處——因為風從不強勁——然後可能發芽，也可能不。晝夜交替不過是物理現象，時間關乎為人之本質，而坦白說，我又怎能自視為人？我只認識過三十九個人，而且全是女人。我想時間想必與懷胎時長、孩童成長有關——這些我從未經歷之事。若有人對我說話，時間便存在：他們話語的開端與結束，我回應的時刻，他們的回覆。最簡短的對話也能創造時間。或許我試圖透過書寫這些頁面來創造時間。我開始寫，將文字填滿頁面，把它們堆疊起來，但因為無人閱讀，我仍不存在。我為某個未知的讀者書寫，而這位讀者恐怕永遠不會出現——我甚至不確定人性是否在那個左右我一生的神秘事件之後存活了下來。 但若真有那麼一天，那人來了，他們會讀這些文字，我便會存在於他們的腦海中。他們身上將承載我的思緒。如此這般，讀者與我交融，構成某種活生生的存在——那不會是我，因為我早已死去；也不會是閱讀前的他們，因為我的故事，注入他們的意識後，將成為他們思維的一部分。唯有當永遠無人前來，當數個世紀、數個千年如此漫長地流逝，以至於這顆我確信已非地球的星球不復存在時，我才算是真正死去。只要這疊覆滿我字跡的紙張仍靜躺於此桌上，我便能在某人的意識中化為真實。而後，一切都將湮滅，眾星熄滅，我將如宇宙般消散。</p>",
  "<p>最可能的情況是，不會有人來了。我會讓門敞開，將我的故事留在桌上，任它慢慢積塵。總有一天，摧毀行星的自然災變會抹去這片平原，避難所將坍塌在那疊整齊的手稿之上，紙頁散落於瓦礫之間，永遠不會被閱讀。</p>\n<p>三個月前，我發現自己病了。我坐在馬桶上排便時，感受到一種全新的感覺：溫熱的液體沿著陰道流淌而下——那個身體部位向來寂靜無聲，我從未想過它的存在。我傾身望向便盆，看見一大塊裹著淡黃色絲狀物的黑色血塊。還沒來得及驚慌，一股鮮血便泉湧而出，劇痛襲來，我失去了意識。醒來時，我躺在地板上，疼痛已消失無蹤。我沒費太多力氣便起身站好，或許是因為失血，感到些許暈眩，但那感覺很快就過去了。我清洗自己，然後清理了染血的地板，想起安西亞教過我的事，便烤了一塊紅肉來補充流失的養分。</p>",
  "<p>女人們曾談論過更年期，但我想那不會影響到我，因為我從未經歷青春期。不過，沒有理由假設我沒有子宮或卵巢，即使它們發育不正常。我感到困惑，然後告訴自己沒必要擔心，試圖忘記這件事。我不擅長這種心理活動，就算我擅長，也不會持久。第二天同樣的事情又發生了。我的症狀和瑪麗-珍相似，根據安西雅的說法，她得了性器官癌症，無法忍受疼痛時就吊在鐵欄上自殺。沒有其他選擇，我也不會得到不同的治療。安西雅告訴過我，他們會動手術、使用嗎啡。或許走廊裡有藥物，但我無法辨認，也從未見過類似警衛在有人發燒時偶爾拿出的那種白色藥丸的瓶子。</p>\n<p>疼痛從一開始就令人難以忍受，而且變得愈發頻繁。我大半時間都在受苦，這奪走了生命中所有的喜悅，也讓我無法享受片刻的喘息，因為我已經太過虛弱。我再也無法一口氣爬上樓梯，抵達頂端時，身體冰涼。步行一刻鐘後，我就得停下來休息。大概是我近來吃得不多也無濟於事，但如果勉強自己，又會感到噁心。我正走向生命的盡頭。</p>",
  "<p>我獨自一人。即便有時夢見訪客到來，我已在平原上來回走得太久，深知那不可能成真。沒有人會來，因為只剩下屍體。哈姆雷特王子的父親若已死去，又怎能顯現並與他交談？死者無法移動，只能在原地腐朽，最終化為一碰即碎的枯骨。我見過數百具屍體，沒有一具曾在深夜前來與我交談。若真能如此，我該會多麼快樂！安西亞曾嘗試向我解釋，基督徒所謂的上帝與靈魂是何意。顯然，人們對此深信不疑，甚至在某一本太空學書籍的前言中也有提及。有時，我會在晴朗的夜晚坐在星空下，仰望星辰，用我沙啞的嗓音說道：「主啊，若您在天上的某處，又不太忙碌的話，請現身與我說幾句話吧，因為我極為孤獨，這會讓我無比歡喜。」但什麼也沒發生。因此我推想，人類——而我不確定自己是否屬於人類——確實擁有極為鮮活的想像力。</p>",
  "<p>我不算太老：若我從地堡離開時大概是十五歲，如今也不過六十出頭。那些女人曾說，在另一個世界，人類平均壽命超過七十歲，但那需要醫療照護。若在那裡，我會有月經、有孩子，而我這無用的子宮也不會腐爛。如今我常出血，子宮正逐漸崩解，我早已認清不會有奇蹟，它不會化為虛無，我亦不會恢復健康。近來我開始咳嗽，胸口隱隱作痛——安西婭曾告訴我這是癌細胞轉移的徵兆。無論如何，該親手終結的時候也快到了，但我不打算等到那時，我會再過些時日便動手，因為我的故事已近尾聲，待最後一個句點落下，便再沒有什麼能絆住我了。</p>",
  "<p>一發現自己病了，我便開始思考自殺的方法。我不想吊死自己，讓乾癟的屍體永遠懸在繩索末端晃蕩。我想要有尊嚴地躺著，就像那個坐在折疊床墊之間的男人；我想要直視前方，但如果疼痛太過劇烈，我可能會做出什麼不體面的事。我既沒有足夠的時間，也剩餘不了多少力氣去那輛巴士上，把我放在墳墓上的槍取回來，於是我花了很長時間磨利一把刀。若用指尖輕拂刀鋒，便會割傷自己。刀刃薄而平，卻相當堅固。我知道該刺向何處——讓它筆直插入兩根肋骨之間，穿透我的心臟，令其停止跳動。當疼痛暫時放過我時，我幾乎不敢相信自己會真的這麼做；但當痛苦肆虐時，所有猶豫都煙消雲散。</p>\n<p>我會坐在床上，將枕頭和毯子整齊地堆疊在身邊，好讓身體穩穩地倚靠著。一切都會保持得完美潔淨。我希望不會流血，我知道這是可能的。也許永遠不會有人來，也許有一天，某個驚愕的人類，像我許久前那樣來到階梯腳下，會看見那間暗色木板的房間、整理妥當的床鋪，以及一位年邁的女人筆直坐著，心口插著一把刀，神情安詳。</p>\n<p>我得了一種子宮疾病，正在因此死去，這真是奇怪——我從未有過月經，也從未識得任何男人。</p>",
];

const DURATION = 320;
let cur = 0;
let busy = false;

const stage    = document.getElementById('stage');
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const pgInfo   = document.getElementById('pg-info');
const barFill  = document.getElementById('bar-fill');

let layers = [
  document.getElementById('pg-a'),
  document.getElementById('pg-b'),
];
let activeIdx = 0;

function active()   { return layers[activeIdx]; }
function inactive() { return layers[1 - activeIdx]; }

function renderLayer(el, idx) {
  el.innerHTML = PAGES[idx];
  el.scrollTop = 0;
}

function updateUI() {
  const n = PAGES.length;
  pgInfo.textContent = (cur + 1) + ' / ' + n;
  barFill.style.width = ((cur / (n - 1)) * 100).toFixed(1) + '%';
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === n - 1;
}

function go(dir) {
  if (busy) return;
  const next = cur + dir;
  if (next < 0 || next >= PAGES.length) return;

  busy = true;

  const outClass = dir > 0 ? 'anim-out-l' : 'anim-out-r';
  const inClass  = dir > 0 ? 'anim-in-r'  : 'anim-in-l';

  const inLayer  = inactive();
  renderLayer(inLayer, next);

  inLayer.style.zIndex = '0';
  active().style.zIndex = '1';
  active().classList.add(outClass);

  requestAnimationFrame(() => {
    inLayer.classList.add(inClass);
    inLayer.style.display = '';
  });

  setTimeout(() => {
    active().classList.remove(outClass);
    active().style.display = 'none';
    inLayer.classList.remove(inClass);
    inLayer.style.zIndex = '1';
    activeIdx = 1 - activeIdx;
    cur = next;
    updateUI();
    busy = false;
  }, DURATION);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

// Touch / swipe — horizontal drag threshold 48px
let tx0 = null, ty0 = null;
stage.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

stage.addEventListener('touchmove', e => {
  if (tx0 === null) return;
  const dx = Math.abs(e.touches[0].clientX - tx0);
  const dy = Math.abs(e.touches[0].clientY - ty0);
  // If clearly horizontal, prevent default scroll
  if (dx > dy && dx > 10) e.preventDefault();
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = Math.abs(e.changedTouches[0].clientY - ty0);
  // Only trigger if horizontal movement dominates and meets threshold
  if (Math.abs(dx) > 48 && Math.abs(dx) > dy) go(dx < 0 ? 1 : -1);
  tx0 = null; ty0 = null;
}, { passive: true });

// Mouse wheel / trackpad scroll
let wheelCooldown = false;
document.addEventListener('wheel', e => {
  e.preventDefault();
  if (busy || wheelCooldown) return;
  go(e.deltaY >= 0 ? 1 : -1);
  wheelCooldown = true;
  setTimeout(() => { wheelCooldown = false; }, DURATION + 100);
}, { passive: false });

// Buttons
btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

// Init
renderLayer(active(), 0);
inactive().style.display = 'none';
updateUI();

</script>
