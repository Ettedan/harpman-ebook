<script>
const PAGES = [
  "<div class=\"cover\">\n<h1>未曾識得男人的我</h1>\n<p class=\"author\">賈桂琳・哈普曼</p>\n<p class=\"meta\">出自法文原著，由蘿絲·舒瓦茲英譯</p>\n<p class=\"meta\">索菲·麥金托什作序</p>\n</div>",
  "<h2>引言</h2>\n<p>有時候，我們會讀到一本如此獨特、如此與眾不同，卻又如此鏗鏘真實的書，以至於不禁納悶，它為何未能獲得更多讀者的青睞。賈桂琳・哈普曼的《未曾識得男人的我》深受一小群熱情讀者喜愛，卻始終未進入主流視野。或許這並不令人意外，因為它拒絕被歸入任何整齊的類型框架。它既是一部關於異質世界的寓言，也是一篇哲學論述；即使在一個全然陌生、令人迷失的境地中，它仍將角色的人性置於核心，毫不動搖地放在最顯眼的位置。文筆如清涼的流水，意象孤寂、怪誕，有時駭人，卻永遠令人無法移開目光。</p>\n<p>近年來，女性作家創作的科幻與思辨小說蓬勃發展，但《未曾識得男人的我》卻令人毛骨悚然地充滿先見之明，宛如一本來自百年前或百年後的書。將以女性為中心的科幻作品混為一談，可能過於簡化；女性的困境終究是身處父權社會中每個人都會面臨的問題。事實上，在這本小說中，女性特質既處於核心地位，卻又近乎無關緊要。沒錯，死者之中是有男人，但若男人以守衛與囚犯屍體以外的身分登場，整部小說的面貌將會截然不同。</p>",
  "<p>敘述者正處於這種二元性的核心，從一個奇特的中立空間中向我們呈現她的記憶與理論。她不像小說中的其他女人，那些人擁有外部世界的記憶，了解關係、性、愛與家庭。她的身體從未發展出生殖的標記，又因自幼在地下碉堡長大，她處於一個獨特的位置——成為一個不具備任何「人」的標誌的人。她是個被剝離文化、社會建構與知識而養育的人，一個純粹的實驗，提出這樣的問題：當一個人被剝到核心、在隔離中長大，她會變成什麼？在這種境況下，一個女人又會是什麼樣子？這本小說的力量與美感在此：她依然是一個角色，而不只是一個設定；她具體成形、令人同情，且懷抱著好奇與勇氣。</p>",
  "<p>這部小說中，沒有任何剝削、為苦難而苦難，或是不必要的殘酷。整部作品在優雅的哲學思考與人類的溫柔之舉間取得了絕妙的平衡，堪稱不凡成就。一切都被精簡至核心，每個元素皆有深意。哈普曼既展現了人類所能施加於同類的極致惡意，也描繪了愛與團結所能帶來的至善境界。這是一部『噩夢的精微紀錄』（埃克托·比安喬蒂，《世界報》），卻同時也是那些構成我們存在的渺小、看似微不足道的片段所織就的勝利。「這一切是那麼平凡，跟所有人都一模一樣！」其中一名女子談及自己的過往人生時如此驚呼；而敘事者則回應道：「彷彿她不明白，對我而言，沒有任何事物是平凡的，因為我的人生中從未發生過任何事。」</p>\n<p>書中似乎在說：沒有任何生命是平庸的。沒有任何生命是毫無希望、毫無光明的，即使在最難以想像的時刻也是如此。</p>",
  "<p>《未曾識得男人的我》情節十分單純。四十名女子被囚禁在一處看似地下碉堡的地方，她們已在此地度過多年，由男性守衛管控。現代生活的基本物資——電力、食物、水——她們都得以享用。如此過了許多年，直到某日警報聲驟然響起。這群女子僥倖逃脫，踏入一個神祕的世界，在一連串駭人的發現中，她們逐漸意識到：自己或許是這顆陌生星球上最後的人類。</p>\n<p>儘管如此，這部小說仍選擇以生命作為開端——聚焦於敘事者的成長歷程，透過她對最年輕男警衛的迷戀呈現出來。敘事者坦率地描述自己日漸萌發的性意識，同時又與之保持疏離。相較於那些終其一生從事服務業工作、養育家庭的其他女人，她在許多方面都像個異類，如同她所居住的那顆星球一般。她毫無頭緒「正常」的人類生活該是什麼模樣，而其他女人對此也感到不安。</p>",
  "<p>但或許，女性特質本身才是那奇異的事物。從遠景來看，敘事者對警衛的性吸引力喚起了當代關於順從與幻想的迴響。還有什麼比渴望與慾望更為人性：當你身體的運作機制啟動時？（而在這般距離下觀看，我們被迫承認慾望是多麼奇異的東西。）敘事者以客觀的方式觀察人類行為與身體，既帶著好奇，又帶有去人性化的色彩；她的視角既強調了她與自身身體的疏離，也凸顯了擁有一個身體——尤其是未曾被教導如何擁有、被他人控制的身體——那種本質上的奇異。她或許沒有學過舞蹈與婚姻的種種社會行為，但即使是在囚禁中長大的人，也會學會渴望，渴望看見牢籠之外的景象。</p>\n<p>我們的人性有多少是天生的？當一切都被剝奪殆盡之後，又還剩下多少？</p>",
  "<p>這個故事及其所發生的世界，被精簡到令人沮喪的程度。它帶有達利式的超現實主義；其景觀既有貝克特的影子，也汲取布雷德伯里的神韻。被解放的女人們行走其中的世界一片荒涼，不時點綴著樹木、河流，以及那些與她們逃離的如出一轍的噩夢般碉堡。我們無從得知是誰將她們囚禁、為何囚禁、她們是否甚至還漫步在地球上。稀疏的線索更讓情況撲朔迷離：不變的季節、一輛載滿死亡守衛的巴士、籠中的俘虜、地底下的豪華碉堡。什麼都沒有解釋，但什麼也無須解釋。這部小說的魅力與力量，正在於其曖昧性，在於那些得以盡情展現、並證明其必須證明的假設。它本該是徹底的絕望，因為絕望的所有要素都已具備；然而，在其核心，卻有一種閃耀的、探尋的人性，支撐著一切。</p>",
  "<p>隨著敘事者發現自我意識與自主性，年長的女人們也緊抓著她們的自我不放：她們談論自己的過去，抱怨必須在眾人面前使用廁所，在烹調少量肉、水與馬鈴薯時討論食譜。她們意識到敘事者存在於一個與她們不同的世界，她以她們無法做到的方式屬於這個世界，是一位連結舊秩序與新秩序的橋樑人物。後來，令人心碎又充滿憐憫地，正是這種差異讓敘事者得以對年長的女人們做出致命的愛之行為。在這個世界裡，死亡有其自身的尊嚴，一種不斷被強調為人性的尊嚴。他們發現的其他被囚禁的人類都死得極為悽慘，但敘事者欽佩那些平靜死去、直面恐懼、毫不畏懼的人。害怕死亡、害怕難以想像的痛苦，這是人性；而超越它，則是另一種人性。</p>",
  "<p>這種對待死亡與苦難的方式，讓人難以在分析這樣一部小說時，不去正視作者是猶太人這個事實——二戰期間她曾隨家人逃往卡薩布蘭卡。在她們無端殘酷的囚禁中、神祕獄卒不斷揮響的鞭子聲裡、以及她們一次又一次發現地球上所有與她們同樣被囚禁的人都已死去時那股令人作嘔的無可避免，都隱約迴盪著集中營的影子。而這一切是為了什麼？一個開端模糊的「行動」——女人們隱約提及的「混亂」、警報聲、火光、被人從家中帶走——然後只剩下無止盡、毫無意義的囚禁。</p>\n<p>四十個女人關在一個鐵籠裡；一台裝滿食物的冰櫃，溫度低得足以讓食物永遠保鮮；從不間斷的電力和水源。這種監禁、殘酷與絕望的處境，並非史無前例——如果我們以為這些殘忍行徑只存在於虛構的外星星球上，那只是在自欺欺人。</p>",
  "<p>但貫穿整部小說的，既有恐懼，也有愛。那種安靜的、近乎烏托邦的境地——考慮到她們身處的奇異世界與全然隔絕，這已是她們所能創造的最佳狀態——令人聯想起夏綠蒂·柏金斯·吉爾曼筆下被顛覆的《女兒國》。她們所創造的是一個平和的世界，一個不再追尋、開始建造房屋、過著規律生活、結成對偶的世界。儘管面臨重重困境，她們仍為自己打造出最有可能實現的烏托邦，並以這樣的方式度過一生，即使多年來承受著難以想像的創傷。雖然她們對男性的缺席感到些許悵惘（尤其是一開始），但沒有他們，她們也過得很好。小說中唯一被詳細描寫的男人，是那位最年輕的獄警，而且僅止於敘述者對他的身體反應。</p>",
  "<p>儘管這烏托邦毫無被發現的希望，也無法讓他們更了解自身處境，但這仍是一個角色們得以度過餘生的世界。女人們仍能在相伴中找到某種美感，適應新的存在方式，棲居於一個空無所知的環境中，卻仍被憐憫支撐著。但這並非必然頌揚此種存在。小說或許以其獨特方式，狡黠地展現了沒有男人的世界可能擁有的自然寧靜，卻也暗示這種安頓正是女人們的墮落——她們不再繼續追尋。若她們的隊伍中有男性，她們會不會探索得更遠、抗爭得更激烈？即使耗費數十年光陰，她們是否終能在遙遠地平線之外找到答案？</p>\n<p>我深愛這本書；我愛它那不為所動的平靜，也愛它不願洩露祕密的姿態。這是一道無法解開的謎題，本就不該被解開，因為正是在與之搏鬥的過程中，我們才為自己發現了其中的意義。每一次讀這本小說，都像稜鏡般折射出不同光芒，引發我對殘酷、人性與資本主義的省思。閱讀它並非被動的體驗，而是一場挑釁、一場激怒、一場撼動。</p>",
  "<p>如果一本充滿真實的書中存在某個核心訊息，那麼以下這段話便是絕佳的擷取之處：「我被迫太晚——真的太晚——才承認自己也曾愛過，承認自己有能力承受痛苦，終究是個凡人」，我們的敘事者在生命即將終結之際，於小說開頭如此沉思。隨後不久，她又說道：「畢竟，若我真是個人類，我的故事便與李爾王，或威廉·莎士比亞費心詳述的哈姆雷特王子同樣重要。」在廣袤而神秘的世界中，獨自存活的生命何其渺小，這是個令人卻步的概念。但最好的科幻作品，不正是讓我們重新思索這個世界，以及我們是誰嗎？倘若敘事者已盡其所能活過一生——儘管極度不合常規，卻在諸多方面為她帶來了喜悅——那麼，她豈非終究戰勝了殘酷？戰勝了被剝奪一切的命運？她的尊嚴與本質人性，最終豈非獲勝？</p>",
  "<div class=\"divider-page\"><span class=\"dot\">·</span></div>",
  "<p>近來我幾乎足不出戶，多半時間都窩在扶手椅裡，重讀那些書籍。直到最近，我才開始對序言產生興趣。作者們不吝於談論自己，解釋他們撰寫此書的理由。這令我訝異：在他們的世界裡，傳遞所學的知識難道比我所處的世界更為尋常嗎？他們似乎經常需要強調，寫書並非出於虛榮，而是應人之請，並且在答應前深思熟慮了許久。多麼奇怪啊！這暗示人們並非渴望學習，而你想傳授知識時竟得道歉。或者，他們解釋為何覺得該推出普魯斯特的新譯本——因為先前的努力，縱使值得讚揚，卻總缺少了某樣東西。但既然學習不同語言如此容易，能直接閱讀任何想讀的書，又何必翻譯呢？這些事讓我完全摸不著頭緒。確實，我極其無知：顯然，我對這些事情的了解比我自以為的還要少。作者們對教導他們的人、為他們打開知識之門的人表達感謝，而因為我完全不明白他們在說什麼，讀這些文字時通常帶著幾分漠然。但突然間，昨天，我的眼眶盈滿淚水；我想起了安西亞，一股巨大的悲傷將我淹沒。我能看見她，坐在床墊邊緣，膝蓋斜靠一側，用她那不時斷裂的臨時編織髮線耐心縫補，停下動作望著我，滿臉驚訝，迅速察覺我的無知，便教導她所知的一切，還為自己所知甚少而道歉。我感到一陣劇痛，開始放聲哭泣。我從未哭過。 我心頭一陣劇痛，猶如腹中癌腫般猛烈。我已不再說話，因為無人聽得見我，卻開始呼喚她。安西亞！安西亞！我大聲喊道。我無法原諒她不在這裡，無法原諒她讓死亡攫走她，將她從我笨拙的懷抱中扯離。我責怪自己沒有緊緊抓住她，沒有明白她再也撐不下去了。我告訴自己，我遺棄了她，因為我從小便冷若冰霜，至死都將如此，所以無法給她溫暖的擁抱；我的心冰冷麻木，渾然不覺，我竟未曾意識到自己早已絕望。</p>",
  "<p>我從未如此徹底地被擊潰。我曾發誓這樣的事絕不會發生在我身上；我曾見過女人顫抖、哭泣、尖叫，但她們的悲劇從未動搖過我，我只是個旁觀者，旁觀那些我無法理解的衝動，即便在她們要求我協助時，我也默不作聲地照做。誠然，我們都被困在同一場如此強大、如此涵蓋一切的戲劇中，以至於我對任何與此無關的事物都毫無知覺，但我已逐漸認為自己與眾不同。如今，我卻在哭泣中顫慄，被迫太遲、太遲地承認——我也曾愛過，我也有承受痛苦的能力，終究，我也只是個凡人。</p>\n<p>我感覺這份痛苦永無止息之日，它將我永遠緊握在掌中，使我無法投身於任何其他事物，而我竟任憑它如此。我想這便是人們所謂的「被悔恨吞噬」。我將再也無法起身、思考，甚至無力為自己烹煮食物，任由自己緩慢凋零。當肉體的痛楚驟然襲來時，我正從想像自己屈服於絕望的畫面中，汲取一種病態的快感。那痛楚來得如此突然、如此劇烈，竟將我從精神的苦痛中拉了出來。我發現這兩者之間如此突兀的轉換竟有些荒謬，於是我——這個向來不會發笑的人——蜷縮在劇痛之中，笑了出來。</p>",
  "<p>疼痛消退後，我思索著自己是否曾經笑過。女人們時常發笑，我想我偶爾也會加入，但我不太確定。那一刻我意識到，自己從不回想過去。我活在永恆的當下，逐漸遺忘自己的故事。起初我聳聳肩，告訴自己這算不上什麼損失——畢竟我的人生並無大事發生——但很快，這個念頭便令我震驚。歸根結底，如果我是個人類，我的故事就該與威廉·莎士比亞費心詳述的李爾王或哈姆雷特王子的故事同樣重要。我幾乎在無意識間做了決定：我也要這樣做。這些年來，我學會了流暢閱讀；書寫要困難得多，但我從不畏懼阻礙。我確實有紙筆，雖然時間可能所剩無幾。如今我不再外出探險，沒有任何任務召喚我，於是我決定立刻開始。我走進冷藏室，取出稍後要吃的肉，讓它解凍——這樣等飢餓襲來時，食物很快就能入口。然後我在大桌前坐下，開始書寫。</p>",
  "<p>當我寫下這些文字時，我的故事已然完結。周圍的一切井然有序，我也完成了為自己設下的最後一項任務。這只花了我一個月的時間，或許是我生命中最快樂的一個月。我不明白這件事：畢竟，我所描述的無非是我那奇異的存有，它並未帶給我多少喜悅。難道在回憶的努力中，存在著一種自給自足的滿足感，而人們所回憶的內容，反倒不如回憶這個行為本身重要？這又是一個將永無解答的問題：我感到自己彷彿由虛無所構成，別無其他。</p>\n<p>從我所能回憶的最遠之時起，我便已身處地堡之中。這就是人們所謂的記憶嗎？在少數幾次女人們願意向我訴說她們過往的時刻，她們的故事充滿了事件、來去、男人……但我所能稱為記憶的，不過是感受自身存在於同一個地方、與同樣的人、做著同樣的事——換句話說，吃、排泄、睡覺。很長一段時間裡，日子一天天過去，每一天都與前一天一模一樣，然後我開始思考，一切便改變了。在此之前，除了這些千篇一律的重複動作之外，什麼都沒發生，時間彷彿靜止不動，即使我隱約察覺自己正在成長、時間正在流逝。我的記憶始於我的憤怒。</p>",
  "<p>很顯然，我無從得知自己當年年紀多大。其他人早已成年許久，而我卻仍像個青春期的孩子。但我的發育就此停滯：腋下和陰部開始長出體毛，乳房微微隆起，然後一切便戛然而止。我從未有過月經。女人們告訴我，說我運氣很好，不必承受流血的麻煩，也無需費心保持床墊潔淨。她們說我可以省下洗抹布的功夫——她們只能將布條硬塞在雙腿之間，靠大腿肌肉夾緊固定，沒有其他辦法——也不必像許多青少女那樣忍受經期腹痛。但我從不相信她們的話：幾乎所有女人都來月經，當別人都擁有的東西你卻沒有，又怎會覺得這是種優待？我總覺得她們在欺騙我。</p>",
  "<p>那時候，我對事物並不感到好奇，也沒想過要去問月經有什麼意義。或許我生性安靜，總之，我少數提出的問題所得到的回應，並不算鼓舞人心。多數時候，那些女人會嘆口氣別過頭，說著：「就算告訴你，知道了又有什麼用？」這讓我覺得自己在打擾或惹惱她們。我一無所知，也就不再追問。直到很久以後，安西雅才向我解釋了月經的事。她告訴我，那些女人都沒有受過什麼教育——她們是工廠女工、打字員或店員，這些詞對我來說從來沒有太多意義——而且她們知道的也不比我多多少。即便如此，當我終於明白時，我還是覺得她們並沒有真正付出努力來教導我。我氣壞了。安西雅說我並非完全沒有道理，並試圖解釋她們的理由。如果我想得起來，或許之後會再提到這件事，但在我此刻想寫的那段時期，我當時怒火中燒。我覺得自己被輕視了，好像我連少數幾個問題的答案都無法理解，於是我決定不再對這些女人抱持任何興趣。</p>",
  "<p>我始終帶著怒氣，但我並未察覺，因為我根本不曉得該用什麼詞彙來描述情緒。女人們忙碌著，在微不足道的日常瑣事中打轉，卻從未邀請我參與其中。我會蹲下來，觀察任何值得一看的事物。回想起來，那幾乎什麼都沒有。她們坐著聊天，或是一天兩次準備餐食。漸漸地，我將注意力轉向那些在我們牢籠外不斷來回踱步的守衛。他們總是三人一組，相隔幾步之遙，監視著我們，而我們通常假裝無視他們的存在，但我卻開始感到好奇。我注意到其中一位與眾不同：更高、更瘦，過了一陣子後我發現，也更年輕。這讓我著迷。在情緒比較愉悅的時候，女人們會談論男人與愛情。當我追問有什麼好笑的，她們會咯咯笑著捉弄我。我反芻著我所知道的一切：親吻，那是發生在嘴唇上的；擁抱；對某人拋媚眼；玩腳——我完全不懂那是什麼意思；然後就是極樂天堂——我的天！鑑於我從未見過任何天空，更不知道第一層天堂或中間那些層次是什麼，我便不再深究。她們也會抱怨男人的粗暴。那很痛，男人不在乎女人，他們讓女人懷孕後就一走了之，還說：「我怎麼知道那是我的種？」有時候女人們會宣稱這沒什麼大不了的，有時候她們又會開始哭泣。但我注定要終身為處女。某天，我鼓起勇氣壓下怒氣，去問桃樂絲，她是兩位老太太中最不嚇人的一位。</p>",
  "<p>「妳這可憐的孩子啊！」</p>\n<p>幾聲嘆息之後，她還是說出了那套千篇一律的回答：</p>\n<p>「既然這事不可能發生在你身上，你知道又有什麼用呢？」</p>\n<p>「因為我想要知道！」我怒不可遏，突然間明白了這一切對我來說為何如此重要。</p>\n<p>她無法理解為何有人會想獲取無用的知識，而我也無法從她口中套出任何訊息。我註定在未經人事的狀態下死去，至少我想滿足自己的好奇心。為什麼她們全都如此堅決保持沉默？我試著安慰自己，這反正也不是什麼秘密，畢竟她們全都知曉。難道是為了增添額外的光采，她們才拒絕告訴我，好讓這件事綻放稀有寶石般的光澤？藉由保持沉默，她們塑造出一個無知的女孩，將她們視為珍寶的守護者。她們讓我蒙在鼓裡，是否只是為了假裝自己並非全然無能為力？她們有時聲稱這是出於羞怯，但我看得一清二楚，彼此之間她們根本毫無羞怯可言。她們竊竊私語、咯咯發笑，滿是猥褻。我永遠不會做愛，她們也永遠不會再做愛了：或許這讓我們變得平等，而她們正試圖藉由剝奪我唯一能掌控的事物來安慰自己。</p>",
  "<p>常在夜色降臨、入睡之前，我會想起那位年輕的守衛。我憑藉著所能揣測到的蛛絲馬跡想像：在另一種人生裡，他會走來坐到我身旁，邀我共舞，告訴我他的名字。我會有個名字，我會告訴他，我們會交談。而後，若我們彼此吸引，便會牽手漫步。或許我其實不會覺得他有趣——畢竟是六個獄吏中唯一不老邁孱弱的人，而我大概是太過寬容，因為從未見過其他年輕男子。我試圖想像我們的對話，在那個我從未經歷的過去：明天天氣還會好嗎？你見過鄰居的小貓嗎？聽說你阿姨要去度假……可我從未見過小貓，也完全不知晴朗天氣為何物，思緒便戛然而止。接著我會想起親吻，極盡所能地描摹守衛的唇形。那雙唇頗寬，輪廓分明且偏薄——我不喜歡某些女人那種豐厚的嘴唇。我幻想自己的唇逐漸湊近：大概還有什麼是我該知道的，因為我並無特別感受。</p>",
  "<p>然而，某個傍晚，正當我因徒勞想像一個永遠不會發生的親吻而陷入沉悶睡意時，忽然記起女人們曾提及審訊一事，說她們訝異於從未有過任何審訊。我將她們寥寥數語加以渲染：想像守衛前來帶走其中一名女子，她尖叫著、滿懷恐懼地被拖離。有時，那女子便從此消失；有時，清晨時分她會被扔回我們當中，滿身灼傷、傷痕累累、呻吟不止，且未必能夠倖存。我心想：「哈！若真有審訊，他會來帶走我，而我便得以離開這間自始至終囚禁我的房間。他會拖著我穿過未知的走廊，屆時，總會發生些什麼吧！」</p>\n<p>我的思緒運轉得快得驚人：那男孩看似忠於職守地推著我前行，但我們一轉過街角、離開眾人視線，他便停了下來，轉身面向我，微笑道：「別害怕。」接著他將我擁入懷中，一股巨大的感受在我體內翻湧而出，一次無法抵擋的噴發，一道非凡的光芒在我體內轟然炸裂。我無法呼吸——然後我又重新呼吸了，因為那一刻短暫得令人絕望。</p>",
  "<p>那之後，我的心境變了。我不再試圖說服那些女人吐露她們的秘密——我有了自己的秘密。高潮變得難以達成。我必須對自己編織故事，這些故事愈來愈長、愈來愈複雜，但令我極度沮喪的是，我從未能連續兩次體驗到那種爆發——而我多麼希望它能持續數小時。我想要無時無刻感受那種感覺，日夜不斷，美妙地搖曳，就像平原上罕見的草叢，被連日吹拂的微風輕撫——但那是我很久以後才見到的景象。</p>",
  "<p>我如今將所有時間都奉獻給製造那次爆裂的任務。我必須創造出特殊情境——讓我們單獨相處，或至少置身眾人之中卻孤立無援、彼此面對面，然後在歷經無數煎熬之後，迎來他的手臂環繞著我的那份絕美驚喜。我的想像力就此滋長。我必須嚴格自律，因為同樣的故事不能重複上演：驚喜至關重要——當我試圖重溫那曾令我神魂顛倒的優雅舉止幾次後，卻再也感受不到絲毫悸動時，我便明白了這個道理。這極其困難，因為我同時是故事的創造者、敘述者，以及等待意外衝擊的聆聽者。現在回想起來，我竟能克服如此多的障礙，連自己都感到驚奇！試想我的想像力必須運轉得多麼迅速，才能阻止我先知道接下來會發生什麼，好讓自己措手不及！第一次想像審問場景時，我從未編造過故事，甚至不知道這是可行的。我完全被它席捲，既驚嘆於這項全新的活動，也陶醉於故事本身。接著我很快就精通此道，成了某種敘事工程師。我能判斷起頭是否順利，或是否正走向死胡同，甚至能回到開頭改變事件的走向。我甚至創造出定期出現的角色，他們在故事之間不斷轉變，成了我的老朋友。我對他們滿心歡喜，直到現在能夠閱讀書籍後，才看出他們其實相當單薄。</p>",
  "<p>我需要編織日趨複雜的故事：我心底深處某個部分明白我想要的是什麼，卻對此抱持反對；我必須設法出其不意地抓住自己。有時我得持續好幾個小時，哄騙我內在的聽眾，讓她誤以為一切安全無虞，好讓她在聆聽的愉悅中著迷，享受故事，卸下防備。隨後，那魔法般的時刻降臨——男孩凝視的目光、他搭在我肩上的手，以及那股席捲全身的狂喜。之後，我才能入睡。或許，在停止故事的瞬間，我正讓內在的聽眾失望——她寧願要故事也不要騷動，正因如此，她總是將故事無限延長，樂意為延長自己的愉悅而剝奪我的安寧。有時進行到一半，我會試著與她爭論：「我累了，我想睡覺，讓我進入高潮吧，明天再繼續。」但沒用，她不會被愚弄。</p>\n<p>女人們注意到我的改變。她們觀察了我一陣子，看見我總是坐著，雙膝蜷縮，下巴擱在交疊的手臂上，想必我眼神空洞。我渾然無覺，因為我不再在意她們，所以當安娜貝爾來詢問我時，我感到驚訝。</p>\n<p>「妳在做什麼？」</p>\n<p>「思考，」我回答。</p>\n<p>這讓她困惑不已。她多停留了一會兒，等我再多說些什麼，然後才去把我的答覆轉告其他人。他們爭論了一陣子，接著安娜貝爾回來了。</p>\n<p>「關於什麼？」</p>\n<p>我的怒火重新燃起，來勢洶洶。</p>",
  "<p>「當初我問你人們做愛時都在做什麼，你不肯告訴我；如今你倒指望我告訴你我腦子裡在想什麼！你若歡喜，就儘管保守你的祕密，但別指望我會告訴你我的！」</p>\n<p>她皺起眉頭，轉身走回其他人身邊。這次，討論持續得更久了。我從未見過她們談論這麼久、這麼認真——通常十分鐘後她們就會爆笑出聲。顯然我觸動了她們腦中某個新的事物。接著，另一個女人站起來，朝我走來。是桃樂絲，年紀最長也最受尊敬的一位。連我都無法討厭她。她坐下後，直直地盯著我看。她的存在讓我很惱火，因為她在我故事最關鍵的時刻打斷了我——這個故事已經持續了很久：我即將被獨自關進牢房，聽見幾句關於夜間救護警衛的對話，而我完全有理由相信那個警衛就是那個年輕男子。在這位沉默注視我的老婦人面前，我該如何繼續下去？至少我還能試著不讓自己脫離情境：我孤身一人，屏息顫抖，聽見走廊裡傳來說話聲和武器的鏗鏘聲。我不知道發生了什麼事，被那種緊急而混亂的氛圍嚇壞了。我試著在心裡定格那個場景，同時端詳著同樣在端詳我的桃樂絲。我告訴自己，如果這場爆發沒有很快發生，我就得從這個處境中找出一些意義。但我究竟能想像出什麼，能反饋到我們生活的這個靜止世界中呢——一群被囚禁了這麼多年、早已失去時間概念的婦女。</p>",
  "<p>「那麼，你有個祕密，」桃樂絲終於開口說道。</p>\n<p>我沒有回應，因為那並非真正的提問。我可以看出她正試圖用那沉重的目光與沉默來令我動搖。在我找到那個供自己消遣的內心世界之前，我曾經仍是好奇又溫順的，那時候的我確實會被嚇到。我當時會懷疑自己究竟做錯了什麼，才值得被這樣審視，並且會害怕受到懲罰。但現在，我知道自己已超出她們的掌控範圍：懲罰再怎麼也不過是被排擠、被排除在那些無關緊要的輕浮談話之外——而那正是我所求，如此我才能繼續安穩地進行我的祕密探索。</p>\n<p>見我毫無反應，她皺起了眉頭。</p>\n<p>「我跟你說話了。不回話可不禮貌。」</p>\n<p>「我無話可說。他們告訴你我有祕密。你又對我說他們是這麼說的。那，又如何？」</p>\n<p>「我想聽見牠們。」</p>",
  "<p>我忍不住笑了出來，這不僅讓其他人驚訝，連我自己也感到意外。我向來習慣尊重這些女人的意願，尤其是那些資歷最深、最有權威的年長者，但如今一切都變了，因為我再也看不出她們的權威有何依據。我突然發現，她們根本沒有任何權力。我們所有人都是以同樣的方式被囚禁在此，無人知曉原因，由那些獄卒看守著——他們或許出於輕蔑，或許只是奉命行事，從不與任何人交談。他們從不進入籠子。總是以三人為一組，只有在換班時才會同時出現六人，但他們彼此之間也不說話。每到用餐時間，其中一扇雙扇大門會打開，一個男人推著推車沿著籠子與牆壁之間的窄道進來，另一個人則解鎖一扇小門，從那裡遞給我們食物。他們從不回答我們的問題，而我們也早已不再開口提問。那些年長的女人與年輕的一樣束手無策。她們所掌握的不過是某種虛幻的權力——一種凌駕於虛無之上的權力，一種默許的默契，創造出毫無意義的階級，因為她們既無法給予也無法剝奪任何特權。事實上，我們所有人都是完全平等的。</p>\n<p>我靜坐片刻，感受著那些熟悉的事實，它們突然成了令人震驚的啟示，直視著桃樂絲的眼睛。</p>",
  "<p>「你想聽我的秘密，」我說，「但你能做的，不過是讓我知道你的願望罷了。」</p>\n<p>我饒有興致地觀察著我的話對她產生的影響：起初，當她看出我準備回應時，臉上帶著自滿的神色，想必以為自己已贏得了我的順從。接著，她聽著聽著，明白了我的話意，卻又驚愕過甚，以為自己聽錯了。</p>\n<p>「妳是什麼意思？」</p>\n<p>「你好好想想吧，」我說。「我就是字面上的意思。」</p>\n<p>「你一句話都沒說！」</p>\n<p>「我說過我不會告訴你我的祕密。你告訴我你想要它們。這並沒有告訴我任何新鮮事，我本來就知道了。你以為只需要告訴我你想要知道，我就會告訴你。」</p>\n<p>這確實就是她的想法。</p>\n<p>「事情本就該是這樣，」她堅持道。</p>\n<p>「為什麼？」</p>\n<p>她顯得有些困擾。我看得出來她並未思考我的問題，她只是震驚於我竟敢這樣問。她繼承了一套我不屬於其中的傳統：當年長女子要求年輕女子回答時，年輕者就該照辦。她從未質疑過這一點，但像我這樣在地堡長大的人，根本沒有理由順從。過了一會兒：</p>\n<p>「『為什麼』是什麼意思？」</p>\n<p>「為什麼我得回答？你憑什麼認為這是理所當然的？」</p>\n<p>她的目光動搖了。她試著思考，卻不習慣這麼做。她一臉困惑，抓住了第一個浮現的念頭：</p>",
  "<p>「妳真無禮，」她說道，語氣中帶著如釋重負的安慰，替自己剛聽見的那番費解的話找到了解釋。她深信這就足以回到慣常的軌道，回到禮俗，回到陳腔濫調。</p>\n<p>「你是個蠢蛋，」我反駁道，為這份嶄新的確信所陶醉，「這場對話荒謬至極。你自以為擁有權力，但你和我們其他人一樣，只能從敵人手中領取自己那份食物，如果我反抗你，你也無從懲罰。既然除了他們的權威之外，其他任何權力都被禁止，你既不能毆打我，也不能讓我挨餓。我憑什麼要聽你的？」</p>\n<p>這次很明顯，她完全沒聽進我說的話。我想，她寧可自己聾了。她低聲咕噥了幾句，微微躁動不安，然後示意兩個年輕女子過來扶她起身，儘管她其實自己就能站起來。她回到鐵籠另一頭的老位置。那些女人緊緊盯著她，卻不敢開口問任何問題。她閉上眼睛，裝出一副正在沉思的樣子，然後便睡著了。</p>\n<p>「那是因為她年紀大了，」年紀較輕的人說道。「像這樣的考驗，對她這個年紀的女人來說，實在太過沉重。」</p>",
  "<p>她們又恢復了嘰嘰喳喳的談話，而我則回到了自己的故事裡。我重返那間陰暗的牢房，獨自一人被隔離。我並未受傷——守衛們總是小心翼翼，避免動用拳腳。我蜷縮在角落裡，滿懷恐懼，而這屈辱的姿勢令我自己震驚。蹲伏著、顫抖著——這像是一個剛剛當面挑戰籠子裡最受尊敬的女人之一、直視她的眼睛、說她是個傻瓜的人該有的姿態嗎？多蘿西當時啞口無言。我感到一陣愉悅的顫慄。我想，那是我的第一次智性快感。在那想像的牢房裡，我必須站起來，而現在，我必須微笑，必須挑釁她們。專注在那個故事上並不容易，我沉浸在剛才那場小勝利的喜悅中，想要細細品味，但它並未引發那場爆發，因為年輕的守衛不在其中，於是我召喚內心的紀律，讓自己回到那私密的天地。</p>",
  "<p>若那些女人還有半分理智，就該讓此事就此打住。那時仍可假裝什麼都沒發生，避免一場實力懸殊的較量。我已經明白，自己與她們同樣強悍——只要不動用酷刑，任何人都有權守護秘密，而一旦守住，那祕密便會立刻顯得無比珍貴。當她們拒絕與我分享關於愛情的知識時，我曾視其為終極渴望之物。如今，我輕蔑她們的狹隘，告訴自己若身處另一個時代，隨手便能從第一個遇見的男孩那裡得到想要的一切。向她們乞求，不過是賦予了一項她們從未擁有的特權，只會更加凸顯我的無知。然而此刻輪到她們的好奇心被點燃，感受被排擠與鄙視的滋味。我找到了那場噴發來慰藉自己：她們依然滿腹怨氣、無能為力，僅靠啃噬般的惱怒支撐著。她們開始監視我。</p>",
  "<p>觀察？我們四十個人住在偌大的地下房間裡，誰也無法躲過別人的視線。每隔五公尺，柱子撐起拱形的天花板，鐵欄杆把我們的居住區與牆壁隔開，四周留下一條寬闊的通道，供守衛不停地來回踱步。沒有人能逃脫審視的目光，我們早已習慣在彼此面前解決生理需求。最初——她們告訴我，我的記憶沒那麼久遠——女人們極為困擾，她們想用人牆遮擋正在方便的同伴，但守衛禁止這麼做，因為任何女人都不能被遮蔽視線。當我去解手時，我發現坐在馬桶上繼續交談——在難得的幾次我參與對話的場合——是件極為自然的事。老女人們憤怒地咒罵，抱怨淪落到動物的尊嚴盡失。如果人與動物的唯一區別是我們會躲起來排便，那麼作為人的立足點就太薄弱了，我心想。我從未與那些女人爭論，事實上我早已覺得她們愚蠢，只是沒清楚說出這句話罷了。</p>",
  "<p>現在回想起來，我當時真是個討人厭的小道學家！我為自己找到了一種自以為與眾不同的消遣而沾沾自喜、樂在其中。我覺得自己像是在被一群暴徒追趕，而我們其實都是同樣無助的囚徒。由於我年紀小，加上那些強加在我們身上的限制，我孤立無援，或許和其他人一樣，我需要創造一個幻覺，好讓自己能夠承受這份苦難。我也不知道。如今我再也無法出去遠足，便時刻深思，但由於無人可談，我的思緒很快就會開始繞圈子。這也是為什麼把它們寫下來很有趣：當它們再次浮現時，我能認出它們，就不會重複了。</p>\n<p>當多蘿西醒來，有了力氣向其他人轉述我們的對話時，她並沒有說我叫她傻瓜。但儘管她努力維護自己的形象，卻始終未能得知我的祕密，也無法隱瞞這個事實。</p>\n<p>「祕密！祕密！在這種處境下，她有什麼資格擁有祕密？」</p>\n<p>安西亞是所有女人中最聰明的，她立刻領悟到：祕密的實際內容並ho 不重要，真正重要的是——在她們持續監視彼此的生活中，竟能宣稱擁有祕密且被相信。這道理對其他女人而言太過複雜，她們不耐煩地揮手打發安西亞，堅持要我說出祕密。</p>\n<p>「我們必須逼她。讓她開口。」</p>\n<p>「你要怎麼做到？」</p>",
  "<p>卡蘿，最愚鈍也最易激動的那個，在我面前停下腳步，以威脅的口吻命令我開口說話。</p>\n<p>「要不然呢！」</p>\n<p>「不然能怎樣？」我忽然笑了出來。</p>\n<p>她做出了一個激烈的動作，很明顯是想打我一巴掌。那意圖如此明顯，以至於那些從不把目光從我們身上移開的守衛，和我同時看見了她的動作，接著我們聽到了鞭子的劈啪聲。我們都知道他們不是要打我們，鞭子只在籠子周圍走廊的空氣中甩響，但那聲音總是讓我們害怕，卡蘿跳了一下。沒有任何女人記得自己真的被打過，但安西亞後來告訴了我這件事。那必定發生在我們被囚禁之初那段模糊的時期，不然這種深深的恐懼不會如此深植於我們心中。沒有人敢違抗鞭子，女人們有時會描述皮鞭在赤裸皮膚上留下的血痕，以及持續數日的灼痛。有幾個女人身上還帶著長長的白疤。卡蘿嚇得縮了回去，而我對她報以譏諷的微笑。我內心掙扎著，一方面想默默嘲笑她，讓守衛成為我的盟友，另一方面又想向她說明她的愚蠢與無助，這時安西亞介入。她走到因憤怒與恐懼而顫抖的卡蘿身邊，示意她離開。</p>\n<p>「來吧，這沒有意義。」她非常輕聲地說。</p>",
  "<p>卡蘿的身軀一陣顫抖，我以為她會撲進安西亞的懷裡，但我們都太清楚彼此觸碰是被禁止的，於是她低下了頭。</p>\n<p>「來，」安西亞重複道。</p>\n<p>她們並肩離去。我重新坐定，頭枕在膝上，慶幸終於能獨享安寧，卻再也無法沉浸回自己的故事裡。那段插曲讓我變得神經質。我坐立不安，無法重新集中精神。我起身走向正在削蔬菜的女人們，主動提出幫忙。但我笨手笨腳的，惹惱了她們。</p>\n<p>「喔，走開去玩啦！」其中一人說道。</p>\n<p>「和誰？」</p>\n<p>我是最年輕的，也是被關起來時唯一還是孩子的女孩。女人們一直相信我是陰錯陽差才和她們關在一起，說我在混亂中被送到了錯誤的那一邊，而沒有人注意到。一旦籠子上鎖，大概就永遠不會再打開了。有時女人們會說，鑰匙一定弄丟了，就算警衛想放我們出去，也辦不到。我想這是個笑話，但我一直忘記這件事，直到現在才想起來，而現在已經太遲，來不及確認了。</p>\n<p>愛莉絲——那位曾經斥退我的女人——看起來有些尷尬。她悲哀地望著我，或許是為我感到難過，也對那些執意要從我這裡撬出祕密的女人們不以為然。</p>",
  "<p>「是真的，可憐的孩子。你完全是孤單一人。」她露出同情的表情，這讓我稍微平靜了些。那些女人平時很少善待我。我想在那個時候，她們怨恨我還活著，而她們完全不知道自己的女兒們遭遇了什麼。降臨在我們身上的可怕災難，大概解釋了她們的態度：沒有人關心過我，也沒有任何人試圖安慰我。但也許這根本不可能？我的母親不在我們之中，我們對其他人的下落一無所知。我們猜想她們大概都死了。我反覆翻找那段時光的記憶，似乎看見她們搖晃呻吟、哭泣顫抖，因恐懼而顫抖。沒有人正眼看我，而我恨她們。我認為這不公平，然後我明白了，在孤獨與恐懼中，憤怒是我對抗恐怖的唯一武器。</p>",
  "<p>我離開愛麗絲，走回去重新坐下，雙腿蜷在身下，但卻無法重新拾起思緒的線頭。我感到無聊。缺乏其他消遣，我便開始觀察她們。那天，我們分到了韭蔥和粗切的羊肉。她們一邊刷洗蔬菜，一邊大聲爭論該如何烹調。我從不特別在意自己吃什麼，在我看來，食物無所謂好壞，除非盤子空了時我還餓著——但這種情況很少，因為我食慾不大。聽著她們的閒聊，我不禁驚訝——任誰聽了都會以為她們能在幾種食譜和各式調味料之間做選擇，而事實上她們只有三口大鍋和水。蔬菜除了水煮別無選擇。我們午餐時吃掉，剩下的湯汁就當晚餐的湯。有時下午會送來額外的食物，幾公斤義大利麵，或極偶爾的馬鈴薯——沒有什麼能激發想像力的東西。這大概是她們彼此說故事的方式；她們盡其所能。她們說——我聽過上百次，但從未留意——湯汁的味道取決於你先放肉還是先放蔬菜，你也可以把食材分開煮，把韭蔥葉切絲，或者把湯汁收乾一點讓它更美味。她們一邊忙活一邊聊天。這是我第一次仔細聆聽，我驚訝於她們有這麼多話可說，驚訝於她們用十種不同方式重複同一件事時的那股熱情，只為避免承認她們之間早已無話可說。但人類需要說話，否則就會失去人性——這是我過去幾年才體認到的。 漸漸地，我開始為那些決心繼續活下去的女人感到難過——她們假裝自己還活躍、還能做決定，卻永遠被囚禁在這座監獄裡，唯一能解脫的方式就是死亡——但她們會處理屍體嗎？——而在這裡，她們甚至連互相殘殺也辦不到。</p>",
  "<p>我忽然審視起我們的處境。到那一刻之前，我只是單純地忍受，從未思考過，彷彿這是一種自然狀態。我們是否會追問自己為何夜晚會睏倦，醒來時為何會飢餓？和其他人一樣，我知道自殺是被禁止的。起初，有些更絕望或更活躍的女人試過刀或繩索，而這正好顯示守衛對我們的監視有多麼嚴密——他們總能立刻聽到鞭子的劈啪聲。守衛是神射手，能從遠處精準命中目標，抽走女人們準備當作繩索的腰帶，或是奪下她們手中粗磨的刀子。他們想確保我們活著，這讓女人們相信他們另有用途，有著某種計畫。她們想過各種可能，但什麼事也沒發生。我們有東西吃，不算豐盛，那些太胖的人因此瘦了下來，而我們也確實不缺少什麼。我們得用大鍋煮飯，削完蔬菜後要交回兩把鈍刀。偶爾會給我們幾塊布料做衣服。這些衣服做得粗糙，因為我們沒有剪刀，只能非常小心地撕開布料。剛才我說什麼事也沒發生，但這並不完全正確：布料的到來總能引起極大的騷動。我們知道哪些衣服破損到無法修補，哪些還能搶救，然後便開始複雜的計算，希望能最有效地利用新的棉布。我們得考慮隨之而來的線量；有時會有零碎的布料，但我們沒有東西可以把它們縫在一起。有一天，桃樂絲想出用頭髮當線的主意。她回憶起很久很久以前，頭髮曾被用來做刺繡。 安娜和羅拉的頭髮最長，我們拿來做最初的嘗試。那些嘗試並不成功，因為髮絲一扯就斷了。後來有人提議將幾根頭髮編成辮子，我們這才取得了某種程度的成功：縫合處撐不了多久，但有的是更多頭髮可以重新縫。</p>",
  "<p>守衛沒有給我們衛生棉或衛生紙，這讓女人們抱怨連連。我對這兩樣東西毫無印象，所以用水管理得相當好——水是充足的——而且因為我沒有月經，也就不必煩惱如何處理血跡。女人們收集最微小的布料碎片，用在經期時，再用清水徹底沖洗，因為我們得到的肥皂極少，那種肥皂又黑又稀，我們都留著洗身體。</p>\n<p>這種近乎完全缺乏體能活動的狀態，理應使我們變得虛弱，但我們強迫自己每天做運動——這堪稱世上最乏味的事——然而連我都忍受了下來，因為我明白這是必要的。曾有那麼一兩次，有女人生了病：補給品裡附有體溫計，而鞭子明確指示她要測量體溫。倘若她發燒，藥物便會送來。我們似乎都維持著相當不錯的健康狀況。考量到食物、持續不斷的照明與暖氣，想必有人或某個組織在我們身上耗費了巨資，但我們無從知曉他們為何費這番工夫。在過往的人生中，這些女人曾工作、生育、戀愛。我只知道這些事備受珍視。而我們在此處，又有何用？</p>\n<p>我被自己的想法嚇了一跳。突然之間，那個被隱瞞不讓我知道的秘密，和那個我不願與人分享的秘密，相較於守衛們的秘密，竟似乎毫無價值可言：我們在這裡做什麼，為什麼他們要讓我們活著？</p>",
  "<p>我走向安西亞，她始終是對我最不帶敵意的那個人。她對我微微一笑。</p>\n<p>「那麼，你是來告訴我你的秘密的嗎？」</p>\n<p>我煩躁地聳了聳肩。</p>\n<p>「別跟其他人一樣愚蠢，」我說。「看看她們。她們在自欺欺人，表現得好像對自己的人生還有掌控權，煞有介事地決定先煮哪樣蔬菜。我們在這裡做什麼？」</p>\n<p>安西亞面露戒備。「你是什麼意思？」</p>\n<p>「我們連這個也不能談！你總是自以為什麼都懂，利用我這個一無所知的人，來證明自己的優越感！根本沒有人知道為什麼我們會被如此嚴密地看守著，而你卻連想都不敢想。」</p>\n<p>「不要總是將我們當作一個群體來談論。」</p>\n<p>「好吧，那就來談談妳。用自己的想法回答我——如果妳有的話。」</p>\n<p>我們不被允許毆打彼此，但只要冷靜交談、不讓表情洩露怒意，我們就可以說些尖刻的話。</p>\n<p>「談論這些有什麼用？反正也不會改變什麼。」</p>\n<p>「你又來了，盡說些蠢話！說得好像交談只是為了讓事情發生似的。說話本身就是存在。你瞧：她們明白這個道理，可以沒完沒了地談論著毫無意義的事情。」</p>\n<p>「可是，說話真的能讓我們更了解自己在這裡做什麼嗎？你跟我或其他人一樣，都毫無頭緒。」</p>",
  "<p>「沒錯，但這樣我就會知道你的想法，你也會知道我的想法，或許這會激發出新的念頭，到時我們就會覺得自己更像個活生生的人，而不只是機器人了。」</p>\n<p>她放下正在用編織髮絲縫製的布料，雙手交疊在膝蓋上。</p>\n<p>「你獨自坐著閉上眼睛，想著我們的時候，就是在做這件事嗎？」</p>\n<p>「我想做什麼就做什麼。別想逼我說出我的祕密，我不是那種隨便被騙的輕浮人。」</p>\n<p>她笑了。</p>\n<p>「妳一定會很聰明！前途無可限量，真的！」</p>\n<p>「我們再也沒有未來了。我們所能做的，不過是靠談話來彼此消遣罷了。」</p>\n<p>「你嘲笑大家為了蔬菜爭論不休，但你提出的建議也同樣毫無意義。」</p>\n<p>我開始笑了起來。能與和自己一樣聰明的人交談，實在是件愉悅無比的事。</p>\n<p>「我覺得這個主題更有趣。我們知道為什麼他們把我們關起來嗎？」</p>\n<p>「不。」</p>\n<p>「或是其他人在哪裡？」</p>",
  "<p>「若有理由，我們也無從知曉。既然我們在此處，且被養活著，想必別處也有活人，但沒有證據，這倒也無妨。沒有人對這一切背後的原因有絲毫概念。半點線索都沒有。他們把成年人集中起來——你幾乎肯定是意外來到這裡的。起初——不，其實並非最初，因為那段時期在所有人的記憶中都很模糊——但在那之後，從我們的記憶變得清晰時起，我們記得自己曾不斷思索。他們大可殺了你——但他們不殺人——也可以把你帶走，送到別處，若有其他像這樣的監獄；但那樣你的到來就會帶來消息，而我們唯一確定的是，他們不願我們知道任何事。我們得出的結論是，他們把你留在這裡，是因為任何決定都可以被分析，而他們不作為的決定，正表明了他們唯一想讓我們知道的事——那就是我們必須一無所知。」</p>\n<p>從來沒有任何一個女人對我說了這麼長的話。我感覺到她將自己所知的一切都傳遞給了我，心中升起一陣輕微的暈眩，倒也不失為一種愉悅的感受。這隱約讓我想起了那次火山爆發，我暗自許諾，要想辦法將這個感覺寫進我的故事裡。</p>\n<p>「你還能告訴我其他事情嗎？」</p>\n<p>「沒什麼。」</p>\n<p>她嘆了口氣，拿起針線活，機械地檢查著。</p>",
  "<p>「我們永遠不會變得更聰明。我們會一個接一個地死去，隨著年歲逐漸凌駕於我們之上。桃樂絲很可能是第一個，她的心臟不好。她看起來超過七十歲了。我想我還沒到四十歲；沒有四季更迭，我們無法追蹤時間的流逝。妳會是活到最後的那個。」</p>\n<p>她久久地凝視著我，一句話也沒說。由於近來我極盡所能地發揮想像力，我能猜出她的心思：總有一天，我會獨自留在那巨大的灰色房間裡。早晨，警衛會遞給我食物，我會在電爐上加熱，然後獨自吃飯、睡覺、死去，始終不明白我們的命運，也不明白為何這一切降臨在我們身上。我嚇得渾身僵硬。</p>\n<p>「我們什麼都不能做嗎？」</p>",
  "<p>「我們之中沒有人沒想過要自殺，但他們動作太快了。妳千萬別試圖上吊：把一塊布料搓成繩子，才剛開始繫在鐵欄杆上，他們就出現了。那邊坐著跟桃樂絲說話的瑪麗，曾經試圖餓死自己：他們用鞭子追趕她，不斷折磨她，直到她放棄。妳知道他們給我們的刀子：鈍得不得了，大概只夠拿來刮胡蘿蔔，而且我們不被允許磨利它們。很久以前有一次，艾莉絲，一個最絕望的女人，說服另一個女人把她勒死。事情發生在夜裡，在他們把燈光調暗之後。我們以為守衛被我們的靜止欺騙，只是機械式地來回踱步：但他們無時無刻不在緊盯著我們，察覺到了正在發生的事，鞭子聲便劈啪作響。」</p>\n<p>「她們從不碰我們。」</p>\n<p>「從前確實會有，有些傷口要很長一段時間才能癒合。我們不知道為什麼後來就停了。反抗是沒有意義的。我們只能等待死亡到來。」</p>",
  "<p>她繼續縫紉。正在將一件洋裝磨損最少的部位拼接起來，做些什麼東西。回憶起當時的情景，我告訴自己那些布料幾乎是多餘的：地堡裡很熱，我們沒有衣服也能活下去。我想像房間中央那兩間廁所。既然我們有四十個人，幾乎總是有個女人坐在那裡方便，而我很難相信她們允許我們遮住身體來滿足自己的羞恥心。我看著安西亞，突然想到，既然我會是最後一個，最好還是學會縫紉。除非那些死去的女人把衣服留給我，而那些二手衣物足夠我穿到最後。</p>\n<p>我很傷心。我一直憎恨那些獄友，因為她們對我漠不關心，而我從未為她們著想過。來到這裡後，她們被恐懼與絕望淹沒，而我始終孤立無援，一個驚恐的小女孩，被哭泣的女人們包圍。如今她們即將死去，又要再一次拋棄我。憤怒在我心中翻騰。原來她們思考過我們處境，她們已經思考了很長時間，卻始終將我排除在討論之外。安西亞是第一個願意與我交談的人。我發現我們的對話很有趣，也下定決心要聽她說話，要思考，要忘記多年來她就像其他人一樣忽視我的事實。</p>\n<p>「你今天為什麼要跟我說話？」</p>\n<p>她看起來吃了一驚。</p>\n<p>「可是，是你來找我說話的，」她說。「你總是一個人在一旁，好像不想加入我們似的。」</p>",
  "<p>我正要告訴她，每當我走近，她們便會停止交談，但忽然間我感到極度疲倦。或許是因為我不習慣如此長時間的交談。她看見我打了個呵欠。</p>\n<p>「他們很快就會把燈關暗了。我們準備上床吧。明天再說。」</p>\n<p>當然無法入睡。我想繼續那則被安娜貝爾打斷的故事——故事正進行到我在牢房裡等待年輕警衛出現的時刻，但我無法專注。通常，當我對自己說故事時，會完全無視周遭發生的一切，但那晚，女人們搬動床墊的來來去去、低語聲，以及逐漸降臨的寂靜，全都擾亂了我的思緒。我思索著那些年歲、那些哀傷、那些失蹤的丈夫、那些再也見不到的孩子，也思索著自己的母親——既然我必定曾有過母親。我記不得她了。我只知道必定曾有個人，我喚她「媽媽」，而她不在監獄裡。她死了嗎？我反芻著那些聽來關於災難的零星資訊，歸結起來不過寥寥幾字：尖叫、慌亂、黑夜與逐漸升騰的恐懼。她們以為自己必定昏厥過，或許好幾次，而一切都發生得極快。細想之下，我斷定這樣的解釋並不充分。我們四十個人毫無共同點，而在此之前，每個女人都曾有家庭、父母、兄弟姊妹、朋友：唯有精心的篩選才能將這些陌生人聚集一處。這點在次日由安西亞得到了證實。</p>",
  "<p>「想想看，那是多麼浩大的工程：他們確保我們當中沒有人認識其他人。他們從全國四個角落把我們帶走，甚至跨越了好幾個國家，確認命運沒有將兩個因環境而分離的表親或朋友湊在一起。」</p>\n<p>「為什麼？他們在找什麼？」</p>\n<p>「我們問同一個問題問到快發瘋了。妳當時太小，無法理解，只會把自己蜷縮在地上，我們跟妳說話時妳也不回答。」</p>\n<p>「我不記得了。」</p>\n<p>「我們本以為你撐不過去。因為不允許碰觸彼此，沒有人能把你抱起來哄你、試著安慰你，甚至強迫你吃飯。我們以為你會死，但妳非常緩慢地，又開始動了起來。用餐時間你會悄悄的靠近食物，吞下幾口。然後，很自然的，我們養成了習慣，絕不在你面前重提我們僅有的那幾個回憶，我們認為這對妳不好。而漸漸地，我們自己也倦於談論這些事了。那沒有幫助。用同樣的方式問同樣的問題，年復一年——你終究會感到厭倦的。」</p>\n<p>「妳就這麼過活，種著蔬菜，沒有任何前景嗎？」</p>\n<p>「只有死亡，」她厲聲說道。「我們無法自殺，但我們終究會死。我們只需等待。」</p>",
  "<p>我從未如此清晰地思考過我們的處境。在我的故事裡，總有事在發生；而在我的生命中，什麼都不會發生。我明白她是對的，愛的奧祕與我無關。或許她們假裝比我懂得多，是因為她們對本質一無所知。我懷疑男人不像女人那樣聽話，但既然我永遠不會遇見任何男人，這差異又有什麼要緊？我告訴自己，那是另一個時代的女孩們需要在婚禮前夕做好準備的事。</p>\n<p>那天似乎特別短，我想是因為我思考得太過專注。燈光轉暗時，我們得鋪開四十張床墊來睡覺。空間不夠，床墊幾乎彼此相貼，每天早上我們得把它們疊成三四層高，才能勉強走動或坐在上面。我躺平身子，試著接續思緒的線頭，卻怎麼也抓不住——腦子裡一片空白，胸口籠罩著一股無以名狀的哀傷。</p>\n<p>「閉上眼睛，」我的鄰居說。「別讓她們看出你還沒睡。」</p>\n<p>是法蘭西斯說的，她是那些年輕女子之一，是從未嘲笑過我的那群人。</p>\n<p>「為什麼？」</p>\n<p>「你沒注意到什麼嗎？別人會以為你剛從另一個星球來。他們不允許我們不睡覺。如果他們看到你睜著眼睛，就會把你叫到鐵欄前，逼你吃藥。」</p>\n<p>「打電話？但他們從不跟我們說話啊！」</p>\n<p>「喔，他們當然會！用他們的鞭子！」</p>",
  "<p>我明白她的意思。女人極少違抗命令：但當這種情況發生時，鞭子便在她身旁劈啪作響，直到她聽從為止。她們毫不留情，揮鞭精準無比：能在某人耳邊連續甩響二十次，而若被針對的女人執意反抗，總會有其他人屈服。當愛麗絲被迫進食後，試圖將裙子扭成繩索勒死自己時，克勞迪婭心軟了，連忙上前解開繩結，阻止那場不斷被威脅卻從未真正降臨的死亡。我閉上雙眼。</p>\n<p>「是什麼讓你睡不著？」法蘭西絲問道。</p>\n<p>「妳怎麼睡著的呢？」</p>\n<p>她沒有回答。我哽咽得難以自制。「我們可以哭嗎？沒有藥丸的情況下？」</p>\n<p>「不——你最好控制住自己。」</p>\n<p>接著，我內心發生了一件奇怪的事——我想感受她的雙臂環抱著我，這感覺來得如此突然、如此出乎意料，令我措手不及。我撲進她懷裡，還沒意識到自己做了什麼。</p>\n<p>「停下來！」她驚恐地低聲說道。</p>\n<p>鞭子在我頭頂劈啪作響。我縮身向後，滿懷恐懼。這是它第一次朝我揮來。至今想起，我仍會戰慄。我蜷起身子，喘息如狂奔過後。</p>\n<p>奔跑？我從未奔跑過！</p>",
  "<p>我深知我們不許碰觸彼此。由於從未經歷過不同的規範，我一直視此為理所當然。方才湧上的情緒在我心中激起混沌的念頭：牽手、挽臂並行、相擁——這些詞彙我雖認識，描述的卻是從未做過的動作。散步？我依稀記得草坪，或是季節，因為這些詞語聽來如此遙遠，微弱回音轉瞬消散。我認得的只有剝落的灰牆、每隔十五公分的鐵欄，以及守衛們規律地繞著房間周界來回踱步。</p>\n<p>「他們到底想要我們做什麼？」我又問了一次。她聳了聳肩。</p>\n<p>「我們所知道的一切，不過是他們不想要的那些。」</p>\n<p>她移開了目光，顯然這場對話已經結束。安西亞是第一個願意與我長時間交談的女人，也許她將會是唯一一個？</p>\n<p>我專注地閉著雙眼，希望能就此睡去。這是我第一次明白，自己正活在絕望的正中心。我一直將自己與絕望隔絕開來，以為那是出於苦澀，但此刻我突然意識到，那是出於謹慎——而這些活著卻不知自身存在意義的女人們，全都瘋了。無論這是否是它們的錯，她們都在環境的逼迫下失去理智，因為生命中的一切都再也沒有意義可言。</p>",
  "<p>我不知道自己幾歲。因為我沒有月經，也幾乎沒有胸部，有些女人認為我還沒滿十四歲，頂多十三歲。但安西亞比其他人更有邏輯頭腦，她認為我應該在十五、六歲左右。</p>\n<p>「我們不知道自己被關在這裡多久了。從妳的身高來看，妳已經不是個孩子了，而我們之中有些人早就停經了。安娜還年輕，她臉上沒有皺紋，我也沒有——至少他們是這麼說的。讓我們衰老的不是更年期，是絕望。」</p>\n<p>「所以男人一直都很重要嗎？」</p>\n<p>她點了點頭。</p>\n<p>「男人代表你活著，孩子。沒有未來、沒有子嗣，我們算什麼？一條斷裂鎖鏈的最後環節。」</p>\n<p>「這麼說，生命能帶來如此巨大的愉悅嗎？」</p>\n<p>「妳根本不明白擁有命運是什麼意思，所以也無法理解像我們這樣被剝奪代表什麼。看看我們的生活：我們知道自己必須表現得像現在是早晨，因為他們把燈光調亮，然後給我們食物，到了某個時間，燈光又變暗。我們甚至不確定他們是否按照二十四小時的規律在安排我們的生活。我們要如何計算時間？他們已經把我們貶低到完全無助的地步。」</p>\n<p>她的語調尖銳刺耳，目光直視前方。我又一次感到想哭。我蜷縮成一團。</p>\n<p>「怎麼了？」</p>",
  "<p>忽然間，她的嗓音變得如此溫柔，如此輕盈，使我渾身顫抖，彷彿被撫摸一般。至少，我想可以這樣形容：有某種絕妙的感受流過全身，如此甜美，竟令我感到恐懼。我將自己蜷縮得更緊了。</p>\n<p>「我不想再說了，」我對她說。「在我什麼都不懂的時候，反倒更快樂些——那時我恨你們所有人，因為你們守著各自的祕密。而你們根本沒有祕密。你們一無所有，這個世界上也沒有什麼東西是真正擁有的。」</p>\n<p>「你以為我們藏了什麼祕密？」</p>\n<p>我不再因自己的無知而感到羞辱，因為我已觸及一種痛苦得難以承受的知識。</p>\n<p>「你們怎麼做愛、用什麼做、過程如何，全都是這些。她們就這麼聚在一起，說著過去的故事，語帶暗示，突然大笑起來，而我一走近她們就閉上嘴。我本以為那才是重要的事，但其實全都毫無意義。」</p>\n<p>「可憐的孩子，」她說，語氣如此溫柔，如此哀傷，讓我瞬間淚如雨下。</p>\n<p>她們大概默許哭泣，只要我們低聲啜泣、不引起騷動就行；鞭子便不會響起。</p>",
  "<p>食物送來了，帶來一陣小小的騷動。當我們第二次感到飢餓時——這是從早晨以來的第二次——我們說現在是傍晚。我們把找到的食物煮了，吃下，不久燈光便暗了下來。女人們說，在災難發生之前，人們一天吃三餐：早晨、中午和傍晚；但我們在每次清醒的時段只感到兩次飢餓，也不確定自己是否還遵循著從前的時鐘規律。這是那些一再被提起、卻始終繞回原點的話題之一，因為什麼都沒有改變。究竟是我們不工作、需要的食物變少了，所以一天兩餐就夠了？還是我們的身體已經遺忘了舊有的習慣，以至於可以每八或十小時睡一次？然而，我們又怎麼知道自己睡了多久？也許他們讓我們清醒八小時，卻只給我們四小時或六小時的夜晚？守衛換班的時間與我們生活的節奏不相符——有時在白天中間，有時在夜裡，有時一天換兩次。我觀察著他們，蒐集著自己僅有的一點知識，這時我意識到那個藍眼睛的年輕守衛一定離開過：突然間，我看見他在籠子來回踱步，才發覺自己已經好幾天沒有想起他，也沒有為自己編織任何故事了。他依舊那麼好看。</p>\n<p>我取了餐盤，挨著安西亞坐下。</p>\n<p>「英俊、美麗——我想這些都是『之前』的用詞吧，是還有事情發生的那個時候的詞？」我問她。</p>",
  "<p>她凝視了我一會兒，然後別開目光。</p>\n<p>「我以前很美，」她說。「不知道現在還算不算，得要有面鏡子才看得出來。我的頭髮白了，但那不代表我老了，我們家女人都早生華髮。記憶很混亂，我記得被關起來那年我二十八歲。一開始我還費心打理頭髮，弄丟梳子的時候非常難過。」</p>\n<p>她低聲輕語，彷彿在自言自語，但我明白她是在對我說話。</p>\n<p>「後來我的洋裝穿破了。那是一條漂亮的夏季連衣裙，非常時髦，有著荷葉邊，用的是那種細緻、不耐久的布料。我是最早穿上我們現在做的這種寬袍的人之一。如今，從前的洋裝一條也不剩了，就連碎片都沒有，每一件都從最後一縷線條開始磨損殆盡。你無法想像它們曾經是什麼模樣。」</p>\n<p>「美麗，是為了那些男人嗎？」</p>\n<p>我幾乎可以確定是如此，但有時我聽見女人們說不是這樣。</p>\n<p>「是的。有些女人說這是為了我們自己。但我們到底能用它做什麼呢？就算我是駝背或跛腳，我照樣可以愛我自己；但若要被他人所愛，你就必須美麗。」</p>\n<p>「我美嗎？」</p>\n<p>我看見她的微笑，但那笑容令人心碎。</p>\n<p>「是啊，」她說。「是啊。你大概會是其中最漂亮的幾個女孩之一，因為你不會有那種悶悶不樂、憤怒的表情。你會笑，你會去挑逗那些男孩。」</p>",
  "<p>「有時候我會故意挑釁那個年輕的警衛，」我脫口而出。</p>\n<p>這是我剛剛才明白的事。</p>\n<p>當我對自己說故事時，我總是坐到靠近鐵欄杆的地方，在他來回踱步的那一側。他走得很慢，如往常般緊盯著籠子裡發生的一切。我蹲下身，面對著他，靜止不動，目光追隨著他。我凝視著他，而他既然能看見一切，不可能不知道我在看他。只是個女孩，坐在那裡，穿著不成形的罩衫。我的頭髮很長，總是束在頸後；除此之外，我對自己的長相一無所知。我甚至不知道自己的眼睛是什麼顏色——是後來安西亞告訴我的——而我也完全不明白「最漂亮的女孩之一」是什麼意思。我從未想過，這些女人中沒有一個是美麗的：她們只是乾淨，我們保留著洗澡和洗頭時發給的那一點肥皂，頭髮總是清潔的。我們多數人留著長髮，因為沒有東西可以剪。我們也沒有工具修剪指甲，太長時總是自然斷裂，我們看起來很憂傷，除了偶爾爆發出神經質的咯咯笑聲。我不知道自己看著守衛時臉上是什麼表情：我完全專注，全身心都在注視。他從不看我：我很確定他知道我一直在盯著他，而那讓他感到不自在。</p>\n<p>「我想讓他失去冷靜。」</p>\n<p>「究竟是為什麼？」安西亞驚訝地問道。</p>",
  "<p>「我不知道。為了控制他。他們手裡有鞭子，逼我們做他們想要的事——其實幾乎什麼都沒有。他們禁止一切。我希望他感到不安、憂慮、恐懼，無力反擊。我們從來沒有被禁止坐著發呆。」</p>\n<p>「也許他們會禁止這項行為。他們想禁什麼就禁什麼。」</p>\n<p>「這麼一來，他們就得承認我的存在了。如果你做的是被禁止的事，禁令針對的是那個行為本身；但如果你做的是沒被禁止的事，他們卻出手干預，那麼引起注意的就不是那個活動，而是你這個人。」</p>\n<p>她是那群女子中最聰慧的一位，但我卻掌握了她未曾想及的事，這表示我至少與她一樣機敏！一陣愉悅的戰慄流遍全身，我對她露出了微笑。</p>\n<p>「他們養活四十個女人，讓我們保暖，還給我們布料做衣服。對他們來說，我們沒有名字，他們對待我們的方式，彷彿一個女人和另一個女人之間沒有任何差別。但我是我。我不是那群牲口裡的四十分之一，不是一群母牛中的一頭。我要一直盯著他，盯到他覺得難為情為止。」</p>",
  "<p>我對自己的膽大妄為感到驚奇。這些年來，我們困在這裡，淪落到徹底無助的境地，被剝奪了一切權力，甚至連自盡的工具也被奪走，在燈光刺眼的照耀下排便，當著其他人的面，當著他們的面：而我竟想讓一名守衛難堪，還自以為找到了辦法。</p>\n<p>「不要對任何人吐露一個字。我不想讓那些女人知道發生了什麼事。她們的態度會改變，她們會不由自主地那樣做，而我所做的一切就會失去全部的力量。」</p>\n<p>「要是我們大家都開始盯著她們看——她們豈不是會更難堪？」</p>\n<p>「她們將再也不感到任何尷尬。」</p>\n<p>這些想法以眩目的確定性降臨在我心中，讓我對它們深信不疑。它們從何而來？我依然無從知曉，只知道自己從內心翻湧的思想中獲得了極大的愉悅。</p>\n<p>「人人都做的事，終將失去意義。那不過是種習慣、習俗，沒人知道始於何時，大家只是機械地重複著。若想惹惱他，我就得成為唯一一個瞪著他的人。」</p>\n<p>安西雅沉思著。我不確定她是否完全理解我的意思；一股不容置疑的力量驅策著我，沒有什麼能阻止我。</p>\n<p>「我不知道這一切會通往何處，」我對她說，「但這正是令人興奮的地方：在我們荒謬的存在中，我發明了某種意料之外的事物。」</p>\n<p>她輕輕點了點頭。</p>",
  "<p>「繼續說吧，」她說。「我會繼續思考這件事。」</p>\n<p>於是我恢復了姿勢，盤腿而坐，目光緊鎖著那位年輕的守衛。</p>\n<p>他真算英俊，抑或我只因他是唯一不老的男人才覺得他好看？我一無所知，也無法憶起世間種種，卻認得出衰老的徵兆。我看過髮絲轉灰、轉白，看過斑點浮現、禿頭威脅最年長的女人們的頭頂，看過皺紋、乾燥的皮膚、鬆弛的皮肉、孱弱的肌腱、佝僂的背脊。那名守衛生著清朗的肌膚，步伐輕盈——我知道自己也是如此，儘管能讓我測試這點的小小空間少得可憐；他挺拔而年輕，和我一樣。我覺得古怪：剩下來的老人還不夠多嗎？也許他們都死了？還是他們不知該拿年輕人怎麼辦？他們想不出更多差事可派，只好把年輕男人送來，在鐵欄與高牆之間來回踱步？先前沒有過年輕的守衛，我對自己說，心開始狂跳。他在這裡多久了？我覺得自己不是一眼就注意到他的；我沒數日子，我不知自己是何時開始編造故事——因為我沒有參照點。除非我弄錯了，若他是最近才出現的，那麼，多年來頭一遭，有些事改變了。高牆之外，在我們完全無從得知的外部世界——除了我們吃的食物、他們給的布料——發生了些事，而那些事影響了我們。守衛們一直那麼老，老到我們察覺不到他們變老。我初來時還是個小女孩，如今已是個女人——永遠的處女，但儘管乳房發育不全、青春期戛然而止，我仍是個成人：我長大了，我的身體記錄了時間的流逝。老女人們和那些老守衛一樣不再起變化，她們的頭髮轉白了，但過程如此緩慢，幾乎無從察覺。我曾是她們的時鐘：望著我，女人們看著自己的時間滴答流逝。或許那就是她們不喜歡我的原因——也許是我的存在本身讓她們落淚。 年輕守衛來到這裡時並非孩童，他個頭高大，頭髮濃密，臉上毫無皺紋。當他首現衰老的跡象之際，我便會觸摸自己的肌膚，看看自己是否也正在老去。他同樣會成為一座時鐘，我們將以相同的速度衰老。我可以觀察他，從他步履的彈性判斷自己還剩下多少時光。</p>",
  "<p>所以，有些改變發生了。某處有個影響我們的決定被做出，而我們能夠評估其影響：其中一位老人消失了——或許他死了——然後被取代了。這件事是否逃過了掌控我們生活之人的注意？他們是否不關心要給我們任何資訊，還是他們的警戒鬆懈了？</p>\n<p>我的目光始終沒有離開那些守衛。他們總是三人一組，在走廊上來回踱步。他們沉默不語。當彼此擦身而過時，他們的目光不曾交會，但我有種感覺，他們監視彼此就跟監視我們一樣緊密。當局想必是害怕他們會違抗命令，或是跟我們說話。又一次，我突然領悟了——我明白了為什麼他們非得三人一組：這杜絕了任何共謀的可能性。他們不允許私下交談，因為那可能會向我們傳遞什麼訊息；他們必須時刻維持著可疑獄卒的角色。</p>",
  "<p>與年輕女獄警一同值勤的兩名男子，已在這裡待了不知多少年。最初幾年，女人們曾試圖與守衛們交談、提出要求或喚起他們的憐憫，但沒有任何事物能打破他們殘酷的冷漠。後來，她們放棄了，表現得彷彿看不見守衛，彷彿已將他們的存在逐出思緒——又或者，她們自己成了鐵欄，而女人們早已習慣，不再會撞上它們。沒有人想像她們感受到絲毫屈辱，但囚犯們的自尊完好無缺。她們不再向守衛抱怨，也不再把他們那不為所動的態度視為侮辱。也正因如此，這個女孩靜止不動的目光，顯得格外強烈。</p>",
  "<p>我不再對自己說故事了：注視守衛時，我正創造一個故事。我需要耐心，除此之外我別無所有。我不知道自己以這種方式度過了多少個清醒時段。我思考了很多，忽然意識到我們不該再用白天、黑夜來描述，而該說清醒期與睡眠期。我的確信越發強烈：我們並非按照二十四小時的週期生活。當燈光調暗時，沒有人感到疲倦——女人們說那是因為她們無事可做。或許她們說得對，但我從不知道工作的感覺是什麼。我的確信來自持續觀察那個年輕守衛。換班的守衛並不在我們醒來時、用餐時、就寢時或走動時到來，而是在這些時段之間、間隔不規律的時候到來。大門會略微打開，在籠子周圍來回踱步的三個男人會聚攏，有時下一班人進來時他們全部離開；有時只有一兩個人被替換。他們的時間表與我們的之間有任何關聯嗎？我該如何測量時間的流逝？我僅有的指標就是自己的身體節律。</p>\n<p>安西亞教會我，心臟的跳動速率始終如一，健康的人每分鐘約在七十到七十四下之間。</p>\n<p>我開始數數。</p>",
  "<p>我所學到的實在太少。三十、四十、五十、七十、八十，我必須在腦中理清這些十位數，但隨後我發現自己連乘法表都沒記熟，幾乎不會做除法。如果從他們把燈全打開到守衛換班、年輕守衛上崗這段時間，我的心跳了七千兩百次，那應該等於一百分鐘。這不過是將安西亞的七十二乘以一百的問題，但我算出來卻變成三千兩百二十，或者五千零十二！我根本無法進行必要的運算。無論我多麼專心、拼命計算，都無法運用自己取得的數字。</p>\n<p>「妳能教我算數嗎？」我問安西亞。</p>\n<p>「沒有鉛筆和紙嗎？」</p>\n<p>她解釋道：</p>\n<p>「我們沒有你想像的那麼鐵石心腸，關於你的教育問題，我們討論了很多次。教你讀書？用什麼教，又讀什麼？算數勉強能教到某個程度，但只能心算，我們沒辦法教你運算方法。你連數字都看不懂。海倫和伊莎貝教過你九九乘法表，但你一定都忘了，因為從來沒用過。再說，當你發現這不是遊戲時，你就拒絕學了，還鬧脾氣。我們不能強迫你，也不能處罰你，因為有警衛在。我們無法讓你想要學習你認為沒有意義的東西，到頭來，我們也實在看不出有什麼必要。八八六十四，然後呢？你在這裡能找到六十四個什麼東西？教你任何事情，又有什麼意義呢？」</p>",
  "<p>我知道什麼是閱讀，但我從未見過任何書寫的文字。頂多，我理解字母的概念、它們的排列方式、以及詞語的構成。女人們曾談論過書籍與詩人。</p>\n<p>「如果我們真能出去，我會變得很笨。」</p>\n<p>「如果有一天……」</p>\n<p>她凝視著我，我能感受到她心中流轉的意象，而那些是我完全無法理解的。當然，我必定見過太陽、樹木、白晝與黑夜，但我對這些毫無記憶。儘管我能猜測安西亞內心思緒中浮現的是什麼，我卻無法在腦中描繪出那些景象。</p>\n<p>「恐怕這是不可能的，你可憐的孩子，」她過了一會兒說道。「不過，如果真的發生了，你確實可以批評我們教學不力，而我們也會樂於接受你的批評。」</p>\n<p>我看著那些女人：她們才剛拿到蔬菜，就像往常一樣忙碌起來，試圖在手邊只有水和鹽的情況下，為高麗菜和紅蘿蔔找出新的烹調方式。她們看起來並不那麼愚蠢，因為我明白，在她們一無所有的生活中，她們把握住僅有的一點事物，並善加利用，將最微小的變故都化作養分，餵養她們那飢渴的靈魂。</p>\n<p>「昨天，從燈光完全亮起到年輕守衛抵達之間，也就是他們換班的時候，我的心跳了三千兩百二十下，而今天則有五千零一十二下。這代表多長時間呢？」</p>\n<p>我看見她倒抽一口氣。</p>",
  "<p>「什麼？你數過她們了？」</p>\n<p>「這可能有助於衡量時間。」</p>\n<p>年輕警衛沿著鐵籠緩慢踱步，另外兩人落後幾步跟在他身後。他們從不彼此遠離，也從不並肩而行。與安西亞交談時，我的視線始終鎖定獵物：他一次也未曾朝我這邊看。</p>\n<p>「如果你數過了，那我至少該試著推算看看。」她說，「我好久沒這麼做了！但我怎麼知道你心跳得多快呢？」</p>\n<p>「你告訴過我正常的頻率是多少。」</p>\n<p>「沒錯，但每個人的情況都不盡相同，我又怎麼知道妳的心跳頻率是否正常？我甚至無法為妳把脈，因為我們不被允許觸碰彼此。」</p>\n<p>「我承受得住，我已經準備好了。我會在每一次節拍時說『滴答』。跟妳自己的心跳比對一下，這可以給我們一個起點。」</p>\n<p>我的速度比她慢。</p>\n<p>「妳比較年輕。大概比我更接近平均值；我的心跳原本就很快。我們怎麼判斷呢？」</p>\n<p>「精確的單位又有什麼關係？重要的是有個單位。就取七十二吧。」</p>\n<p>「不。反正我們也無法確定，我就除以七十好了。這樣比較簡單，即便如此，我還是沒把握不會搞混。」</p>\n<p>她沉默了，眼神迷濛，開始喃喃自語。我聽著她的話，但目光始終沒有離開守衛。</p>\n<p>「三千兩百二十除以七十，等於四十六。至少，我認為是這樣。我很驚訝能整除。我要再算一次。」</p>",
  "<p>一位老守衛注視著我，目光專注地停留了兩三秒。</p>\n<p>「沒錯，確實是四十六。我來試試五千零十二。」</p>\n<p>在她完成之前，守衛們有足夠時間完成巡邏。</p>\n<p>「七十一或七十二，還有零頭呢。」</p>\n<p>「所以，那要嘛是我們起床後四十六分鐘，要嘛是七十一或七十二分鐘？」</p>\n<p>「四十六分鐘，或者一時十一分、十二分。」</p>\n<p>她激動萬分。</p>\n<p>「真奇怪！四十六分鐘跟一小時十二分鐘之間能有什麼關聯？」</p>\n<p>我迷失了。</p>\n<p>「我們過去每天工作七到八個小時，視工作內容而定，」她解釋道。「我們每天在同一時間開始工作，或者人們輪班，以確保連續性。但我們從來不會有一天之間有二十五或二十六分鐘的差異。這代表什麼意思嗎？」</p>\n<p>她話中所指的生活方式，我全然一無所知，只能靜靜聽她述說。</p>\n<p>「繼續數。明天再數。」</p>\n<p>明天？但這還是舊日意義上的那個明天嗎？</p>",
  "<p>這首次的成就讓我萌生野心。我告訴自己，心跳並非唯一的節奏，便開始聆聽自己的身體。我知道月經每二十八天來潮一次，卻為自己缺乏這項指標而感到黯然，但我觀察著食慾的變化。有時早晨醒來異常飢餓，等待開飯的時間彷彿格外漫長。我們原先認定他們總在固定時間送餐，後來卻發現這個想法錯了。兩餐之間有時相隔三小時，有時五小時。當我計算了大約十次之後，似乎年輕守衛抵達的時間都不一樣。我不打算列出統計數字——儘管一一銘記在心，因為它們正是我思緒的誕生日。安西婭覺得這些數字如此古怪，甚至懷疑時間是否完全隨機。但根據我的心跳估算，年輕守衛幾乎從不待超過六小時。他現身時總是容光煥發、精神飽滿——長久觀察下來，我對他已然熟悉——然而值班結束時，他會露出細微的疲態。腳步仍保持彈性，頭顱依然高昂：我說不清究竟是哪個細節洩露了倦意。是他臉色蒼白了點？眼神少了銳利？還是動作慢了那麼一絲？換班的守衛總是在與我們用餐及睡眠時間錯開的時段上工。我發現這點很不尋常。</p>",
  "<p>「這給了我們一條線索，」我對安西亞說。「她們的時間和我們的不一樣。我們和守衛其實共同生活在這裡：難道遵循同樣的規律不是很自然的事嗎？」</p>\n<p>我能看出她並未理解我的推理。</p>\n<p>「當其中一名守衛七、八個小時沒有出現，想必是去睡了。但那些時段從未與我們的睡眠時間一致。我得保持警戒，在腦中記下他們缺席的時刻。」</p>\n<p>安西亞面露困惑，隨即皺起眉頭，點了點頭。</p>\n<p>「兩種不同的時間模式，能意味著什麼？」</p>\n<p>「妳才是那個見識過真實世界的人。我對它一無所知。」</p>\n<p>她告訴我，她也完全無法理解這一切。她無法將這兩件事連結起來，並且覺得是時候讓其他女人也知曉我們所掌握的資訊了。</p>\n<p>「我再也無法思考了。這一切太過複雜，我無法消化所有的事實。我們必須分享發現的一切，然後聽聽其他人的想法。」</p>",
  "<p>顯而易見，我對此並不怎麼高興，但我明白安西婭已經力不從心，於是便答應了她。她以謹慎的閒聊方式展開行動：她把一兩個女人拉到一旁，預告自己即將說些驚人的事，並要求她們面不改色，以免引起守衛注意。她們對現有生活竟會感到驚訝這個念頭，本身就引起了騷動，而安西婭很快就學會了如何安撫她們。在最初的幾年裡，她們學會了控制自己，後來，隨著日子荒謬地單調重複，她們再也沒有什麼需要控制的了。任何新鮮事的宣告都會讓她們陷入慌亂。起初，新奇本身反而沒有「它竟然存在」這件事來得震撼。她們說：「這不可能！」然後便語塞了。安西婭發明了一些技巧。她總是先說：「保持冷靜。繼續你正在做的事」——剝蔬菜、縫補衣物、編辮子，可做的事實在太少——「不要改變你的速度。要做到這點，你必須意識到自己的速度、自己的動作。」聽到這話，女人們自然感到好奇，但也僅此而已。因為我們生活在監視之下，「保持不動聲色」這個念頭很快就被理解，她們毫不費力地遵循安西婭的指示。消息傳開了，說有件不尋常的事正在發生，最重要的是，千萬不能洩露分毫。在我看來，即使有些興奮的細微騷動，也輕微到足以避開守衛的注意。過去在無話可說時，女人們什麼都能聊得興高采烈，現在看來似乎也沒什麼改變。她們盤點自己對過去世界的認知，才發現已經遺忘了許多。她們大多數人受的教育不多，只是安靜地過日子，打理家務、照顧孩子、買菜做飯。我不覺得她們有多少東西可以遺忘。 她們開始思索；思緒遲鈍，因此倍感艱難。</p>",
  "<p>她們什麼也想不出來。</p>\n<p>與此同時，我繼續數數。漸漸地，我學會了在聊天或進食時自動計數，不久後，甚至在睡夢中也能如此。我醒來時腦中浮現一個數字：起初，這看似不可能。我滿懷狐疑，隨後便深信不疑。安西亞告訴我，我發展出的這項能力或許並非如此非凡；只不過在此之前，從沒有人需要它罷了。</p>\n<p>我逐次數著自己的心跳，很快便碰上難以心算的巨大數字。每分鐘七十二次心跳，一個小時就超過四千兩百次，到一天結束時已達五萬多次。這數字已經無法掌控。於是我換了個方法：數到七十二後，便在腦中記上一筆。重新開始，再記上第二筆，但我擔心這兩種不同的計數方式會搞混。這時有位女士走來，充當我的算盤：我說一，她記住，再說二。但她很快就派不上用場了，因為我從未出錯。我發現自己精準地記錄著數字。漸漸地，我不再需要說出數字。體內某處形成了自動機制，每七十次心跳就會自動提醒我。我成了一座人體時鐘。</p>\n<p>我們的日子持續十五到十八小時，長短不定。從燈光轉暗——我們稱之為夜晚的開始——到被喚醒，大約間隔六小時。我們由此確立了自身正依循著人為時鐘而活的事實。我們需要明白箇中緣由。</p>\n<p>愛瑪提出了最荒謬的理論。</p>",
  "<p>「我們不在地球。我們在一顆每十六個半小時自轉一圈的行星上。」</p>\n<p>「我們是怎麼來到這裡的？」</p>\n<p>「我們是怎麼進到地堡裡的？」我問道。</p>\n<p>誰都沒有絲毫頭緒，這點讓我感到驚異。</p>\n<p>我將自己缺乏記憶的原因，歸咎於當年太過年幼，以及安西雅向我描述過的那些女人們當時的驚駭狀態，但其餘的人知道的並不比我多。顯然，生活原本一如往常地進行著，卻在某個與其他夜晚無異的深夜裡，突然爆發出尖叫聲、烈焰、慌亂的奔逃——這些事情，始終在地下碉堡的寂靜中生活的我，根本無從想像。</p>\n<p>「有些奇怪的藥物會影響大腦，製造出虛假的記憶。」艾瑪說。</p>\n<p>安西亞對此並不確信。曾有過各種未經證實的謠言，關於洗腦、基因改造，或是精密到被誤認為人類的機器人的種種傳聞。</p>\n<p>「問題是，我們之中沒有人擁有任何連貫的記憶，足以拼湊出發生過什麼事。我們甚至不知道是否有過一場戰爭。」桃樂絲說道。「我只能回想起模糊的畫面：我看見火焰，人們四處奔逃，而且我覺得自己被人捆住，內心恐懼。這一切持續了很長很長一段時間。我仍然感到害怕，但就連畫面也不復存在了。」</p>",
  "<p>「唉，我連那麼多都說不出來，」安娜貝爾說。「就我日常的生活，然後有種恐慌——那種我一直害怕會再次經歷的恐慌。接著，我就到了這裡，躺在床墊上，一切感覺都再正常不過了。」</p>\n<p>「戰爭不是那樣的。會有炸彈和空襲警報。」</p>\n<p>「那場戰爭並不存在。至少在我們那裡沒有。當然，那段日子確實動盪不安，但有教養的人都說，我們其實已經很久不曾活在真正的和平裡了。」</p>\n<p>「我們被另一個國家入侵了。」</p>\n<p>「不然就是火星人！」</p>\n<p>她們一如往常地隨時準備爆笑出聲，而我開始明白，這並非出於愚蠢或絕望，而是為了求生。</p>\n<p>「那麼，他們為什麼要把我們帶到另一個星球？我們對他們能有什麼用處？」</p>\n<p>「顯然完全沒有，」另一人插嘴道。「我們還在地球上。十五、二十年前——不，更短，看看那孩子就知道——我們被關起來的時候，是有目的的，他們把我們留作備用。然後某個檔案遺失了，行政人員確保沒人發現，於是他們繼續看守我們、讓我們活著，但再也沒有人對我們負責。我們是行政失誤的產物。」</p>\n<p>「可是十六個小時！十六個小時可不是這樣就能解釋的！」</p>",
  "<p>「我們始終無法從守衛們的日常作息中找出任何規律，這實在荒謬。我對過去的記憶早已模糊，但我確信從前我們的工作時間是固定的。我們甚至還得打卡上班。」</p>\n<p>「自我開始記數以來，有過一次，僅此一次，那位年輕的守衛一口氣待了將近十一小時，在鐵籠周圍來回踱步。到最後，他臉色憔悴蒼白，卻從未抱怨。我從未見過他不耐煩的樣子，」我說。</p>\n<p>我們的對話沿著這些線索進行，反覆在同一塊領域打轉。試圖回憶監禁初年的努力徒勞無功。顯然，女人們是逐漸從內心的迷霧中浮現，發現自己已習慣了所處的奇特生活。沒有任何反抗的跡象。她們曾有過丈夫、情人和孩子。因為過於痛苦而不敢去想，結果幾乎遺忘了一切。但她們沒有試圖讓我閉嘴，因為她們對自己失去過往的這件事感到驚駭。安西亞逐漸確信她們曾被下藥。</p>",
  "<p>「看看我們，看看我們是怎麼活著的。我們被剝奪了一切使我們成為人的東西，但我們還是組織起來了，我想是為了生存，或者，因為身為人類，你無法不這麼做。我們用殘存的一切制定了新的規則，發明了一套規範。由最年長的那位負責把湯舀進碗裡，我負責監督縫補——如果有需要的話，安娜貝爾調解那些爭吵的人，而我們根本不知道這一切都是怎麼形成的。想必我們長久以來一直活在夢裡，等我們醒來時，早已適應了這個處境。」</p>\n<p>「愛麗絲想自殺那一次，克勞蒂亞阻止了她，後來怎麼樣了？」</p>\n<p>「在所有的混亂之中，那是格外清晰的一段記憶。沒有人知道那是什麼時候的事了。」</p>\n<p>我已經數了四個月。我們決定不再去管他們加諸在我們身上的混亂作息——我的心跳成了我們的時鐘。某個晚上，燈光正要暗下時，我們決定當時是十一點，從那一刻起，我會像過去一樣，把每一天算作二十四小時。有時候，當我們正在吃午餐，毫無樂趣地吞著水煮蔬菜時，會有女人問我時間，我便回答：</p>\n<p>凌晨兩點。</p>",
  "<p>那在她們麻木的心靈中重新燃起了反抗的精神。我們擁有自己的時間，和那些將我們囚禁的人的時間毫無共通之處；我們重新發現了身為人類的品質。我們不再與守衛站在同一陣線。在鐵欄杆內，我那因年輕憤怒而強勁規律跳動的心臟，為我們奪回了屬於自己的領地；我們建立了一片自由的空間。新的笑話開始流傳。當艙門第二次打開，他們給了我們幾公斤義大利麵時，若根據我的心跳時間是早上八點，總會有個女人說：</p>\n<p>「啊！早餐來了！」</p>\n<p>或者，如果是午夜時分：</p>\n<p>「表演結束了，我們進城吃晚餐吧。」</p>\n<p>我們便會笑得前仰後合。我也跟著笑，現在想起來了，因為自從我能給予她們我所擁有的東西——時間——之後，我就不再把那些女人視為敵人。我並未忘記那個年輕的守衛，每當他值班時，我仍會坐在鐵柵欄旁注視著他，盼望有朝一日他會露出破綻，給我某個信號，表示他注意到了我，但此事始終沒有發生。我至今仍在思索，這究竟是出於紀律，還是他真的完全沒有察覺到，有個女人——始終是同一個——一刻也不曾將目光從他身上移開。我不再對自己編織任何故事了。</p>",
  "<p>在我們靜止不變的生活中，我創造了唯一可能的新事物。當我的目光緊鎖著年輕警衛時，沒有人打擾我。若有人這麼做，反而會引起注意。這給了我充裕的時間思考。我開始擔心，我們又會被習慣弄得遲鈍。在我看來，某些討論已經不再引起多少興趣，而當我們再次試圖探究時差背後的邏輯時，有些女人開始打呵欠。她們抱怨說我們在白白耗費精力，說我們找不到解釋，說一切都是隨意的。我告訴自己，如果她們的熱情消退，我又會開始憎恨她們，感到孤獨，而明明我剛才還很享受。她們會回到那些把我排除在外的玩笑，我又會再次憤怒。但安西婭認為我錯了，她們確實已經甦醒過來了。「甚至很危險，」她補充道。「我怕警衛們會察覺，又把我們下藥。我們會再次沉入麻木，變得半死不活，甚至自己都意識不到。我想像不出比這更屈辱的事了。」</p>",
  "<p>記憶到來時，必然伴隨著痛苦。她們相對而坐，終於找到了勇氣，去比對彼此零碎的記憶。她們試圖在漫長的對話中挖掘過去，話語在障礙之間摸索前進。她們對抗著或許能帶來些許緩解、但她們仍奮力反抗的失憶，也對抗著恐懼。她們專注地聆聽彼此，當其中一人靈光乍現時，便急著打斷說話的人，深怕還未說出口便已忘記。但她們仍保有某種克制，以免眼淚驚動守衛。我不再被排除在外。我已經在她們之間掙得了容身之處，即便我能做的，僅僅是傾聽。</p>\n<p>然而，這並沒有持續太久，因為突然發生了一件大事。</p>\n<p>我們挖的洞穴在沙漠中並不孤獨。其他洞穴散布各處，有些靠近，有些遙遠。我們知道它們的存在，因為我們躺在自己洞穴的底部時，能看到地平線上有其他奇怪的隆起，像是大地長出的膿包。</p>",
  "<p>我必須精確描述那件事的細節，但由於震驚與困惑，我感到極其困難。事件發生時，守衛正要打開艙門遞給我們食物。鍋子和器皿一向留在籠子裡，我們堆放在水槽旁，但餐盤必須在每次用餐後從鐵欄杆間遞回去。食物會用巨大的推車運來，我們得用手拿起放進容器，這項工作既令人不快又困難重重。在房間後方，鐵欄杆的另一側，一扇大型金屬門會滑開一道縫隙，立刻激起我們的好奇心。今天會給我們什麼？我們能怎麼處理這些食物？兩名守衛會走向那扇門，拉著推車，而第三名守衛則繼續監視我們，鞭子隨時待命。首先，我們必須拿起湯杓、四十根湯匙和用來削蔬菜的鈍刀。那天有胡蘿蔔和粗切塊的牛肉，女人們立刻爭論是否要煮掉所有胡蘿蔔，還是留一些生吃。還有馬鈴薯，這讓我們欣喜不已，因為那是難得的享受。女人們說這很奇怪，因為在過去世界裡，馬鈴薯非常便宜，而且富含各種營養，安西亞說一個人只吃馬鈴薯也能保持健康。但我們發現食物的量不足，即使是對這些幾乎無所事事、活動量極小的女人們而言，那點胃口也無法滿足，因此快樂轉瞬即逝。一名守衛將鑰匙插入小艙門的鎖孔。就在那一刻，傳來一聲震耳欲聾的巨響。</p>",
  "<p>我從未聽過這樣的聲音，但女人們都僵住了，因為她們認出了警報聲。那是一陣尖銳刺耳、持續不斷的哀鳴。我驚呆了，我想這是我學會計算時間以來第一次失去時間感。原本坐著的女人們跳了起來，那些在柵欄前領取食物的人則向後退縮。警衛鬆開了鑰匙串，讓它掛在鎖孔上，轉身面對其他人。她們短暫地交換了一個眼神，然後全都衝向主出口，猛地推開雙扇大門——這是她們從未做過的事——奔了出去。</p>\n<p>她們衝了出去。自我們這些女人被囚禁以來，第一次，地堡裡只剩下我們。</p>",
  "<p>對我來說，最初的震撼很快就過去了。我衝上前去，將手臂伸進鐵欄之間，轉動鑰匙完成解鎖，然後連同整串鑰匙一起拔了出來。我推了一下艙門，它便應聲而開。我向後退了一步，雙手緊握，因為我手中正握著世上最珍貴的東西。我內心的時鐘再次啟動，可以這麼說，我們在那裡站了超過一分鐘，瞪視著敞開的門，仍然無法理解發生了什麼事。那震撼奪去了我的呼吸，我氣喘吁吁。我穩住自己，抓住鐵欄，跳過艙門，去解開牢籠的門。鑰匙圈上有好幾把鑰匙，我試了兩把才找到對的那把。由於我從未用過鑰匙，動作有些笨拙，但終究成功打開了牢籠的門。女人們看著我，像釘在原地一般動彈不得。她們的神情彷彿無法理解眼前發生的一切。</p>\n<p>「來啊，」我大喊著。「出來啊！」</p>\n<p>於是我奔向另一扇門。我完全無法想像那兒會有什麼。那門不過幾公尺之遙，使我納悶是否會撞見守衛，是否正一頭栽進危險之中，但我告訴自己，若有必要，那些女人會來援救，而四十個憤怒的女人足以對付幾個守衛，即使他們帶著武器。我穿過敞開的門，發現自己置身於一條寬敞而空無一人的走廊。兩側盡是通往房間的門，那些房間則是我一無所知的。</p>",
  "<p>第一個加入我的是安西亞，緊隨其後的是桃樂絲——就是那個質問過我的女人。她們臉上都掛著同樣難以置信的表情。她們開口說話，但話語全被警報器持續的哀鳴淹沒，我聽不清她們在說什麼。我發現自己也在說話，說著守衛不在了、他們走了、他們逃跑了之類的話。我不斷重複同樣的話，就像在陳述一個難以置信的真實，必須一說再說才能說服自己。我們徒勞地交談了幾秒鐘，然後警報器突然停下來，彷彿被自己的噪音噎住了。</p>\n<p>「她們走了。」我說。</p>\n<p>桃樂絲點了點頭。安西婭隨聲附和：</p>\n<p>「他們走了。」</p>\n<p>我們驚慌失措，只是呆站在原地，完全不知如何是好。接著，其他女人一個接一個出現，起初還有些猶豫，但隨著彼此打氣，她們開始推擠起來，擠滿了這條太窄、無法容納我們所有人的走廊。我退開來，走進其中一個房間，四處打量。我看見一張大桌子、幾張椅子和一些櫥櫃。當然，那時我還不知道這些東西的名字；我在它們之間迅速穿行時，看見了一些不認得的物品，因為我瞥見房間另一端有另一扇門。那扇門也開著，通往樓梯間。</p>",
  "<p>今天我說著樓梯這個詞，彷彿在那個時候，我就知道那是什麼、又正在尋找什麼。事實上，我們甚至不確定自己是否身處地下。女人們之所以這麼認為，是因為沒有窗戶。我從未站在樓梯腳下，但我聽過樓梯這回事，立刻明白了這是什麼。我跑上幾級階梯，然後轉頭呼喚——其實沒必要，因為安西亞和多蘿西已經跟了上來。她們比我謹慎——後來她們告訴我，她們很害怕守衛會突然出現，在跟我之前，她們曾對女人們大喊說可能得奮力一搏，而女人們回答說必要時她們寧可被殺，也絕不回到籠子裡去。我當時已不再想她們的事。我魯莽地跑上階梯；奔跑時帶著一種吞噬一切的狂喜，一種近乎沉醉的感覺，就像那段我從孤獨中走出來、開始與他人交談後，再也無法靠編故事來誘發的感受。我被一股強勁的衝動推著向前，倘若那時有守衛出現，就算他體型是我的兩倍大，我也會將他撞倒、踩在腳下；我被一種狂野的喜悅所佔據，顧不得其他一切。我爬著階梯，沒有喘不過氣，也沒有感到疲倦，儘管我從未一口氣直線走超過二十步。 我飛奔上階梯，就像後來夢境裡那樣——那些我曾聽女人們描述過的夢，夢中妳會升起、滑翔，如同我即將目睹的鳥兒順著氣流，毫不費力地飄移，在暮色中盤旋數小時，舞動不歇；而我正如舞蹈般躍上階梯，輕盈、漂浮，在一場令人心醉神迷的升騰中，朝向那前所未聞的未知、外界、不是牢籠的世界；我沒有任何思緒，只有一股源自內心深處的狂喜席捲著我，或許還有掠過腦海的影像，又或者只是奔湧而出、準備承接即將降臨之影像的字詞——天空、夜晚、地平線、太陽、風，還有更多、更多，那些多年來累積的無數字詞，正急著催促我前進。噢！我初次登上階梯的那一刻！每當憶起，我的雙眼便盈滿淚水，感受到那股衝動、那股勝利的浪潮。我想，我願意再經歷十二年的囚禁，只為換取那場奇蹟般的升騰，那份美妙的確信讓我輕盈到一口氣飛奔上百級階梯，無須停歇喘息，而我正笑著。</p>",
  "<p>猛然間，我發現自己已至頂端。我置身於我們後來稱為小屋的空間，三面牆壁與一扇門，門也敞開著，平原在我面前鋪展開來。我衝向前方，凝視著。那是世界。</p>\n<p>天亮了。天空灰濛濛的，但這灰不像碉堡牆壁那般死氣沉沉。大片色調微妙的雲層，在微風中輕輕流動。我認出那是雲——它們泛著珍珠般的光澤，背後透著陽光。一種奇異的情感哽住我的喉嚨，比方才那股衝上階梯的狂喜更為內斂、更為精緻。我多想在此流連，但還有太多事物等著去發掘。天正飄著細雨。命運安排我們在雨天裡重見天日。後來我們才發現，這個季節很少下雨。我踏出步伐，仰起臉龐，張開雙臂迎向這奇異的濕潤——我聽人說過，卻始終無法想像。幾滴雨落在我的掌心，我舔了舔，著了迷。裙子很快就濕透了，微風雖輕柔，卻將布料貼在我的大腿上，我覺得這美妙極了。</p>\n<p>「但我們究竟在哪裡？」身後傳來一個聲音問道。</p>\n<p>安西亞扶著氣喘吁吁的多蘿西。她們倆環顧四周，我也跟著張望。眼前只有一片綿延起伏的平原，從地平線的這一端延伸到另一端，一望無際。</p>\n<p>「我們在外面了，」我笑著回答，「而且一個警衛也沒有。他們全都不見了。」</p>",
  "<p>「我們離城鎮很遠，完全看不到任何房屋的跡象。我一直以為我們一定在某個大城市附近。」安西亞說道。</p>\n<p>桃樂絲皺起眉頭。</p>\n<p>「我從未見過這樣的地方。這片平原廣袤無垠，一望無際。我們不在我的國家，那裡總能看見群山。」</p>\n<p>安西婭看上去既困惑又焦慮，我不禁為她感到難過。</p>\n<p>「那又有什麼關係？」我說。「最重要的是我們出來了，自由了，而且沒有警衛了。」</p>\n<p>其他女人陸續抵達，氣喘吁吁、踉踉蹌蹌，我們便從小屋旁退開讓出空間。很快地，她們全都到了，驚奇地環顧四周，試圖弄清自己身在何處，一個接一個重複說著這輩子從未見過這般景象，幾乎因置身如此陌生的地方而恐懼。我無法理解，為什麼她們不全心全意為這奇蹟──終於來到戶外、從牢籠中獲得解放、看見天空、感受風雨──而歡欣鼓舞。她們一生都在渴望某樣東西，但如今得到了，卻認不出來。或許，當一個人經歷過有意義的日常生活後，就再也無法適應陌生感。這是個我──這個只體驗過荒謬的人──只能揣測的道理。</p>\n<p>「我害怕，」安娜貝爾說。</p>",
  "<p>她們蜷縮在一起，一小群驚恐的人，佇立在一片陌生大地的中央。在經歷了籠中的熟悉之後，這四十個女人互相緊靠著，被那廣袤無聲、毫無生息的寂靜弄得茫然失所。</p>\n<p>「如果他們回來了怎麼辦？」</p>\n<p>我明白她們試著為自己的恐懼尋找理由。我們掃視四周，放眼望去盡是石礫遍野的荒原，除了微風中輕輕搖曳的稀疏野草，萬物靜止不動。</p>\n<p>「我們不能留在這裡，必須離開、躲起來，」安娜貝爾說。</p>\n<p>「去哪裡？」法蘭西斯喃喃說道。「什麼都沒有。沒有建築，沒有遮蔽，沒有道路，就只有……」</p>\n<p>她凝視著我們走出來的那棟小建築。</p>\n<p>「就是這樣的小屋，在荒郊野外。」</p>\n<p>「我們迷路了。」一個聲音說道。</p>\n<p>未竟的話語化作低微的嗡鳴，一人接續前人未說完的部分，詞句彼此碰撞、翻滾交織。我突然動了怒。</p>\n<p>「那就回裡面去！地下的鐵籠還在那裡，要是你這麼害怕待在外面！」</p>\n<p>「哦，你和你那……」，安娜貝兒惱怒地反駁道。</p>",
  "<p>她頓住了。我想她原本要說的是「傲慢」或「叛逆」，但她很快就意識到我說得沒錯，這樣的恐慌對她們毫無幫助。我也努力克制自己，因為我感覺到一場爭論正要醞釀，那會給她們一個抒發焦慮的出口，並讓所有人團結一致反對我的意見。始終保持冷靜的安西亞，此時站出來支持我。</p>\n<p>「孩子說得對。我們必須思考，並且組織起來。我不明白守衛去了哪裡，也不懂他們為什麼消失，我也很害怕。他們離開地堡才沒多久，就完全不見蹤影了。」</p>\n<p>「十一分鐘，」我補充道，「從警報響起開始算起——或許還更長一點，因為我有一會兒失去了時間感。我們花了十一分鐘打開門、爬出去、走上樓梯。」</p>\n<p>「十一分鐘？我想，若是搭直升機或小型飛機，這點時間足夠讓他們消失得無影無蹤了。但我們呢？我們無法這樣消失。要走到那邊，走到地平線那邊，步行至少得花上兩三個小時。如果他們打算回來抓我們，我們很快就會被逮住。」</p>\n<p>「不是我，」安娜貝爾說，「我寧可死，也不會回去。他們愛怎麼給我下藥都行，我確信自己能把任何劑量精準的藥物變成致命毒藥。」</p>\n<p>「我也是。」葛蕾塔說。「我會停止呼吸。這一定是意志力的問題，我敢說你可以讓自己的心臟停止跳動。」</p>",
  "<p>這番話堅定了她們的決心，她們開始齊聲應和：「我也是」「我也是」。反抗正在醞釀，顯而易見，這次她們不會再措手不及——不像過去必然發生過的那樣——她們不會讓自己像那些無法想像屠宰場、因而能被牽去宰殺的驚恐牲畜一樣，被事態所吞噬。她們挺直身子，凝視著那片奇異的景致。雙腳更穩固地踩在地上，臉上綻開笑容。</p>\n<p>「下雨了。」法蘭西斯說。</p>\n<p>她像我剛才那樣伸手接住雨滴，捧到唇邊。接著，她摸了摸自己的頭髮和臉頰。</p>\n<p>「我全身濕透了。我忘了這種感覺是什麼樣子。已經過了這麼久……」</p>\n<p>「十二年了，」葛蕾塔說道。「妳看這孩子都長這麼大了。」</p>\n<p>她們轉向我，這個她們的時鐘，沉默地凝視了我許久，然後稍微散開。她們彎下腰觸碰地面。有人撿起石頭，露出乾燥的灰色土壤，因為雨水還沒滲透。安娜貝爾用唾液沾濕食指，舉起來觀察風向。</p>\n<p>「雲層很薄。現在應該是中午時分，你看太陽正高掛天空。如果風向照常的話，應該是從西方吹來的。」</p>\n<p>「當然，因為下雨了。西風總是帶來雨水。」</p>\n<p>「在你的國家或許是吧，但這裡可不是你的國家。」</p>\n<p>「噢，不！那會有山丘和森林！」</p>\n<p>這話讓她們笑了起來。她們需要緩解緊繃的情緒。</p>",
  "<p>「真奇怪，這裡連一隻鳥都沒有。下雨的時候，鳥兒會躲起來嗎？」格蕾塔問道。她這輩子只住過城市。</p>\n<p>「可是他們要到哪裡避難呢？放眼望去一棵樹也沒有，只有幾叢灌木。」</p>\n<p>「還有石頭，」桃樂絲說道。「這裡什麼也種不出來。我從沒見過這麼貧瘠的土壤。」</p>\n<p>「反正，我們也沒有什麼東西可以種。」</p>\n<p>那句簡短的話語在空中懸滯了一秒，彷彿眾人心智正抓住它、摸索它，然後擱置一旁以備後用。但它留下了一縷回音：</p>\n<p>「我們得準備些吃的，」葛蕾塔說。「該吃飯了，我餓了。真奇怪，因為在那底下，我從來沒覺得餓過。」</p>\n<p>食物就在地堡裡，放在推車上。一想到如果想吃東西就得再回去，女人們不禁打了個寒顫。</p>\n<p>「我們要怎麼煮它？我看不出來我們要怎麼煮！」</p>\n<p>「那又如何？我們總得吃東西，哪怕肉是生的！」</p>\n<p>安納貝爾宣布：「我不會下去那裡。我寧可餓死。」</p>\n<p>她們再次聚攏，肩並著肩，我想是在彼此的觸碰中尋求慰藉。總得有人去，而理所當然地，那個人是我。或許因為我只記得監獄這個世界，我是最不害怕的那個。當她們擠作一團時，我沒有加入，因此我獨自站在群體之外，她們的目光轉向我。我明白了，便對她們微笑：</p>\n<p>「當然了，」我說，「我會去。」</p>",
  "<p>我毫不耽擱，立刻朝小屋走去。她們跟在幾公尺之後，彷彿要給我支持，去做她們自己極度害怕做的事。我慶幸她們如此，因為抵達樓梯口時，我卻步了。要是守衛回來了怎麼辦？這些女人有能力抵抗嗎？一瞬間，我想像了一場駭人的屠殺——我從地下室上來，發現一堆屍體，而那些嗤笑的守衛正揮舞武器等著我。我繃緊自己，因為我不想做個膽小鬼，然後走下階梯。從那之後，我已經下去過上百次——這是少數幾件我沒數過的事之一——而每一次都同樣令人不快，就像走進一個隨時會合上的陷阱。當我獨自一人時，我養成了用小石頭堵住小屋門的習慣：這很荒謬，鎖已經生鏽，門閂也卡住了，風也從未強到能推動那扇沉重的木門，但我心裡踏實些。</p>\n<p>我以最快的速度衝下那百級階梯，但仍格外小心，因為我從未下過樓梯，深怕跌倒。接著我沿走廊奔跑，卻發現自己面臨一個難題：要搬運那些大鍋、紅蘿蔔和肉，還有水。我意識到自己得來回好幾趟，而且這很可能超出我的負荷。半小時前，我還興奮不已地往上衝，絲毫不覺疲倦，但此刻我已氣喘吁吁，頭暈目眩，雙腿顫抖。我盤算著得先跑一趟，於是將肉堆進鍋裡。爬到半途時，我遇見安西亞正往下走。</p>",
  "<p>「我原本不認為你能獨力完成。」</p>\n<p>「妳說得對，太多了。況且，我們只想到鍋子、肉和蔬菜，但也需要水——飲用水和烹飪用水——還有盤子。」</p>\n<p>「我們得生火。那邊，她們正在撿石頭和樹枝，但我們要怎麼點著火呢？」</p>\n<p>我們決定要先把我已經收集好的東西拿過去，然後再去探索其他房間。</p>\n<p>後來，我們對這個發現思考良久，但又一次，我們始終未能得出一個條理清晰的解釋。警衛們沒有寢室，連張床都沒有，安西雅對此感到詫異。那麼他們不在這裡睡覺嗎？難道他們每晚離開，早上再回來？他們又去了哪裡？</p>\n<p>「他們在十一分鐘內消失了，」安西亞低聲說道。「而我們沒有發現任何蹤跡。我不確定普通直升機能飛得那麼快。」</p>",
  "<p>抽屜裡有各種工具：鐵鎚、鐵釘、螺絲起子——這些我都得學會如何使用——還有日後會派上大用場的刀子和斧頭。安西雅發現四只大登山背包時欣喜若狂，她解釋這些背包的用途。接著我給她看一堆小盒子，裡頭裝著火柴，這解決了生火的難題。但最重要的是，我們發現了大量的糧食儲備。首先是堆積如山的罐頭，讓安西雅歡呼連連；她讀著標籤，以一種令我發笑的熱忱唸出菜名：德國酸菜、焗豆、肉醬，還有我從未嘗過的蔬菜。接著我們打開一間冷凍庫的門，裡頭滿是冷凍肉類與家禽，以及一袋袋的紅蘿蔔、韭蔥、芹菜和蕪菁。如此一來，我們生存下去便不成問題了。</p>\n<p>「我無法估算這一切會持續多久，但就算我們有四十個人，在我看來，這裡的物資也足夠維持好幾年。」</p>\n<p>她為所見的一切事物命名，我腦中很快便被學到的資訊塞得暈頭轉向。她本可再探索上幾小時，但我提醒她必須回去找其他人——他們還在等著我們。我們帶著肉、罐頭、大量的馬鈴薯和火柴返回。那些女人在大石頭之間堆起的細枝上，點燃了火。</p>\n<p>「桃樂絲很肯定你會找到火柴。」葛麗塔說，「男人身上總會帶著火柴。」</p>\n<p>我們又走回下方取水。這次，兩位較強壯的女人跟著我們一起。</p>",
  "<p>煮食時，雨停了，雲散了。太陽出來了，高懸於天際——女人們說，這表示已是正午時分。我們圍著火堆，三兩成群地吃了第一頓飯；而在牢房裡，每個女人總是各自取食，隨意坐下。食物很充足，甚至破天荒地剩下一些在鍋裡，這讓女人們開起玩笑：</p>\n<p>「我們會變胖的！」</p>\n<p>「嚴格節食了這麼多年，我們豈不是白費功夫了！」</p>\n<p>直到很久以後，她們才向我解釋為何覺得那件事如此好笑。奇怪的是，這些如今笑得如此輕快的女人，自從我們逃出來以後，還不曾開過玩笑。我一向嚴肅，而且始終如一。我想，她們是被接連不斷的打擊給壓垮了。</p>\n<p>「現在幾點了？」葛蕾塔問我。</p>\n<p>我驚訝地聽見自己回答說是晚上十點。從警報響起到現在，不過才三個多小時，而那一刻，我們醒來也還沒多久。所以，我們確實沒有遵循往常的日夜規律。</p>\n<p>「你最好把手錶調準，」安西亞笑了起來。</p>\n<p>「我該從何說起？」</p>\n<p>「我們今晚要觀賞日落。把那一刻當作你的起點，告訴我們明天日落時過去了幾小時。從一次日落再到下一次，就是一整天，對吧？」</p>\n<p>「我不知道。」多蘿西說，「這不是要看一年中的什麼時候嗎？」</p>",
  "<p>她們陷入了一場混亂的辯論，內容完全超出我的理解。夏季的白晝變長，冬季的白天縮短，但從一次日落到下一次日落總是二十四小時，不是嗎？沒有人完全確定這一點，就連最聰明的安西亞也不例外。我很快就停止聆聽她們的對話。反正，黑夜遲早會降臨：我們又要在哪裡度過呢？</p>\n<p>當然，不可能再回到監獄睡覺，而待在木屋附近的想法也不怎麼吸引人。我觀察著太陽的移動，感覺天黑前我們還有幾個小時。我提議先下去拿食物和毯子，然後遠離這裡。但該往哪個方向？如果警衛回來怎麼辦？在沒有任何道路痕跡的情況下，我們怎麼能預測他們會從哪裡出現？再說，他們是怎麼離開的？安西婭說房間裡沒有床鋪。這又引發了一連串新的問題，但多蘿西察覺到即將陷入混亂，便提醒女人們她認為最根本的問題：如果我們同意離開，就必須決定往哪個方向走。那麼該如何決定？安西婭指向南方：那個方向有個輕微的地勢凹陷，可以讓我們隱蔽起來。</p>",
  "<p>女人們極度擔憂守衛會回來，但她們再也沒出現過。她們花了很長時間才擺脫恐懼，而我實在無法理解，為何她們不能更快放下心來。守衛們轉瞬間便消失無蹤，不留痕跡，彷彿蒸發了一般。她們憑空出現，如今又回歸虛無，我對此並不如其他人那般驚訝——她們曾活在一個萬事皆有道理的世界。而我只認識荒謬，我逐漸明白，這點讓我與她們有著本質上的不同。我們自由了。</p>\n<p>事實上，我們不過是搬到一座新的監獄罷了。</p>\n<p>安西亞和我來回了幾趟，把所有需要的東西都搬下去。女人們在機艙外等著我們，接過我們扛著的物品，我們便立刻再次往下走。第三次時，她們抓住了我們，神情既欣喜又興奮。</p>\n<p>「快來看！快來看！看看我們做了什麼！」</p>\n<p>離我們坐下來吃東西的地方不過幾步之遙，有一叢灌木，不算茂密，卻相當高。她們拔掉了中央的灌木，雙手都刮傷了，又在四周蓋上毯子。我們帶來了兩把鏟子，她們就用那鏟子挖了個洞。我不明白。</p>\n<p>「這裡是廁所。」她們得意洋洋地宣布。</p>\n<p>「我們又變回人了。」桃樂絲宣布，「我們可以私底下處理自己的事，不受他人目光打擾。」</p>",
  "<p>我早已習慣監獄裡的廁所，因此一開始並不理解安西亞的欣喜。她眼眶裡含著淚水，走向那座臨時搭建的設施，停下來，微笑著問道：</p>\n<p>「裡面有人嗎？」</p>\n<p>她們全都笑了。</p>\n<p>「不，這裡是自由的，你可以走。」</p>\n<p>「這邊走。」其中一名婦人說道，掀開毯子露出一道入口。</p>\n<p>安西亞走進帳篷，放下身後的毛毯，佇立了片刻。當她再度現身時，告訴我輪到我了。</p>",
  "<p>女人們抱怨必須在公開場合排便，這讓我學到許多，也終於讓我體會到這件事的重要性。我隱約感覺到，她們正邀請我參與過去的生活，進入那個她們共同談論的世界——現在我看出她們不再打算將我排除在外——儘管我早已知道自己永遠無法真正踏入其中。於是我走向那塊被毯子圍起的小區域，她們屏息注視著我。我能看出她們正給予我極其珍貴的東西，而我缺乏熱情的反應讓自己感到不安。我撥開那粗糙硬挺的布料，穿過後讓它落回原位。頓時，一股奇異的陌生感湧上心頭。我的心怦怦直跳，頭暈目眩。我環顧四周：只看見帶刺的枝條和褐色毯子的皺褶，在我與其他人之間形成一道屏障。我打了個冷顫。但我很快明白了：這是我生平第一次獨自一人。沒有女人看得見我，我也看不見她們任何一人。這讓我感到極度不安。我茫然地佇立在那裡，審視著自己的處境。我發現了身體上的孤獨——對其他人而言是再平常不過的事，卻是我從未經歷過的——而它立刻吸引了我。</p>\n<p>幸好。</p>",
  "<p>我用過那個洞，但心裡很不自在，因為我得雙腿大開、身體半彎著，維持一個極不舒服的陌生姿勢。我慶幸沒人看到我這副模樣——明明從前坐在馬桶上、當著其他女人的面排便，我也從不覺得難為情。事後，我按照指示拿起鏟子掩埋糞便，卻因沒有水可以清洗而煩躁，生怕弄髒了自己。於是我走出了茅坑。後來，安西亞教我用一把樹葉來處理。</p>\n<p>葛蕾塔和法蘭西絲克服了重返地窖的厭惡感，在女人們準備行囊時陪伴我們往返了幾趟。我們每個人都把毯子的四角打結，做成簡易布袋，用來裝罐頭、肉類，以及各種我們認為派得上用場的物品。我們出發了。三個大水壺由六位女人輪流抬著，每兩人抬一個，我們頻繁換手，確保抬水的人不會疲累跌倒而灑光所有水。光是準備工作就花了一個多小時。出發時，太陽似乎已行至天際的四分之三處，我們希望能在天黑前抵達那片淺窪地。</p>",
  "<p>安西亞、我和另外兩位幫忙的婦女都累壞了。我們上下樓梯超過十次，而過去這許多年來，我們從未直線走過十公尺以上的距離，即便是那點距離，也是以規律的步伐行進，因為奔跑是不被允許的。其他人發現了我們的狀況，便幫忙分擔一些行李。桃樂絲見我踉蹌，便問是否有人能幫我扛包袱。後來，這種事再也沒發生在我身上，我很快就成了最強壯的人，大概是因為我是最年輕的。無論如何，我是最容易適應環境的人，或許是因為我從未經歷過別的生活，心中沒有滿懷的遺憾。</p>\n<p>我們腳上穿著露趾涼鞋，這拖慢了行進速度——碎石總從鞋孔鑽進來，扎得我們一瘸一拐。有幾個女人試圖赤腳走路，卻發現腳底可能被磨破。是蘿拉想到辦法，從裙襬撕下布條裹住雙腳。不久，我們全都學她這麼做了。</p>",
  "<p>山頂上，我們停下腳步回頭望去。那片廣袤乾涸的大地紋絲不動。我們再次啟程，頻頻回頭張望，而當小屋一從視線中消失，我們就想停下腳步，但眼力特別銳利的葛蕾塔說她估計下方有水，因為她似乎看見灌木叢間閃爍著粼粼波光。我一路低著頭走路，儘管穿著臨時湊合的襪子，仍不斷設法不讓自己受傷。我抬起頭來，但即使後來我才發現自己的視力極佳，當時卻完全想像不出河流穿過灌木叢會是什麼模樣。有水的預期提振了我們的士氣，於是決定繼續前進。葛蕾塔沒看錯，半小時後，我們放下行囊，脫去衣裙，奔向那清淺涼爽的水流。</p>\n<p>我如此深愛我的第一次沐浴，以致於以為自己永遠不願離開。我躺在溪流床上，長髮飄浮在水中，待了很長一段時間。若不是過了一會兒開始感到寒意，我大概就要睡著了。</p>\n<p>我們原以為自己累得感覺不到飢餓，但等我們洗完澡、休息過後，還是生起了火。木頭燒得很快，不久就只剩餘燼，女人們用鐵絲編了一張網來烤肉。這是我頭一回吃到不是用水煮過的東西。滋味鮮美極了，我覺得自己根本不想停下來。事實上，我想我嘴裡還含著食物就睡著了！</p>",
  "<p>我在半夜醒來。我驚奇不已：到處都是黑暗！我睜大了眼睛，卻幾乎看不見自己的雙手。天空是一片黑暗的巨塊，令人有些恐懼，彷彿隨時會塌陷下來。我花了很長的時間才意識到，原來又是烏雲密布。</p>\n<p>我感到壓抑，便試圖回想女人們曾告訴我有關星辰的事，那些遙遠的星座與星系，來安撫自己。但另一股焦慮隨即襲來——無盡虛空的感受、暈眩、對墜落於這奇異黑暗中的恐懼，以及永無止境地旋轉於虛無之中。我蜷縮成球狀，彷彿要保護自己，接著意識到自己正躺在另一個女人身旁，甚至觸碰著她。這讓我驚跳起來，本能地退開——因為想起鞭子——然後才記起守衛已經不在了。即便如此，我仍不喜歡與其他身體接觸，於是輕柔地挪開。那是唯一一次體驗到那股衝動，讓我在那晚撲進了法蘭西絲的懷裡。有人為我蓋上了一條毯子，我覺得既奇怪又感動。</p>",
  "<p>我靜靜躺在女人們之間，這些我生命中的同伴，她們在我四周沉睡。一陣輕風拂過，葉片沙沙作響，我聆聽著這陌生的聲音。我身處一個不同的世界，萬物都如此陌生。從那天早晨起，我便無時無刻不在學習。我感受到一陣幸福的湧動：無論發生什麼，我已經離開了地堡，而且，和其他人一樣，我知道自己寧死也不願回去。我已經無法理解自己當初怎能忍受住在那裡。我對自己說，如果這沒有奪去那些女人的性命，那是因為人無法因悲傷而死。</p>",
  "<p>我看見日出。天色在我注視下逐漸轉淡，雲朵消散，天光漸亮——先是灰濛濛的，而後隨著太陽升高，轉為金黃。我聽見鳥鳴，也看見幾隻鳥兒在高空飛翔。女人們陸續醒來。她們面露驚訝，彷彿黑夜讓她們忘了自己已經逃脫。接著她們大笑，彼此呼喚。我們走到河邊洗漱，進一步探索時，發現一處夠深、可以游泳的地方。安西雅在水中扶著我，想教我蛙式，但我怕極了。我無法聽從她的指示，膝蓋還磨破在石頭上。不過，我還是成功漂浮起來，而且很喜歡讓自己順著溫柔的水流漂移。之後我們吃了幾罐罐頭。女人們生了火，設法聚集大量熾熱的餘燼，把馬鈴薯放在上面煮。第一天的大部分時間我們就這麼度過：為了愉悅而吃，一再回到河裡沐浴，在還不算太熾烈的陽光下慵懶度日。但我們仍被守衛的恐懼糾纏，最後決定由兩三個人輪流從山丘頂端監視小屋。輪到我的時候，我說我不需要人陪。我有種感覺，自己會享受獨處。</p>\n<p>那天傍晚，疑問再次浮現：我們在哪裡？我們打算做什麼？</p>\n<p>這裡是地球嗎？</p>",
  "<p>他們問我從一次日落到下一次日落相隔多久：根據我的時鐘，約莫是二十二個半小時多一點。顯然，這什麼也證明不了，因為我們根本不知道我的心跳頻率到底是多少。這些女人中沒人見過在如此溫和的氣候中有這般荒蕪的石頭曠野，但她們都承認自己見識不廣，在前世生活中從未費心鑽研地理。她們的知識僅限於居住地周遭，以及故鄉小鎮附近幾條散步路線。當然，她們看過以未曾造訪的國家為背景的電影，但地球如此遼闊！植被如此稀疏確實有些古怪——幾叢看似眼熟的小樹，像是聖櫟、黃楊和落葉松，但天啊！她們實在難以記清，還有種不尋常的草。沒有任何野花，但這不代表什麼，因為或許不是對的季節。她們注意到沒有昆蟲，但從這點也推論不出太多。地形以長而起伏的波浪朝地平線延伸，但將其形容為丘陵地帶未免誇大。然而，我們又該如何接受這裡並非地球的念頭呢？</p>\n<p>「我們必須找到一座城鎮，」她們決定。</p>",
  "<p>但若那些城鎮仍屬守衛所有呢？若我們再次被捕呢？有數不清的爭論，最終卻都淪為徒勞，因為事實是，我們從未找到任何城鎮。我們並不急於動身：置身戶外的喜悅、在河中沐浴的歡暢、隨心所欲吃飽的滿足，已令我們變得慵懶。我們就那樣耗費數日，在散漫的辯論中度過，而這些討論也總被各種享樂輕易打斷。</p>",
  "<p>我不再像從前那樣滿懷激烈的敵意；我的憤怒已經平息。不再因恨意沸騰、執意挑剔同伴們的毛病，我意識到她們並不擅長長時間維持一條思路，或將一個論證貫徹到底。安西婭是唯一能做到這點的人。她說的某些話讓我明白，她們思緒不清是長期被藥物控制的結果。或許我自己本可以更聰明些、想得更深入，當後來我獨自一人時才發現這點。比如說，找到那條路之後，我沒想到要往兩個方向都走走。這個念頭直到最近才浮現，但我現在已無力去做了。此外，她們受的教育並不多：這些女人在那些神祕事件發生之前，都是打理家務、養育孩子的家庭主婦，或者做著售貨員、女侍、收銀員之類的工作——這些職業是逐漸有人解釋給我聽的。只有安西婭受過教育：她當了幾年打字員後，重回校園成為護士，在我們被囚禁前剛取得資格。她遺忘了許多。其他女人缺乏遠見，做事毫無條理。她們很快就陷入例行公事；從未培養過用不上的技能。總體來說，這點沒有改變，桃樂絲、安西婭和我很快就擔負起照料我們生存的責任。</p>",
  "<p>我曾厭惡多蘿西，只因她純粹憑年齡掌權；但當我發現她是第一個思考關鍵事務的人時，我開始尊敬她。每次女人們開始討論卻又迷失方向，多蘿西總會得體地打斷她們，提出有用的建議。我明白她的權威來自智慧，但我並不打算等待她的命令。我寧可像她那樣預先思考。幾天後，我們發現已經用掉了一半的存糧。</p>\n<p>「我們得回去多拿些食物，」她說，「並且把下面的物資列張清單。之後，再決定要留在這裡還是離開。」</p>\n<p>在她的心中，那個「我們」指的仍然只有Anthea和她自己，但我知道，這個群體很快就會包括我。</p>\n<p>安西亞和我帶著大約十五名婦女前來。她們不打算進入地堡，但會幫忙搬運我們帶上來的所有東西。也有人提議她們應該負責警戒，我認為這毫無意義，便對安西亞說了。</p>\n<p>「你或許是對的，」她回答，「但如果有人能在一樓守夜，我也會感到安心些。誰也說不準。我們對他們為何離去、如何離去一無所知，所以也無法確定他們不會回來。」</p>\n<p>這很有道理。在一個你不知道規則的世界裡，根本無法預測會發生什麼事。</p>",
  "<p>於是我們循著來路返回小屋，愈走近，腳步聲中便愈顯沉默。我向來話不多，卻早已習慣生活在持續不斷的絮語聲中，而此刻，耳邊只剩腳下礫石的嘎吱作響。</p>\n<p>「如果要走路，我們需要更好的鞋子，」安西亞觀察道。「這幾雙涼鞋撐不過兩天。」</p>\n<p>在匆忙離開之際，沒有人留心我們匆匆經過的那些房間，但我依稀記得曾看見靴子，和警衛穿的款式頗為相似。</p>\n<p>「問題在於我們一共有四十個人！」葛蕾塔驚呼道。「若赤腳行走，腳底會變硬，所以也許我們應該⋯⋯」</p>\n<p>但她沒把話說完，也沒有人像往常一樣開始猜測。我們越來越接近了，一種不祥的預感使我們沉默不語。我們不經意間放慢了腳步。</p>\n<p>「什麼都沒變。」安娜貝爾在我們抵達小屋時說道。</p>\n<p>微風輕拂。只要我們停止交談、靜止不動，它便在我們耳邊低吟著同一首歌。這天，雲朵回來了，天空高遠而蒼白。我見同伴們在發抖。</p>\n<p>「我們走吧。」我催促道。</p>\n<p>我們置身於露天之下，而我在厭惡中退縮：當我們走到約莫三分之二的路程時，那氣味朝我襲來。安西亞解釋道：</p>\n<p>「那是我們自己的氣味，滯留不去。你已經忘了它。通風系統提供的空氣勉強能呼吸，但也僅止於此了。」</p>",
  "<p>然後我聽見了：那是我一生都聽過的嗡嗡聲，我這才意識到，自從來到外面，我就一直隱約為它的缺席感到不安。</p>\n<p>「而且燈一直亮著，」我指出。「這很奇怪。不是應該一切都關閉、停擺了嗎？」</p>\n<p>「在這個世界裡，我們要怎麼分辨什麼是正常？反正也無所謂！我們根本沒想到那點。」</p>\n<p>燈光始終未曾熄滅。</p>\n<p>我們兩人都無意踏入那間囚禁鐵籠的大房間。但我們還是強迫自己先進去察看，以免破壞了探索的興致。當我們見到一切都與離開時別無二致，最後一絲不安也消散無蹤。我們本想帶走那些床墊——畢竟這些日子都睡在鏟子整平後的泥地上，還打趣說連監獄裡僅存的舒適都弄丟了。</p>\n<p>「它們太重了，」我抗議道，「如果我們要繼續前進，我不知道要怎麼帶著它們走。我們可以把它們搬上去，但只有決定留下來的時候才能用得上。」</p>\n<p>「那樣就太荒謬了。我們必須尋找文明。」</p>\n<p>「什麼文明？」</p>\n<p>安西亞看著我。</p>\n<p>「妳是什麼意思？」</p>\n<p>我聳了聳肩。</p>\n<p>「你想想看。這顆星球屬於他們，那我們除了那些囚禁我們的人之外，還能找到什麼？我可不想見到他們。」</p>\n<p>「妳覺得我們在另一個星球上。」</p>\n<p>那不是一個問題，而是一個陳述。我對自己所說的話並非完全確信。我始終未能真正查明真相。</p>",
  "<p>隨後我們走進右側的房間，裡面有張桌子與幾把椅子。靠牆處立著六座高而窄的櫥櫃，安西亞告訴我這叫置物櫃，工作場所總會有這種讓人存放物品的櫃子。櫃門都敞開著。每個櫃裡找到兩雙靴子，我記不清這是否就是之前見過的那幾雙。安西亞把它們取出放在桌上。此外還有兩件襯衫、兩條內褲與兩條長褲。</p>\n<p>「這些東西可能會很有用。但數量不夠。」</p>\n<p>抽屜裡有針線，還有一些我無法辨認的物品。</p>\n<p>「剪刀、鈕扣和拉鍊——用來縫補她們的制服。」安西亞說道。</p>\n<p>僅此而已，這令她感到困惑。</p>\n<p>「沒有照片，也沒有信件，沒有個人物品，但確實，他們原本就不住在這裡。那些東西大概都收在別處。他們離開得太匆忙，根本來不及收拾東西。」</p>\n<p>她突然停了下來，皺起眉頭。</p>\n<p>「怎麼了？」</p>\n<p>「但如果他們不住在這裡，那那些襯衫和靴子又是怎麼回事？」</p>\n<p>她聳了聳肩。</p>\n<p>我們穿過那個存放罐頭的房間，前往另一頭的冷儲藏室。安西亞停下來檢查門上的溫度計。</p>\n<p>「零下五十度！這些食物是設計來保存很久的。也許新鮮的補給並不是經常送達。」</p>",
  "<p>我們迅速取走了我們所需的物品。我感到非常寒冷——這是一種對我而言全新的感受，令我痛苦不已。安西婭見我發抖，便去拿來一條毯子，將我裹在其中。</p>\n<p>「妳千萬要小心，別生病了。我不知道該怎麼讓妳好起來，我到現在都沒見到任何像藥的東西。雖然她們以前老是給我們藥丸！坐下休息吧，我去熱點水。」</p>\n<p>在另一間房裡，我們曾見過一只小爐子和一只比我們用的小得多的煮鍋。安西雅翻找著能為她給我泡的飲料增添風味的東西，卻驚訝地發現一個包裝袋底部只有幾片茶葉。我並不怎麼喜歡這新味道，但還是乖乖地喝了，它讓我暖和起來。</p>\n<p>於是我們回到第一個房間。安西亞開始尋找咖啡或更多茶包，但什麼也沒找到。我幫不上什麼忙，因為我不識字，那些標籤對我而言毫無意義。那裡有許多工具：在工具這一項我們從不匱乏，但我們完全不明白為何它們會被存放在此。我先前已提過鐵鎚和釘子，但那裡還有鋸子、刨刀、各種鉗子、十字鎬、鏟子以及好幾把開罐器。安西亞認出了其他幾樣物品，但它們的名稱與用途我都記不得，因為我從未有機會使用它們。</p>",
  "<p>我們取走了鋸子和鏟子。我們發現了一大堆毯子，和我之前拿到的那種一樣，不過全是新的。這些大概是一直存放著，等待需要時取用。</p>\n<p>「照我們這樣消耗的速度，這些足夠撐上兩百年！」安西亞驚呼道。</p>\n<p>我們用它們來捆紮那些要帶上頂層的物品。</p>\n<p>「我們沒辦法全部帶走，太多了，這麼多年來幾乎什麼都沒做，我們太虛弱了。」</p>\n<p>百級樓梯已夠令人卻步，但我們扛著這樣的負擔，又該如何攀爬上去？</p>\n<p>「我們可以用那輛推車，」我提議道，「只要能把牠弄上樓梯就行。」</p>\n<p>推車既重又寬。樓梯是筆直的，所以我們不至於卡住，但這重量讓我們感到遲疑。</p>\n<p>「我們試試看。」</p>\n<p>走了十步之後，我們便喘不過氣來。我們得完全將推車抬離地面，以免損壞輪子——輪子壞了就白費力氣了。</p>\n<p>「葛蕾塔既勇敢又強壯。要是她下來幫忙，我們就能辦成這件事。」</p>",
  "<p>我們呼喚著，因為確信女人們正在入口處等待我們。葛蕾塔自願加入我們的行列。行進速度緩慢，我們必須頻繁停下來休息，以免耗盡體力。當法蘭西絲和安娜貝爾看見我們有多疲倦時，她們克服了內心的不安，下樓去取我們準備好的包裹。我們只帶了足夠兩天的肉食，因為非得回來補充新鮮物資不可，而床墊因為太重只能留下。我仔細關好身後冷藏庫的門，在最後一刻，我又為桃樂絲帶了一把椅子。</p>\n<p>回程十分緩慢。我們得為推車清出一條路，發現自己正在鋪設一條小徑。安娜貝爾走在前頭，去請求額外的協助。</p>\n<p>「可是這條路會告訴他們我們在哪裡！」其中一名女性抱怨道。</p>\n<p>安西亞與葛蕾塔聳了聳肩。漸漸地，所有敢下樓的女人們都得出了結論——守衛永遠不會回來了。廢棄的房間裡，毫無他們存在的痕跡，如此徹底的終結，讓人無法想像會有人走進來宣稱：「這是我的。」</p>",
  "<p>我們迅速組織成小組：一些婦女在前方清除石頭，其他人則跟在後面，用鏟子刮平地面。只要遇到任何微小障礙，我們就會停下推車，清理路面。由於車子載重過大，需要好幾個人合力才能讓它再次啟動。抵達時，火堆已熊熊燃燒，烤好的肉在等待著我們。多蘿西坐在她的椅子上用餐，我們則圍繞在她身旁。</p>\n<p>「我們必須離開，」她說。「我們不能賴在這裡，像寄生蟲一樣靠著地堡過活。我們必須保有人的模樣。我想知道我們身在何處、是誰囚禁了我們、又是為了什麼。我不想在一個不知名的地方，坐在椅子上等死。」</p>\n<p>奇怪的是，她剛剛才描述了自己的命運。</p>\n<p>「我們有毯子和許多線。我們會縫製背包，每個女人盡可能多帶些東西。往北走或往南走都無所謂，既然我們不知道追尋之物究竟在哪個方向。」</p>\n<p>「也不確定我們會不會高興找到它，」安西亞低聲咕噥。</p>",
  "<p>——「葛蕾塔、安西亞，還有那孩子，先下到地堡裡去拿些罐頭回來。我們得估算每個人每天要吃的食物有多重，看看一名女子是否扛得起兩個月份的糧食。接下來我們會步行，慢慢鍛鍊體能。等過一陣子，一天應該能走上十二到十五英里，這樣算下來總共能走六到九百英里。這段時間裡，我們肯定會碰上些什麼。否則……」</p>\n<p>她打了個寒顫。片刻的沉默後，安西婭打破了寂靜：</p>\n<p>「如果我們帶兩個月的糧食，就只能走一個月的路。我們得考慮回程。」</p>\n<p>無人出聲。我們不願相信將會一無所獲。但夜裡，看不見任何燈火。從前，總有人類存在的跡象——道路、飛機——即使在沙漠上空也是如此。這片空曠的平原與靜默的天空，給人一種無人居住之地的感覺。</p>\n<p>「我們兩天後出發。明天，我們來打包背包。」</p>\n<p>那晚，天空放晴了。日落之後，夜幕降臨，我凝視著星星許久。安西婭仰臥著一動不動，雙眼睜著。</p>\n<p>「你醒了嗎？」</p>\n<p>「我不確定這是地球上的天空。我找不到大熊星座，那是我過去唯一能辨認的星座。在南半球，你能看到南十字座，但我不知道它長什麼樣，也不曉得它在哪裡。」</p>",
  "<p>隔天，我們忙得不可開交。我們往返地下碉堡好幾趟，囤積食物；又將工具、鏟子和平底鍋分成四十堆。十個女人縫製背包，盡可能將它們縫得堅固。我們本想帶著推車，但它會大大拖慢我們的腳步。現在回想起來，我不明白為何那時大家都覺得非帶著它不可。彷彿我們都預感了即將面臨的處境，卻執意要否認它。安西婭尤其堅持要保留輪子。她向我解釋了一串複雜的道理，說輪子是一切技術的原點。最後，她找到方法把推車拆解開來。每個人分擔了一部分零件。我們也會帶著那把椅子。</p>",
  "<p>我們的進展相當緩慢，原因是桃樂絲和另外兩位年長婦人——伊莉莎白與瑪格麗特。每隔一小時，我們就必須停下來讓她們休息；但凡遇到斜坡，無論多麼和緩，她們都無法一口氣走到頂端。我總是搶先走到前頭，急著想知道另一邊究竟有什麼，卻屢屢失望——因為那裡除了平原，什麼也沒有，一道平緩的凹谷之後又是另一道隆起的坡地。那些女人望著我歸來，期盼我能看見房屋、道路、或任何指標，但我只是搖頭。我們翻越了三道寬闊的起伏地勢，夕陽西沉時，我們又見到一條河——比第一條小些——於是決定就地過夜。我們迅速紮營：用石頭堆砌爐灶、在灌木叢中挖個坑當作廁所、掛起三條毯子隔出隱私。晚餐時分格外沉默，失望感已然蔓延開來。</p>\n<p>「我們早該料到了。」安西亞說。「他們把監獄蓋在遠離一切的地方，大概是打算讓它永遠維持秘密。」</p>\n<p>女人們立刻抓住這個念頭。她們不願沉浸在悲傷中，很快便找到方法，重新開啟關於我們囚禁歲月的舊話題。過了一會兒，她們甚至又笑了起來。夕陽西下時，蘿絲開始唱歌。</p>",
  "<p>我驚呆了。我從未聽過音樂，幾乎不曉得它的存在。「看，天空多美！」安娜貝驚呼，所有人都轉頭望向夕陽。面對這出乎意料色彩的壯麗，幾聲驚嘆很快便消散了。我認不出那些顏色，我從未見過那樣的粉紅與紫紅，只見過碉堡的灰。一道道紫色摻著紫羅蘭色的長痕……有些雲帶著綠意，被金色光芒穿透。這景象讓我屏息，正想問安西亞時，蘿絲的歌聲響起，清亮而有力，打破了寂靜。我感到一陣顫動，像那場爆發的遙遠回音，但這震顫持續更久，讓我眼眶泛淚。她唱了很久，其他女人無聲地跟著動嘴唇。太陽在悠長而溫柔的喝采中消失，暮色籠罩了平原。</p>\n<p>後來，我在睡夢中感覺到被人抱起：是安西亞用毯子裹住我。這一次，我沒有本能地因想起守衛與鞭子而退縮，但也沒有重新入睡。我隱約感到一陣不安。星光吸引了我，令我著迷。我凝望許久，它們看似靜止，卻又移動，緩慢得讓我無法追蹤其軌跡。蘿絲的歌聲仍在耳邊縈繞。</p>",
  "<p>過了一會兒，我去上了廁所。回來的路上，我注意到有些女人兩人一組，遠離群體，裹在同一條毯子下糾纏著。我覺得這很奇怪。等到有機會和安西亞談起這件事時，她聳聳肩告訴我，她們不過是給彼此能給的。我沒有追問，因為能感覺到她的尷尬。</p>\n<p>我們走了二十六天，每天晚上都有那股哀傷，然後是蘿絲的歌聲。她從不重複唱同一首歌。起初，她唱的是以前學過的曲調，後來便開始編歌，發揮出她自己也不知道擁有的天賦。第二十七天，我們停下吃午餐時，我像往常一樣在女人們準備食物時繼續往前走，第一次，我看見了什麼東西。在我們飯後將要往下的長坡半途中，矗立著一棟小小的方形建築，看起來和我們離開的那間小屋如此相像，起初我還以為我們一定是繞了個圈。但這片地勢不同。這間小屋不在平原中央，也不像我們的那間面朝南方，那敞開的門正對著我。我衝向前去，然後才意識到我應該告訴其他人。於是我往回走，瘋狂地揮舞著手臂，她們便丟下爐火和鍋子來跟上我。我強迫自己等待她們。我也已經成了一個好夥伴。</p>",
  "<p>她們跑上前來，連多蘿西也氣喘吁籲地趕了過來。安西亞和我一路攙扶著她下山，我很慶幸這項任務能幫我壓住不耐煩。我們在那半掩的門前站了一會兒，不知所措，滿心恐懼：說不定有守衛？我邁步上前，把門朝自己拉開。鉸鏈已經生鏽僵硬。我用力一拉，它們吱呀作響地鬆動了。我看見樓梯，燈還亮著。空氣中有股難聞的味道。我走進去，安西亞和多蘿西緊跟在後，我們開始往下走。沒有人說話，彷彿對即將發現之事的預感，正開始沈重地壓在我們心上。</p>\n<p>氣味迅速變得濃烈，我們才下到樓梯一半，就已經令人難以忍受。最勇敢的女人緊跟在我們身後，我們能聽見她們的驚呼聲。桃樂絲停下腳步，撕下裙擺的下緣，做了一個簡易的面罩，遮在鼻子前。我們也如法炮製。這幾乎無法減輕氣味，但我們覺得自己受到了保護。我們繼續向下走，盡可能減少呼吸，時不時停下以免喘不過氣。女人們一個接一個沉默下來，唯一聲響是我們腳步在樓梯上的輕柔踢踏聲。我們抵達了底部。那兩扇巨大的木門敞開著，就像警報響起那天我們自己的監獄一樣。我跨步走進去，猛然停住，被恐懼凍結在原地。</p>",
  "<p>那是深夜的半明半暗，但我仍看得見那鐵籠：地板上橫七豎八地躺滿了死去的女人。她們似乎無所不在——橫陳在床墊上，彼此交疊，有人緊握鐵欄杆，三五成群堆疊成堆，散落在駭人的混亂中。有些全身赤裸，有些衣衫襤褸，扭曲成驚恐的姿態，嘴巴與眼睛張開，拳頭緊握，彷彿她們曾在瘋狂中互相廝殺，直到死亡將她們奪去。</p>\n<p>在這裡，警報聲在人造黑夜中響起，門鎖上了，而守衛們——當然！——懶得去打開它。女人們曾試過。在飢餓奪走她們性命之前，她們早已因悲痛而死。沒有食物，憤怒而絕望，她們用殘存的力氣去抓鐵欄杆，試圖在沒有鑰匙或工具的情況下撬開鎖，手指流血，試圖達成不可能的事——病了、瘋了、筋疲力竭地倒下，然後又爬起來用赤手空拳攻擊鋼鐵，尖叫、哭泣、茫然，有時恢復神智，凝視自己的命運，再以憤怒逃離它——如今她們發出惡臭，腫脹、腐爛發綠，滿是蛆蟲在腐朽的身體上蠕動，一幅諷刺的畫面，若非那難以置信的運氣，這本可能是我們的命運。</p>",
  "<p>我們的同伴們朝我們走來，起初腳步倉促，隨後漸漸放慢停下。安西亞、桃樂絲和我被緩緩往後推，最終發現自己背靠地堡牆壁排成一列，離籠子越遠越好，四十個活生生的女人凝視著四十個死去的女人。我們佇立良久，駭然無語，隨後桃樂絲跪了下來，我聽見她輕聲說道：</p>\n<p>「聖母瑪利亞，天主之母，為我們這些可憐的罪人祈禱……」</p>\n<p>後來，她告訴我們，這段記憶是從童年深處打撈上來的。當時她的祖母瞞著父母，偷偷教她那些基督教的禱詞。</p>\n<p>其他女人也跪了下來，隨著她複誦那些字句，彷彿在駭人景象面前，古老的儀式重新獲得了意義。混雜的話語發出低沉的嗡鳴，飄盪在恐怖的屍堆之上，接著傳來蘿絲的歌聲。她一開口，那豐厚而有力的女高音便充盈了整片空氣。我聽不懂歌詞，但那曲調如此緩慢、哀婉而深邃，以至於恐懼化作悲痛，我感到心頭一緊。她停下來後，我們一片靜默，隨後悄然離去，一個接一個，緩慢地走回原路。</p>\n<p>當天晚上，安西亞解釋說，蘿絲用拉丁語唱了為亡者祈禱的詩歌，而拉丁語早已死去許久，如今只用於儀式。我不明白，直到現在仍不太懂什麼是儀式，但若有人讀到這些文字，他們會懂的。</p>",
  "<p>那一天，我們都沒有離開。回到營地後，沒有人吃得下東西，我們就那樣靜坐了好幾個小時，誰也沒有開口說話。直到黃昏時分，我們才勉強吃了點食物，重新開始交談。原來我們不是唯一的囚徒。還有另一個地堡，和我們的那個一模一樣。這兩個事實讓我們徹底崩潰。我們對自己的遭遇一無所知：有時候，我們的發現似乎能為這一切帶來一絲曙光；但有時候，卻讓一切變得更加撲朔迷離。如今回想起來，我只能說，我們發現自己陷入了更深的荒謬之中。</p>",
  "<p>我說她們有四十人：我們第一時間便覺得她們的人數與我們相當，但沒有人真正數過。第二天我數了數，才發現她們只有三十九人，卻有四十張床墊。大概其中一人在警報響起那天之前便已死去，屍體被移走了。後來我們討論時，仍說是四十人，因為她們是與我們平等之人，是我們那不幸的對照組。我仔細查看那串鑰匙是否掉落——我們想打開鐵籠，將屍體運出，埋葬在平原上——但我什麼也沒找到。我們試著用帶來的工具撬開鐵欄杆，但或許是欄杆太堅固，又或許我們中無人知道該如何下手——我們失敗了。最後，安西亞與我關上那扇巨大的雙扇門，這便是我們能獻給她們的唯一儀式。我們本想立一座墓，將它封好，或留下訊息，告訴人們這扇木門之後躺著四十名死於某個瘋狂無名之事的女子，但我們沒有書寫工具，木頭又太硬，無法刻字。</p>\n<p>我們依照上一個避難所的方式，清點了這兩個房間的內容物，並發現了同樣的東西，包括靴子——這很幸運，因為我們的涼鞋已經破爛不堪。我們再次找到了新鮮的肉類，並補充了罐頭食品的庫存。</p>",
  "<p>三日後，我們再度啟程。一股沉滯的倦怠悄悄佔據了我的同伴們。她們鮮少交談，夜晚總是靜默無聲，唯有蘿絲唱歌時眾人會隨聲應和。我明白她們不想思考，為了不用面對必然的結局，為了不墜入絕望。她們堅信能尋得城鎮與文明。而我早已預料，除了這些小屋之外，什麼也不會遇見——我想她們也隱約感覺到了。我不認識她們向我描述的世界，無從想像，每當費力攀上漫長陡坡，卻只見到另一道低谷時，我從不意外，因為我心中從未有過清晰的景象可供對照。但她們低落的氛圍終究感染了我，我也失了跑在前頭的興致，於是第三間小屋是葛蕾塔發現的。我們只稍稍加快腳步，被隱約的不安拖住了步伐，隨著我們走下山坡，心裡對鐵籠是否敞開、裡頭的人是否逃脫、是否終有一日會在平原上相遇，已不抱太多期待。迎接我們的是沖天的惡臭。</p>",
  "<p>我們預期會找到女人，但來的卻是男人。他們也曾嘗試逃脫——試圖鬆開其中一個洗手台，拆下管線，做成工具來撬開鎖頭。然而一切都在他們的努力下徒勞無功：管線雖被扭彎卻未斷裂，陶瓷馬桶歪斜傾倒，卻始終無法砸碎。屍體散落四處，狀態與那三十九個女人如出一轍。空調仍在運轉，氣味會逐漸消散，但屍體將永遠留在這裡——有些已成木乃伊，有些化為白骨，有的赤裸，有的裹著破布，襯衫撕裂，褲子剪裁自與我們衣裙相同材質的薄布。他們以各式各樣的姿勢癱倒在地，毫無尊嚴，成為這難以理解之事的悲劇見證。蘿絲淚流滿面，拒絕下來，我們也沒有吟唱死亡之樂。我們從儲藏櫃裡取走一切可能用得上的物品，立刻離開，盡可能地走遠，以免在萬人塚旁紮營。</p>",
  "<p>我們又繼續走了好幾個月，從此之後，我們從一個萬人塚到另一個萬人塚。我們對是否真能抵達某個城鎮已感到絕望。我們的期望已經改變：我們希望有一天能發現一個敞開的籠子。我們甚至決定留下造訪過的痕跡，好讓其他人——如果還有其他人的話——知道。我們在每間小屋的門前清理出一塊地面，用石頭排成一個大大的十字。Anthea向我解釋說，那是基督教的標誌，是我們祖先的宗教，在很久很久以前，它曾是受迫害者的象徵。沒有人再害怕警衛會再次出現，我們完全不知道他們怎麼了，但我們確信他們已經不在了。我們還用箭頭標出我們打算繼續前進的方向。</p>\n<p>「但假如這世界上還有像我們一樣四處遊蕩的人呢？十字架和箭頭這麼顯眼，他們很可能也會用同樣的符號，畢竟他們也只有石頭可以寫字！我們需要一個簽名，」桃樂絲宣稱，「否則，我們可能會遇到自己的記號卻認不出來。」</p>",
  "<p>她們不知該選擇什麼。在從前的世界裡，人們會簽下自己的名字，但在塵土中寫下四十個名字？事實上，是三十九個，因為我們從不知道我的名字是什麼，而那些女人都叫我「那個孩子」。我們該選什麼？一個圓圈？一個三角形？兩條平行線？最後，安西婭建議在圓圈上方加上一個十字。</p>\n<p>「這樣就能讓她們知道我們是女人。我們還需要別的嗎？」</p>\n<p>「或許還有其他女人。」葛蕾塔說，「我們不妨再添些什麼，既然我們什麼都不知道——不知道身在何處、不知為何在此、也不曉得將往何方——那就添個問號吧。」</p>\n<p>每次這項工作需耗費我們整整一天。我們當中有幾個人會回到那座囚禁男人的碉堡，在地面畫上巨大的符號。我們的碉堡與最早那座滿是女屍的碉堡並未留下標記，但許多其他碉堡都有——並非全部，因為當我孤身一人後，便不再繼續在地面書寫那些記號。我已不再相信會有任何生靈到來。</p>",
  "<p>我們走了兩年，以小規模的進程逐步前行，後來決定必須停下：桃樂絲日漸虛弱。她自己也意識到了，卻不願說出口。我們能看出她越來越遲緩。某天早晨，她試著起身時一個踉蹌，立刻明顯再也站不起來。安西亞將耳朵貼在她胸前：心跳極其微弱。我們決定等她好轉，但兩天後，她卻變得煩躁不安。</p>\n<p>「等下去毫無意義，」她說。「我老了，肯定超過七十五歲了，我的心臟只會越來越弱。我們必須繼續前進。」</p>",
  "<p>多虧了我們一直隨身攜帶的工具，我們得以搭建出一種簡易擔架。我們砍下兩棵筆直勻稱的樹木，削去枝幹，再用緊密編織的布條將椅子固定在樹幹上。桃樂絲非常虛弱，一直覺得冷，我們便用毯子將她裹住，然後把她綁在椅背上，由四人輪流抬著她，小心翼翼地踩著同樣的步伐以免顛簸。但這個方法只維持了幾天，因為連這樣她都覺得疲憊，而久坐也開始讓她感到疼痛。我們於是在兩根木桿上橫綁樹枝，好讓她能躺著被搬運。她不住地道謝，說自己感覺好多了，但我們看得出她呼吸急促，移動時她多半閉著眼睛。起初她還會睡覺，任何動靜都能驚醒她，但後來我們發現，換人抬她停下來時，她已不再有反應。安西雅說她陷入了輕度昏迷。有些女人想讓我們停下，但桃樂絲醒來後堅決反對：</p>\n<p>「如果你停下來，我會對自己說，再過半小時我們或許就能找到什麼，然後我會帶著憤怒死去。我希望一直走下去，直到嚥下最後一口氣。」</p>\n<p>這就是桃樂絲死去的方式，女人們輕輕搖晃著她，而安西亞則走在她身旁握著她的手。過了一會兒，她再也感覺不到她的脈搏了。我看見淚珠沿著她的臉頰滑落。</p>\n<p>「結束了。」她說道。</p>",
  "<p>其他女人趕上了我們，一行人繼續前行直到日落。三十九個女人與一具屍體，拖曳成一支長長的、零散的隊伍，橫越平原，穿越這不可能的一切，不情願地佔據這片虛無，陪伴著那位固執的女人——她一心求死，不留片刻歇息。</p>\n<p>我們在夜裡將她埋葬。天空飄著細雨。羅絲的葬歌懸盪在原野上空。</p>\n<p>我們在那座墓旁停留了數日，彷彿不願遺棄桃樂絲，也彷彿再也沒有理由繼續前行。我認為我們之中沒有任何人仍相信那些會拯救我們的城市，或是一個籠子敞開的碉堡。幾乎每個傍晚，安西亞都凝望天空，思索我們身處何方。她說，若在地球上，我們理應注意到季節的更迭，但在這裡，經過數月，白晝幾乎未曾縮短，天氣也未顯著轉涼。應該要有暴風雪或熱浪才對，而不是這種幾乎無雨、植被稀疏、一成不變的氣候。何必繼續前進？她說，我們永遠不會更清楚自己的所在，只會不斷靠近另一個碉堡，然後一個接一個地死去。</p>\n<p>從那時起，我完全明白，總有一天我會是最後一個。</p>",
  "<p>然而，我們既不知該往何處去，也沒有更好的理由留下，便再次啟程。至今我們一直向南走，如今改變了方向。眼前仍是那些小屋、碉堡與屍體。當瑪麗-珍生病時，我們決定停下。等她的病好轉再說，我們這麼說，但心裡明白，這是要等到她死去為止。</p>\n<p>我與瑪莉-珍並不親近。她是個相當不引人注目的女人，總是默默跟隨、從不提出任何建議。需要生火時她會去撿柴，揹著柴火也不會喘不過氣；行走時既不是最後一個，也不是第一個。事實上，她沒有任何突出的地方。我想這就是所謂的隨和吧。她是那些不獨自入睡的女人之一，經常和艾瑪在一起——艾瑪是第一個認為這顆星球不是地球的女人。確實，我們人這麼少，每個人都認識彼此，但某些情感上的契合還是形成了鬆散的群體。我和瑪莉-珍不在同一個群體裡，而是和安西亞、葛麗塔、法蘭西斯在一起——也就是說，和多蘿西組成的、負責做決策的那個群體。或許這就是她們所謂的友誼吧，但無論如何，疾病將我們所有人聚集在一起。</p>",
  "<p>瑪麗-珍腹部疼痛。有一天，她流了很多血——她原本以為自己早已停經，接著疼痛便開始了。那晚，她幾乎沒怎麼睡，一陣痙攣般的疼痛將她驚醒，其來得突然，使她不禁叫出聲來。我們全都趕緊跑到她身邊。她立刻鎮定下來，我們聽見她低聲呻吟，雙拳塞進嘴裡，額頭沁滿汗水。我們站在她身旁，無助而絕望。起初，她要我們回去睡覺，說我們幫不上什麼忙，但沒有人能夠離開，最後她也就接受了我們陪在身邊。</p>\n<p>艾瑪用濕布輕輕擦拭她的額頭，安西亞在她腹部放上熱敷墊，瑪莉珍說這能緩解疼痛。發作逐漸平息，她在痛苦中筋疲力竭地沉沉睡去。我們便在她身旁的地上躺下，讓自己再度入睡。某個早晨醒來時，我們發現她已不在我們身邊。</p>",
  "<p>我們停在離一間小屋很近的地方，以便能輕易取得物資。我們坐在那兒，驚訝地彼此對望，在眾人中尋找她的身影。這時我想到，或許該下去地下避難室看看。她就在那裡。她將自己的毯子撕成一條條布條，繫在一起，然後吊在鐵條上，與四十具男性屍體並排懸掛。我們決定將她留在那兒。我們只是割斷繩索，將她平放在地上，用另一條毯子——我們所擁有的最新的一條——仔細包裹好。她的雙手交疊在曾讓她痛苦萬分的腹部上，而這回，蘿絲終於同意下來，在地下避難室裡唱了一首歌。然後，我們像往常一樣，在身後關上門。我們在地上畫下我們的符號，便離開了。</p>\n<p>但這一次，我們是為了尋找一個可以定居的地方。彷彿這兩人的死亡讓我們確信，這個星球上或許根本沒有什麼不是「地球」的地方。我們希望找到一條離地堡不遠的河流，能滿足我們的需求——就像我們正要離開的那個地方一樣。但當然，我們也不想離那個曾有人不得不自殺以結束痛苦的地方太近。桃樂絲的死讓愛她的人感到悲傷，但她年事已高，那是一個非常安詳的結局。瑪麗-珍的死則是一場震撼，讓我們感到恐懼。年紀較大的女人們不願談論這件事。大概正因如此，我們幾乎立刻便離開了。</p>",
  "<p>幾週後，我們找到了目標：河面寬闊，中央水深及大腿，兩岸樹木茂密。我們決定用大石塊和泥巴混合成的灰漿來建造房屋。屋頂則使用鋸下的樹幹。我們注意到，在某些水流較緩的地方長著水草。這些水草曬乾後可以編織成繩索，用來捆紮成厚實的細枝捆，就是我們所謂的茅草——雖然我們也不太確定這個詞的真正含義。後來我們發現，把這些水草混進灰漿裡能增加強度。我們的目標很樸實：第一間房子邊長四公尺。花了兩個月才蓋好，下雨時躲在裡面格外舒適。當然，所有人都無法同時擠進去，但待在屋外的婦女們會像逃脫以來那樣擠在一起取暖，知道下次下雨就輪到她們了。第二間房子蓋得較快。我們決定蓋成長方形。樹木不高，無法用單根橫樑支撐整個屋頂，但我們設法用石柱撐起樹幹交錯銜接，整體結構十分穩固。此外，我們知道這裡從不颳強風。</p>\n<p>也許它仍矗立著。</p>",
  "<p>我們從附近的掩體搬來椅子和桌子，並由四名最強壯的婦女陪同，去其他掩體取家具。我們也拿了床墊。我們常發現有些床墊就放在籠子的邊上，只需從鐵欄杆之間拉出來即可。我們絕不拿那些要移動就必須驚擾死者的床墊。床墊通風一陣子後，氣味便會消失，變得完全可用。有時我們會有意外發現：一塊布料、一批線、一袋涼鞋——這些都很實用，因為儘管靠著掠奪，我們現在每人都有雙靴子，但停下腳步時，我們更偏愛穿不把腳包得緊緊的鞋子。我們丟掉了那輛手推車，因為知道每個掩體裡都有一輛，而掩體多得是。我們找到了一輛新的，將它拆開、帶回來，再用它來運送建材往返各處。總共我們蓋了五間屋子，第一間成了廚房。我們裝了煙囪，因為設法造出了一種爐子：我們把空罐頭敲平，再用鉗子把邊緣折彎，將它們拼接在一起，然後再次敲平，這樣就製成了一塊大金屬爐板，架在石牆上。我們在下方生火，一個爐灶就能同時加熱好幾個鍋子。我變得擅長鋸木，能做出木板來搭建架子存放食物，也能做長凳。</p>",
  "<p>我非常享受建造的過程，也很樂意繼續下去，但其他女人不願意：在四十人共擠一個籠子之後，她們滿足於九或十人住一間屋子。她們談起從前家中的設施，例如自來水和浴缸——那些都是過去的事了，我們必須學會遺忘。我感覺她們比我能更輕易適應這種定居的生活。有時，我會爬上一座山丘，凝視著平原。我想繼續前行，內心開始躁動不安。於是我會想出一些事情來做，多一張桌子或一條長凳；最巧妙的是設計了一套可移動的木板系統，讓人能夠坐在廁所上。我將鋸成兩半的樹幹組裝起來，做成便於運輸的活動隔板，這樣我們就不用再用灌木叢和毯子了。那是一項漫長而複雜的工作，我想獨自完成。若有人幫忙，反而會掃了我的興致。當我想不出有什麼可建造時，我就會說鋸子鈍了，需要釘子或鉗子，然後說服其中一個女人跟我一起進行為期數週的遠征。回來之後，我會提出一個新點子，讓自己忙上一陣子，而這些點子總是離不開製作某樣東西。但我們的需求實在太少，最終我再也想不出什麼新花樣。年復一年過去。生活相當單調，但有一天，與安西亞的一次偶然談話，喚起了我學習的渴望。</p>",
  "<p>我們只剩下三十八個人了，分散住在四棟房子裡。我們做了安西雅口中的上下舖床，這樣床墊就不會佔滿所有地板空間。我和安西雅、葛蕾塔、蘿絲、安娜貝爾、瑪格麗特——年長者之一——還有丹妮絲、蘿拉和法蘭西絲同住。我們這群人都隨和務實，很少爭執。那些因自然氣質相近而形成的群體，在我們搬進房子後變得更加涇渭分明——這點我非常理解，因為我也不想太靠近總是亢奮的卡蘿，或是陰沉難聊的瑪麗。那些伴侶組合仍令我困惑。有時她們會激烈爭吵，又喊又叫，我納悶是什麼事能讓人如此激動。我極度害怕提問，這是早年留下的後遺症，但安西雅察覺到我的困惑，便向我解釋女人之間能做些什麼。我覺得那很怪異，因為我痛恨任何人碰觸我——她把這歸因於鞭子的記憶。</p>\n<p>「既然如此，男人是為了什麼？」我問道。</p>\n<p>她對我的無知感到訝異。</p>\n<p>「沒人告訴我，我怎麼會知道？那些有男人屍體的地堡裡，有些人赤身露體，我看得出來他們的身體構造和我們不同。我想這跟愛多少有些關係。你們以前常提起這個話題，但已經很久沒討論了，而我仍然一無所知。」</p>\n<p>接著，她重複了我聽過無數次的話：</p>\n<p>「告訴你有什麼用呢？這世上再也沒有男人了。」</p>",
  "<p>怒氣在我體內翻騰，但我已不再是那群女人中的小女孩：無論最初我年歲幾何，我們在外已過了七年，我肯定超過二十歲了。我是那些會思考、會組織我們共同生活的女人之一。我變得熟練，會鋸木、釘釘、縫紉和編織，我不想被當成孩子對待。</p>\n<p>「因為我想要知道！有的時候，你學到的東西確實有用，但這不是最重要的。我想要知道一切可以知道的事物。不是因為它有什麼用處，純粹是為了求知本身的喜悅。現在，我要求你把你知道的一切都教給我，即便我永遠也用不上。別忘了，我是最年輕的那個。總有一天，我很可能會成為最後一個，到那時我或許需要知道些什麼，為了那些我現在無法想像的理由。」</p>\n<p>接著她告訴了我一切——男人、陰莖、勃起、精液和孩子。這花了些時間，因為要學的東西太多了，我記不住細節，她不得不反覆說明。我的記憶力很好，但安西亞說，就算是世上最好的記憶也無法一次記住所有事。她也向我解釋了我自己的身體。因為我沒有月經，所以我並不知道自己有陰道。她對此感到驚訝。</p>\n<p>「但你一定注意到了，感受到了什麼，就算只是在妳洗澡的時候？」</p>",
  "<p>接著她推測，像我這樣從出生起就始終被他人圍繞著長大的人，恐怕沒能真正親密認識自己的身體。當然，我確實仔細地為自己擦洗，從肛門到陰戶，就像那些女人吩咐我每次上完廁所後該做的那樣——但那些清潔動作並未讓我知道，身體的這些部位擁有特別的質感。我沒有跟她提起那次顫慄，那件事其實早已被我遺忘，直到很久以後，我才將那短暫的悸動與愛情的歡愉連結起來。</p>\n<p>我們的談話相當隨興，因為安西亞常常對我的無知感到驚訝，以至於忘了解說的思路。我試著想像自己的身體內部。有時她會清理出一塊地面，在泥土上畫圖。她告訴我關於胃、腸道，還有心臟、血管與血液循環。我對一切都充滿興趣，問她的問題甚至超出她所知的範圍。</p>\n<p>「在我受訓成為護士的時候，我學了很多東西，但考試過後從未用過，如今都忘了。況且，我認為長年受藥物影響也讓我忘掉了一些記憶。桃樂絲大概死於心臟衰竭。她臨終之際，我試著回想：心臟衰弱會影響循環系統、腎臟和肺臟，這一切都是環環相扣的完美邏輯系統——我曾覺得這套系統如此美麗——但我卻想不起它的運作機轉。」</p>\n<p>「那對你又有什麼用呢？」</p>",
  "<p>「沒有，妳說得對，因為我沒有任何藥物。我試過了，明知毫無意義，只因為我需要知道。就像妳一樣。」</p>\n<p>我能感受到自己的腸道，裡頭有咕嚕聲、脹氣，還有規律的排便。我的生殖器官卻一片死寂。出於好奇，有時我去河邊洗澡時，會試著尋找自己的陰道：我只能勉強插入指尖，因為處女膜像門擋住走廊入口般，將它密封起來。我猜想它又長又窄，兩端都封閉著，就像地堡裡的走廊：入口處有那道屏障——只有男人能用陰莖突破的屏障；再往深處，則是子宮頸——只有即將出生的嬰兒才能穿過，從體內的大房間離開。我想像那兒有光滑柔軟、暗紅色的壁面，而在最深處、最內層的入口，是輸卵管的微小孔洞——在我的身體裡，從未有過卵子沿著它們旅行。接著是輸卵管綴滿流蘇般的葉狀結構，包裹著卵巢——那裡本該進行最重要的工作，即卵子緩慢而規律地成熟。但我的卵子是不孕的，也許在這個毫無用處的世界裡，它們早已萎縮、乾枯。我的大腦知道沒有男人存在，便命令腦下垂體無須操心性腺——它忙於應付肝臟、脾臟、胰臟、甲狀腺、骨髓，以及其他維繫我生存的種種功能。何必費心投入一件毫無意義的任務？它從未允許任何卵子成熟。它只勉強讓我的乳房和陰毛成長，接著便放棄了。當我在地堡裡營養不良時，身體本該補償失血的損失，但身體已認定：既然沒有精子可用，卵子就無須釋放、游向子宮。我的子宮內膜是平坦的。我從未見過犁過的田，因為我們沒有種子；我們沒有任何東西可以播種，而我的子宮永遠不必擴張以容納嬰兒，所以就算它縮小或枯萎，也無關緊要。</p>",
  "<p>說起伴侶之事時，安西亞也曾解釋過有一種自己來的辦法。在探索自己身體的過程中，我想知道能從中得到什麼。我讓手指長時間遊走於那些據說能帶來快感的區域：黏膜感受著手指，手指感受著黏膜，但僅此而已。我並不意外，因為我一直隱約覺得自己跟別人不一樣。</p>\n<p>當我們完全安定下來，住進如今稱為「村莊」的地方，我有時會感到不滿足與不耐煩。我本想繼續尋找，但當然，我甚至不知道自己究竟在找什麼，於是我努力克制自己的煩躁。安西雅把她所知的一切都教給了我：與她交談時，我漸漸發覺自己經常犯下語言錯誤，而她總是不自覺地糾正我。她解釋了文法是什麼，我欣喜地發現又有新的事物可以學習。</p>\n<p>「可是我們之中沒有人能教你文法！」她對我說。「我們這裡甚至連一個小學老師都沒有。」</p>\n<p>「可是當你糾正我時，你是根據什麼來判斷的？」</p>\n<p>她思索著。</p>\n<p>「關於習慣。還有模糊的記憶，那些我曾知曉卻難以再回憶起來的準則。」</p>\n<p>「難道你不能告訴我一個故事嗎？隨便哪一個都行？」</p>\n<p>我看著她集中精神，就像從前她第一次嘗試心算時那樣。她對我微微一笑。</p>\n<p>「關係子句是由關係代名詞引導的子句，用以修飾其前的名詞或代名詞。」</p>",
  "<p>「噢！什麼是子句？還有名詞？還有代名詞？」</p>\n<p>我對這些詞彙一概不熟悉，因為我當然不是系統性地學會說話，而是靠鸚鵡學舌般模仿聽到的內容。安西婭開始解釋得有些混亂，便叫瑪格麗特來幫忙，接著是海倫——她曾和伊莎貝爾一起試著教我九九乘法表——沒多久就有好幾個人圍過來，激烈地爭論著，拼命回想她們僅記得的那些知識。她們並不反對繼續我未完成的教育，也發現自己同樣能從中學習。「何不試著把話說得更好呢？」她們說。蘿絲會唱歌，能為我們帶來珍貴的愉悅，但每個人都能說話，也該從中享受樂趣。我是個用功的學生。對其他人而言，這不過是場打發時間的遊戲，她們玩了一陣子就膩了：我們缺少娛樂，但對於任何能提供的消遣，從未拒絕過。</p>\n<p>我們開始發展起培養少數可及樂趣的想法。幾位女性重新對自己的外貌產生了興趣，既然現在我們有了剪刀和梳子——葛蕾塔在地堡裡找到了兩把——我們便開始打理起頭髮。我們用鐵絲扭成髮夾，曾是理髮師的愛麗絲為那些想留長髮的人盤起髮髻。但這樣的日子並沒持續太久，因為梳子上的齒牙開始脫落，而我們也無從替換。</p>",
  "<p>我們也下跳棋：那是安琪拉的主意。她要我鋸些木板，把它們釘在一起。然後她用燒焦的木棍畫出格子，我們得鋸出小圓木片，把一半塗黑。她們教了我規則，但我始終不是個好棋手，因為我看不出贏棋有什麼意義。</p>\n<p>「但這是最優秀的滿足感，還有運用你的頭腦！」安西婭說道。</p>\n<p>我明白善用腦力帶來的愉悅，但我覺得花這麼多力氣，最後卻只是把棋子收進空盒子裡，或是在棋盤上擺好又重頭來過，實在荒謬可笑。</p>",
  "<p>我們沒找到太多其他東西。我們很想為自己做些衣服，但布料和針線依然難以取得。我們過著平靜的生活，後來，情侶間的爭吵也停止了。年長的女人們明顯衰老，她們遺忘了當初將她們聚在一起的那點激情。死亡再次驟然降臨：某天早晨，貝娜黛特沒能醒來。就像瑪麗-簡一樣，她是個低調的人，一直到這突如其來的結局都保持如此，完全出乎意料。然後瑪格麗特變得非常虛弱，她失去記憶，認不出我們，也無法站立。她只肯接受流質食物，並開始失禁。我依照安西亞的指示，做了她所謂的架子，並在床墊上挖了個洞，鋪上樹葉，我們定期更換，但即便如此，我們屋子裡仍瀰漫著難聞的氣味，她的生命就在那裡逐漸消逝。伊莉莎白——我們流浪初期曾是她的愛人——過來和我們同住，彷彿瑪格麗特的困境重新喚起了她的感情。這樣持續了兩個月，然後情況突然惡化，她變得心神錯亂，夜裡做噩夢時會尖叫。接著她會找到力氣起身跑出去，或是被可怕的暴怒攫住。她就這樣死去，咒罵著。突然間，當她與試圖幫助她的女人們掙扎時，她僵住了，瞪著伊莉莎白，伸出手臂像要打她，然後一陣痙攣襲來。她挺直身軀，清晰地說道：</p>\n<p>「不，這絕不可能！」</p>\n<p>然後便倒地死去。</p>",
  "<p>我們在樹林中央選了一處空地作為埋葬之地，先是貝爾納黛特，後來是瑪格麗特。我們為她們每人立了一個小墓碑，用石塊堆成一個小丘，並插上木製十字架，刻上她們的名字。婦女們用舊刀子盡力刻劃，再用火中燒紅的木炭烙出字跡。第二座墳墓就緊挨著第一座挖掘，婦女們稱這個地方為墓園。蘿絲唱起了歌。村莊籠罩在一片深重的哀傷之中。</p>\n<p>死亡早已悄然發動。下一次，它又會選中誰？一種模糊的憂傷蔓延開來。我想她們都在暗自思索：在這片異鄉土地上苟延殘喘有何意義？這裡除了墳墓，什麼也等不到。但她們從不談論這件事。不再沒完沒了地閒聊瑣事，只是沉默地來來去去，緩慢地，彷彿被無可逃避的命運壓得抬不起頭。日子流轉，月復一月，那股迫在眉睫的災難感終究消散了。直到有一天——如今最年長的伊莉莎白對我們笑著說——我才真正明白。</p>\n<p>「下一個就輪到我了，看看我還是多麼精力充沛！」</p>\n<p>她剛從林子裡回來，抱了滿懷的粗樹枝要當柴火——說來也是，她連氣都沒喘一下。</p>",
  "<p>於是我們再次開始規劃未來。冷凍庫裡還存有大量肉類，但海倫與伊莎貝爾計算過，以我們三十六人的數量，頂多撐不過五年。我忍住沒說——大概也不只我一人如此——我們的人數會減少。不可能從其他地堡補給物資，最近的地堡徒步要十天路程，肉類在半路就會腐壞。有人提出遷移的念頭，想到能再造一座村莊，我興奮不已。我喜歡建築工作，開始構思新的格局，甚至變得相當激動，主動提議為那些想要多點隱私的人增建房屋。我已練就一身技藝，但除了偶爾釘個架子，鮮少有機會施展才能。我的建議獲得贊同，幾位與伴侶同住的女子表示，其實她們更想獨居。但最迫切的問題是我們的衣著：連衣裙都已破爛不堪。我們其實可以赤身裸體，這氣候如此溫和——至少在炎熱季節是如此——但女子們反對。多年來在守衛監視下毫無隱私的監禁歲月，使端莊成為無人願意放棄的奢侈。此外，肥皂也幾乎用罄。我們決定朝西方派出一支探險隊，那是我們尚未探索的方向。四人啟程：丹妮絲、法蘭西絲、葛蕾塔與我，因為我們最年輕強壯。安西亞的年紀或許與同行三位女子相仿，但她擔任護士，唯有她能理解女子們的病症，或許還能——儘管缺乏藥物——找到些許療法，因此她最好留在村莊。我們的任務是取回布料、涼鞋、肥皂與鹽，同時勘查另一處地點，以備我們真的決定遷移之需。 留在原地的人承諾會砍伐樹木，將它們鋪平晾乾，好讓我們回來時就能使用。</p>",
  "<p>那是一趟愉快的遠征。我們用石頭排列成巨大的箭頭標記路線，以免在這片單調的景色中迷失方向。我們從一座山丘頂走到另一座山丘頂，好將周遭景物盡收眼底。直到第九座碉堡，我們才找到布料，但早在第二座碉堡裡，我們就發現了一包咖啡。我從未嚐過咖啡，也不太喜歡它的味道。我看著同伴們欣喜若狂地尖叫，想像著其他人見到他們帶回如此驚人的發現時會有多麼高興，但我卻無法分享他們的興奮。我們找到了足夠的鹽和肥皂，卻沒有一雙涼鞋，這讓我們感到沮喪，直到丹妮絲說，我們幾年前就該想到，拿那些皮靴來割取靴筒做成涼鞋。</p>\n<p>「我們還真是不太會隨機應變，對吧！」葛蕾塔苦笑著說。</p>\n<p>「我們來自一個不需要這些東西的世界，一切都是現成的，我們從來不問東西是怎麼生產出來的。」法蘭西絲回答。</p>\n<p>她們和從前一樣不喜歡談論過去，本該什麼都不再多說，但這段徒步路途漫長，正是個好機會。因為安西亞教會了我許多事情，我提問時也更大膽了些。</p>\n<p>「告訴我那時候是什麼樣子，」我說。「你們是怎麼生活的？」</p>",
  "<p>起初，她們不願回答，隨後才鬆口。一開始她們是在對我說話，但到頭來發現彼此從未聽過對方的生平故事，便趁機享受這難得的機會。法蘭西絲結過婚，有兩個孩子，叫保羅和瑪麗。災難發生時，她正計畫生第三胎，但因記憶過於模糊不清，她不知道自己當時是否已懷孕而流產，抑或只是單純想再生一個。丈夫名叫勞倫斯，她二十三歲時認識他，當時正剛經歷一段她以為自己永遠走不出來的失戀。她一邊說著，一邊不斷重複：</p>\n<p>「可是這一切也太普通了，跟所有人都一模一樣！」</p>\n<p>彷彿她並不明白，對我來說，沒有什麼是平凡的，因為我從未經歷過任何事。</p>\n<p>「這孩子說得對，事情發生在自己身上時，從來就不尋常。」丹妮絲說。「我沒有生過孩子，但我一直想要，也總是羨慕那些有孩子的人。」</p>",
  "<p>當她們全部的人生都已被粉碎時，她正經歷第二次離婚，因為，她說，她總是選錯男人，而且從未與他們幸福過。葛蕾塔無法理解丹妮絲為何一再結婚。她自己從未結婚，卻與同一個情人同居多年，過得非常幸福。這讓丹妮絲大為震驚。於是她們開始爭論婚姻究竟是好是壞。在那片沒有男人可嫁的荒原上，她們辯論著背叛與離開哪個更好，然後突然放聲大笑。連我也看出了這處境的荒謬，跟著笑了起來。回想起來，我發現自己笑過的次數遠比想像中多。但後來，她們哭了，而我再也無法理解她們。接著她們為我感到難過，因為我永遠不會體驗到愛情，就像她們談到巧克力或漫長熱水澡的喜悅時一樣；我相信她們的話，卻無法真正想像她們在說些什麼。</p>\n<p>葛蕾塔與那個她從未嫁給的男人生下了一個兒子，但她們除了為孩子們命名外，從不談論自己的子女。在這個話題上，我的問題始終無法突破她們的防備。後來，安西雅試著向我解釋她們的沉默。</p>",
  "<p>「你無法理解，而我自己也沒有孩子，所以大概也無法完全明白，但想想她們的孩子可能遭遇什麼事！像你一樣獨自長大，在一群無力妥善照顧他們的陌生人之間？還是被殺害了？或者像動物一樣被丟進四十人一群的避難所裡生活，最後因缺乏照料而死去？她們不願去想自己的孩子。那些孩子大概都死了，這樣也好。如果法蘭西絲懷孕了，她肯定流產了。你從未見過孩子，不知道那是什麼意思——他們的脆弱、他們的信任、你對他們的愛、那份焦慮、願意為救他們而犧牲自己的性命，而想像一個孩子在受苦，更是無法承受。」</p>\n<p>確實，我對這一切一無所知，也對自己的童年毫無記憶。或許這就是我和其他人如此不同的原因。我必然缺少某些使人成為完整人類的經歷。</p>",
  "<p>我已不太記得她們所說的故事了，大概是因為有太多事物是我從未經歷、也無法想像的。她們會說：「我們去跳舞了。」跳舞是什麼？她們解釋著，兩人一組，面對面。丹妮絲將左手放在法蘭西絲的腰際，右手高舉在空中，然後她們開始旋轉。是的，但音樂呢？手風琴或小提琴的聲音？她們數著華爾滋的節拍，一、二、三，一、二、三。長久以來數著自己的心跳，我能理解重複的節奏，卻永遠無法想像樂團的聲音，也想像不出那些讓她們害相思病的男孩們的笑聲，更無法想像雪紡或絲綢裙擺在她們身邊旋繞、讓她們如此美麗的窸窣聲。她們說起黎明時分偷偷溜回家、生氣責罵的父母、親吻、被拋棄的戀人、那些她們深愛卻不愛她們的男人——這一切在我腦中攪成一團。漸漸地，我不再請她們訴說她們的世界，也放棄了試圖想像它。我很清楚自己來自那個世界。我曾有過父親和母親，他們大概也去跳過舞，然後結了婚或分開了，最後像法蘭西絲和勞倫斯一樣被災難撕裂。或許我在地堡裡見過的某具女屍就是我的母親，而我的父親正像木乃伊般躺在某座監獄的鐵欄旁；他們與我之間的所有連結都已斷裂。沒有延續性，我所來自的那個世界對我而言全然陌生。我沒聽過它的音樂，沒見過它的繪畫，沒讀過它的書籍——除了在避難所找到的為數不多的幾本，而我讀懂的也寥寥無幾。我所知道的只有石漠、流浪，以及希望的逐漸消逝。我是個無用的後代，來自一個我一無所知的種族，甚至不知它是否已然滅絕。或許，在某個地方，人類正在星光下繁榮興盛，渾然不知他們的骨肉血脈中有一名女兒正在寂靜中度過她最後的日子。 我們對此無能為力。</p>",
  "<p>這樣的想法理應令我落淚。但淚水從不湧上眼眶，唯有當我想起安西亞——那位我真正相識的女子。我無法為不曾擁有過的事物哀悼。</p>\n<p>每晚我們都會蒐集成堆的枯木生火。我們烤了幾根塗上芥末醬的香腸——這些醬料是我們找到的幾罐存貨——再搭配在餘燼上烤熟的麵餅一起吃。大夥兒既放鬆又疲倦，我想那段日子裡，同伴們對過往的懷念之情，在平原浩瀚的寂靜與草地持續不斷的沙沙聲中，得到了暫時的撫慰。我們不急著入睡，只是靜靜聽著微風吹奏那永恆不變的輕柔音調。除了蘿絲那洪亮的女高音之外，這是我聽過唯一的音樂。</p>\n<p>有時，當我回到圍著火堆的那群人中間，會感到一陣情緒湧上；黑夜中搖曳的火光、休憩中的女人剪影、話語的交錯，或是丹妮絲尖細的嗓音將另一個時代的哀歌傳遍平原，這些都觸動了我。於是我理解了安西亞所謂的美——在他們的世界裡，這似乎曾如此豐盛。</p>",
  "<p>四個月後，我們啟程返家。我們繞了一個大圈，因此只花了一個月就回到村莊。眾人略感忐忑，但無人喪命。承諾用於新建築的木材已經備妥，我們便開始動工。我極度享受這項工作。我們找到兩處絕佳的地點，若決定離開現有聚落便可遷移，但這看來不太可能——我看出女人們對新居感到滿意，在冷藏庫幾乎見底之前，她們絕不會同意離開。儘管如此，房屋完工後，我仍與安西雅匆匆前往最近的地點探查：那條河寬闊宜人，水生植物豐茂，河床富含黏土，她說或許能用來製磚。還有一片小樹林，對木材供應至關重要。「我不確定你有沒有注意到，剩下的樹木不多了，」她說。「它們長得很慢，可能在肉類耗盡之前，我們就會先缺木柴。」</p>\n<p>回到不久後，安琪拉便說自己身體不適。她時常頭暈、記憶斷片、疲倦不堪，怎麼休息都無法恢復。她告訴我們，自己大約不超過六十或六十五歲，但原生家族的人壽命都不長。她希望萬一情況發生時，我們不要讓她像瑪格麗特那樣受苦或衰竭。</p>\n<p>「那你希望我們怎麼做？」安西亞抗議道。「我明白你的要求，如果我有針筒和藥品，我什麼都可以答應你。但在這裡？」</p>\n<p>「有那些刀子，」安琪拉回答，「你知道該往哪裡刺，才能刺中心臟。」</p>",
  "<p>事實證明這並無必要。她很快就陷入昏迷，三天內便過世了，但這個念頭卻在安西亞心中生了根。她想起瑪莉珍——那個跑進碉堡裡上吊自殺的女孩。</p>\n<p>「妳看，這件事始終縈繞心頭，啃噬著我。她在深夜獨自逃離，或許在編織繩索時還因痛苦而哭喊。我覺得自己拋棄了她。安潔拉說得對：我知道心臟在哪裡，也知道如何捅進一刀讓它停止。我想，若有人承受與瑪麗珍相同的痛苦，我有義務做該做的事，但我害怕自己太過懦弱。」</p>\n<p>「你可以教我，」我說。「我做得到。我和你們其他人不一樣。」</p>",
  "<p>逃出後的第十三年，我們決定遷移，因為肉品幾乎耗盡。又有好幾名婦女過世，如今只剩下三十二人，但這些死亡要麼來得很快，要麼平靜安詳，所以我始終無須履行承諾。我們利用僅存的幾棵樹和推車輪子，拼湊出簡陋的板車，裝載桌椅。我們走了三週，來到距離第一個村莊三天路程的新地點，蓋了十間屋子。第一間盡可能寬敞，其餘的較小，僅容少數婦女入住。這是項浩大的工程，但自然帶給我們莫大的樂趣。我們已成為稱職的木匠，屋頂結構紮實。甚至用河床的泥巴製作出極佳的磚塊，牆壁或許不夠筆直，卻穩固牢靠。我們嘗試在門前開闢花園，收集幾株稀有的野花，但無論多麼細心澆灌，它們總是枯萎凋零。</p>",
  "<p>葛麗塔、安西亞、法蘭絲和我同住一間屋子。大部分女人都成對生活，只有丹妮絲、安娜貝爾與蘿拉三人搭夥。但我們只蓋了一間廚房，大家圍著排成大方形餐桌一起吃飯。村子花了一整年才建好，建成後我們便開始害怕閒散度日。有些女人真的愛上了木工活，我則多次外出尋找其他樹種或更粗的樹幹。有時我會找到中空的樹枝帶回來給蘿絲，她想雕刻一支笛子，卻始終不滿意成果。我們之中沒有人學過像製陶這類基本技藝，或辨認香草的學問。安西亞說，這塊土地即使如此貧瘠，也該比我們目前想到的方式提供更多創造資源。比如說，我們用來蓋茅草屋頂的水生植物，若能妥善處理，說不定能用來編織。法蘭絲記得亞麻需要漚麻，但什麼是漚麻？另一個女人提議將木材長時間浸泡再彎曲。然而我們的努力毫無成果，經歷幾次失望後便放棄了。</p>",
  "<p>漸漸地，我們所有努力都徒勞無功，這點消磨了我們的意志。我們有床可睡、有飯可吃，幾公尺的布料足以遮體，幾公斤的軟皂滿足衛生需求。我們將一個接一個死去，對於發生在我們身上的事一無所悉，而隨著歲月流逝，我們的問題也漸漸消失。地堡裡的燈光仍然亮著，而我完全無法接受自己永遠無法理解任何事物這件事。電力從哪裡來？安西亞告訴過我，一定有個發電廠在某處運作。它完全是自動化的嗎？會不會還有一些人，在不明白為什麼的情況下操作著它？它會不會在某天停擺，然後冷凍庫裡的肉品腐敗？沒有人夢想會有救援者出現，而殘存的幾個問題，總是圍繞著我們的失敗打轉。我不敢承認自己還想繼續走、繼續探索，因為我知道他們會覺得我瘋了。</p>",
  "<p>我們的情緒並非絕望——安西亞曾向我解釋，絕望是一種激烈的情感，會引發巨大的情緒爆發——而是一種平靜。不再有針對每個話題的深入交談，也不再像從前那樣神經質地強顏歡笑。在我們建造新村莊的那一年裡，女人們曾再度活躍起來，但隨後又陷入了昔日的遲緩，從不急著完成任何工作，因為工作少得可憐，她們寧可慢慢消磨時間。這讓她們看起來像老婦人。她們沒有理由抬頭望天，所以總是彎腰駝背地走路。最後的熱情已然熄滅，頭髮漸漸灰白，彷彿失去了求生的欲望。我們從監獄、平原以及失去所有希望的困境中活了下來，但女人們發現，生存不過是將死亡的時刻往後推延。她們繼續進食、飲水、睡眠，而在陰影之中，投降、無聲的屈服與死亡正蟄伏著。她們變得消瘦，愁苦面容上的皺紋愈加深陷，動輒氣喘吁吁，臀部疼痛，雙腿浮腫。伊莉莎白飽受出血之苦，葛蕾塔胃痛纏身，而安娜則半身癱瘓。</p>\n<p>她已無法言語，一隻眼睛緊閉，另一隻則苦苦哀求。我們全都明白她想求的是什麼，但安西亞邊哭邊顫抖，無法應允她的請求。</p>\n<p>「妳說過妳辦得到的，」安西亞低聲說，不敢直視我的眼睛。</p>\n<p>「我來做，」我告訴她。</p>",
  "<p>我並不完全明白。如果那就是安娜想要的，而我們也無法給她其他的慰藉，那麼他們為什麼要如此難以行動？我想，如今我已哭泣過，或許能夠理解他們了，但我無法確定，因為即使我大半輩子都與她們相處，我深知自己始終是不同的。我大概錯失了她們過去的一大塊。</p>\n<p>她已向我詳細解釋了一切。你得從鎖骨往下數肋骨，找到胸骨邊緣後再後退三指寬。她在自己的胸口上比劃，讓我看清那個精確的位置——我必須以迅速俐落的一擊，將刀深深刺入。</p>\n<p>「那麼，輪到我的時候，你就知道該怎麼做了。」</p>\n<p>她們全都離開了安娜躺臥的房子，只剩下我獨自與她相伴。我坐在她身旁。她望著我，我在她那殘存的臉龐上，看見她試圖對我微笑。我掀開覆在她瘦骨嶙峋胸膛上的毯子，清晰地數出每一根突出的肋骨，也輕易找到了胸骨的邊緣。我將手指按在那個位置，感受到她心臟的跳動，那跳動似乎還頗為有力。可以確定的是，若我們不加干預，她可能將長久地承受這駭人的苦楚。她抬起那隻尚能活動的手臂，輕撫我的臉頰，與此同時，我將那把耗費許久磨利的刀尖貼上她的肌膚。我的動作迅速而精準，她的手臂頹然垂下，心臟也再也沒有跳動。</p>",
  "<p>我承受過多次那種撫觸——那是我唯一能夠容忍的——那是女人們在我手中迎接死亡時無聲的感激。沒有人願意忍受痛苦，我想她們急於死去。我不知道自己殺了多少人——我這個事事計數的人，唯獨這件事，我從未數過。每一次，即使她們因最劇烈的痛楚而扭曲，當我即將出手時，我總能看見她們受折磨的臉龐逐漸鬆弛，而這並沒有讓我哭泣，因為我感受到了她們的急切與解脫。唯有在死亡的瞬間，她們才坦然承認絕望，義無反顧地衝向我為她們敞開的、幽暗的巨門，拋下那片讓她們人生錯亂的荒蕪平原，連回頭看一眼都沒有，急切地想要擁抱另一個或許根本不存在的世界——但她們寧願選擇虛無，也不願忍受那些空洞日子的徒勞循環。而我知道，在那一刻，她們愛著我。我的手從未顫抖。在她們最後的時刻，我們成了奇異的共犯，那時我是被選中的同伴，那個會解開她們難以理解的命運的人，比她們早已被遺忘的戀人——死在碉堡裡或另一片天空下的戀人——更加親近，比那些在門外啜泣、等待我出來、懷裡揣著用厚布包裹的刀——布能掩蓋任何血滴——的戀人更加親近。我會點點頭，證實一切都結束了，病痛的女人苦難已盡，至少對我們其中一人而言，折磨已經終止。然後我們可以哼唱死亡的歌。之後，我們會沉默片刻，彼此凝視，接著女人們便走進屋裡，用我們那條最新最好的毯子將死者包裹起來。夜幕降臨時，我們把她抬到墓地，輕柔地放進墓穴中。她們一個接一個，被埋葬在那片天空下，而無論是她們還是我，都不知道那是否是我們出生的那片天空。</p>",
  "<p>我無須親手終結安西亞的心跳。每一次死亡，都像在慢慢殺死她。逃出監獄時我們曾懷抱那麼多希望，而後卻是一切逐漸消散，期望一點一滴被拋棄，一場不戰而敗的潰敗，將所有生機都殺死了。她思索著，究竟是從何時開始，我們才驚覺自己雖身處開闊天地，卻和當年困在鐵欄後時一樣，同樣是囚徒？是在找到第二個地堡時，看見那三十九具女屍堆疊相壓的駭人景象之後嗎？還是第一次走下樓梯，卻再也無法指望那鐵籠會被打開的時候？或是瑪麗珍上吊自殺的那一刻？我們究竟是何時才確信自己毫無未來，注定要繼續寄生在那些囚禁我們的人留下的殘骸上，像小偷一樣潛入地下盜取敵人的食物？而我們又何以沒有因極度的噁心厭倦而死去？她無止盡地反覆琢磨這些問題，而我則默默聆聽。找不到任何答案的絕望，滋養著那股正將她殺死的悲傷。當我們只剩六人，葛麗塔也死去時，安西亞已無力站立，必須被抬到墓地。我們用了和朵洛西死時一樣的擔架，安西亞仰躺著，在行走時凝望天空，仍在思索那是否還是地球的蒼穹。天上有一輪月亮。女人們總說它看起來像她們記憶中的月亮，但她們不確定能否相信自己的記憶。安西亞的視力已變得模糊，她徒勞而執拗地瞇起眼睛。我們到達時，葛麗塔已躺在墓穴中，蘿拉在一旁守靈。羅絲已經過世，但女人們學會了那首歌，她們的歌聲在平原上迴盪許久，因為她們反覆唱了好幾遍。我從未唱過歌。在地堡裡我們不曾歌唱，而之後為時已晚，我喉頭哽住，唱不出聲。 我也無法呼喊，只能發出沙啞的嘎聲，傳不了多遠。我不知道自己是否還能說話。當然，我只需試試便知，但我似乎並不想這麼做。在一個無人可交談的世界裡，即使啞了，又有什麼關係呢？</p>",
  "<p>我們在墓旁站了很久，無語。不時有女人重複那句恐怖的話：「從深淵中，我呼喚祢，上主。」或許這不是最準確的翻譯，我們沒有人真正懂得那種已死的語言——他們在一片幾近死亡的荒地上吟誦的語言——但她們告訴過我她們所理解的。她們的聲音往上攀升，凝視著黑暗的天空，彷彿在某種程度上期待回應，但穹蒼之上，除了星辰無聲的運行，什麼也沒有。然後，一個接一個，她們沉默下來，合唱團像無人看顧的火般熄滅，寂靜降臨，只有那永恆吹拂的微風輕輕擾動。我們所能做的，就是把泥土撒在毯子下幾乎看不清的瘦削身軀上，然後慢慢走回那座空屋林立的村莊。</p>\n<p>女人們將擔架放在床邊後便離開了，留下我們兩人獨處。我把安西雅安置到她的床上——她瘦得厲害，我輕易就能將她抱起。我仔細為她蓋好被子，因為她變得對寒冷格外敏感，我們互道了晚安。但我聽見她在哭泣，自己怎樣也無法入睡。我起身走到她床邊坐下。她要我握住她的手。她知道我有多麼厭惡與他人接觸，而我明白，她之所以要我克服這份反感，正是因為她極度渴望這可憐的觸碰。</p>\n<p>「你知道妳終究會獨自一人。」她說。</p>\n<p>我經常思索這件事。</p>",
  "<p>「你小的時候，我盡己所能照顧你，後來又把我所知的一切都教給了你。但很快我將無法再陪伴在你身邊。我覺得自己像是在遺棄你。」</p>\n<p>「你別無選擇。」我回答。</p>\n<p>「妳要怎麼活下去？」</p>\n<p>「我會繼續前進。我會繼續尋找。如果是我自己的意思，我絕不會停下，但我看得出其他人已經撐不下去了。」</p>\n<p>「你能撐下去嗎？你不會發瘋吧？」</p>\n<p>「我不明白你所說的『瘋狂』是什麼意思。你知道我和你們其他人不一樣。那些你們如此懷念的事物，我從未經歷過，就算經歷過，我也毫無記憶，而這對我來說也無傷大雅。對我而言，彷彿我一直都是孤獨的，即使身在你們之中也是如此，因為我如此與眾不同。我從來沒有真正了解過你們，我不知道你們在說些什麼。」</p>\n<p>「確實如此，」她同意道。「你是我們之中，唯一屬於這個國度的人。」</p>\n<p>「不，這片土地屬於我。我將是它唯一的主人，這裡的一切都將是我的。」</p>",
  "<p>此後，她靜默躺了許久。我猜想她是在回憶過往，那段她曾擁有的、充滿意義卻已失去的時光——因為淚水不時滑過她的臉頰，我便輕輕為她拭去。除此之外，我們動也不動，我能感受到她那不規律的心跳，就連握著她的手時都能察覺。我已學會辨識這種節奏，它會愈來愈微弱。你以為它停歇了，但它又會再次搏動，然而終究毫無希望；生命不夠頑強，無法勝出。我不確定安西亞能否看見黎明。夜裡某個時刻，她問我是否願意將她抱在懷裡。</p>\n<p>「我好冷。」</p>\n<p>我主動提出去拿另一條毯子。她微微點頭，勉強擠出一絲笑容。</p>\n<p>「我需要被擁抱。」</p>\n<p>這讓我費了一番力氣，而我確信自己成功地隱藏了這一點。我在她身邊躺下，她把頭靠在我肩上，而我將她緊緊摟入懷中。</p>\n<p>「我曾經那麼愛你，」她對我說。</p>",
  "<p>她逐漸陷入淺眠，我想她是做夢了，因為她偶爾會輕微抽動、含糊不清地喃喃自語。天快亮時，她完全平靜下來，呼吸變得極其輕柔。我不怕自己會睡著，全神貫注地感受她逐漸流逝的生命。我不確知她何時停止呼吸——我們兩人都如此安詳靜默。死亡有時如此輕柔，悄然潛入，稍作停留便帶走獵物，而我竟未能察覺這轉變。當我確定一切已經結束，我仍躺在原地，久久將她擁在懷裡，如她所願。</p>\n<p>這是我唯一能做的事。</p>\n<p>最後剩下法蘭西絲、丹妮絲、蘿拉和我。幾個月後，法蘭西絲在屋裡跌倒，摔斷了腿。安西亞曾跟我解釋過老年婦女發生這類骨折的情況，她根本沒有康復的機會。法蘭西絲痛得連我們想扶她起身或讓她舒服一點都不願意。她要求我立刻用刀刺死她，她不願多承受一分一秒的痛苦。我確保刀鋒磨得盡可能鋒利後，留下她與丹妮絲和蘿拉獨處。等我回來時，那兩個身體健全的女人起身要離開屋子，這時發生了一件奇怪的事：她們經過我身邊時都停了下來，緊緊擁抱了我，彷彿在為我即將做的事向我道謝。我在法蘭西絲身旁跪下，她抓住我的肩膀將我拉近，在我兩頰各印下一個吻。</p>\n<p>「妳真是善良，」她說。</p>",
  "<p>那觸動了我。我對她微笑，而當刀子刺入時，她也正微笑著。</p>\n<p>從墓園回來後，丹妮絲要我為她做同樣的事，但我不明白為什麼無法對一個身體仍算健康的女人下手——即使我知道她承受著多大的悲痛。她得再等三年，直到她像安娜那樣半身癱瘓，只是她的臉沒有受影響，還能開口說話。</p>\n<p>「現在，妳願意嗎？」</p>\n<p>「現在，情況不同了。我必須這麼做。」</p>\n<p>於是我便與蘿拉獨自留下。除了我之外，她是那群女人中最年輕的，而她的死亡似乎還不那麼迫在眉睫。儘管她曾陪我出過幾次遠征，我對她卻沒有什麼自然的好感。她頗為暴躁，總是喋喋不休地抱怨。當我們單獨相處時，她的性格變了。她從未反對過我的決定，而說實話，要反對那些我誇大其詞稱之為「決定」的東西，還真需要不少想像力。如果我說該去最近的碉堡取些肉、洗衣服或生火，那總是因為我們的肉快吃完了，衣服也髒了。她似乎完全任由我引導，而我察覺到，她對自己的生命已失去了所有興趣。</p>",
  "<p>某個早晨，我提著滿滿的罐頭食品正要返回村莊，被她失神的神情深深觸動。那時正值雨水最少的季節，我把長椅搬到門外。她坐在那裡，呆望著遠方。多年來她的視力一直不好，此刻她直視遠方，甚至沒有像往常那樣瞇起眼睛——雖然她曾說這樣能幫助分辨事物。她的雙手擱在大腿上，掌心朝上，彷彿忘了翻過來，這讓她看起來異常、被遺忘，像一個被隨意擺放在那裡、無人費心整理的女人，宛如匆忙間掉落在地、皺巴巴的衣裳。她的雙腿微微分開。從前在地牢裡，蘿拉像所有人一樣瘦削，後來她發胖了，總是抱怨自己控制不住食慾。但自從她的戀人愛麗絲死後，她對食物失去興趣，體重減輕許多。如今她擺出一個豐腴女人的姿態——雙腿併攏時膝蓋因大腿粗壯而無法相觸，彷彿她的身體已不再認得當下的自己。她的裙子微微上捲，露出乾癟脆弱的肌膚。那是我親手做的裙子，細心地從磨損最少的罩衫中挑揀可用的碎布拼湊而成，她看著我工作，彷彿無法真正理解我為何如此忙碌。後來她穿上裙子，短暫恢復神智向我道謝。我們一向非常講究禮儀，即使在地堡裡也是如此——大概是想以此區別於那些揮舞鞭子的警衛吧。</p>",
  "<p>我向她走近，一邊說話以免驚嚇到她。我告訴她我帶了些湯回來，我們很快就能吃東西了，還帶了些肥皂，因為我們最後一包快要用完了。</p>\n<p>「但我是對的，我到處都找過了，可是再也沒有線了，我沒辦法幫你補裙子。」</p>\n<p>過去我們曾用她的頭髮來縫補，但如今我們的頭髮已停止生長，變得又短又稀疏。</p>\n<p>我對她說話時，心想得再出去一趟探險，因為我們也快沒有肥皂了，但我忍住了沒說出口。我只是為了說話而說話，被她那空洞、失神的表情嚇到了——她看起來就像睜著眼睛在睡覺。她猛然一驚，轉頭面向我，如同先前告訴過我的，想必只看見一個模糊的輪廓。</p>\n<p>「哦，是你啊，孩子，」她說，彷彿忘了世上只剩下我們兩人。「你是個好女孩。我幫不上你什麼忙。」</p>\n<p>我說了幾句安慰的話，便進去生火。她緩緩跟隨在後，站在我身旁，看著我，似乎想不出能幫上什麼忙。</p>\n<p>「妳覺得我還能活多久？」她問道。</p>\n<p>她的語氣平靜而尋常。她只是在問一個普通的問題，樂意聽完答案後便轉念去想別的事。如此對自身處境漠不關心，豈不是死期將至的徵兆嗎？</p>",
  "<p>那些女人始終只喚我「孩子」，即便如今我已獨自度過如此漫長的歲月，只因沒有其他名字，我仍隱約覺得自己是最年幼的——儘管已無人可以比對年歲。我回想起從前滿腔怒火、滿懷鄙夷的日子，那時總覺得她們在嘲笑我，覺得我一無所知而她們無所不知；此刻見蘿拉竟將我奉若神明般徵詢意見，不禁令人心碎。她就那樣佇立著，渾然不知該如何安置自己的身軀。</p>\n<p>「你覺得不舒服嗎？」</p>\n<p>我遲遲沒有回答，她想必早已忘了自己問過什麼。她顯得有些愕然，費力思索了一陣，點了點頭。</p>\n<p>「我累了。但每個人都累了，不是嗎？」</p>\n<p>所有人：就只有我們兩個。</p>\n<p>「是的，每一個人。」我平靜地回答。</p>\n<p>若她已不記得所有人皆已死去，又何必提醒她？</p>\n<p>火已經生起來了。我添上木柴，蓋好爐蓋，拿起一只鍋子。選了兩罐番茄湯——安西亞教過我看罐頭標籤，我欣喜地發現這是那種裡頭有小肉丸的口味。蘿拉站在我身旁，彷彿不知還能做些什麼。她的雙腿似乎有些不穩。那跡象並不明顯，我也不太確定。起初我告訴自己，只是她那茫然失神的模樣讓我產生錯覺，但既然她不久後便離開了人世，想來她那時已步履維艱。我輕輕扶她到大桌旁坐下，將碗和杯子放在她面前。</p>",
  "<p>「再過幾分鐘就可以吃飯了。」</p>\n<p>「如果你喜歡的話，」她回答。</p>\n<p>我仔細端詳著她。她的面容完全沒有任何表情，或許是我自己的焦慮使然，才會覺得她看起來迷惘失神。她的眼神呆滯，雙臂垂在身側。我本想將她的手放回膝上，但這個念頭讓我想起自己常做的那個動作——將死去女人的雙臂交疊在胸前，再為她闔上眼睛——於是我收回了手。但與此同時，我確信她正在死去。</p>",
  "<p>她就這樣站著，連生病都沒有？放棄的不是她的身體，而是她的精神——那份日益疲憊、再無力驅動那些肌肉、讓那顆心臟跳動、走完整個生命過程的精神。這精神長久以來未受任何滋養，眼睜睜看著姊妹們死去，唯一的伴侶是個厭惡她、她也厭惡的女人。多麼悲慘！我對自己說。多麼悲慘！她曾經活了二十或二十五年的正常命運，然後瘋狂的事發生了，她進入一個荒謬的世界，被一群和她一樣困惑的陌生女人包圍。儘管如此，她還是試著去愛。我想起愛莉絲，一個活潑急躁的女人，我打擾她後道歉時，她會對我說：「去玩吧！」她們曾住在一間小房子裡。她們大聲爭吵，又鄭重許諾和好：總得找點事來打發時間。我在蘿拉面前坐下，真心想說些能維繫她的話語，但老實說，在這片荒蕪之地，在寂靜與孤獨中，我自己也是無知而荒蕪的，我又能給她什麼？她為什麼要活下去？我們什麼也沒做，哪裡也去不了，我們誰也不是。</p>\n<p>「妳看，」我對她說，「我想出去探索。我不想在這裡終老一生，吃著罐頭食物，最後只為了把它再拉出來。」</p>\n<p>她抬頭看向我。可以看出她正極力試圖理解我在說些什麼。於是，為了幫助她，我說道：</p>\n<p>「我要出去探索了。」</p>",
  "<p>「但什麼也沒有啊，」她驚訝地說。「就只有那些地堡。」</p>\n<p>對她而言，思考是一件極為費力的事。</p>\n<p>「這裡連季節都沒有。」</p>\n<p>「我們不知道。我們放棄得太早了。我們只搜尋了兩年，不是嗎？」</p>\n<p>「那是因為那些老婦人的緣故。我們得不斷停下腳步，好讓她們能平靜地死去。有時候，她們拖了好久好久。她們的狀況一直好轉，我們還以為她們會康復呢。」</p>\n<p>「我想離開。我還不老。」</p>\n<p>「等等，」她說。「等等，我馬上就好。」</p>\n<p>她明白我。我們兩人都清楚，她無法獨自應付——沒有力氣去地堡取食物，也無法撿拾足夠的柴火來生火，而我，也無法棄她而去。</p>\n<p>湯是熱的。我們沉默地吃著，然後我去河邊洗碗。回來時，她又坐在長椅上等我。她會一直坐在那裡，直到睏了，才去躺到她的床墊上睡覺。睡著的時候，她也在等待醒來。</p>",
  "<p>我並不希望她死去，但若真要讓她活著，我又怎能真心如此期望？那個下午，我好幾次感到一陣不耐的顫動。想到自己即將獲得自由，我欣喜若狂。為了平復這份興奮，我開始盤算需要準備些什麼。我會拿一個大袋子，裝上足夠兩週的糧食、兩條毯子——因為我已經習慣了睡在床墊上，擔心地面會太硬。等到適應之後，一條毯子就夠了，行囊也會輕一些。我需要大量火柴、一把小鏟子和靴子。切記要帶上肥皂。我的裙子早已破爛不堪，但我一定能找到布料和針線，因為我經常看到有補給的碉堡。如果我想走遠路，就必須確保找到合腳的靴子。過去我曾有過起水泡的不愉快經驗，而多年來我一直穿著涼鞋。我們從未找到任何襪子，我腳上的皮膚變得柔軟，但我知道它很快就會重新變硬。</p>\n<p>我忙進忙出，滿心歡喜地投入那些寥寥可數的家務，腦中不停地盤算著路線。我一再檢視需要帶上的物品清單，數算、重複、歸納，直到情緒開始變得煩躁不已。很快地，所有能做的事我都做完了：地板掃過了，床墊翻面了，毯子抖過了，再也沒有東西需要清洗或收拾。我走到外面，坐在一張面對蘿拉的椅子上。</p>",
  "<p>她凝視著天空，注視著稍後太陽會落下的地方，目光比以往任何時候都更加空洞、更加恍惚。她的呼吸平穩。雙手再次放在大腿上，掌心朝上，我可以看見她手腕外側一條微小的動脈正搏動著。規律、清晰而有力。正因為如此，我不認為她是死於身體疾病，而是她拋棄了那副可以再撐好幾年的堅韌軀體——除了她的眼睛。她聽見我走過來，咕噥了幾個字，聲音輕柔到我聽不明白，但我也不想請她再說一次。她有什麼話能對我說？我們之間有什麼有趣的事情值得互相傾訴？說今天天氣不錯、今晚不太可能下雨、太陽快下山了？她既沒興趣告訴我，我也沒興趣聽，很可能她只是出於禮貌試圖對我說話，表示她高興有我陪伴，但這大概不完全是實話。除了食物和飲水——只會延續她已不再渴望的存在——我還能給她什麼呢？</p>\n<p>「是啊，當然，」我說。</p>\n<p>這讓她感到滿意。我們達成共識，卻不太確定究竟是關於什麼。或者也許，是因為我們明白彼此毫無共同之處。於是我們就這樣靜靜坐著，沉默不語。</p>",
  "<p>我沒有望向天空。我全神貫注在蘿拉身上。她彷彿正在自己的內裡消失，逐漸退縮、愈退愈遠。起初，她的臉上還殘留著一些表情——那一抹歡迎我時留下的微笑殘影、一絲倦意，以及當蟲子停在她手上時，一抹微弱的皺眉。她一動也不動，我拂去了那隻蟲，但她似乎渾然不覺。夕陽映照著她的臉龐。沒有陰影，除了皮膚之外什麼也看不見，皮膚緊繃在仍活著的組織上，一個活生生的模特兒，有高有低，與平原或丘陵的地形不同，眼睛可以探索，但除了它們的形狀之外，什麼也學不到。我當然可以觸碰她，用雙手撫摸她的臉頰，但是她會感覺到嗎？有一刻，一切都彷彿凝固了。我可以清楚地看見她手腕上的小動脈仍在跳動，但我確信蘿拉已經死了。她的呼吸輕柔而規律，帶著一種無法停止的自動節奏，但她已經不再思考。過去，安西亞解釋過什麼是腦電圖：蘿拉的腦電圖會是一條直線。她坐在長椅上，凝視著夕陽，在腦迴的褶皺中、在記憶神祕的角落與縫隙裡迷失了心智，她向後退去，尋找一個有意義的世界，在迷宮中迷失方向，逐漸衰敗、黯淡，無聲地被抹去，然後如此緩慢地消逝，以至於無法確切指出那道閃爍的小火焰與陰影之間的轉折點。當太陽觸及地平線時，她的手腕在暮光中清晰地顯現出來，我看見那白皙的皮膚下不再有任何動靜。我深深地嘆了口氣。我最後的一條聯繫，斷了。</p>",
  "<p>我們挖的洞穴在沙漠中並不孤獨。其他洞穴散布各處，有些靠近，有些遙遠。我們知道它們的存在，因為我們躺在自己洞穴的底部時，能看到地平線上有其他奇怪的隆起，像是大地長出的膿包。</p>",
  "<p>我坐著凝視她許久，然後將她平放在長椅上，把她的雙手交叉置於胸前，小心地讓掌心朝下。她那雙近乎失明的眼睛已經自己闔上了，我無須費心。沒有理由再耽擱。我拿起鏟子，到大屋後方去挖土，其他人早已葬在那裡。夜空萬里無雲，一如往常清澈，雖然不見月亮的蹤影。不必挖太深的坑——沒有動物會來刨出屍體，我也不打算堆起土丘或立下標記，標示這裡長眠著一具人類的遺骸。我會記得，但這世上已沒有其他人需要告知。一個時辰後，墓穴便準備妥當。我還得把蘿拉運過去。挖掘時我一直在想這件事。我孤身一人，而她雖已瘦削許多，我仍懷疑自己是否有力氣扛起她。想到要將她放在推車上，我便感到排斥：那車太短，她的雙腿會怪異地懸盪，而我希望能以體面的方式運送她。我確實陷入兩難，直到回到她身邊時，瞥見那張很久以前做的木桌，靈光才乍現。我可以把桌子擱在推車上，再將蘿拉安置其上，謹慎地用最好的毯子裹住。過程極為困難，我暗自懷疑，多年久坐不動的生活早已侵蝕了我的體力。我耗盡了全部的決心。待我準備好護送蘿拉入土時，夜色早已深沉。我去採了幾朵野花，撒在她的面容周圍，正如那群女人曾經做過的那樣。她面色蒼白，神情安詳，看起來並不比心臟仍在跳動、卻已對活著失去興趣時更像死去。</p>",
  "<p>我開始推動推車。必須時常停下來，清除石塊、掃平地面，這是一場緩慢的葬禮隊伍，由僅存的最後一位女子埋葬另一位女子。我停下腳步，彎下腰，又直起身來。我記起曾聽過的那些朝聖的描述，那些人跪著繞行教堂，祈求赦免自己的罪孽。我始終不太理解那究竟是怎麼回事，但我感覺到，自己正在參與一個極為古老的儀式，屬於那個我來自卻又如此陌生的星球。</p>\n<p>「到了。」我對著蘿拉的遺體說道，「就快結束了。」</p>\n<p>我盡可能輕柔地將她抱起，這比觸碰活人還要令我少些不適。她沉得驚人，要將她安置在地上而不震動到她著實困難，但我還是做到了。我不願用泥土覆蓋她，不想掩蓋那張安詳的臉龐與我仔細梳理過的白髮。我將大桌放倒在地上，拆去桌腳，再將桌面蓋在墳上。我將四周的泥土整平，退後一步：這是一座平整潔淨的長方形墓塚。雨水雖稀少，終究會將木材漂白，但它會穩穩地待在那裡，蘿拉將能靜靜地化為塵土。</p>",
  "<p>我躺上床。經歷了這番折騰，本以為會倒頭大睡，但啟程的念頭讓我過於興奮，難以入眠。大約凌晨三點，我再也等不下去，起身重新生火燒水，開始收拾行裝。當年還有三四十人時，我們總得顧及那些年邁的婦女，她們走得慢，也背不了太多東西。但我身強力壯，決定帶上三週的補給，這足夠撐到我找到下一個地堡。這些年來，我們找到了六個金屬水壺，我把它們都裝滿了水，因為河流實在稀少，有時得走上好幾天才能從一條河趕到下一條。安西婭告訴我肉類能補充體力，而在埋葬蘿拉時，我也意識到自己需要重新積蓄力量。罐頭裡的肉不夠，我便決定去冷藏庫多取一些，用長時間燉煮的方式來保存。</p>",
  "<p>我們在距男子監獄五公里處定居下來，依例關上了大門——這是我們從不省略的簡樸儀式。當我取出肉品補給時，想最後再看一眼過去十年間死去的同伴。隨著時間流逝，惡臭已然消散，因為空調仍在運轉。穿梭於各個地堡之間時，我已習慣了那些胡亂堆疊、如今已成木乃伊的屍體。然而，有一具特別引人注目。他獨坐於他人之外，離那扇鎖著的門很遠。他是想與那群直到最後一口氣還在攻擊鎖頭的瘋狂人群隔絕，還是像我一貫所做的那樣，在給了那些再也無法承受卻又無法停止活著的人最後一擊後，成了最後死去的那個？他在身後折了一張床墊，兩側也各放了一張，所以他坐得筆直，身體被牢牢支撐著。在我看來，他死得驕傲，高昂著頭，那雙大眼睛凝視著黑暗的通道，帶著自尊與挑釁的神情。我繞過籠子走近他：儘管他臉上殘餘無幾，但我有種印象，覺得他生前必定英俊，深色的鬍鬚與枯萎的皮膚掩蓋不了他面容的美。他的拳頭緊握，並排放置在膝蓋上，或許這就是昔日戰士的死亡姿態，手握武器，直視命運。他的軀幹半罩在一件破爛的束腰外衣下，我能看見那一定曾經強壯的肩膀顯露出的有力骨架。一股悲痛湧上心頭，我這個從未識得男人的女子，站在這個試圖克服恐懼與絕望、想帶著憤怒與尊嚴走入永恆的男人面前。我嘆了口氣，轉身離去。</p>",
  "<p>我緩慢地爬了上去，因為一股奇異的懷舊之情正在呼喚我回頭。我再也不會走進這個地下碉堡了。啊！我還會見到上百個其他碉堡，它們有那麼多，但在這個我曾頻繁取用物資的地方，我從未費心去看那些乾枯的屍體，而此刻，其中一具竟觸動了我。我先前沒在屍群中注意到他，而當我終於看見他時，我正要離去。若在另一種人生裡，我或許會與他相遇。他年紀不算太大，可能是父親的朋友，或者父親本人——畢竟我確實有過父親。甚至是情人。但我對他所知的，僅是他想要有尊嚴地死去，筆直坐著，遠離他人，避開其他人纏繞其中的推擠、恐懼與哭喊。他是個孤獨者，像我一樣，一個驕傲的人，而我正要離去，對他除了最終的計畫之外一無所知。但至少他達成了那個計畫。他曾想面對自己的命運直到最後一刻，而有人知情。只要我還活著，對他的記憶也將存活，他的驕傲與孤獨將有一位見證者。我停下了，猶豫片刻，然後又走下去，凝視了他許久。在他那羊皮紙般的臉上，沒有新的東西可發現。我感到一股深沉的哀傷。我告訴自己，或許在人類的時代，人們就是這樣向心愛之人的遺體告別——試圖將他們銘刻在記憶中。我對他一無所知，但對自己也一無所知，只知道，有一天，我也會死去，並且，就像他一樣，我會把自己撐起來，筆直挺立，直視前方直到最後一刻，而當死亡戰勝我的目光時，我將如同一座高聳的紀念碑，在沉默面前懷著憎恨豎立起來。</p>",
  "<p>我勉強與他告別。回到村莊後，我煮了肉。因為必須不斷添柴，我無法上床睡覺。天色將亮，我仍毫無睡意。在地牢裡，睡眠是強制的，後來我才發現這不僅是身體所需，最好也與眾人保持相同的作息。但我現在是獨自一人。再也沒有人依賴我，我的習慣也不會打擾任何人。我完全信任自己的身體，它需要休息時自然會要求睡眠，因此如果我沒睡意，就沒有理由勉強上床。我可以離開了。我穿上鞋子，背起背包，走出門外。我甚至不必熄滅爐火、鎖上房門，或收拾那些留下來的零星物品。我唯一需要做的，只是決定該往哪個方向走。</p>",
  "<p>我朝著旭日東昇的方向走去，眼前的天色壯麗非凡。天空中不見一絲雲彩，我喜愛凝視白晝逐漸展開。我以從容不迫的步伐出發，這樣的節奏我能維持很長一段時間。我依著地景辨認方位，開始了這場我打算持續一生的長途跋涉——儘管連我自己也不清楚從中期待著什麼。我沿著平緩的長坡向東行進，抵達頂端時轉身回望。凝視著村莊裡那十間我滿心喜悅搭建起來的房舍，最大那棟後方是我埋葬安西雅的墓地。直到此刻，我才對自己承認：我對她的感受——那緩慢滋長的信任，總想與她相伴的偏愛，每次探險後重逢時的喜悅——大概就是女人們所謂的愛吧。現在，我已經沒有任何人可以愛了。</p>",
