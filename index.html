<meta name="viewport" content="width=device-width, initial-scale=1">
<title>書架 · The Lonely Writer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #eae9e4;
  --ink:    #1c1c24;
  --dim:    #6a6a78;
  --rule:   #ccccc4;
  --shelf:  #c8c2b4;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "PingFang TC", "Noto Sans CJK TC", "Microsoft JhengHei", sans-serif;
  -webkit-font-smoothing: antialiased;
}

header {
  padding: 3.5rem 2rem 2rem;
  text-align: center;
}
header h1 {
  font-family: "Songti SC", "STSong", Georgia, serif;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  font-weight: 400;
  letter-spacing: 0.2em;
  color: var(--dim);
}

/* ── Shelf ── */
.shelf-wrap {
  max-width: 720px;
  margin: 1.5rem auto 4rem;
  padding: 0 1.5rem;
}

/* Shelf rail */
.shelf {
  display: flex;
  flex-wrap: wrap;
  gap: 2.5rem 2rem;
  padding-bottom: 1.2rem;
  border-bottom: 3px solid var(--shelf);
  position: relative;
}
.shelf::after {
  content: '';
  position: absolute;
  bottom: -7px; left: -4px; right: -4px;
  height: 5px;
  background: linear-gradient(to bottom, var(--shelf) 0%, transparent 100%);
  border-radius: 0 0 3px 3px;
  opacity: 0.5;
}

/* Book card */
.book {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  width: clamp(140px, 28%, 180px);
  transition: transform 0.2s ease;
}
.book:hover { transform: translateY(-6px); }
.book:active { transform: translateY(-3px); }

/* Book cover block */
.cover-block {
  width: 100%;
  aspect-ratio: 2 / 3;
  border-radius: 2px 4px 4px 2px;
  position: relative;
  overflow: hidden;
  box-shadow:
    2px 3px 8px rgba(28,28,36,0.18),
    inset -2px 0 5px rgba(0,0,0,0.08);
}

/* Spine line */
.cover-block::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: rgba(0,0,0,0.15);
  border-right: 1px solid rgba(0,0,0,0.07);
}

/* Cover text */
.cover-inner {
  position: absolute;
  inset: 0;
  padding: 1.2rem 1rem 1rem 1.3rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.cover-title {
  font-family: "Songti SC", "STSong", "FangSong", Georgia, serif;
  font-size: 0.82rem;
  line-height: 1.65;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 1px 3px rgba(0,0,0,0.25);
  writing-mode: vertical-rl;
  text-orientation: mixed;
}
.cover-author {
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.7);
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

/* Book info below cover */
.book-info {
  margin-top: 0.9rem;
  padding: 0 0.1rem;
}
.book-info .title {
  font-family: "Songti SC", "STSong", Georgia, serif;
  font-size: 0.9rem;
  letter-spacing: 0.06em;
  line-height: 1.5;
  color: var(--ink);
}
.book-info .author {
  margin-top: 0.3rem;
  font-size: 0.72rem;
  color: var(--dim);
  letter-spacing: 0.05em;
}
.book-info .read-cta {
  margin-top: 0.5rem;
  font-size: 0.68rem;
  color: #8fa5c4;
  letter-spacing: 0.1em;
}

footer {
  text-align: center;
  padding: 0 1rem 3rem;
  font-size: 0.72rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  opacity: 0.6;
}
</style>

<header>
  <h1>書　架</h1>
</header>

<main class="shelf-wrap">
  <div class="shelf">

    <a class="book" href="harpman.html">
      <div class="cover-block" style="background: linear-gradient(135deg, #5a7a9e 0%, #3d5c7a 60%, #2d4560 100%);">
        <div class="cover-inner">
          <div class="cover-title">未曾識得男人的我</div>
          <div class="cover-author">賈桂琳・哈普曼</div>
        </div>
      </div>
      <div class="book-info">
        <div class="title">未曾識得男人的我</div>
        <div class="author">賈桂琳・哈普曼</div>
        <div class="read-cta">開始閱讀 →</div>
      </div>
    </a>

    <a class="book" href="gh.html">
      <div class="cover-block" style="background: linear-gradient(135deg, #7a5a4e 0%, #5c3d30 60%, #3d2218 100%);">
        <div class="cover-inner">
          <div class="cover-title">G.H. 的激情</div>
          <div class="cover-author">克拉莉絲・李斯佩克多</div>
        </div>
      </div>
      <div class="book-info">
        <div class="title">G.H. 的激情</div>
        <div class="author">克拉莉絲・李斯佩克多</div>
        <div class="read-cta">開始閱讀 →</div>
      </div>
    </a>

  </div>
</main>

<footer>The Lonely Writer · 繁中文學電子書庫</footer>
